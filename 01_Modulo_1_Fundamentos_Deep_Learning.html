<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Material de aprendizaje autónomo del Módulo 1 — Fundamentos del Aprendizaje Profundo. Maestría en Ciencia de Datos, Universidad Santo Tomás. Historia, MLP, optimización, backpropagation, regularización y ética con analogías colombianas.">
    <title>Módulo 1 — Fundamentos del Aprendizaje Profundo · USTA</title>

    <!-- Preconnect para rendimiento de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para transpilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS (utilidades) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome (iconografía de apoyo) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Plotly (gráficas interactivas: activaciones, descenso del gradiente, curvas de aprendizaje) -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

    <!-- MathJax 3 — JUSTIFICACIÓN: el material es matemáticamente denso ($...$ y $$...$$);
         MathJax renderiza LaTeX de forma nativa y accesible sin dependencias locales. -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Google Fonts: Montserrat (texto) y Fira Code (código) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3D008D',
                        secondary: '#ED1E79',
                        navy: '#001A4D',
                        gold: '#FDB913',
                        bg: '#F8FAFC',
                        surface: '#FFFFFF',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            scroll-behavior: smooth;
        }

        code,
        pre {
            font-family: 'Fira Code', monospace;
        }

        /* Gradientes institucionales USTA */
        .usta-gradient {
            background: linear-gradient(140deg, #3D008D 0%, #ED1E79 100%);
        }

        .usta-header {
            background: linear-gradient(180deg, #001A4D 0%, #002868 100%);
        }

        /* Tarjeta con elevación al pasar el cursor */
        .usta-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .usta-card:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        /* Barra de desplazamiento personalizada */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3D008D, #ED1E79);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #4A00A8, #FF2D8A);
        }

        .code-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .code-scroll::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .code-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3D008D, #ED1E79);
            border-radius: 4px;
        }

        /* Animación de aparición */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Accesibilidad: foco visible */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid #ED1E79;
            outline-offset: 2px;
        }

        /* Código en línea */
        .inline-code {
            background: #F1F5F9;
            color: #0F172A;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: 'Fira Code', monospace;
        }

        /* Contenedores de gráficas Plotly */
        .chart-h-320 {
            height: 320px;
        }

        .chart-h-360 {
            height: 360px;
        }

        .chart-h-420 {
            height: 420px;
        }

        /* Tipografía de contenido */
        .prose-usta p {
            margin-bottom: 1rem;
            line-height: 1.75;
        }

        .prose-usta h3 {
            color: #ED1E79;
            font-weight: 600;
            font-size: 1.2rem;
            margin: 1.8rem 0 0.6rem;
        }

        .prose-usta h4 {
            color: #001A4D;
            font-weight: 600;
            font-size: 1.05rem;
            margin: 1.4rem 0 0.4rem;
        }

        .prose-usta ul {
            list-style: disc;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .prose-usta ol {
            list-style: decimal;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .prose-usta li {
            margin-bottom: 0.35rem;
            line-height: 1.65;
        }

        .prose-usta strong {
            color: #0F172A;
        }

        .prose-usta table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin: 1rem 0;
        }

        .prose-usta th {
            background: #F5F0FA;
            color: #3D008D;
            text-align: left;
            padding: 0.6rem 0.8rem;
            border: 1px solid #E2E8F0;
        }

        .prose-usta td {
            padding: 0.6rem 0.8rem;
            border: 1px solid #E2E8F0;
            vertical-align: top;
        }

        /* Ecuación destacada */
        .eq-block {
            background: #FAF8FF;
            border: 1px solid rgba(61, 0, 141, 0.12);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            overflow-x: auto;
        }

        /* Slider de la neurona interactiva (Cap. 2) */
        .usta-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: #E9E2F5;
            outline: none;
        }

        .usta-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ED1E79;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .25);
            cursor: pointer;
        }

        .usta-range::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ED1E79;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .25);
            cursor: pointer;
        }

        /* FIX MathJax + Tailwind: Preflight aplica svg { display: block }, lo que parte
           las fórmulas inline a una línea aparte. Restaurar el SVG de MathJax a inline-block
           (no afecta a las ecuaciones en bloque, que se centran por su contenedor). */
        mjx-container svg {
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ============================================================
           UTILIDAD: re-tipografiado de MathJax al cambiar de lección
        ============================================================ */
        const typesetMath = (retries = 25) => {
            if (window.MathJax && window.MathJax.typesetPromise) {
                try { window.MathJax.typesetClear && window.MathJax.typesetClear(); } catch (e) { }
                window.MathJax.typesetPromise().catch(() => { });
            } else if (retries > 0) {
                setTimeout(() => typesetMath(retries - 1), 200);
            }
        };

        // Re-tipografía SOLO el subárbol de un componente cuando cambia su estado
        // de revelado (pestañas, acordeones, retroalimentación). Evita que el LaTeX
        // recién mostrado quede como texto literal "\frac{...}".
        const useTypeset = (ref, deps) => {
            useEffect(() => {
                const t = setTimeout(() => {
                    if (ref.current && window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([ref.current]).catch(() => { });
                    }
                }, 40);
                return () => clearTimeout(t);
            }, deps);
        };

        /* ============================================================
           ICONOS (SVG en línea)
        ============================================================ */
        const Icons = {
            BookOpen: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            ),
            History: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M3 3v5h5"></path>
                    <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path>
                    <path d="M12 7v5l4 2"></path>
                </svg>
            ),
            Network: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <circle cx="5" cy="6" r="2"></circle><circle cx="5" cy="18" r="2"></circle>
                    <circle cx="19" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle>
                    <line x1="7" y1="6" x2="10.5" y2="11"></line><line x1="7" y1="18" x2="10.5" y2="13"></line>
                    <line x1="14" y1="12" x2="17" y2="12"></line>
                </svg>
            ),
            TrendingDown: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
                    <polyline points="17 18 23 18 23 12"></polyline>
                </svg>
            ),
            GitBranch: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <line x1="6" y1="3" x2="6" y2="15"></line>
                    <circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle>
                    <path d="M18 9a9 9 0 0 1-9 9"></path>
                </svg>
            ),
            Scale: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M12 3v18"></path><path d="M5 7h14"></path>
                    <path d="M5 7l-3 6h6z"></path><path d="M19 7l-3 6h6z"></path>
                    <path d="M7 21h10"></path>
                </svg>
            ),
            Award: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <circle cx="12" cy="8" r="7"></circle>
                    <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
                </svg>
            ),
            CheckSquare: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
            ),
            ChevronLeft: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            ),
            ChevronRight: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            ),
        };

        const renderIcon = (iconName, size = 20) => {
            const Icon = Icons[iconName];
            return Icon ? <Icon size={size} /> : null;
        };

        /* ============================================================
           BLOQUE DE CÓDIGO — resaltado, copiar y OCULTAR
        ============================================================ */
        const CodeBlock = ({ title, code, lang = 'python' }) => {
            const [copied, setCopied] = useState(false);
            const [hidden, setHidden] = useState(false);

            const handleCopy = () => {
                navigator.clipboard.writeText(code).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const meta = {
                python: { icon: 'fab fa-python text-yellow-400', label: title || 'Python' },
                pytorch: { icon: 'fas fa-fire text-orange-400', label: title || 'PyTorch' },
                shell: { icon: 'fas fa-terminal text-green-400', label: title || 'Terminal' },
                text: { icon: 'fas fa-file-alt text-gray-300', label: title || 'Salida' },
            }[lang] || { icon: 'fas fa-code text-gray-300', label: title || 'Código' };

            const escapeHtml = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            const protect = (src, patterns) => {
                const tokens = [];
                let out = src;
                patterns.forEach(({ re, cls }) => {
                    out = out.replace(re, (m) => {
                        const ch = String.fromCharCode(0xE000 + tokens.length);
                        tokens.push({ text: m, cls });
                        return ch;
                    });
                });
                return { out, tokens };
            };
            // Reconstruye los <span>: cada caracter del Area de Uso Privado (>= 0xE000)
            // que se inserto en "protect" se reemplaza por su token original.
            const restore = (src, tokens) => {
                let out = '';
                for (const ch of src) {
                    const code = ch.charCodeAt(0);
                    const t = (code >= 0xE000 && code <= 0xF8FF) ? tokens[code - 0xE000] : null;
                    out += t ? `<span class="${t.cls}">${t.text}</span>` : ch;
                }
                return out;
            };

            // Todo el resaltado se hace en UNA sola pasada de "protect": cada coincidencia
            // (strings y comentarios primero, luego palabras clave, tipos y numeros) se
            // sustituye por un caracter opaco que no es \w ni digito; asi ninguna regex
            // posterior puede tocar el marcado ya generado.
            const highlightPython = (raw) => {
                const escaped = escapeHtml(raw);
                const { out, tokens } = protect(escaped, [
                    { re: /"""[\s\S]*?"""|'''[\s\S]*?'''/g, cls: 'text-green-500 italic' },
                    { re: /#[^\n]*/g, cls: 'text-green-500 italic' },
                    { re: /"(?:\\.|[^"\\\n])*"|'(?:\\.|[^'\\\n])*'/g, cls: 'text-emerald-300' },
                    { re: /\b(?:class|def|from|import|return|if|else|elif|for|while|async|await|try|except|finally|raise|del|as|in|not|and|or|is|with|yield|lambda|pass|break|continue|None|True|False|global|nonlocal|assert|print)\b/g, cls: 'text-pink-400' },
                    { re: /\b(?:self|cls)\b/g, cls: 'text-orange-300 italic' },
                    { re: /\b(?:np|torch|nn|optim|F|plt|tensor|Tensor|array|ndarray|Linear|Sequential|ReLU|Sigmoid|Module|Adam|SGD|Dropout|BatchNorm1d|MSELoss|BCELoss|CrossEntropyLoss|matmul|dot|maximum|exp|sum|mean|zeros|ones|randn|float|int)\b/g, cls: 'text-yellow-300' },
                    { re: /\b\d+(?:\.\d+)?\b/g, cls: 'text-amber-300' },
                ]);
                return restore(out, tokens);
            };

            const html = highlightPython(code);

            return (
                <div className="my-4 rounded-xl overflow-hidden border border-gray-700 bg-gray-900 text-gray-100 shadow-lg">
                    <div className="bg-gray-800 px-4 py-2 text-xs font-mono text-gray-400 border-b border-gray-700 flex justify-between items-center">
                        <span><i className={`${meta.icon} mr-2`}></i>{meta.label}</span>
                        <span className="flex items-center gap-3">
                            <button onClick={() => setHidden(h => !h)} className="flex items-center gap-1 hover:text-white transition-colors" title={hidden ? 'Mostrar código' : 'Ocultar código'}>
                                <i className={`fas ${hidden ? 'fa-eye' : 'fa-eye-slash'}`}></i>
                                <span>{hidden ? 'Mostrar' : 'Ocultar'}</span>
                            </button>
                            <button onClick={handleCopy} className="flex items-center gap-1 hover:text-white transition-colors" title="Copiar código">
                                {copied
                                    ? <><i className="fas fa-check text-green-400"></i><span className="text-green-400">¡Copiado!</span></>
                                    : <><i className="far fa-clipboard"></i><span>Copiar</span></>}
                            </button>
                            <span className="flex items-center gap-1">
                                <span className="w-2 h-2 rounded-full bg-red-500"></span>
                                <span className="w-2 h-2 rounded-full bg-yellow-500"></span>
                                <span className="w-2 h-2 rounded-full bg-green-500"></span>
                            </span>
                        </span>
                    </div>
                    {!hidden && (
                        <div className="p-4 overflow-x-auto code-scroll animate-fade-in">
                            <pre className="text-sm leading-relaxed"><code dangerouslySetInnerHTML={{ __html: html }} /></pre>
                        </div>
                    )}
                </div>
            );
        };

        /* ============================================================
           CALLOUT (info / tip / warn / danger / eth)
        ============================================================ */
        const Box = ({ type = 'info', label, children }) => {
            const styles = {
                info: { border: '#3D008D', bg: '#F5F0FA', label: '#3D008D', icon: 'fa-circle-info' },
                tip: { border: '#15803D', bg: '#F0FDF4', label: '#15803D', icon: 'fa-lightbulb' },
                warn: { border: '#B45309', bg: '#FFFBEB', label: '#B45309', icon: 'fa-triangle-exclamation' },
                danger: { border: '#B91C1C', bg: '#FEF2F2', label: '#B91C1C', icon: 'fa-circle-exclamation' },
                eth: { border: '#0E7490', bg: '#ECFEFF', label: '#0E7490', icon: 'fa-scale-balanced' },
            }[type] || { border: '#3D008D', bg: '#F5F0FA', label: '#3D008D', icon: 'fa-circle-info' };
            return (
                <div className="rounded-xl px-5 py-4 my-4 border-l-4" style={{ borderColor: styles.border, background: styles.bg }}>
                    {label && (
                        <span className="inline-flex items-center gap-2 text-[0.7rem] uppercase tracking-wider font-bold rounded mb-2 px-2 py-0.5 text-white" style={{ background: styles.label }}>
                            <i className={`fas ${styles.icon}`}></i>{label}
                        </span>
                    )}
                    <div className="text-gray-700 leading-relaxed text-[0.95rem]">{children}</div>
                </div>
            );
        };

        /* ============================================================
           CALLOUT DESTACADO (tarjeta con cabecera en gradiente + ícono)
           Para los recuadros clave (p. ej. la dimensión ética).
        ============================================================ */
        const CalloutPro = ({ tema = 'eth', titulo, subtitulo, icon, children }) => {
            const temas = {
                eth: { grad: 'linear-gradient(135deg,#0E7490 0%,#06B6D4 100%)', bg: 'rgba(8,145,178,0.06)', border: 'rgba(14,116,137,0.22)', icon: 'fa-scale-balanced' },
                warn: { grad: 'linear-gradient(135deg,#B45309 0%,#F59E0B 100%)', bg: 'rgba(180,83,9,0.06)', border: 'rgba(180,83,9,0.22)', icon: 'fa-triangle-exclamation' },
                info: { grad: 'linear-gradient(135deg,#3D008D 0%,#ED1E79 100%)', bg: 'rgba(61,0,141,0.05)', border: 'rgba(61,0,141,0.18)', icon: 'fa-circle-info' },
            };
            const t = temas[tema] || temas.eth;
            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border bg-white not-prose" style={{ borderColor: t.border }}>
                    <div className="px-5 py-3 flex items-center gap-3" style={{ background: t.grad }}>
                        <span className="bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0" style={{ width: 36, height: 36 }}>
                            <i className={`fas ${icon || t.icon} text-white text-lg`}></i>
                        </span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">{titulo}</div>
                            {subtitulo && <div className="text-white/80 text-xs">{subtitulo}</div>}
                        </div>
                    </div>
                    <div className="px-5 py-4 text-[0.95rem] text-gray-700 leading-relaxed" style={{ background: t.bg }}>
                        {children}
                    </div>
                </div>
            );
        };

        /* ============================================================
           ECUACIÓN DESTACADA (display LaTeX)
        ============================================================ */
        const Eq = ({ children }) => (
            <div className="eq-block my-4 text-center">{children}</div>
        );

        /* ============================================================
           ENCABEZADO DE SECCIÓN
        ============================================================ */
        const SectionHeader = ({ title, icon: Icon }) => (
            <div className="flex items-center gap-3 mb-5 border-b border-gray-200 pb-3">
                <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                    {Icon && <Icon size={24} />}
                </div>
                <h2 className="text-2xl font-bold text-gray-900">{title}</h2>
            </div>
        );

        /* ============================================================
           PIPELINE (pasos horizontales)
        ============================================================ */
        const Pipeline = ({ steps }) => (
            <div className="flex items-stretch flex-wrap gap-2 my-6 justify-between">
                {steps.map((s, i) => (
                    <React.Fragment key={i}>
                        <div className="flex-1 min-w-[140px] bg-white border border-gray-200 rounded-xl px-3 py-3 text-center text-sm shadow-sm" style={{ borderTop: '4px solid #3D008D' }}>
                            <span className="inline-block w-6 h-6 leading-6 rounded-full text-white font-bold text-xs mb-1" style={{ background: '#3D008D' }}>{s.num}</span>

# ML clásico: el HUMANO diseña las características a mano
# (ej. clasificar plátano Hartón del Urabá listo para exportar)
def caracteristicas_manuales(imagen):
    largo_mm      = medir_largo(imagen)         # algoritmo de segmentación
    pct_amarillo  = contar_amarillo(imagen)     # umbral sobre el tono (Hue)
    manchas       = contar_blobs_negros(imagen) # detector de manchas
    return np.array([largo_mm, pct_amarillo, manchas])

# Deep Learning: la RED aprende sola las características desde el píxel crudo
# capa1 -> bordes ; capa2 -> texturas ; capa3 -> partes ; capa4 -> defectos
# El humano NO diseña nada: solo aporta miles de imágenes etiquetadas.`;

        /* Término con definición emergente (para conceptos aún no vistos) */
        const Termino = ({ children, def }) => {
            const [open, setOpen] = useState(false);
            const [pos, setPos] = useState(null);
            const btnRef = useRef(null);
            const popRef = useRef(null);
            const closeTimer = useRef(null);

            // Cierre con periodo de gracia: permite mover el cursor del termino al
            // cuadro (que estan separados unos pixeles) sin que se cierre de inmediato.
            const cancelClose = () => { if (closeTimer.current) { clearTimeout(closeTimer.current); closeTimer.current = null; } };
            const scheduleClose = () => { cancelClose(); closeTimer.current = setTimeout(() => setOpen(false), 150); };
            const openNow = () => { cancelClose(); setOpen(true); };
            useEffect(() => cancelClose, []); // limpia el temporizador al desmontar

            // Calcula la posición del cuadro en coordenadas del viewport (position: fixed)
            // y decide si abrir hacia abajo o hacia arriba según el espacio disponible.
            const place = () => {
                if (!btnRef.current) return;
                const r = btnRef.current.getBoundingClientRect();
                const margin = 12;
                const w = Math.min(300, window.innerWidth - margin * 2);
                let left = r.left;
                if (left + w > window.innerWidth - margin) left = window.innerWidth - margin - w;
                if (left < margin) left = margin;
                const abreArriba = (window.innerHeight - r.bottom) < 180; // poco espacio abajo
                setPos({
                    left, width: w,
                    top: abreArriba ? null : Math.round(r.bottom + 6),

        /* ============================================================
           DIAGRAMA SVG: red multicapa (MLP)
        ============================================================ */
        const MLPDiagram = () => {
            const H = 260;
            const layers = [
                { n: 3, x: 70, c: '#3D008D', label: 'Entrada' },
                { n: 4, x: 250, c: '#ED1E79', label: 'Oculta 1' },
                { n: 4, x: 430, c: '#ED1E79', label: 'Oculta 2' },
                { n: 1, x: 600, c: '#15803D', label: 'Salida' },
            ];
            const cy = (n, i) => (H / (n + 1)) * (i + 1);
            const edges = [];
            layers.slice(0, -1).forEach((L, li) => {
                const N = layers[li + 1];
                for (let i = 0; i < L.n; i++) for (let j = 0; j < N.n; j++) {
                    edges.push(<line key={`${li}-${i}-${j}`} x1={L.x + 16} y1={cy(L.n, i)} x2={N.x - 16} y2={cy(N.n, j)} stroke="#cbd5e1" strokeWidth="1" />);
                }
            });
            return (
                <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm my-4 overflow-x-auto">
                    <svg viewBox="0 0 660 260" className="w-full" style={{ minWidth: 520 }} role="img" aria-label="Diagrama de un perceptrón multicapa">
                        <title>Red feedforward totalmente conectada: una capa de entrada, dos capas ocultas y una capa de salida.</title>
                        {edges}
                        {layers.map((L, li) => (
                            <g key={li}>
                                {Array.from({ length: L.n }).map((_, i) => (
                                    <circle key={i} cx={L.x} cy={cy(L.n, i)} r="16" fill="#fff" stroke={L.c} strokeWidth="2.5" />
                                ))}
                                <text x={L.x} y={250} textAnchor="middle" fontSize="12" fill={L.c} fontWeight="bold">{L.label}</text>
                            </g>
                        ))}
                    </svg>
                    <p className="text-xs text-gray-500 italic text-center">Red feedforward: la información fluye de izquierda a derecha, transformándose en cada capa.</p>
                </div>
            );
        };

        /* Gráfica de funciones de activación (interactiva: toggles + derivadas) */
        const ActivacionesChart = () => {
            const defs = {
                relu: { name: 'ReLU', color: '#ED1E79', f: v => Math.max(0, v), d: v => (v > 0 ? 1 : 0) },
                leaky: { name: 'Leaky ReLU', color: '#0E7490', f: v => Math.max(0.1 * v, v), d: v => (v > 0 ? 1 : 0.1) },
                sigmoide: { name: 'Sigmoide', color: '#3D008D', f: v => 1 / (1 + Math.exp(-v)), d: v => { const s = 1 / (1 + Math.exp(-v)); return s * (1 - s); } },
                tanh: { name: 'Tanh', color: '#FDB913', f: v => Math.tanh(v), d: v => 1 - Math.tanh(v) ** 2 },

            const [vis, setVis] = useState({ relu: true, leaky: false, sigmoide: true, tanh: true });

                const x = []; for (let i = -6; i <= 6; i += 0.1) x.push(+i.toFixed(2));
                return Object.keys(defs).filter(k => vis[k]).map(k => {
                    const D = defs[k];
                    return { x, y: x.map(deriv ? D.d : D.f), name: deriv ? `${D.name}′` : D.name, line: { color: D.color, width: 3 } };
                });
            }, () => ({
                margin: { t: 10, r: 10, b: 30, l: 35 }, legend: { orientation: 'h', y: -0.18 },
                xaxis: { zeroline: true, gridcolor: '#eee', range: [-6, 6] },

                <div className="my-4">
                    <div className="flex flex-wrap items-center gap-2 mb-2">

                            <button key={k} onClick={() => setVis(s => ({ ...s, [k]: !s[k] }))}
                                className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${vis[k] ? 'text-white shadow' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                style={vis[k] ? { background: defs[k].color } : {}}>
                                {defs[k].name}
                            </button>
                        ))}
                        <span className="mx-1 text-gray-300">|</span>
                        <button onClick={() => setDeriv(d => !d)}
                            className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${deriv ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                            {deriv ? 'Ver función' : 'Ver derivada'}
                        </button>
                    </div>
                    <ChartFrame id="chart-activaciones" caption={deriv
                        ? "Derivadas: la de Sigmoide/Tanh ≈ 0 en los extremos (origen del desvanecimiento del gradiente); la de ReLU vale 1 para z>0."
                        : "ReLU no satura para valores positivos; Sigmoide y Tanh se aplanan en los extremos. (Softmax es multivariante; ver el acordeón abajo.)"} />
                </div>
            );
        };

        /* Gráfica de descenso del gradiente */
        const GradienteChart = () => {
            usePlotly('chart-gradiente', () => {
                const x = []; for (let i = -3; i <= 3; i += 0.05) x.push(+i.toFixed(2));
                let p = 2.7; const px = [p], py = [p * p]; const lr = 0.22;
                for (let k = 0; k < 9; k++) { p = p - lr * (2 * p); px.push(+p.toFixed(3)); py.push(+(p * p).toFixed(3)); }
                return [
                    { x, y: x.map(v => v * v), name: 'Costo L(θ)', line: { color: '#3D008D', width: 3 } },
                    { x: px, y: py, name: 'Pasos del descenso', mode: 'lines+markers', line: { color: '#ED1E79', width: 2 }, marker: { size: 9, color: '#FDB913' } },

            }, () => ({

            return <ChartFrame id="chart-gradiente" caption="Cada paso del descenso se da en dirección opuesta a la pendiente; los pasos se acortan al acercarse al valle (error mínimo)." />;
        };

        /* Gráfico interactivo: cómo una capa oculta resuelve el XOR */
        const XorMLP = () => {
            const [paso, setPaso] = useState(0);
            const ref = useRef(null);
            const pasos = [
                { t: 'XOR solo', d: <span>Como se vio en el Capítulo 1: ninguna recta separa los puntos. Una sola neurona fracasa.</span> },
                { t: '+ Oculta 1', d: <span>La primera neurona oculta traza la recta {String.raw`\(x_1 + x_2 = 0.5\)`} (equivale a un OR): «¿hay al menos una entrada activa?».</span> },
                { t: '+ Oculta 2', d: <span>La segunda neurona oculta traza {String.raw`\(x_1 + x_2 = 1.5\)`} (equivale a un NAND): «¿NO están ambas activas a la vez?».</span> },
                { t: 'Región combinada', d: <span>La neurona de salida combina ambas: <strong>XOR = 1 solo en la franja</strong> entre las dos rectas. ¡Una región no lineal construida con dos fronteras lineales!</span> },
            ];
            useTypeset(ref, [paso]);

            usePlotly('chart-xor-mlp', () => {
                const traces = [];
                if (paso >= 3) {
                    traces.push({ x: [-0.35, 1.35, 1.35, -0.35], y: [0.85, -0.85, 0.15, 1.85], fill: 'toself', mode: 'none', name: 'XOR = 1', fillcolor: 'rgba(21,128,61,0.15)', hoverinfo: 'skip' });
                }
                const lx = [-0.3, 1.3];
                if (paso >= 1) traces.push({ x: lx, y: lx.map(x => 0.5 - x), mode: 'lines', name: 'Oculta 1 (OR)', line: { color: '#ED1E79', width: 3, dash: 'dash' } });
                if (paso >= 2) traces.push({ x: lx, y: lx.map(x => 1.5 - x), mode: 'lines', name: 'Oculta 2 (NAND)', line: { color: '#3D008D', width: 3, dash: 'dash' } });
                traces.push({ x: [0, 1], y: [0, 1], mode: 'markers', name: 'Salida 0', marker: { size: 20, color: '#fff', symbol: 'circle', line: { color: '#B91C1C', width: 3 } } });
                traces.push({ x: [0, 1], y: [1, 0], mode: 'markers', name: 'Salida 1', marker: { size: 20, color: '#15803D', symbol: 'circle', line: { color: '#0b5d2a', width: 2 } } });
                return traces;
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 40 }, legend: { orientation: 'h', y: -0.2 },
                xaxis: { title: 'Entrada x₁', range: [-0.35, 1.35], tick0: 0, dtick: 1, gridcolor: '#eee', zeroline: false },
                yaxis: { title: 'Entrada x₂', range: [-0.35, 1.35], tick0: 0, dtick: 1, gridcolor: '#eee', zeroline: false },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [paso]);

            return (
                <div ref={ref} className="my-4">
                    <div className="flex flex-wrap gap-2 mb-2">
                        {pasos.map((p, i) => (
                            <button key={i} onClick={() => setPaso(i)}
                                className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${paso === i ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                {i + 1}. {p.t}
                            </button>
                        ))}
                    </div>
                    <ChartFrame id="chart-xor-mlp" height="chart-h-360" caption="XOR resuelto por un MLP: 2 entradas → 2 neuronas ocultas → 1 salida." />
                    <div key={paso} className="text-[0.9rem] text-gray-700 bg-bg rounded-lg p-4 border-l-4" style={{ borderColor: '#15803D' }}>
                        {pasos[paso].d}
                    </div>
                </div>
            );
        };

        /* ============================================================
           CAPÍTULO 2 — EL PERCEPTRÓN MULTICAPA (MLP)
        ============================================================ */
        const neuronaNumpy = `import numpy as np

# Una neurona: suma ponderada + sesgo, seguida de una activación (ReLU)
x = np.array([0.8, 0.3, 0.6])      # entradas (ej. altitud, humedad, sol normalizados)
w = np.array([0.9, -0.4, 0.7])     # pesos: importancia aprendida de cada entrada
b = 0.1                             # sesgo: umbral base

z = np.dot(w, x) + b               # z = w1*x1 + w2*x2 + w3*x3 + b
y = max(0.0, z)                    # ReLU: f(z) = max(0, z)
print(round(z, 3), round(y, 3))    # -> 1.12  1.12`;

        const mlpTorch = `import torch.nn as nn

# Un MLP en PyTorch: 4 entradas -> 16 -> 8 -> 1 salida
modelo = nn.Sequential(
    nn.Linear(4, 16),   # capa oculta 1 (4 entradas -> 16 neuronas)
    nn.ReLU(),          # no linealidad
    nn.Linear(16, 8),   # capa oculta 2
    nn.ReLU(),
    nn.Linear(8, 1),    # capa de salida
    nn.Sigmoid(),       # probabilidad para clasificación binaria
)`;

        /* Tarjeta del Teorema de Aproximación Universal con gráfica interactiva:
           una función objetivo y su aproximación por bloques (más neuronas = mejor ajuste). */
        const TeoremaAproximacion = () => {
            const [n, setN] = useState(6);
            const target = (x) => 1.7 + 0.9 * Math.sin(x * 0.9) + 0.5 * Math.sin(x * 1.9 + 0.8) + 0.3 * Math.cos(x * 0.5);
            usePlotly('chart-teorema', () => {
                const xt = []; for (let x = 0; x <= 10; x += 0.05) xt.push(+x.toFixed(2));
                const yt = xt.map(target);
                const xs = [], ys = []; const w = 10 / n;
                for (let i = 0; i < n; i++) { const x0 = i * w, x1 = (i + 1) * w, v = target((x0 + x1) / 2); xs.push(x0, x1); ys.push(v, v); }
                return [
                    { x: xs, y: ys, name: `Aproximación (${n} neuronas)`, mode: 'lines', line: { color: '#ED1E79', width: 2 }, fill: 'tozeroy', fillcolor: 'rgba(237,30,121,0.09)' },
                    { x: xt, y: yt, name: 'Función objetivo', mode: 'lines', line: { color: '#3D008D', width: 3 } },
                ];
            }, () => ({
                margin: { t: 8, r: 8, b: 22, l: 8 }, legend: { orientation: 'h', y: -0.16, font: { size: 10 } },
                xaxis: { visible: false, range: [0, 10] }, yaxis: { visible: false, range: [0, 3.6] },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [n]);

            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    {/* Cabecera con gradiente USTA */}
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M2 17 C 5 5, 9 5, 12 12 S 19 19, 22 7" />
                            </svg>
                        </span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Teorema de Aproximación Universal</div>
                            <div className="text-white/80 text-xs">El porqué de las capas ocultas</div>
                        </div>
                    </div>
                    <div className="p-5">
                        {/* Enunciado destacado */}
                        <div className="rounded-xl px-4 py-3 mb-4 text-[0.95rem] text-gray-800 border-l-4" style={{ background: 'rgba(61,0,141,0.05)', borderColor: '#ED1E79' }}>
                            Una red con <strong>al menos una capa oculta</strong> y suficientes neuronas puede aproximar <strong>cualquier función continua</strong>.
                        </div>
                        <p className="text-[0.92rem] text-gray-700 leading-relaxed mb-3">
                            Considérese el perfil de la <strong>Cordillera Central</strong> al cruzar el Túnel de La Línea. Una regresión
                            lineal es una rampa rígida que no encaja; una red neuronal es como tener <strong>millones de piezas de
                                Lego</strong>: cada neurona aporta un bloque y, al sumar suficientes y ajustar sus alturas (<em>w</em>) y
                            posiciones (<em>b</em>), se recrea la silueta de las montañas.
                        </p>
                        <ChartFrame id="chart-teorema" height="chart-h-320" />
                        <div className="flex flex-wrap items-center gap-2">
                            <span className="text-xs font-semibold text-gray-500 mr-1">Neuronas:</span>
                            {[3, 6, 12, 24].map(k => (
                                <button key={k} onClick={() => setN(k)}
                                    className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${n === k ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                    {k}
                                </button>
                            ))}
                            <span className="text-xs text-gray-400 ml-1">→ más neuronas, mejor aproximación</span>
                        </div>
                    </div>
                </div>
            );
        };

        /* Neurona interactiva: mover pesos/sesgo y ver z y la activación en vivo (Cap. 2) */
        const NeuronaInteractiva = () => {
            const x = [0.8, 0.3, 0.6];                 // entradas fijas (café: altitud, humedad, sol — normalizadas)
            const etiquetas = ['Altitud', 'Humedad', 'Sol'];
            const [w, setW] = useState([0.9, -0.4, 0.7]);
            const [b, setB] = useState(0.1);
            const [act, setAct] = useState('relu');
            const fns = { relu: v => Math.max(0, v), sigmoide: v => 1 / (1 + Math.exp(-v)), tanh: v => Math.tanh(v) };
            const z = w[0] * x[0] + w[1] * x[1] + w[2] * x[2] + b;
            const a = fns[act](z);
            const aNorm = act === 'relu' ? Math.min(1, a / 3) : act === 'tanh' ? (a + 1) / 2 : a;
            const nota = act === 'relu' ? 'ReLU anula los valores negativos' : act === 'sigmoide' ? 'Sigmoide comprime la salida a (0, 1)' : 'Tanh comprime la salida a (−1, 1)';
            const setWi = (i, v) => setW(prev => prev.map((p, j) => (j === i ? v : p)));
            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0"><i className="fas fa-sliders"></i></span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Neurona interactiva</div>
                            <div className="text-white/80 text-xs">Al ajustar los pesos y el sesgo, la salida cambia en vivo</div>
                        </div>
                    </div>
                    <div className="p-5 grid md:grid-cols-2 gap-5">
                        <div className="space-y-3">
                            {w.map((wi, i) => (
                                <div key={i}>
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                        <span>{etiquetas[i]} · <span className="text-primary">w{i + 1} = {wi.toFixed(2)}</span></span>
                                        <span className="text-gray-400">x{i + 1} = {x[i]}</span>
                                    </div>
                                    <input type="range" min="-2" max="2" step="0.05" value={wi} onChange={e => setWi(i, +e.target.value)} className="usta-range" aria-label={`Peso w${i + 1} (${etiquetas[i]})`} />
                                </div>
                            ))}
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Sesgo · <span className="text-secondary">b = {b.toFixed(2)}</span></span>
                                </div>
                                <input type="range" min="-2" max="2" step="0.05" value={b} onChange={e => setB(+e.target.value)} className="usta-range" aria-label="Sesgo b" />
                            </div>
                            <div className="flex items-center gap-2 pt-1">
                                <span className="text-xs font-semibold text-gray-500">Activación:</span>
                                {['relu', 'sigmoide', 'tanh'].map(k => (
                                    <button key={k} onClick={() => setAct(k)} className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${act === k ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                        {k === 'relu' ? 'ReLU' : k === 'sigmoide' ? 'Sigmoide' : 'Tanh'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex flex-col justify-center">
                            <div className="rounded-xl bg-bg p-4 border border-gray-200">
                                <div className="text-center text-xs text-gray-500">Suma ponderada</div>
                                <div className="text-center font-mono text-lg text-navy">z = w·x + b = <strong>{z.toFixed(3)}</strong></div>
                                <div className="h-px bg-gray-200 my-3"></div>
                                <div className="text-center text-xs text-gray-500">Salida tras la activación</div>
                                <div className="text-center font-mono text-2xl font-extrabold" style={{ color: '#15803D' }}>a = {a.toFixed(3)}</div>
                                <div className="mt-3 h-3 rounded-full bg-gray-200 overflow-hidden">
                                    <div className="h-full usta-gradient transition-all duration-150" style={{ width: `${Math.max(0, Math.min(1, aNorm)) * 100}%` }}></div>
                                </div>
                                <div className="text-center text-[0.7rem] text-gray-400 mt-1">{nota}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ============================================================
           LABORATORIO: frontera de decisión de un MLP (Cap. 2)
           Red neuronal "desde cero" (sin librerías de ML) + mapa de calor
           en un <canvas> oscuro. Entrena por descenso del gradiente sobre la
           entropía cruzada binaria (BCE) y dibuja la frontera en tiempo real.
        ============================================================ */
        const RedFrontera = () => {
            // --- Configuración de la arquitectura (estado de la UI) ---
            const [dataset, setDataset] = useState('lunas');        // 'lunas' | 'circulos'
            const [nCapas, setNCapas] = useState(2);                // capas ocultas: 1..3
            const [nNodos, setNNodos] = useState(6);                // nodos por capa: 1..10
            const [activacion, setActivacion] = useState('tanh');   // 'relu'|'sigmoide'|'tanh'
            const [lrExp, setLrExp] = useState(0.8);                // 0..1 -> lr logarítmico
            const [corriendo, setCorriendo] = useState(false);      // animación activa
            const [metricas, setMetricas] = useState({ epoca: 0, perdida: NaN, acc: 0 });
            const [hayCongelada, setHayCongelada] = useState(false);

            const lr = Math.pow(10, -3 + 3 * lrExp);                // escala logarítmica: 0.001 .. 1.0

            // --- Refs de trabajo (no provocan re-render) ---
            const canvasRef = useRef(null);
            const redCanvasRef = useRef(null);  // canvas del diagrama de la red (neuronas + pesos)
            const offRef = useRef(null);        // canvas auxiliar RES×RES para el mapa de calor
            const datosRef = useRef([]);        // [{x, y, t}]  t = etiqueta 0/1
            const redRef = useRef(null);        // {sizes, W, b, act}
            const congeladaRef = useRef(null);  // grilla RES×RES de la frontera "fantasma"
            const animRef = useRef(null);       // id de requestAnimationFrame
            const corriendoRef = useRef(false); // espejo de `corriendo` para el bucle
            const epocaRef = useRef(0);
            const lrRef = useRef(lr);

            const DOM = 3.5;     // dominio del mundo: [-DOM, DOM] en X e Y
            const RES = 56;      // resolución del mapa de calor (RES×RES predicciones)
            const LIENZO = 380;  // lado del canvas en px

            // ===== Activaciones y sus derivadas (en función de la salida activada `a`) =====
            const sigmoide = (z) => 1 / (1 + Math.exp(-z));
            const activar = { relu: (z) => Math.max(0, z), sigmoide, tanh: (z) => Math.tanh(z) };
            const dActivar = { relu: (a) => (a > 0 ? 1 : 0), sigmoide: (a) => a * (1 - a), tanh: (a) => 1 - a * a };

            // ===== Datos sintéticos =====
            const gauss = () => {                       // ruido gaussiano (Box-Muller)
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
            };
            const genLunas = (n = 220, ruido = 0.18) => {   // dos medias lunas entrelazadas
                const pts = [], m = n / 2;
                for (let i = 0; i < m; i++) {
                    const t = Math.PI * i / m;
                    pts.push({ x: (Math.cos(t) - 0.5) * 1.9 + gauss() * ruido, y: (Math.sin(t) - 0.25) * 1.9 + gauss() * ruido, t: 0 });
                    pts.push({ x: (1 - Math.cos(t) - 0.5) * 1.9 + gauss() * ruido, y: (0.5 - Math.sin(t) - 0.25) * 1.9 + gauss() * ruido, t: 1 });
                }
                return pts;
            };
            const genCirculos = (n = 220, ruido = 0.14) => {  // dos anillos concéntricos
                const pts = [], m = n / 2;
                for (let i = 0; i < m; i++) {
                    const t = 2 * Math.PI * i / m;
                    pts.push({ x: 2.4 * Math.cos(t) + gauss() * ruido, y: 2.4 * Math.sin(t) + gauss() * ruido, t: 0 });
                    pts.push({ x: 1.1 * Math.cos(t) + gauss() * ruido, y: 1.1 * Math.sin(t) + gauss() * ruido, t: 1 });
                }
                return pts;
            };

            // ===== Construcción de la red (pesos aleatorios He/Xavier) =====
            const crearRed = () => {
                const sizes = [2];
                for (let i = 0; i < nCapas; i++) sizes.push(nNodos);
                sizes.push(1);
                const W = [], b = [];
                for (let l = 1; l < sizes.length; l++) {
                    const fanIn = sizes[l - 1], fanOut = sizes[l];
                    const esReluOculta = activacion === 'relu' && l < sizes.length - 1;
                    const std = Math.sqrt((esReluOculta ? 2 : 1) / fanIn);   // He si ReLU, Xavier si no
                    const Wl = [], bl = [];
                    for (let j = 0; j < fanOut; j++) {
                        const fila = [];
                        for (let i = 0; i < fanIn; i++) fila.push(gauss() * std);
                        Wl.push(fila); bl.push(0);
                    }
                    W.push(Wl); b.push(bl);
                }
                return { sizes, W, b, act: activacion };
            };

            // ===== Forward pass: devuelve la activación de CADA capa =====
            // acts[0] = entrada; acts[k] = salida activada de la capa k-1;
            // la última capa usa siempre sigmoide (clasificación binaria).
            const adelante = (red, x0, x1) => {
                let a = [x0, x1];
                const acts = [a];
                for (let l = 0; l < red.W.length; l++) {
                    const esSalida = l === red.W.length - 1;
                    a = red.b[l].map((bj, j) => {
                        let z = bj; const wj = red.W[l][j];
                        for (let i = 0; i < acts[l].length; i++) z += wj[i] * acts[l][i];  // z = w·a + b
                        return esSalida ? sigmoide(z) : activar[red.act](z);
                    });
                    acts.push(a);
                }
                return acts;
            };

            // ===== Backward pass + actualización (descenso del gradiente, full-batch) =====
            const entrenarEpoca = (red, datos, tasa) => {
                const { W, b } = red;
                const gW = W.map(Wl => Wl.map(row => row.map(() => 0)));   // gradientes acumulados
                const gB = b.map(bl => bl.map(() => 0));
                for (const p of datos) {
                    const acts = adelante(red, p.x, p.y);
                    // delta de la capa de salida: con BCE + sigmoide se simplifica a (â - y)
                    let delta = [acts[acts.length - 1][0] - p.t];
                    for (let l = W.length - 1; l >= 0; l--) {
                        const aPrev = acts[l];                          // entrada de la capa l
                        for (let j = 0; j < W[l].length; j++) {
                            gB[l][j] += delta[j];
                            for (let i = 0; i < aPrev.length; i++) gW[l][j][i] += delta[j] * aPrev[i];
                        }
                        if (l > 0) {                                    // propagar el error a la capa anterior
                            const nuevo = new Array(aPrev.length).fill(0);
                            for (let i = 0; i < aPrev.length; i++) {
                                let s = 0;
                                for (let j = 0; j < W[l].length; j++) s += delta[j] * W[l][j][i];
                                nuevo[i] = s * dActivar[red.act](aPrev[i]);   // × derivada de la activación oculta
                            }
                            delta = nuevo;
                        }
                    }
                }
                const N = datos.length;                                  // promedio del gradiente y paso
                for (let l = 0; l < W.length; l++)
                    for (let j = 0; j < W[l].length; j++) {
                        b[l][j] -= tasa * gB[l][j] / N;
                        for (let i = 0; i < W[l][j].length; i++) W[l][j][i] -= tasa * gW[l][j][i] / N;
                    }
            };

            // ===== Pérdida (BCE) y precisión sobre todo el conjunto =====
            const evaluar = (red, datos) => {
                let L = 0, ok = 0; const eps = 1e-7;
                for (const p of datos) {
                    const acts = adelante(red, p.x, p.y);
                    const yhat = Math.min(1 - eps, Math.max(eps, acts[acts.length - 1][0]));
                    L += -(p.t * Math.log(yhat) + (1 - p.t) * Math.log(1 - yhat));
                    if ((yhat >= 0.5 ? 1 : 0) === p.t) ok++;
                }
                return { perdida: L / datos.length, acc: ok / datos.length };
            };

            // ===== Predicción en una grilla RES×RES (para el mapa de calor) =====
            const predecirGrilla = (red) => {
                const g = new Float32Array(RES * RES);
                for (let yi = 0; yi < RES; yi++) {
                    const wy = DOM - 2 * DOM * (yi + 0.5) / RES;     // fila 0 = y máximo (arriba)
                    for (let xi = 0; xi < RES; xi++) {
                        const wx = -DOM + 2 * DOM * (xi + 0.5) / RES;
                        const acts = adelante(red, wx, wy);
                        g[yi * RES + xi] = acts[acts.length - 1][0];
                    }
                }
                return g;
            };

            // ===== Dibujo del canvas =====
            const pintar = () => {
                const cv = canvasRef.current, red = redRef.current;
                if (!cv || !red) return;
                const ctx = cv.getContext('2d'), Wd = cv.width, Hd = cv.height;

                // 1) Mapa de calor de la red actual (grilla pequeña escalada y suavizada)
                let off = offRef.current;
                if (!off) { off = document.createElement('canvas'); offRef.current = off; }
                off.width = RES; off.height = RES;
                const octx = off.getContext('2d'), im = octx.createImageData(RES, RES);
                const bg = [11, 15, 28], cP = [150, 99, 224], cK = [240, 70, 150];  // fondo, clase 0 (morado), clase 1 (rosa)
                const g = predecirGrilla(red);
                for (let k = 0; k < RES * RES; k++) {
                    const p = isFinite(g[k]) ? g[k] : 0.5;
                    const conf = Math.min(1, Math.abs(p - 0.5) * 2);   // confianza: 0 en la frontera, 1 al estar seguro
                    const col = p < 0.5 ? cP : cK, mix = 0.12 + 0.72 * conf, o = k * 4;
                    im.data[o] = bg[0] + (col[0] - bg[0]) * mix;
                    im.data[o + 1] = bg[1] + (col[1] - bg[1]) * mix;
                    im.data[o + 2] = bg[2] + (col[2] - bg[2]) * mix;
                    im.data[o + 3] = 255;
                }
                octx.putImageData(im, 0, 0);
                ctx.imageSmoothingEnabled = true;
                ctx.drawImage(off, 0, 0, RES, RES, 0, 0, Wd, Hd);

                // 2) Ejes centrales tenues
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(Wd / 2, 0); ctx.lineTo(Wd / 2, Hd); ctx.moveTo(0, Hd / 2); ctx.lineTo(Wd, Hd / 2); ctx.stroke();

                // 3) Frontera "congelada": banda dorada donde la grilla fantasma cruza 0.5
                if (congeladaRef.current) {
                    const fg = congeladaRef.current, cw = Wd / RES, ch = Hd / RES;
                    ctx.fillStyle = 'rgba(253,185,19,0.6)';
                    for (let yi = 0; yi < RES; yi++) for (let xi = 0; xi < RES; xi++)
                        if (Math.abs(fg[yi * RES + xi] - 0.5) < 0.045) ctx.fillRect(xi * cw, yi * ch, cw + 1, ch + 1);
                }

                // 4) Puntos de datos (color claro de su clase + borde oscuro para que resalten)
                for (const p of datosRef.current) {
                    const px = (p.x + DOM) / (2 * DOM) * Wd, py = (DOM - p.y) / (2 * DOM) * Hd;
                    ctx.beginPath(); ctx.arc(px, py, 4.2, 0, 2 * Math.PI);
                    ctx.fillStyle = p.t === 0 ? '#CBB6FF' : '#FF9DC8';
                    ctx.fill(); ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(5,8,18,0.85)'; ctx.stroke();
                }
                pintarRed();   // mantener el diagrama de la red sincronizado con el estado actual
            };

            // ===== Diagrama del "estado de la red": neuronas por capa y conexiones coloreadas por peso =====
            const pintarRed = () => {
                const cv = redCanvasRef.current, red = redRef.current;
                if (!cv || !red) return;
                const ctx = cv.getContext('2d'), Wd = cv.width, Hd = cv.height;
                ctx.clearRect(0, 0, Wd, Hd);
                const sz = red.sizes, L = sz.length, padX = 52, padY = 26;
                const maxN = Math.max(...sz);
                const r = Math.max(5, Math.min(12, (Hd - 2 * padY) / (maxN * 2.3)));   // radio de neurona, adaptado al nº de nodos
                const xs = sz.map((_, i) => padX + (Wd - 2 * padX) * (L === 1 ? 0.5 : i / (L - 1)));
                const ys = sz.map(n => Array.from({ length: n }, (_, j) => padY + (Hd - 2 * padY) * (n === 1 ? 0.5 : j / (n - 1))));

                // Magnitud máxima de los pesos, para normalizar grosor y opacidad
                let maxAbs = 0.5;
                for (const Wl of red.W) for (const row of Wl) for (const w of row) maxAbs = Math.max(maxAbs, Math.abs(w));

                // 1) Conexiones = pesos (morado = positivo, rosa = negativo); grosor ∝ magnitud
                for (let l = 0; l < red.W.length; l++) {
                    const Wl = red.W[l];
                    for (let j = 0; j < Wl.length; j++)
                        for (let i = 0; i < Wl[j].length; i++) {
                            const w = Wl[j][i], mag = Math.abs(w) / maxAbs;
                            const base = w >= 0 ? '124,77,201' : '237,30,121';
                            ctx.beginPath();
                            ctx.moveTo(xs[l], ys[l][i]);
                            ctx.lineTo(xs[l + 1], ys[l + 1][j]);
                            ctx.strokeStyle = `rgba(${base},${0.12 + 0.65 * mag})`;
                            ctx.lineWidth = 0.4 + 2.6 * mag;
                            ctx.stroke();
                        }
                }

                // 2) Neuronas (entrada navy, ocultas moradas, salida verde)
                for (let l = 0; l < L; l++) {
                    const esEnt = l === 0, esSal = l === L - 1;
                    for (let j = 0; j < sz[l]; j++) {
                        ctx.beginPath();
                        ctx.arc(xs[l], ys[l][j], r, 0, 2 * Math.PI);
                        ctx.fillStyle = esEnt ? '#001A4D' : esSal ? '#15803D' : '#3D008D';
                        ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                    }
                }

                // 3) Etiquetas: dentro de las neuronas de entrada/salida y bajo cada capa
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
                if (r >= 7) {
                    ctx.font = `700 ${Math.max(9, r - 1)}px Montserrat`;
                    ctx.fillText('x', xs[0], ys[0][0]);
                    ctx.fillText('y', xs[0], ys[0][1]);
                    ctx.fillText('ŷ', xs[L - 1], ys[L - 1][0]);
                }
                ctx.fillStyle = '#64748B'; ctx.font = '600 11px Montserrat'; ctx.textBaseline = 'alphabetic';
                ctx.fillText('Entrada', xs[0], Hd - 8);
                ctx.fillText('Salida', xs[L - 1], Hd - 8);
                for (let l = 1; l < L - 1; l++) ctx.fillText('Oculta ' + l, xs[l], Hd - 8);
            };

            // ===== Bucle de entrenamiento animado =====
            const bucle = () => {
                const red = redRef.current;
                if (!red || !corriendoRef.current) return;
                for (let e = 0; e < 3; e++) { entrenarEpoca(red, datosRef.current, lrRef.current); epocaRef.current++; }
                pintar();
                const { perdida, acc } = evaluar(red, datosRef.current);
                setMetricas({ epoca: epocaRef.current, perdida, acc });
                if (corriendoRef.current) animRef.current = requestAnimationFrame(bucle);
            };

            const detener = () => { corriendoRef.current = false; setCorriendo(false); if (animRef.current) cancelAnimationFrame(animRef.current); };
            const alternarEntrenar = () => {
                if (corriendoRef.current) { detener(); return; }
                corriendoRef.current = true; setCorriendo(true);
                animRef.current = requestAnimationFrame(bucle);
            };

            // Rehacer la red (mismos datos): pesos nuevos, época y métricas a cero
            const reconstruir = () => {
                detener();
                redRef.current = crearRed();
                epocaRef.current = 0;
                if (datosRef.current.length) setMetricas({ epoca: 0, ...evaluar(redRef.current, datosRef.current) });
                pintar();
            };
            const congelar = () => { congeladaRef.current = predecirGrilla(redRef.current); setHayCongelada(true); pintar(); };
            const limpiar = () => { congeladaRef.current = null; setHayCongelada(false); pintar(); };

            // Regenerar datos al cambiar de conjunto
            useEffect(() => { datosRef.current = dataset === 'lunas' ? genLunas() : genCirculos(); reconstruir(); }, [dataset]);
            // Reconstruir la red al cambiar la arquitectura (capas, nodos o activación)
            useEffect(() => { reconstruir(); }, [nCapas, nNodos, activacion]);
            // La tasa de aprendizaje se ajusta en caliente, sin reiniciar
            useEffect(() => { lrRef.current = lr; }, [lr]);
            // Limpieza al desmontar
            useEffect(() => () => { corriendoRef.current = false; if (animRef.current) cancelAnimationFrame(animRef.current); }, []);

            // Arquitectura y conteo de parámetros (pesos + sesgos) para mostrar
            const sizes = [2, ...Array(nCapas).fill(nNodos), 1];
            const nParams = sizes.slice(1).reduce((s, n, i) => s + sizes[i] * n + n, 0);
            const pillBtn = (activo) => `px-3 py-1 rounded-full text-xs font-bold transition-all ${activo ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;

            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0"><i className="fas fa-vector-square"></i></span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Laboratorio de fronteras de decisión</div>
                            <div className="text-white/80 text-xs">Una red neuronal entrenándose desde cero, en vivo</div>
                        </div>
                    </div>
                    <div className="p-5 grid md:grid-cols-2 gap-5 items-start">
                        {/* ---------- Controles ---------- */}
                        <div className="space-y-4 order-2 md:order-1">
                            <div>
                                <div className="text-xs font-semibold text-gray-500 mb-1.5">Conjunto de datos</div>
                                <div className="flex gap-2">
                                    <button onClick={() => setDataset('lunas')} className={pillBtn(dataset === 'lunas')}><i className="fas fa-circle-half-stroke mr-1"></i>Dos lunas</button>
                                    <button onClick={() => setDataset('circulos')} className={pillBtn(dataset === 'circulos')}><i className="fas fa-bullseye mr-1"></i>Círculos</button>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Capas ocultas</span><span className="text-primary">{nCapas}</span>
                                </div>
                                <input type="range" min="1" max="3" step="1" value={nCapas} onChange={e => setNCapas(+e.target.value)} className="usta-range" aria-label="Número de capas ocultas" />
                            </div>
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Nodos por capa</span><span className="text-primary">{nNodos}</span>
                                </div>
                                <input type="range" min="1" max="10" step="1" value={nNodos} onChange={e => setNNodos(+e.target.value)} className="usta-range" aria-label="Nodos por capa oculta" />
                            </div>
                            <div>
                                <div className="text-xs font-semibold text-gray-500 mb-1.5">Activación (capas ocultas)</div>
                                <div className="flex gap-2">
                                    {['relu', 'tanh', 'sigmoide'].map(k => (
                                        <button key={k} onClick={() => setActivacion(k)} className={pillBtn(activacion === k)}>
                                            {k === 'relu' ? 'ReLU' : k === 'tanh' ? 'Tanh' : 'Sigmoide'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Tasa de aprendizaje</span><span className="text-secondary">{lr < 0.01 ? lr.toFixed(4) : lr.toFixed(3)}</span>
                                </div>
                                <input type="range" min="0" max="1" step="0.01" value={lrExp} onChange={e => setLrExp(+e.target.value)} className="usta-range" aria-label="Tasa de aprendizaje (escala logarítmica)" />
                                <div className="flex justify-between text-[0.65rem] text-gray-400 mt-0.5"><span>0.001</span><span>escala logarítmica</span><span>1.0</span></div>
                            </div>
                            <div className="flex flex-wrap gap-2 pt-1">
                                <button onClick={alternarEntrenar} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white usta-gradient shadow hover:opacity-90 transition">
                                    <i className={`fas ${corriendo ? 'fa-pause' : 'fa-play'} mr-1`}></i>{corriendo ? 'Pausar' : (metricas.epoca > 0 ? 'Reanudar' : 'Entrenar')}
                                </button>
                                <button onClick={reconstruir} className="px-3 py-1.5 rounded-lg text-xs font-bold text-primary bg-gray-100 hover:bg-gray-200 transition"><i className="fas fa-rotate-left mr-1"></i>Reiniciar pesos</button>
                                <button onClick={congelar} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white shadow hover:opacity-90 transition" style={{ background: '#D97706' }}><i className="fas fa-snowflake mr-1"></i>Congelar frontera</button>
                                <button onClick={limpiar} disabled={!hayCongelada} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${hayCongelada ? 'text-gray-700 bg-gray-100 hover:bg-gray-200' : 'text-gray-300 bg-gray-50 cursor-not-allowed'}`}><i className="fas fa-eraser mr-1"></i>Limpiar congelada</button>
                            </div>
                        </div>
                        {/* ---------- Lienzo + métricas ---------- */}
                        <div className="order-1 md:order-2">
                            <div className="rounded-xl overflow-hidden border border-gray-800 shadow-inner mx-auto" style={{ maxWidth: LIENZO }}>
                                <canvas ref={canvasRef} width={LIENZO} height={LIENZO} style={{ width: '100%', height: 'auto', display: 'block', background: '#0b0f1c' }} aria-label="Mapa de calor de la frontera de decisión" />
                            </div>
                            <div className="grid grid-cols-3 gap-2 mt-3">
                                {[
                                    { etq: 'Época', val: metricas.epoca, col: '#001A4D' },

                <p>
                    El Perceptrón Multicapa (MLP) es la arquitectura de red neuronal más básica y fundamental. Aunque hoy
                    existen arquitecturas especializadas (CNN para imágenes, RNN para secuencias, Transformers para lenguaje),
                    comprender el MLP es esencial: en él se manifiestan, en su forma más pura, las neuronas, las funciones de

                </p>

                <Box type="info" label="Qué vas a aprender">
                    <ul>
                        <li>Por qué los problemas reales son <strong>no lineales</strong> y por qué una sola recta no basta.</li>
                        <li>La <strong>anatomía de una neurona</strong> (suma ponderada + sesgo + activación) y cómo encadenarla en capas.</li>

                <h3>La ilusión de la línea recta</h3>
                <p>
                    Considérese a un agrónomo de la Zona Cafetera que predice la calidad de la variedad Castillo a partir de la
                    lluvia y las horas de sol. Trazar una recta entre «más sol» y «mejor calidad» llevaría a un error: poca exposición
                    favorece hongos, pero el exceso quema las hojas. La relación real es una <strong>curva con un punto óptimo</strong>,
                    como la cima de una montaña. La realidad colombiana —geográfica, social, ecológica— es intrínsecamente no lineal.
                </p>

                <h3>Anatomía de una neurona</h3>
                <p>Una neurona artificial es, en esencia, una regresión lineal envuelta en una función de decisión:</p>
                <Eq>{String.raw`$$ y = \sigma\!\left(\sum_{i=1}^{n} w_i x_i + b\right) = \sigma(\mathbf{w}^\top \mathbf{x} + b) $$`}</Eq>
                <ul>
                    <li>{String.raw`\(\mathbf{x} = [x_1, \dots, x_n]^\top\)`} son los datos (ej. reflectancia de una hoja de café).</li>
                    <li>{String.raw`\(\mathbf{w}\)`} (pesos) indican la <strong>importancia</strong> de cada dato; entrenar es hallar los {String.raw`\(w\)`} correctos.</li>
                    <li>{String.raw`\(b\)`} (sesgo) <strong>desplaza la frontera de decisión</strong>: sube o baja el umbral de activación sin depender de las entradas (como el término independiente de una recta).</li>
                    <li>{String.raw`\(\sigma\)`} (función de activación) es la que <strong>rompe la linealidad</strong>.</li>
                </ul>

                <h4>Una neurona, paso a paso</h4>
                <p>En resumen, toda neurona ejecuta <strong>dos pasos</strong> encadenados:</p>
                <ol>
                    <li><strong>Suma ponderada:</strong> combina las entradas y el sesgo en un solo número, {String.raw`\(z = \mathbf{w}^\top \mathbf{x} + b\)`}</li>
                    <li><strong>Activación:</strong> pasa ese número por la función no lineal para obtener la salida, {String.raw`\(a = \sigma(z)\)`}</li>
                </ol>
                <p>
                    <strong>¿Para qué sirve?</strong> Esta herramienta permite ver —sin escribir código— cómo cada parámetro
                    de una neurona influye en su salida. Al mover los <strong>pesos</strong> y el <strong>sesgo</strong>
                    y cambiar la <strong>activación</strong>, se observa cómo varían la suma ponderada y la salida en tiempo real.
                </p>
                <NeuronaInteractiva />
                <Box type="tip" label="Qué se debe concluir">
                    <p>Tras experimentar, se puede afirmar que:</p>
                    <ul>
                        <li><strong>El peso es importancia:</strong> cuanto más grande es un peso (en valor absoluto), más influye su entrada en el resultado; un peso cercano a cero vuelve casi irrelevante a esa entrada.</li>
                        <li><strong>El signo manda:</strong> un peso positivo aumenta la suma ponderada; uno negativo, la reduce.</li>
                        <li><strong>El sesgo desplaza todo:</strong> sube o baja la salida por igual, sin depender de las entradas (es el umbral base).</li>
                        <li><strong>La activación da forma a la salida:</strong> ReLU convierte en cero cualquier valor negativo (la neurona se «apaga»), la Sigmoide comprime el resultado a (0, 1) y la Tanh a (−1, 1).</li>
                        <li><strong>Idea de fondo:</strong> una neurona no es una caja negra, sino una fórmula simple y transparente. «Aprender» será, precisamente, encontrar los pesos y el sesgo adecuados — el tema de los capítulos 3 y 4.</li>
                    </ul>
                </Box>

                <h3>El poder de la capa oculta</h3>
                <p>
                    La solución es introducir <strong>capas ocultas</strong> entre la entrada y la salida. Considérese la
                    aprobación de un subsidio agrícola:
                </p>
                <Pipeline steps={[

                <p>
                    En la detección de minería ilegal con imágenes satelitales, las capas aprenden representaciones jerárquicas:

                    la evidencia.
                </p>

                <p>
                    Ese flujo de izquierda a derecha se llama <strong>propagación hacia adelante</strong> (<em>forward propagation</em>).
                    En forma matricial, la activación de cada capa {String.raw`\(l\)`} se calcula a partir de la anterior:
                </p>
                <Eq>{String.raw`$$ \mathbf{a}^{[l]} = \sigma\!\left( \mathbf{W}^{[l]}\,\mathbf{a}^{[l-1]} + \mathbf{b}^{[l]} \right) $$`}</Eq>
                <p>

                    y {String.raw`\(\mathbf{a}^{[0]} = \mathbf{x}\)`} son los datos de entrada: <strong>la salida de una capa es la entrada de la siguiente</strong>.
                </p>

                <h3>Cómo una capa oculta resuelve el XOR</h3>
                <p>

                </p>
