        };

        /* ============================================================
           CAPÍTULO 5 — AJUSTE, EVALUACIÓN Y ÉTICA
        ============================================================ */
        const trainingLoopTorch = `# El bucle de entrenamiento: 5 pasos que se repiten en cada época
for epoch in range(epochs):
    for batch_x, batch_y in dataloader:
        pred = modelo(batch_x)           # 1) Forward: la predicción
        loss = criterio(pred, batch_y)   # 2) Pérdida: error vs. realidad
        optimizer.zero_grad()            # 3) Limpia los gradientes previos
        loss.backward()                  # 4) Backward: calcula gradientes
        optimizer.step()                 # 5) Actualiza los pesos`;

        const regulTorch = `import torch.nn as nn

# L2 (Ridge) se aplica con weight_decay en el optimizador
opt = torch.optim.Adam(modelo.parameters(), lr=1e-3, weight_decay=1e-4)

# Dropout y BatchNorm son capas que se insertan en la red
red = nn.Sequential(
    nn.Linear(64, 128), nn.ReLU(),
    nn.BatchNorm1d(128),    # normaliza por lotes (estabiliza el entrenamiento)
    nn.Dropout(p=0.5),      # apaga el 50% de neuronas en cada paso de entrenamiento
    nn.Linear(128, 1),
)`;

        const Cap5Section = () => (
            <div className="prose-usta">
                <p>
                    Este capítulo cierra el ciclo del aprendizaje: una vez que la red puede predecir y calcular gradientes, queda
                    ponerla a <strong>entrenar</strong> de forma estable, evitar que <strong>memorice</strong> en lugar de aprender,
                    <strong> evaluarla</strong> con honestidad y considerar las <strong>implicaciones éticas</strong> de su despliegue
                    en contextos colombianos.
                </p>
                <h3>El bucle de entrenamiento (training loop)</h3>
                <p>
                    Ya se tiene el cuerpo (arquitectura), la brújula (función de costo) y el motor (optimizador). El entrenamiento
                    en PyTorch no es magia: es un ciclo explícito de cinco pasos que se repite durante muchas épocas.
                </p>
                <Pipeline steps={[
                    { num: 1, title: 'Forward', desc: 'La red predice (ej. "Roya 80 %").' },
                    { num: 2, title: 'Loss', desc: 'Se compara con la etiqueta real.' },
                    { num: 3, title: 'zero_grad', desc: 'Limpia gradientes anteriores.' },
                    { num: 4, title: 'backward', desc: 'Calcula los gradientes.' },
                    { num: 5, title: 'step', desc: 'Actualiza los pesos.' },
                ]} />
                <CodeBlock title="El training loop en PyTorch" code={trainingLoopTorch} lang="pytorch" />
                <Box type="warn" label="¿Por qué zero_grad()?">
                    PyTorch <strong>acumula</strong> gradientes por defecto. Si no se limpian antes de cada paso, se sumarían los de
                    iteraciones previas y se corrompería la dirección de descenso, como un ciclista que sigue instrucciones de
                    rutas viejas.
                </Box>

                <h3>Sobreajuste vs. generalización (la analogía del ICFES)</h3>
                <p>Dos estudiantes preparan el ICFES con un cuadernillo del año pasado:</p>
                <div className="grid md:grid-cols-2 gap-4">
                    <div className="usta-card p-5">
                        <h4 style={{ marginTop: 0 }}>Estudiante A · memoriza</h4>
                        <p className="text-sm">«La respuesta a la pregunta de Bolívar es la C». Saca 100 en el simulacro (entrenamiento), pero falla en el examen real: solo memorizó patrones idiosincrásicos.</p>
                    </div>
                    <div className="usta-card p-5">
                        <h4 style={{ marginTop: 0 }}>Estudiante B · comprende</h4>
                        <p className="text-sm">Estudia los conceptos. Quizá falle algo en el simulacro, pero generaliza y le va bien en el examen real.</p>
                    </div>
                </div>
                <p>
                    El <strong>sobreajuste (overfitting)</strong> es ser el Estudiante A: si una red tiene demasiada capacidad para
                    pocos datos, memoriza el ruido (sombras de nubes, insectos) en lugar de los patrones reales de la enfermedad.
                </p>

                <h3>Regularización: la navaja de Ockham</h3>
                <p>Para evitar la «trampa» de memorizar, se penaliza la complejidad en la función objetivo:</p>
                <Eq>{String.raw`$$ \text{Costo Total} = L(\hat{\mathbf{y}}, \mathbf{y}) + \lambda\,\Omega(\mathbf{w}) $$`}</Eq>
                <p>
                    donde {String.raw`\(\lambda \ge 0\)`} controla la fuerza de la regularización y {String.raw`\(\Omega(\mathbf{w})\)`}
                    penaliza los pesos grandes.
                </p>
                <Tabs tabs={[
                    { label: 'L2 (Ridge)', content: <span>{String.raw`\(\Omega(\mathbf{w})=\tfrac{1}{2}\sum_j w_j^2\)`}. Como un estudiante que repasa todos los capítulos por igual: empuja los pesos a ser pequeños pero <strong>ninguno se anula</strong>. Distribuye la importancia. En PyTorch se activa con el argumento <span className="inline-code">weight_decay</span> del optimizador (el {String.raw`\(\lambda\)`} de la fórmula).</span> },
                    { label: 'L1 (Lasso)', content: <span>{String.raw`\(\Omega(\mathbf{w})=\sum_j |w_j|\)`}. Como un estudiante pragmático que resalta solo lo esencial: fuerza a <strong>cero</strong> los pesos irrelevantes (ej. «color del vehículo»). Produce modelos dispersos e interpretables.</span> },
                    { label: 'Dropout', content: <span>En cada iteración apaga aleatoriamente un porcentaje de neuronas (ej. 50 %). Es como ir rotando, en cada sesión, a quién se le pide ausentarse del grupo de estudio —incluida la «estrella»—: nadie depende de una sola neurona y todos aprenden a resolver. Rompe la co-adaptación.</span> },
                ]} />
                <CodeBlock title="Regularización en PyTorch" code={regulTorch} lang="pytorch" />
                <p>
                    Conviene notar una diferencia de naturaleza: <strong>L1 y L2 son penalizaciones</strong> que se suman al costo,
                    mientras que <strong>Dropout y Batch Normalization son capas</strong> que se insertan en la arquitectura de la red.
                </p>
                <Box type="info" label="Caso aplicado · jaguar vs. puma (cámaras trampa, Orinoquía)">
                    Con solo 500 imágenes por especie (muchas nocturnas), el modelo podría aprender «manchas = jaguar» y confundir
                    al ocelote. <strong>Dropout</strong> en las capas de textura lo obliga a usar rasgos robustos (forma de la cabeza,
                    cola, rosetas); <strong>L2</strong> penaliza fijarse en el fondo (vegetación recurrente).
                </Box>

                <h3>Normalización por lotes (Batch Normalization)</h3>
                <p>
                    Analogía del <strong>Ajiaco Santafereño</strong>: las papas (sabanera, pastusa, criolla) llegan con tamaños muy
                    variables; si entran a la olla sin estandarizar, la cocción es impredecible. La solución es cortar todo a cubos
                    uniformes. Batch Norm hace lo mismo entre capas: re-escala las activaciones para que cada neurona reciba una
                    distribución estable, permitiendo tasas de aprendizaje altas sin inestabilidad.
                </p>
                <Accordion items={[
                    { titulo: '1. Centrado (restar la media del lote)', contenido: <span>{String.raw`\(\mu_{\mathcal{B}}=\frac{1}{m}\sum_i x_i\)`}. Es como lavar las papas: todas parten de una base limpia y centrada.</span> },
                    { titulo: '2. Escalado (dividir por la desviación estándar)', contenido: <span>{String.raw`\(\hat{x}_i=\frac{x_i-\mu_{\mathcal{B}}}{\sqrt{\sigma_{\mathcal{B}}^2+\epsilon}}\)`}. Cortar las papas en cubos del mismo tamaño: todas con escala 1.</span> },
                    { titulo: '3. Transformación aprendible (γ y β)', contenido: <span>{String.raw`\(y_i=\gamma\,\hat{x}_i+\beta\)`}. El chef añade sal ({String.raw`\(\beta\)`}) y ajusta el fuego ({String.raw`\(\gamma\)`}): la red decide cuánto deshacer la estandarización.</span> },
                ]} />
                <Box type="info" label="Detalle clave: entrenamiento vs. inferencia">
                    Durante el entrenamiento, Batch Norm usa la media y la varianza <strong>del lote actual</strong>; en inferencia
                    emplea <strong>estadísticas acumuladas</strong> durante el entrenamiento, de modo que la predicción de una muestra
                    no dependa del lote en que llegue.
                </Box>

                <h3>Curvas de aprendizaje y Early Stopping</h3>
                <p>
                    Graficar el error de entrenamiento y validación a lo largo de las épocas diagnostica la salud del modelo. Si el
                    de entrenamiento baja pero el de validación sube (forma de «U»), hay <strong>sobreajuste</strong>. Si ambos
                    quedan altos, hay <strong>subajuste (underfitting)</strong>. El <Termino def="Detener el entrenamiento en la época donde el error de validación toca su mínimo, conservando esos pesos, antes de que el modelo empiece a memorizar ruido.">Early Stopping</Termino> (parada temprana) aprovecha esa «U»: detiene el entrenamiento en el mínimo del error de validación y conserva esos pesos.
                </p>
                <CurvaAprendizajeChart />

                <h3>La «U» en tu propia red: validación y regularización en vivo</h3>
                <p>
                    La curva anterior es ilustrativa; ahora se trata de <strong>provocar la «U» en la misma red</strong> de los capítulos
                    previos. El laboratorio reserva un <strong>30 % de los datos como validación</strong> (que la red <em>no</em> usa para
                    entrenar) y dibuja <strong>dos curvas</strong>: entrenamiento (rosa) y validación (morado). Sube la <strong>capacidad</strong>
                    (nodos y capas) y entrena muchas épocas: la curva rosa seguirá bajando mientras la morada empieza a <strong>repuntar</strong>
                    —ese despegue es el sobreajuste—. Luego activa <strong>λ (L2)</strong> o <strong>dropout</strong> y observa cómo la brecha se cierra.
                </p>
                <RedFrontera chapter={5} />
                <Box type="tip" label="Qué conviene observar (desde el Capítulo 5)">
                    <ul>
                        <li><strong>Induce el sobreajuste:</strong> con muchos nodos y muchas épocas, la pérdida de <strong>validación (morada)</strong>
                            forma una <strong>«U»</strong> mientras la de entrenamiento sigue cayendo: la red memoriza el ruido.</li>
                        <li><strong>Regulariza:</strong> sube <strong>λ</strong> y la frontera se <em>suaviza</em>; el término L2 empuja los pesos hacia cero y la «U» se aplana.</li>
                        <li><strong>Dropout:</strong> apaga neuronas al azar en cada época de entrenamiento; rompe la co-adaptación y reduce la brecha train/validación
                            —pero la <strong>predicción sigue siendo determinista</strong> (no se aplica al evaluar)—.</li>
                        <li><strong>Audita la equidad:</strong> al pie del laboratorio, el <strong>Auditor de Equidad</strong> reparte la validación en dos subgrupos (A y B).
                            El subgrupo B —con datos más ruidosos— recibe sistemáticamente <strong>más falsos negativos</strong>: el sesgo no se programó, se <em>heredó</em>.
                            Mover el umbral o activar el «costo del falso negativo» muestra que cerrar la brecha de un grupo casi siempre la abre en otro.</li>
                    </ul>
                </Box>

                <h3>Partición honesta: entrenamiento, validación y prueba</h3>
                <p>
                    El laboratorio reservó un 30 % para validación, pero un proyecto serio parte los datos en <strong>tres</strong> conjuntos
                    disjuntos, cada uno con un papel distinto:
                </p>
                <div className="grid md:grid-cols-3 gap-3 my-3">
                    <div className="usta-card p-4"><h4 style={{ marginTop: 0 }}>Entrenamiento · ~70 %</h4><p className="text-sm !mb-0">Ajusta los <strong>pesos</strong> por descenso del gradiente. La red lo ve una y otra vez.</p></div>
                    <div className="usta-card p-4"><h4 style={{ marginTop: 0 }}>Validación · ~15 %</h4><p className="text-sm !mb-0">Elige los <strong>hiperparámetros</strong> y decide el Early Stopping. La red no se entrena con él, pero el ingeniero sí lo «mira» para decidir.</p></div>
                    <div className="usta-card p-4"><h4 style={{ marginTop: 0 }}>Prueba · ~15 %</h4><p className="text-sm !mb-0">Se toca <strong>una sola vez</strong>, al final, para estimar el desempeño real. Si se usa para decidir algo, deja de ser honesto.</p></div>
                </div>
                <p>
                    La regla de oro: el conjunto de <strong>prueba</strong> permanece «en una caja sellada» hasta el final. En cuanto una decisión
                    —qué modelo, qué umbral— se toma mirándolo, su estimación se contamina y se vuelve optimista.
                </p>
                <Box type="danger" label="El pecado capital: la fuga de datos (data leakage)">
                    Ocurre cuando información del futuro —o del conjunto de prueba— se <strong>filtra</strong> al entrenamiento e infla el desempeño
                    de forma ficticia. Casos típicos: <strong>(1)</strong> normalizar (restar la media, escalar) usando <em>todo</em> el dataset
                    antes de partirlo, de modo que el train «ve» estadísticas del test; <strong>(2)</strong> incluir una variable que en realidad es
                    <em> consecuencia</em> del objetivo (predecir dengue usando «días de hospitalización»); <strong>(3)</strong> en series temporales,
                    barajar y mezclar pasado con futuro. El síntoma es siempre el mismo: <strong>95 % en validación, fracaso en producción</strong>.
                    La regla: toda transformación (escalado, imputación) se <strong>ajusta solo con el train</strong> y luego se aplica a validación y prueba.
                </Box>

                <h3>Validación cruzada K-Fold e hiperparámetros</h3>
                <p>
                    Reservar un único conjunto de validación puede sesgar la estimación. La <strong>validación cruzada K-Fold</strong>
                    (ej. {String.raw`\(K=5\)`}) divide los datos en 5 pliegues; en cada iteración entrena con 4 y valida con 1, rotando.
                    La métrica final es el promedio de las 5: estimación robusta del verdadero desempeño.
                </p>
                <p>
                    K-Fold dice <strong>qué tan bien</strong> generaliza una configuración; pero antes hay que decidir
                    <strong> qué configurar</strong>. Conviene entonces distinguir lo que el modelo aprende por sí solo de lo que el
                    ingeniero fija de antemano:
                </p>
                <div className="overflow-x-auto">
                    <table>
                        <thead><tr><th>Concepto</th><th>Parámetros</th><th>Hiperparámetros</th></tr></thead>
                        <tbody>
                            <tr><td>Qué son</td><td>Variables internas aprendidas</td><td>Configuraciones externas fijadas por el ingeniero</td></tr>
                            <tr><td>Ejemplos</td><td>Pesos (w), sesgos (b)</td><td>Tasa de aprendizaje, épocas, batch size, λ, tasa de dropout</td></tr>
                            <tr><td>Cómo se hallan</td><td>Backpropagation + descenso del gradiente</td><td>Grid Search / Random Search, experiencia</td></tr>
                        </tbody>
                    </table>
                </div>
                <Accordion items={[
                    { titulo: 'Grid Search (búsqueda en cuadrícula)', contenido: <span>Evalúa sistemáticamente todas las combinaciones de una rejilla (ej. tostado a 180°, 190°, 200° × 8, 10, 12 min). Exhaustiva pero costosa.</span> },
                    { titulo: 'Random Search (búsqueda aleatoria)', contenido: <span>Prueba combinaciones al azar dentro de rangos razonables. Suele ser más eficiente: explora mejor las regiones promisorias sin malgastar cómputo.</span> },
                ]} />

                <h3>Matriz de confusión y métricas</h3>
                <p>
                    Decir «mi modelo tiene 95 % de exactitud» puede ser una mentira peligrosa. En Urabá, si solo 5 de cada 100
                    pacientes tienen dengue grave, un modelo que diga «nadie está grave» acierta el 95 % (los 95 que efectivamente
                    no están graves)… pero <strong>omite todos los casos graves</strong>. Por eso se usa la matriz de confusión
                    (analogía: trilladora de café Excelso/Pasilla):
                </p>
                <ConfusionMatrix />
                <div className="grid md:grid-cols-3 gap-3 my-3">
                    <div className="usta-card p-4 text-center"><Eq>{String.raw`\(\frac{VP+VN}{\text{total}}\)`}</Eq><span className="text-xs font-bold text-navy">Exactitud</span></div>
                    <div className="usta-card p-4 text-center"><Eq>{String.raw`\(\frac{VP}{VP+FP}\)`}</Eq><span className="text-xs font-bold text-navy">Precisión</span></div>
                    <div className="usta-card p-4 text-center"><Eq>{String.raw`\(\frac{VP}{VP+FN}\)`}</Eq><span className="text-xs font-bold text-navy">Recall / Sensibilidad</span></div>
                </div>
                <h4>Precisión vs. recall: un balancín (y el F1)</h4>
                <p>
                    Precisión y recall <strong>tiran en sentidos opuestos</strong>. <strong>Bajar</strong> el umbral de decisión declara más positivos:
                    sube el recall (se escapan menos enfermos) pero baja la precisión (más falsas alarmas); <strong>subirlo</strong> hace lo contrario.
                    No hay un punto óptimo universal —depende del costo de cada error—. Es exactamente lo que mueve el <strong>slider de umbral del
                    Auditor de Equidad</strong> del laboratorio de arriba.
                </p>
                <p>Para resumir ambas en un solo número se usa el <strong>F1</strong>, su media armónica (penaliza que <em>cualquiera</em> de las dos sea baja):</p>
                <Eq>{String.raw`$$ F_1 = 2\cdot\frac{\text{precisión}\cdot\text{recall}}{\text{precisión}+\text{recall}} $$`}</Eq>
                <p>
                    Y para juzgar el modelo en <em>todos</em> los umbrales a la vez está la <strong>curva ROC</strong> y su <strong>área bajo la curva
                    (AUC)</strong>: {String.raw`\(\text{AUC}=1\)`} es perfecto, {String.raw`\(0{,}5\)`} es azar. Es útil porque no depende del umbral
                    elegido ni del balance de clases.
                </p>
                <CalloutPro tema="eth" titulo="Marco Ético de la IA en Colombia" subtitulo="Transparencia, explicabilidad y sensibilidad">
                    Las métricas derivadas de la matriz de confusión (exactitud, recall) se calculan con <strong>conteos sobre un
                        umbral</strong>, por lo que su gradiente es nulo o indefinido y no pueden optimizarse directamente por descenso
                    del gradiente. Lo que sí se optimiza es la pérdida (p. ej. la entropía cruzada); las métricas <strong>guían las
                        decisiones de ingeniería</strong>: ante muchos falsos negativos (ej. fraude en Bancolombia, o dengue), se asignan
                    <em>pesos de clase</em> para penalizarlos más. En aplicaciones críticas para Colombia —deslizamientos,
                    enfermedades, plagas— suele ser más ético priorizar la <strong>sensibilidad</strong>. El Marco Ético
                    para la IA en Colombia (2021) exige <strong>transparencia y explicabilidad</strong>: una decisión que afecta derechos
                    fundamentales no puede ser una «caja negra».
                </CalloutPro>

                <h3>Equidad algorítmica: el sesgo que se hereda</h3>
                <p>
                    Un modelo puede ser muy preciso <em>en promedio</em> y aun así <strong>tratar peor a un subgrupo de personas</strong>. El sesgo
                    casi nunca se programa: se <strong>hereda de los datos</strong> (subgrupos con menos ejemplos, registros de peor calidad o etiquetas
                    históricamente injustas), y el descenso del gradiente —que solo minimiza la pérdida <em>promedio</em>— lo reproduce y a veces lo
                    amplifica. Tres ideas para nombrarlo:
                </p>
                <Tabs tabs={[
                    { label: 'Atributo protegido', content: <span>Una característica sobre la que es injusto o ilegal discriminar (sexo, etnia, región, edad). <strong>No debe entrar como variable</strong> del modelo… pero quitarla no basta (<em>«fairness through unawareness»</em>): otras variables actúan de <strong>proxy</strong> —el barrio o el municipio pueden codificar la etnia o el estrato—.</span> },
                    { label: 'Impacto dispar', content: <span>(<em>disparate impact</em>) Cuando una decisión perjudica de forma <strong>desproporcionada</strong> a un grupo, aunque el atributo protegido no se haya usado de forma explícita. Se mide comparando tasas —de aprobación, de error— entre subgrupos.</span> },
                    { label: 'Igualdad de oportunidad', content: <span>Que la tasa de acierto en los casos <strong>positivos</strong> (el recall) sea parecida entre subgrupos. Su incumplimiento es justo la <strong>brecha de falsos negativos</strong> que reporta el Auditor de Equidad: un grupo al que se le «escapan» más casos graves.</span> },
                ]} />
                <Box type="eth" label="Caso colombiano · alerta temprana de deslizamientos">
                    Un modelo entrenado sobre todo con datos de zonas urbanas instrumentadas puede tener <strong>muchos menos —y más ruidosos—
                    registros de veredas rurales y resguardos indígenas</strong>. Resultado: alta exactitud global, pero un <strong>recall bajo justo
                    donde un falso negativo cuesta vidas</strong>. Auditar por subgrupo —y no solo el promedio— es un requisito ético, no un lujo.
                </Box>
                <p>
                    El <strong>Auditor de Equidad</strong> del laboratorio encarna todo esto: el subgrupo B recibe más falsos negativos que el A, y al
                    mover el umbral o activar el costo del error se ve que <strong>cerrar la brecha de un grupo casi siempre tiene un precio en el otro</strong>.
                    De hecho, distintas definiciones de «justicia» (paridad demográfica frente a igualdad de oportunidad) pueden ser <strong>matemáticamente
                    incompatibles</strong> entre sí: la equidad obliga a <em>elegir</em> qué se prioriza, de forma transparente y con las comunidades afectadas.
                </p>
                <MCQ
                    pregunta="Un modelo de crédito no usa la etnia como variable, pero rechaza al doble de solicitantes de cierta región. Esto es…"
                    opciones={[
                        { texto: 'imposible: si no usa la etnia, no puede discriminar.', correcta: false },
                        { texto: 'impacto dispar: variables proxy (la región) codifican el atributo protegido y reproducen el sesgo.', correcta: true, justificacion: 'Quitar el atributo no basta («fairness through unawareness»): otras variables correlacionadas actúan de proxy y el impacto sigue siendo desigual.' },
                        { texto: 'un buen modelo, porque su exactitud global es alta.', correcta: false },
                    ]} />

                <MCQ
                    pregunta="Un modelo entrenado con datos de Medellín alcanza 98 % allí, pero al aplicarlo en Cúcuta cae a 55 %. ¿Qué ocurre?"
                    opciones={[
                        { texto: 'Generalización correcta.', correcta: false },
                        { texto: 'Sobreajuste: memorizó rasgos idiosincrásicos de Medellín en vez de los patrones generales.', correcta: true, justificacion: 'La fuerte caída al cambiar de población indica que el modelo aprendió detalles propios de su dominio de entrenamiento y no generalizó: sobreajuste.' },
                        { texto: 'Subajuste.', correcta: false },
                        { texto: 'Un error de hardware.', correcta: false },
                    ]} />

                <MCQ
                    pregunta="La curva de validación empieza a subir desde la época 50. ¿Qué conviene hacer?"
                    opciones={[
                        { texto: 'Entrenar 1000 épocas más.', correcta: false },
                        { texto: 'Aplicar Early Stopping, guardando los pesos de la época 50.', correcta: true, justificacion: 'La "U" de validación es la firma del sobreajuste; Early Stopping detiene justo antes de empezar a memorizar ruido.' },
                        { texto: 'Eliminar el conjunto de validación.', correcta: false },
                        { texto: 'Subir mucho la tasa de aprendizaje.', correcta: false },
                    ]} />

                <Reto titulo="Reto · diagnóstico ético"
                    solucion={<Box type="tip" label="Solución sugerida">
                        Priorizar la <strong>sensibilidad (recall)</strong> sobre la exactitud, porque un falso negativo (no detectar
                        un deslizamiento inminente) cuesta vidas. Técnicamente: asignar mayor peso a la clase positiva en la función
                        de pérdida, ajustar el umbral de decisión y reportar recall/precisión, no solo exactitud. Éticamente:
                        garantizar explicabilidad para que las comunidades puedan auditar la alerta.
                    </Box>}>
                    Un municipio usa un modelo para emitir alertas de deslizamiento. La exactitud es 96 %, pero falla en detectar
                    varios eventos reales. ¿Qué métrica debería priorizarse y qué medida técnica y ética tomaría?
                </Reto>

                <Quiz titulo="Mini-cuestionario · Capítulo 5" preguntas={[
                    {
                        pregunta: 'El paso optimizer.zero_grad() sirve para…',
                        opciones: [
                            { texto: 'evitar que los gradientes del lote actual se sumen a los acumulados de lotes anteriores.', correcta: true },
                            { texto: 'reiniciar los pesos a valores aleatorios.', correcta: false },
                            { texto: 'liberar la RAM de la GPU.', correcta: false },
                        ],
                        justificacion: 'PyTorch acumula gradientes; sin limpiarlos se corrompe la dirección del descenso.'
                    },
                    {
                        pregunta: 'Dropout combate el sobreajuste porque…',
                        opciones: [
                            { texto: 'apaga neuronas al azar y rompe la co-adaptación, forzando representaciones redundantes.', correcta: true },
                            { texto: 'duplica las imágenes de entrenamiento.', correcta: false },
                            { texto: 'elimina permanentemente las neuronas con pesos negativos.', correcta: false },
                        ],
                        justificacion: 'Al no poder depender de una "neurona estrella", la red aprende rasgos distribuidos y generaliza mejor.'
                    },
                    {
                        pregunta: 'En salud pública con clases desbalanceadas (dengue), usar solo la exactitud es engañoso; conviene optimizar…',
                        opciones: [
                            { texto: 'la sensibilidad (recall), para detectar a los enfermos graves.', correcta: true },
                            { texto: 'el número de épocas.', correcta: false },
                            { texto: 'el tamaño de la imagen.', correcta: false },
                        ],
                        justificacion: 'Un alto recall minimiza los falsos negativos, que en salud pueden ser fatales.'
                    },
                    {
                        pregunta: 'La diferencia entre un PARÁMETRO y un HIPERPARÁMETRO es que…',
                        opciones: [
                            { texto: 'el parámetro lo aprende el modelo (pesos); el hiperparámetro lo fija el ingeniero antes de entrenar (learning rate, λ).', correcta: true },
                            { texto: 'son sinónimos.', correcta: false },
                            { texto: 'el hiperparámetro se aprende con backpropagation.', correcta: false },
                        ],
                        justificacion: 'Los pesos se optimizan automáticamente; los hiperparámetros se buscan con Grid/Random Search.'
                    },
                    {
                        pregunta: 'El Marco Ético de la IA en Colombia exige especialmente…',
                        opciones: [
                            { texto: 'transparencia y explicabilidad de las decisiones algorítmicas.', correcta: true },
                            { texto: 'usar siempre la GPU más cara.', correcta: false },
                            { texto: 'maximizar la exactitud a cualquier costo.', correcta: false },
                        ],
                        justificacion: 'Las decisiones que afectan derechos fundamentales no pueden ser cajas negras.'
                    },
                ]} />

                <Box type="tip" label="Síntesis del Capítulo 5">
                    El entrenamiento se reduce a un <strong>bucle de cinco pasos</strong> (forward, loss, zero_grad, backward, step).
                    Para que el modelo aprenda en vez de memorizar, se <strong>regulariza</strong> (L1/L2, Dropout) y se
                    <strong> estabiliza</strong> (Batch Norm); para evaluarlo con honestidad, se leen las <strong>curvas de
                    aprendizaje</strong>, se aplica Early Stopping, se valida con <strong>K-Fold</strong> y se mira más allá de la
                    exactitud con la <strong>matriz de confusión</strong>. En aplicaciones críticas, además, la <strong>ética</strong>
                    obliga a priorizar la sensibilidad y a garantizar transparencia. Con esto se cierra el contenido del Módulo 1; la
                    siguiente sección consolida la evaluación integradora, el glosario y los recursos.
                </Box>
            </div>
        );

        /* ============================================================
           LECCIÓN FINAL — EVALUACIÓN, GLOSARIO Y RECURSOS
        ============================================================ */
        const GLOSARIO = [
            ['Backpropagation', 'Calcula el gradiente del error respecto a cada peso, distribuyendo la "responsabilidad" desde la salida hacia atrás.'],
            ['Capa oculta', 'Capas entre la entrada y la salida que extraen características y aprenden representaciones abstractas.'],
            ['Descenso del gradiente', 'Algoritmo iterativo que minimiza la pérdida ajustando pesos en dirección opuesta a la pendiente.'],
            ['Dropout', 'Apaga neuronas al azar durante el entrenamiento para evitar el sobreajuste y la co-adaptación.'],
            ['Función de activación', 'Función (ReLU, Sigmoide…) que introduce no-linealidad. El "interruptor" que decide si la neurona dispara.'],
            ['Función de pérdida (Loss)', 'Cuantifica la diferencia entre predicción y valor real. El "altímetro". Ej.: MSE, BCE.'],
            ['Learning Rate (η)', 'Hiperparámetro que define el tamaño del paso. Muy alto diverge; muy bajo converge lento.'],
            ['Overfitting', 'El modelo memoriza el ruido del entrenamiento y pierde capacidad de generalizar.'],
            ['ReLU', 'Activación f(x)=máx(0,x); eficiente y mitiga el desvanecimiento del gradiente.'],
            ['Aproximación Universal', 'Una red con una capa oculta y suficientes neuronas aproxima cualquier función continua.'],
