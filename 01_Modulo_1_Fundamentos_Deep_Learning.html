        const sgdNumpy = `import numpy as np

# Descenso del gradiente sobre L(theta) = theta^2 (un "valle" simple)
# El gradiente es dL/dtheta = 2*theta
theta = 2.7        # punto inicial (en lo alto de la montaña)
eta   = 0.22       # tasa de aprendizaje (tamaño del paso)

for paso in range(9):
    grad  = 2 * theta              # pendiente en el punto actual
    theta = theta - eta * grad     # paso en dirección OPUESTA al gradiente
    print(f"paso {paso}: theta={theta:.3f}  error={theta**2:.4f}")
# theta se acerca a 0 (el valle), donde el error es mínimo.`;

# Optimizadores en PyTorch: SGD con momentum vs. Adam
opt_sgd  = torch.optim.SGD(modelo.parameters(), lr=0.01, momentum=0.9)

# momentum=0.9 acumula "inercia" de los gradientes previos: baja más recto

                }
                return [
                    { x, y: x.map(v => v * v), name: 'Costo L(θ)', line: { color: '#3D008D', width: 3 }, hoverinfo: 'skip' },
                    { x: px, y: py, name: 'Pasos del descenso', mode: 'lines+markers', line: { color: '#ED1E79', width: 2 }, marker: { size: 8, color: '#FDB913' } },
                ];
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 45 }, legend: { orientation: 'h', y: -0.22 },
                xaxis: { title: 'θ (parámetro)', range: [-3.2, 3.2], gridcolor: '#eee' },
                yaxis: { title: 'Error', range: [0, 9], gridcolor: '#eee' },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [lr]);

            // Para L(θ)=θ² la actualización es θ·(1−2η): el factor decide el régimen.
            const factor = 1 - 2 * lr;
            let estado, color;
            if (Math.abs(factor) < 0.02) { estado = 'Salto perfecto: 1 paso al valle'; color = '#3D008D'; }
            else if (factor > 0) { estado = 'Converge suave (baja recto)'; color = '#15803D'; }
            else if (Math.abs(factor) < 1) { estado = 'Oscila pero converge'; color = '#B45309'; }
            else if (Math.abs(factor) < 1.02) { estado = 'Oscila sin avanzar'; color = '#ED1E79'; }
            else { estado = 'Diverge: el error explota'; color = '#B91C1C'; }

            return (
                <div className="my-4">
                    <div className="flex flex-wrap items-center gap-3 mb-2 bg-bg rounded-lg p-3">
                        <label className="text-xs font-bold text-navy whitespace-nowrap" htmlFor="lr-range">η = {lr.toFixed(2)}</label>
                        <input id="lr-range" type="range" min="0.05" max="1.10" step="0.05" value={lr}
                            onChange={e => setLr(+e.target.value)} className="usta-range flex-1" style={{ minWidth: 160 }}
                            aria-label="Tasa de aprendizaje eta" />
                        <span className="text-xs font-bold px-3 py-1 rounded-full text-white whitespace-nowrap" style={{ background: color }}>{estado}</span>
                    </div>
                    <ChartFrame id="chart-lr-playground" caption="Al variar η: con pasos pequeños el descenso es recto; cerca de η=0.5 alcanza el valle casi de un salto; por encima de η=1 diverge." />
                </div>
            );
        };

        /* Comparador interactivo de optimizadores sobre un tazón mal condicionado */
        const OptimizerCompare = () => {
            const [vis, setVis] = useState({ gd: true, mom: true, adam: true });
            const toggle = k => setVis(s => ({ ...s, [k]: !s[k] }));
            usePlotly('chart-optim-compare', () => {
                const a = 6, b = 0.6;                    // valle estrecho: relación de curvatura 10:1
                const gx = x => 2 * a * x, gy = y => 2 * b * y;
                const x0 = -2.6, y0 = 2.6, N = 48;
                const traj = (init, step) => {
                    let x = x0, y = y0; const px = [x], py = [y]; const s = init();
                    for (let k = 0; k < N; k++) {
                        const [nx, ny] = step(x, y, gx(x), gy(y), s, k + 1);
                        x = nx; y = ny; px.push(x); py.push(y);
                        if (!isFinite(x) || !isFinite(y) || Math.abs(x) > 3.2 || Math.abs(y) > 3.2) break;
                    }
                    return { px, py };
                };
                const gd = traj(() => ({}), (x, y, dx, dy) => [x - 0.13 * dx, y - 0.13 * dy]);
                const mom = traj(() => ({ vx: 0, vy: 0 }), (x, y, dx, dy, s) => {
                    s.vx = 0.85 * s.vx - 0.045 * dx; s.vy = 0.85 * s.vy - 0.045 * dy;
                    return [x + s.vx, y + s.vy];
                });
                const adam = traj(() => ({ mx: 0, my: 0, vx: 0, vy: 0 }), (x, y, dx, dy, s, t) => {
                    const b1 = 0.9, b2 = 0.999, e = 1e-8, lr = 0.35;
                    s.mx = b1 * s.mx + (1 - b1) * dx; s.my = b1 * s.my + (1 - b1) * dy;
                    s.vx = b2 * s.vx + (1 - b2) * dx * dx; s.vy = b2 * s.vy + (1 - b2) * dy * dy;
                    const mxh = s.mx / (1 - Math.pow(b1, t)), myh = s.my / (1 - Math.pow(b1, t));
                    const vxh = s.vx / (1 - Math.pow(b2, t)), vyh = s.vy / (1 - Math.pow(b2, t));
                    return [x - lr * mxh / (Math.sqrt(vxh) + e), y - lr * myh / (Math.sqrt(vyh) + e)];
                });
                const gridx = [], gridy = [];
                for (let i = -3; i <= 3; i += 0.12) gridx.push(+i.toFixed(2));
                for (let j = -3; j <= 3; j += 0.12) gridy.push(+j.toFixed(2));
                const z = gridy.map(yy => gridx.map(xx => a * xx * xx + b * yy * yy));
                const traces = [
                    { type: 'contour', x: gridx, y: gridy, z, showscale: false, colorscale: [[0, '#EDE7F6'], [1, '#C7B8E0']], contours: { coloring: 'lines' }, line: { width: 1 }, hoverinfo: 'skip' },
                ];
                if (vis.gd) traces.push({ x: gd.px, y: gd.py, mode: 'lines+markers', name: 'GD simple', line: { color: '#B91C1C', width: 2 }, marker: { size: 5 } });
                if (vis.mom) traces.push({ x: mom.px, y: mom.py, mode: 'lines+markers', name: 'Momentum', line: { color: '#ED1E79', width: 2 }, marker: { size: 5 } });
                if (vis.adam) traces.push({ x: adam.px, y: adam.py, mode: 'lines+markers', name: 'Adam', line: { color: '#15803D', width: 2 }, marker: { size: 5 } });
                traces.push({ x: [0], y: [0], mode: 'markers', name: 'mínimo', marker: { size: 14, color: '#FDB913', symbol: 'star', line: { color: '#3D008D', width: 1 } } });
                return traces;
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 40 }, legend: { orientation: 'h', y: -0.18 },
                xaxis: { title: 'parámetro θ₁', range: [-3, 3], gridcolor: '#eee', zeroline: false },
                yaxis: { title: 'parámetro θ₂', range: [-3, 3], gridcolor: '#eee', zeroline: false },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [vis.gd, vis.mom, vis.adam]);

            const defs = { gd: { name: 'GD simple', color: '#B91C1C' }, mom: { name: 'Momentum', color: '#ED1E79' }, adam: { name: 'Adam', color: '#15803D' } };
            return (
                <div className="my-4">
                    <div className="flex flex-wrap gap-2 mb-2">
                        {Object.keys(defs).map(k => (
                            <button key={k} onClick={() => toggle(k)}
                                className={`px-3 py-1 rounded-full text-xs font-bold border-2 transition-all ${vis[k] ? 'text-white shadow' : 'bg-white text-gray-500'}`}
                                style={vis[k] ? { background: defs[k].color, borderColor: defs[k].color } : { borderColor: '#e5e7eb' }}>
                                {defs[k].name}
                            </button>
                        ))}
                    </div>
                    <ChartFrame id="chart-optim-compare" height="chart-h-360" caption="Tazón mal condicionado (valle estrecho 10:1). GD simple zigzaguea; Momentum amortigua el rebote; Adam adapta el paso de cada eje y baja casi recto al mínimo (★)." />
                </div>
            );
        };

        const Cap3Section = () => (
            <div className="prose-usta">
                <Box type="info" label="Idea central">
                    En Deep Learning, <strong>aprender es minimizar el error</strong>. Una red recién inicializada (pesos aleatorios)
                    es como un turista perdido en la Cordillera Central sin mapa. Se necesitan dos herramientas: una <strong>función
                        de costo</strong> (el altímetro que mide qué tan mal va el modelo) y un <strong>optimizador</strong> (la estrategia para
                    descender).
                </Box>

                <h3>Funciones de costo</h3>
                <p>
                    La función de costo {String.raw`\(L(\hat{y}, y)\)`} compara las predicciones con la realidad: si la diferencia es
                    grande, el costo es alto; si la predicción es perfecta, el costo es cero. La elección no es trivial: define
                    <em>qué le importa</em> al modelo.
                </p>

                <h4>Error Cuadrático Medio (MSE) — regresión</h4>
                <Eq>{String.raw`$$ \text{MSE} = \frac{1}{N}\sum_{i=1}^{N}(y_i - \hat{y}_i)^2 $$`}</Eq>
                <p>
                    Al elevar al cuadrado, se penalizan desproporcionadamente los errores grandes. Si una red predice una llovizna
                    (5 mm) en la cuenca del Río Magdalena pero ocurre un diluvio (100 mm), el error no es 95 sino
                    {String.raw` \(95^2 = 9025\)`}: esto obliga a la red a atender los eventos extremos, crucial para alertas de inundación.
                </p>

                <h4>Entropía Cruzada Binaria (BCE) — clasificación</h4>
                <Eq>{String.raw`$$ \text{BCE} = -\frac{1}{N}\sum_{i=1}^{N}\big[\,y_i\log(\hat{y}_i) + (1-y_i)\log(1-\hat{y}_i)\,\big] $$`}</Eq>
                <p>
                    Se usa, por ejemplo, para diagnosticar si una hoja de café tiene roya. No importa la distancia numérica, sino la
                    probabilidad: castiga severamente al modelo que dice «100 % seguro que está sano» cuando la planta está enferma.
                </p>

                <h4>Entropía Cruzada Categórica (CCE) — clasificación multiclase</h4>
                <p>
                    Cuando hay más de dos clases —por ejemplo, diagnosticar si una hoja de café tiene <em>roya</em>, <em>mancha de hierro</em>,
                    <em>antracnosis</em> o está <em>sana</em>— la última capa entrega un puntaje crudo por clase, los
                    {' '}<Termino def="Salidas numéricas sin normalizar de la última capa, antes de convertirse en probabilidades.">logits</Termino>
                    {' '}{String.raw`\(z_k\)`}. La función <strong>Softmax</strong> los convierte en una distribución de probabilidad que suma 1:
                </p>
                <Eq>{String.raw`$$ \hat{y}_k = \text{softmax}(z_k) = \frac{e^{z_k}}{\sum_{j=1}^{C} e^{z_j}}, \qquad \sum_{k=1}^{C}\hat{y}_k = 1 $$`}</Eq>
                <p>
                    Sobre esas probabilidades se aplica la <strong>entropía cruzada categórica</strong>, que solo mira la probabilidad asignada a la
                    clase <em>verdadera</em> (con {String.raw`\(y_{ik}\)`} en codificación <em>one-hot</em>: vale 1 en la clase correcta y 0 en el resto):
                </p>
                <Eq>{String.raw`$$ \text{CCE} = -\frac{1}{N}\sum_{i=1}^{N}\sum_{k=1}^{C} y_{ik}\,\log(\hat{y}_{ik}) $$`}</Eq>
                <p>
                    Es la generalización natural de la BCE a {String.raw`\(C\)`} clases: si la red asigna baja probabilidad a la enfermedad correcta,
                    {String.raw` \(-\log(\hat{y})\)`} se dispara y el costo crece. De hecho, <strong>la BCE es el caso particular de la CCE con {String.raw`\(C = 2\)`}</strong>.
                </p>

                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">Tarea</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Salida típica</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Función de costo</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Ejemplo local</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Regresión</strong></td><td className="p-2 border-b border-gray-100">1 neurona lineal</td><td className="p-2 border-b border-gray-100">MSE</td><td className="p-2 border-b border-gray-100">mm de lluvia en el Magdalena</td></tr>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Clasif. binaria</strong></td><td className="p-2 border-b border-gray-100">1 neurona + Sigmoide</td><td className="p-2 border-b border-gray-100">BCE</td><td className="p-2 border-b border-gray-100">¿la hoja tiene roya? (sí / no)</td></tr>
                            <tr><td className="p-2"><strong>Clasif. multiclase</strong></td><td className="p-2">C neuronas + Softmax</td><td className="p-2">CCE</td><td className="p-2">tipo de enfermedad (4 clases)</td></tr>
                        </tbody>
                    </table>
                </div>

                <CalloutPro tema="eth" titulo="Dimensión ética" subtitulo="Cuando los datos están desbalanceados">
                    Si los datos de dengue están muy desbalanceados (95 % no graves, 5 % graves), una función de costo estándar
                    podría minimizar el error global <strong>ignorando los casos graves</strong>. En salud pública, un falso negativo
                    puede ser fatal. La elección del costo no es solo técnica, también ética: conviene incorporar <strong>pesos
                        diferenciales</strong> que indiquen que equivocarse en un caso grave cuesta, por ejemplo, diez veces más.
                </CalloutPro>

                <h3>Descenso del gradiente: una analogía andina</h3>
                <p>
                    Un excursionista se halla en el <strong>Páramo de Letras</strong>, a 3.677 m, de noche y con niebla densa (visibilidad &lt; 1 m).
                    Debe llegar al valle (error mínimo) pero no ve nada, así que tantea con los pies la inclinación: el <strong>gradiente</strong>
                    es la flecha que apunta hacia arriba. Para descender, da un paso en la dirección <strong>opuesta</strong>:
                </p>
                <Eq>{String.raw`$$ \theta_{t+1} = \theta_t - \eta\,\nabla_\theta L(\theta_t) $$`}</Eq>
                <p>donde {String.raw`\(\nabla_\theta L\)`} es el gradiente y {String.raw`\(\eta\)`} (eta) es la tasa de aprendizaje.</p>
                <GradienteChart />
                <CodeBlock title="Descenso del gradiente en numpy" code={sgdNumpy} />

                <Box type="tip" label="De un parámetro a millones">
                    En esta analogía {String.raw`\(\theta\)`} es un solo número, pero en una red real es un <strong>vector con millones de
                    componentes</strong> (todos los pesos y sesgos). El gradiente {String.raw`\(\nabla_\theta L\)`} es entonces un vector de
                    derivadas parciales —una por parámetro— y la actualización las mueve todas a la vez. ¿Cómo se calcula ese vector gigante de
                    forma eficiente? Ese es justamente el tema del <strong>Capítulo 4: Retropropagación</strong>.
                </Box>

                <h4>La tasa de aprendizaje: cuestión de vida o muerte</h4>
                <p>
                    El siguiente laboratorio usa el mismo valle simple {String.raw`\(L(\theta)=\theta^2\)`}. Al variar la tasa de aprendizaje
                    {String.raw` \(\eta\)`} se aprecia cómo cambia el comportamiento del descenso; el resumen de los tres regímenes aparece debajo:
                </p>
                <LRPlayground />
                <Tabs tabs={[
                    { label: 'Muy alta', content: <p>Saltos de 50 metros: probablemente pase por encima del valle y suba la ladera opuesta, o se desbarranque. En matemáticas, esto es <strong>divergencia</strong>: el error aumenta en vez de disminuir.</p> },
                    { label: 'Muy baja', content: <p>Pasos de hormiga, milímetro a milímetro: tardaría años en llegar. El modelo podría «morir de hipotermia» (no converger en un tiempo razonable).</p> },
                    { label: 'Ideal', content: <p>Pasos firmes y seguros que se reducen a medida que el terreno se aplana (al acercarse al valle). Convergencia estable y razonablemente rápida.</p> },
                ]} />

                <h3>Lotes, épocas e iteraciones</h3>
                <p>
                    Antes de comparar estrategias de descenso conviene fijar tres términos que suelen confundirse:
                </p>
                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">Término</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Qué es</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Lote (batch)</strong></td><td className="p-2 border-b border-gray-100">Grupo de ejemplos que se procesan juntos antes de una actualización de pesos.</td></tr>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Iteración</strong></td><td className="p-2 border-b border-gray-100">Una actualización de pesos = procesar <em>un</em> lote (un paso del descenso).</td></tr>
                            <tr><td className="p-2"><strong>Época (epoch)</strong></td><td className="p-2">Una pasada completa por <em>todo</em> el conjunto de entrenamiento.</td></tr>
                        </tbody>
                    </table>
                </div>
                <Box type="info" label="Ejemplo numérico">
                    Con 50.000 imágenes y un tamaño de lote de 100, una época tiene {String.raw`\(50\,000 / 100 = 500\)`} iteraciones.
                    Entrenar durante 20 épocas equivale a {String.raw`\(500 \times 20 = 10\,000\)`} actualizaciones de pesos.
                </Box>

                <h3>SGD vs. Batch Gradient Descent</h3>
                <p>
                    En teoría, para el gradiente exacto habría que medir la inclinación de <em>toda</em> la montaña a la vez: pasar
                    todos los datos (ej. 1 millón de imágenes) antes de un solo paso (<strong>Batch Gradient Descent</strong>).
                </p>
                <Box type="warn" label="El problema">
                    En una laptop típica no caben 1 millón de imágenes en RAM, y además es lentísimo.
                </Box>
                <p>
                    La solución es el <strong>Descenso de Gradiente Estocástico (SGD)</strong>: usar una pequeña porción
                    (mini-batch, ej. 32 imágenes), calcular el error y actualizar. El camino al valle es zigzagueante (cada lote
                    empuja distinto), pero es rapidísimo y el ruido a veces ayuda a escapar de mínimos locales.
                </p>
                <Box type="tip" label="El tamaño del lote importa">
                    Lotes <strong>pequeños</strong> (8–32) → más ruido por paso: el camino zigzaguea, pero ese ruido ayuda a escapar de malos
                    mínimos y suele generalizar mejor. Lotes <strong>grandes</strong> (256–1024) → gradiente más estable y mejor uso de la GPU,
                    pero exigen más memoria y a veces caen en mínimos «afilados» que generalizan peor. El tamaño de lote es, por eso, un
                    hiperparámetro que se ajusta.
                </Box>

                <h3>El paisaje del error: convexo vs. real</h3>
                <p>
                    El valle {String.raw`\(L(\theta)=\theta^2\)`} de las gráficas anteriores es <strong>convexo</strong>: un único fondo, sin
                    trampas. Es ideal para entender el descenso, pero el paisaje de error de una red profunda no es así. Con millones de
                    parámetros, la superficie es <strong>no convexa</strong> y está llena de accidentes:
                </p>
                <ul className="list-disc pl-6 space-y-1 text-[0.95rem] text-gray-700 my-3">
                    <li><strong>Mínimos locales:</strong> valles que no son el más profundo, donde el descenso podría detenerse.</li>
                    <li><strong>Puntos silla (<Termino def="Punto donde el terreno sube en unas direcciones y baja en otras, como una silla de montar: el gradiente es casi cero pero no es un mínimo.">saddle points</Termino>):</strong> el gradiente es casi nulo y el avance se «estanca», aunque no sea un mínimo real.</li>
                    <li><strong>Mesetas:</strong> zonas casi planas donde el gradiente es diminuto y el aprendizaje se vuelve lentísimo.</li>
                </ul>
                <Box type="info" label="Buenas noticias en alta dimensión">
                    Paradójicamente, con muchísimos parámetros los mínimos locales «malos» son raros: casi todos los puntos de gradiente nulo
                    resultan ser puntos silla, y la mayoría de los mínimos son casi tan buenos como el global. Además, el <strong>ruido del
                    SGD</strong> (lotes pequeños) da pequeños empujones que ayudan a salir de sillas y mesetas. Por eso, en la práctica, no se
                    persigue «el» óptimo global: basta con un mínimo suficientemente bueno.
                </Box>

                <h3>Momentum y optimizadores adaptativos</h3>
                <p>
                    Para corregir el zigzagueo del SGD se usa el <strong>momentum</strong>, un concepto físico: al bajar en bicicleta
                    el Alto de Letras, la inercia permite superar pequeños baches (el ruido de los datos) sin desviarse. El optimizador
                    acumula una «velocidad» basada en gradientes previos: mantiene el impulso en direcciones consistentes y atenúa las
                    oscilaciones.
                </p>
                <Eq>{String.raw`$$ v_{t+1} = \beta\,v_t - \eta\,\nabla_\theta L(\theta_t), \qquad \theta_{t+1} = \theta_t + v_{t+1} $$`}</Eq>
                <p>
                    El coeficiente {String.raw`\(\beta\)`} (típicamente {String.raw`\(0.9\)`}) fija cuánta inercia se conserva. Pero existe una idea
                    aún más potente: <strong>adaptar la tasa de aprendizaje a cada parámetro</strong>.
                </p>

                <h4>RMSProp: un paso a la medida de cada parámetro</h4>
                <p>
                    Una sola {String.raw`\(\eta\)`} para todos los pesos es un traje genérico. <strong>RMSProp</strong> lleva un promedio de la
                    magnitud reciente del gradiente de <em>cada</em> parámetro y divide su paso por ella: los parámetros con gradientes grandes y
                    ruidosos avanzan con cautela, y los de gradientes pequeños y constantes avanzan más rápido. Es como dar pasos largos en terreno
                    parejo y pasos cortos donde hay piedras.
                </p>

                <h4>Adam: lo mejor de los dos mundos</h4>
                <p>
                    <strong>Adam</strong> (<em>Adaptive Moment Estimation</em>) combina ambas ideas: <strong>momentum</strong> (inercia, el primer
                    momento del gradiente) <strong>+</strong> <strong>paso adaptativo por parámetro</strong> al estilo RMSProp (el segundo momento).
                    Es robusto, casi no requiere ajuste fino y por eso es hoy <strong>el optimizador por defecto</strong> en la mayoría de proyectos
                    de Deep Learning.
                </p>
                <CodeBlock title="Optimizadores en PyTorch (ilustrativo)" code={optimTorch} lang="pytorch" />
                <p>
                    El siguiente comparador muestra las tres estrategias sobre un mismo «valle estrecho» (una superficie donde el descenso simple
                    se atasca). Cada botón activa o desactiva una trayectoria:
                </p>
                <OptimizerCompare />
                <Box type="tip" label="¿Cuál elegir?">
                    En la práctica conviene empezar con <strong>Adam</strong> (lr ≈ 0.001): converge rápido y tolera una mala elección de {String.raw`\(\eta\)`}.
                    <strong>SGD con momentum</strong> a veces generaliza un poco mejor en visión por computador, pero exige ajustar con más cuidado la
                    tasa de aprendizaje. Ante la duda, Adam es un punto de partida seguro.
                </Box>

                <Reto titulo="Reto · Un paso de descenso a mano (MSE)"
                    solucion={
                        <div className="space-y-2 text-[0.95rem]">
                            <p><strong>(a) Predicción:</strong> {String.raw`\(\hat{y} = w\,x = 0.5 \times 2 = 1\)`}.</p>
                            <p><strong>(b) Error:</strong> {String.raw`\(L = (\hat{y}-y)^2 = (1-3)^2 = 4\)`}.</p>
                            <p><strong>(c) Gradiente:</strong> {String.raw`\(\dfrac{dL}{dw} = 2(\hat{y}-y)\,x = 2(1-3)(2) = -8\)`}.</p>
                            <p><strong>(d) Nuevo peso:</strong> {String.raw`\(w \leftarrow w - \eta\,\dfrac{dL}{dw} = 0.5 - 0.1(-8) = 1.3\)`}.</p>
                            <p style={{ color: '#15803D' }}><strong>Comprobación:</strong> con {String.raw`\(w=1.3\)`} la predicción es {String.raw`\(\hat{y}=2.6\)`} (más cerca de 3) y el error baja a {String.raw`\((2.6-3)^2 = 0.16\)`}. ✓ El paso funcionó.</p>
                        </div>
                    }>
                    Una neurona lineal sin sesgo predice {String.raw`\(\hat{y} = w\,x\)`} con {String.raw`\(w = 0.5\)`} y entrada {String.raw`\(x = 2\)`}.
                    El valor real es {String.raw`\(y = 3\)`}. Con error {String.raw`\(L = (\hat{y}-y)^2\)`} y tasa {String.raw`\(\eta = 0.1\)`}, se pide calcular a mano:
                    (a)&nbsp;la predicción, (b)&nbsp;el error, (c)&nbsp;el gradiente {String.raw`\(dL/dw\)`} y (d)&nbsp;el nuevo {String.raw`\(w\)`} tras un paso de descenso.
                </Reto>

                <MCQ
                    pregunta="Un modelo diverge: el error crece en cada época en lugar de bajar. ¿Cuál es la causa más probable?"
                    opciones={[

                <Quiz titulo="Mini-cuestionario · Capítulo 3" preguntas={[

        /* ============================================================
           DIAGRAMA SVG: grafo computacional (forward / backward)
        ============================================================ */
        const GrafoComputacional = () => {
            const nodos = [
                { x: 55, label: 'x · w', sub: 'producto' },
                { x: 195, label: '+ b', sub: 'suma' },
                { x: 335, label: 'ReLU', sub: 'activación' },
                { x: 475, label: 'ŷ', sub: 'predicción' },
                { x: 600, label: 'L', sub: 'error' },
            ];
            return (
                <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm my-4 overflow-x-auto">
                    <svg viewBox="0 0 660 170" className="w-full" style={{ minWidth: 560 }}>
                        <defs>
                            <marker id="arrF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2563EB" /></marker>
                            <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#DC2626" /></marker>
                        </defs>
                        {nodos.slice(0, -1).map((n, i) => (
                            <line key={'f' + i} x1={n.x + 38} y1="62" x2={nodos[i + 1].x - 2} y2="62" stroke="#2563EB" strokeWidth="2" markerEnd="url(#arrF)" />
                        ))}
                        {nodos.slice(1).map((n, i) => (
                            <line key={'b' + i} x1={n.x - 2} y1="108" x2={nodos[i].x + 38} y2="108" stroke="#DC2626" strokeWidth="2" strokeDasharray="4,3" markerEnd="url(#arrB)" />
                        ))}
                        {nodos.map((n, i) => (
                            <g key={i}>
                                <rect x={n.x} y="45" width="40" height="36" rx="9" fill="#F5F0FA" stroke="#3D008D" strokeWidth="2" />
                                <text x={n.x + 20} y="68" textAnchor="middle" fontSize="12" fill="#3D008D" fontWeight="bold">{n.label}</text>
                                <text x={n.x + 20} y="98" textAnchor="middle" fontSize="9" fill="#64748B">{n.sub}</text>
                            </g>
                        ))}
                        <text x="20" y="30" fontSize="11" fill="#2563EB" fontWeight="bold">▶ Forward pass (predicción)</text>
                        <text x="20" y="150" fontSize="11" fill="#DC2626" fontWeight="bold">◀ Backward pass (gradientes / regla de la cadena)</text>
                    </svg>
                </div>
            );
        };

        /* ============================================================
           CAPÍTULO 4 — RETROPROPAGACIÓN (BACKPROPAGATION)
        ============================================================ */
        const chainNumpy = `import numpy as np

# Grafo de una neurona:  z = w*x + b  ->  a = ReLU(z)  ->  L = (a - y)^2
x, w, b, y = 2.0, -1.5, 1.0, 0.0

# --- Forward pass (predicción) ---
z = w * x + b            # = -2.0
a = max(0.0, z)          # ReLU -> 0.0  (z es negativo)
L = (a - y) ** 2         # error = 0.0

# --- Backward pass (regla de la cadena, de atrás hacia adelante) ---
dL_da = 2 * (a - y)            # dL/da
da_dz = 1.0 if z > 0 else 0.0  # derivada de ReLU
dz_dw = x                      # dz/dw
dL_dw = dL_da * da_dz * dz_dw  # efecto dominó: producto de derivadas locales
print(dL_dw)                   # -> 0.0  (neurona "apagada": gradiente nulo)`;

        const autogradTorch = `import torch

# requires_grad=True activa el "secretario invisible" que registra cada operación
x = torch.tensor(2.0, requires_grad=True)
w = torch.tensor(-1.5, requires_grad=True)
b = torch.tensor(1.0, requires_grad=True)

z = w * x + b
a = torch.relu(z)
L = (a - 0.0) ** 2

L.backward()        # autograd lee la bitácora al revés y aplica la regla de la cadena
print(w.grad)       # gradiente dL/dw calculado automáticamente`;

        const Cap4Section = () => (
            <div className="prose-usta">
                <Box type="danger" label="El problema de la asignación de crédito">
                    Un envío de flores a Miami para San Valentín se retrasó y generó pérdidas. ¿De quién es la culpa? ¿Del
                    conductor de última milla (capa de salida)? ¿Del despachador en El Dorado (capa oculta 2)? ¿Del agrónomo que
                    demoró la cosecha (capa oculta 1)? ¿O de una política mal diseñada (pesos iniciales)? En una red hay miles de
                    neuronas: <strong>¿cuáles deben ajustar sus pesos y en qué medida?</strong>
                </Box>

                <p>
                    La <strong>retropropagación</strong> es el «mecanismo administrativo» perfecto: rastrea el error desde el
                    resultado final hacia atrás, capa por capa, calculando la contribución exacta de cada neurona al desastre.
                </p>

                <h3>Pensar en grafos, no en neuronas</h3>
                <p>
                    Conviene abandonar la analogía del «cerebro» y ver la red como un <strong>grafo computacional</strong>: una
                    secuencia de operaciones elementales. La ecuación {String.raw`\(y = \text{ReLU}(w\cdot x + b)\)`} se descompone
                    en nodos. La información fluye hacia adelante (forward) para predecir; la <strong>responsabilidad (el gradiente)
                        fluye hacia atrás</strong>.
                </p>
                <GrafoComputacional />

                <h3>La regla de la cadena: el efecto dominó</h3>
                <p>
                    Matemáticamente, la retropropagación se basa enteramente en la regla de la cadena. Si {String.raw`\(y=f(u)\)`} y
                    {String.raw` \(u=g(x)\)`}, entonces:
                </p>
                <Eq>{String.raw`$$ \frac{dy}{dx} = \frac{dy}{du}\cdot\frac{du}{dx} $$`}</Eq>
                <Box type="tip" label="Analogía: el rumor">
                    Si una persona transmite información a un colega y este la exagera ante el jefe, el impacto de la información
                    original sobre la reacción final es el <strong>producto</strong> de dos factores: cuánto distorsiona el colega
                    (derivada local) y la intensidad de la información inicial (otra derivada local). La capa final retropropaga
                    una señal; cada capa la multiplica por su «factor de distorsión» local y la pasa hacia atrás, hasta la entrada.
                </Box>
                <CodeBlock title="Regla de la cadena a mano (numpy)" code={chainNumpy} />

                <h3>Autograd en PyTorch</h3>
                <p>
                    Hace una década, los estudiantes derivaban estas fórmulas a mano. Hoy existe <strong>autograd</strong>. Al crear
                    un tensor con <span className="inline-code">requires_grad=True</span>, PyTorch asigna un «secretario invisible»
                    que registra cada operación. Al llamar <span className="inline-code">loss.backward()</span>, autograd lee la
                    bitácora de atrás hacia adelante y calcula todos los gradientes con la regla de la cadena, automáticamente.
                </p>
                <CodeBlock title="Autograd: derivación automática (PyTorch)" code={autogradTorch} lang="pytorch" />

                <MCQ
                    pregunta="Si el gradiente de un peso es exactamente cero, entonces…"
                    opciones={[
                        { texto: 'cambiar ese peso no afecta (localmente) el error: el punto es estacionario.', correcta: true, justificacion: 'Gradiente cero significa pendiente plana; mover el peso no sube ni baja el error en ese punto, no hay dirección de mejora local.' },
                        { texto: 'el peso es el más importante de la red.', correcta: false },
                        { texto: 'la red ya alcanzó el óptimo global con certeza.', correcta: false },
                        { texto: 'hay un error de hardware.', correcta: false },
                    ]} />

                <MCQ
                    pregunta="¿Qué hace exactamente loss.backward() en PyTorch?"
                    opciones={[
                        { texto: 'Actualiza los pesos restando el gradiente.', correcta: false },
                        { texto: 'Calcula las derivadas del error respecto a cada parámetro, aplicando la regla de la cadena hacia atrás.', correcta: true, justificacion: 'backward() solo CALCULA gradientes; quien actualiza los pesos es optimizer.step().' },
                        { texto: 'Reinicia los gradientes a cero.', correcta: false },
                        { texto: 'Ejecuta el forward pass.', correcta: false },
                    ]} />

                <Quiz titulo="Mini-cuestionario · Capítulo 4" preguntas={[
                    {
                        pregunta: 'El "problema de asignación de crédito" se refiere a…',
                        opciones: [
                            { texto: 'determinar cuánto contribuyó cada neurona/peso al error total.', correcta: true },
                            { texto: 'repartir el presupuesto del proyecto.', correcta: false },
                            { texto: 'asignar tarjetas de crédito a los usuarios.', correcta: false },
                        ],
                        justificacion: 'Backpropagation resuelve este problema distribuyendo la "culpa" del error hacia atrás.'
                    },
                    {
                        pregunta: 'La retropropagación se fundamenta matemáticamente en…',
                        opciones: [
                            { texto: 'la regla de la cadena del cálculo diferencial.', correcta: true },
                            { texto: 'el teorema de Pitágoras.', correcta: false },
                            { texto: 'la regla de tres simple.', correcta: false },
                        ],
                        justificacion: 'Multiplica derivadas locales en cadena ("efecto dominó") para hallar el gradiente respecto a cada peso.'
                    },
                    {
                        pregunta: 'En un grafo computacional, durante el forward pass fluye la predicción y durante el backward pass fluye…',
                        opciones: [
                            { texto: 'el gradiente (la responsabilidad del error).', correcta: true },
                            { texto: 'la imagen de entrada otra vez.', correcta: false },
                            { texto: 'el número de épocas.', correcta: false },
                        ],
                        justificacion: 'Adelante va la señal de datos; atrás va la señal de error que ajusta los pesos.'
                    },
                    {
                        pregunta: '¿Qué activa el "secretario invisible" de autograd en PyTorch?',
                        opciones: [
                            { texto: 'Crear el tensor con requires_grad=True.', correcta: true },
                            { texto: 'Llamar a print().', correcta: false },
                            { texto: 'Usar una GPU.', correcta: false },
                        ],
                        justificacion: 'Con requires_grad=True, PyTorch registra cada operación para luego derivarla en backward().'
                    },
                ]} />
            </div>
        );

        /* Gráfica de curvas de aprendizaje (sobreajuste) */
        const CurvaAprendizajeChart = () => {
            usePlotly('chart-curvas', () => {
                const ep = []; for (let i = 1; i <= 100; i += 2) ep.push(i);
                const train = ep.map(e => 0.9 * Math.exp(-e / 22) + 0.04);
                const val = ep.map(e => 0.85 * Math.exp(-e / 20) + 0.16 + Math.max(0, (e - 50)) * 0.0045);
                return [
                    { x: ep, y: train, name: 'Entrenamiento', line: { color: '#3D008D', width: 3 } },
                    { x: ep, y: val, name: 'Validación', line: { color: '#ED1E79', width: 3 } },
                ];
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 45 }, legend: { orientation: 'h', y: -0.22 },
                xaxis: { title: 'Época', gridcolor: '#eee' }, yaxis: { title: 'Error', gridcolor: '#eee' },
                shapes: [{ type: 'line', x0: 50, x1: 50, y0: 0, y1: 0.9, line: { color: '#15803D', dash: 'dot', width: 2 } }],
                annotations: [{ x: 50, y: 0.78, text: 'Early Stopping', showarrow: false, font: { color: '#15803D', size: 10 } }],
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), []);
            return <ChartFrame id="chart-curvas" caption="Sobreajuste: el error de entrenamiento sigue bajando, pero el de validación forma una 'U'. Early Stopping detiene en el mínimo de validación." />;
        };

        /* Matriz de confusión (analogía cafetera) */
        const ConfusionMatrix = () => {
            const cell = (titulo, desc, bg, border) => (
                <div className="rounded-lg p-3 text-center" style={{ background: bg, border: `2px solid ${border}` }}>
                    <div className="font-bold text-sm" style={{ color: border }}>{titulo}</div>
                    <div className="text-[0.72rem] text-gray-600 mt-1">{desc}</div>
                </div>
            );
            const hdr = (t) => <div className="font-semibold text-xs text-navy flex items-end justify-center pb-1">{t}</div>;
            return (
                <div className="my-4 overflow-x-auto">
                    <div className="inline-grid gap-2" style={{ gridTemplateColumns: 'auto 150px 150px', minWidth: 420 }}>
                        <div></div>{hdr('Predicho: Excelso')}{hdr('Predicho: Pasilla')}
                        <div className="font-semibold text-xs text-navy flex items-center" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>Real: Excelso</div>
                        {cell('VP', 'Excelso → Excelso. Beneficia a todos.', '#F0FDF4', '#15803D')}
                        {cell('FN', 'Excelso → Pasilla. Pérdida para el caficultor.', '#FEF2F2', '#B91C1C')}
                        <div className="font-semibold text-xs text-navy flex items-center" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>Real: Pasilla</div>
                        {cell('FP', 'Pasilla → Excelso. Daña la reputación de la marca.', '#FFFBEB', '#B45309')}
                        {cell('VN', 'Pasilla → Pasilla. Filtro correcto.', '#F0FDF4', '#15803D')}
                    </div>
                </div>
            );
        };

        /* ============================================================
           CAPÍTULO 5 — AJUSTE, EVALUACIÓN Y ÉTICA
        ============================================================ */
        const trainingLoopTorch = `# El bucle de entrenamiento: 5 pasos que se repiten en cada época
for epoch in range(epochs):
    for batch_x, batch_y in dataloader:
        pred = modelo(batch_x)           # 1) Forward: la predicción
        loss = criterio(pred, batch_y)   # 2) Pérdida: error vs. realidad
        optimizer.zero_grad()            # 3) Limpia los gradientes previos
        loss.backward()                  # 4) Backward: calcula gradientes
        optimizer.step()                 # 5) Actualiza los pesos`;

        const regulTorch = `import torch.nn as nn

# L2 (Ridge) se aplica con weight_decay en el optimizador
opt = torch.optim.Adam(modelo.parameters(), lr=1e-3, weight_decay=1e-4)

# Dropout y BatchNorm son capas que se insertan en la red
red = nn.Sequential(
    nn.Linear(64, 128), nn.ReLU(),
    nn.BatchNorm1d(128),    # normaliza por lotes (estabiliza el entrenamiento)
    nn.Dropout(p=0.5),      # apaga el 50% de neuronas en cada paso de entrenamiento
    nn.Linear(128, 1),
)`;

        const Cap5Section = () => (
            <div className="prose-usta">
                <h3>El bucle de entrenamiento (training loop)</h3>
                <p>
                    Ya se tiene el cuerpo (arquitectura), la brújula (función de costo) y el motor (optimizador). El entrenamiento
                    en PyTorch no es magia: es un ciclo explícito de cinco pasos que se repite durante muchas épocas.
                </p>
                <Pipeline steps={[
                    { num: 1, title: 'Forward', desc: 'La red predice (ej. "Roya 80 %").' },
                    { num: 2, title: 'Loss', desc: 'Se compara con la etiqueta real.' },
                    { num: 3, title: 'zero_grad', desc: 'Limpia gradientes anteriores.' },
                    { num: 4, title: 'backward', desc: 'Calcula los gradientes.' },
                    { num: 5, title: 'step', desc: 'Actualiza los pesos.' },
                ]} />
                <CodeBlock title="El training loop en PyTorch" code={trainingLoopTorch} lang="pytorch" />
                <Box type="warn" label="¿Por qué zero_grad()?">
                    PyTorch <strong>acumula</strong> gradientes por defecto. Si no se limpian antes de cada paso, se sumarían los de
                    iteraciones previas y se corrompería la dirección de descenso, como un ciclista que sigue instrucciones de
                    rutas viejas.
                </Box>

                <h3>Sobreajuste vs. generalización (la analogía del ICFES)</h3>
                <p>Dos estudiantes preparan el ICFES con un cuadernillo del año pasado:</p>
                <div className="grid md:grid-cols-2 gap-4">
                    <div className="usta-card p-5">
                        <h4 style={{ marginTop: 0 }}>Estudiante A · memoriza</h4>
                        <p className="text-sm">«La respuesta a la pregunta de Bolívar es la C». Saca 100 en el simulacro (entrenamiento), pero falla en el examen real: solo memorizó patrones idiosincrásicos.</p>
                    </div>
                    <div className="usta-card p-5">
                        <h4 style={{ marginTop: 0 }}>Estudiante B · comprende</h4>
                        <p className="text-sm">Estudia los conceptos. Quizá falle algo en el simulacro, pero generaliza y le va bien en el examen real.</p>
                    </div>
                </div>
                <p>
                    El <strong>sobreajuste (overfitting)</strong> es ser el Estudiante A: si una red tiene demasiada capacidad para
                    pocos datos, memoriza el ruido (sombras de nubes, insectos) en lugar de los patrones reales de la enfermedad.
                </p>

                <h3>Regularización: la navaja de Ockham</h3>
                <p>Para evitar la «trampa» de memorizar, se penaliza la complejidad en la función objetivo:</p>
                <Eq>{String.raw`$$ \text{Costo Total} = L(\hat{\mathbf{y}}, \mathbf{y}) + \lambda\,\Omega(\mathbf{w}) $$`}</Eq>
                <p>
                    donde {String.raw`\(\lambda \ge 0\)`} controla la fuerza de la regularización y {String.raw`\(\Omega(\mathbf{w})\)`}
                    penaliza los pesos grandes.
                </p>
                <Tabs tabs={[
                    { label: 'L2 (Ridge)', content: <span>{String.raw`\(\Omega(\mathbf{w})=\tfrac{1}{2}\sum_j w_j^2\)`}. Como un estudiante que repasa todos los capítulos por igual: empuja los pesos a ser pequeños pero <strong>ninguno se anula</strong>. Distribuye la importancia.</span> },
                    { label: 'L1 (Lasso)', content: <span>{String.raw`\(\Omega(\mathbf{w})=\sum_j |w_j|\)`}. Como un estudiante pragmático que resalta solo lo esencial: fuerza a <strong>cero</strong> los pesos irrelevantes (ej. «color del vehículo»). Produce modelos dispersos e interpretables.</span> },
                    { label: 'Dropout', content: <span>En cada iteración apaga aleatoriamente un porcentaje de neuronas (ej. 50 %). Como sacar al rotar a la «estrella» del grupo de estudio: nadie depende de una sola neurona, todos aprenden a resolver. Rompe la co-adaptación.</span> },
                ]} />
                <CodeBlock title="Regularización en PyTorch" code={regulTorch} lang="pytorch" />
                <Box type="info" label="Caso aplicado · jaguar vs. puma (cámaras trampa, Orinoquía)">

                    cola, rosetas); <strong>L2</strong> penaliza fijarse en el fondo (vegetación recurrente).
                </Box>

                <h3>Normalización por lotes (Batch Normalization)</h3>
                <p>
                    Analogía del <strong>Ajiaco Santafereño</strong>: las papas (sabanera, pastusa, criolla) llegan con tamaños muy
                    variables; si entran a la olla sin estandarizar, la cocción es impredecible. La solución es cortar todo a cubos
                    uniformes. Batch Norm hace lo mismo entre capas: re-escala los datos para que cada neurona reciba una
                    distribución estable, permitiendo tasas de aprendizaje altas sin inestabilidad.
                </p>
                <Accordion items={[
                    { titulo: '1. Centrado (restar la media del lote)', contenido: <span>{String.raw`\(\mu_{\mathcal{B}}=\frac{1}{m}\sum_i x_i\)`}. Es como lavar las papas: todas parten de una base limpia y centrada.</span> },
                    { titulo: '2. Escalado (dividir por la desviación estándar)', contenido: <span>{String.raw`\(\hat{x}_i=\frac{x_i-\mu_{\mathcal{B}}}{\sqrt{\sigma_{\mathcal{B}}^2+\epsilon}}\)`}. Cortar las papas en cubos del mismo tamaño: todas con escala 1.</span> },
                    { titulo: '3. Transformación aprendible (γ y β)', contenido: <span>{String.raw`\(y_i=\gamma\,\hat{x}_i+\beta\)`}. El chef añade sal ({String.raw`\(\beta\)`}) y ajusta el fuego ({String.raw`\(\gamma\)`}): la red decide cuánto deshacer la estandarización.</span> },
                ]} />

                    quedan altos, hay <strong>subajuste</strong>.
                </p>

                <h3>Validación cruzada K-Fold e hiperparámetros</h3>
                <p>
                    Reservar un único conjunto de validación puede sesgar la estimación. La <strong>validación cruzada K-Fold</strong>
                    (ej. {String.raw`\(K=5\)`}) divide los datos en 5 pliegues; en cada iteración entrena con 4 y valida con 1, rotando.
                    La métrica final es el promedio de las 5: estimación robusta del verdadero desempeño.
                </p>

                        </tbody>

                    {
                        titulo: 'Bibliografía base', contenido: <ul className="text-sm">
                            <li>Goodfellow, I., Bengio, Y., &amp; Courville, A. (2016). <em>Deep Learning</em>. MIT Press.</li>
                            <li>Géron, A. (2023). <em>Hands-On Machine Learning with Scikit-Learn, Keras &amp; TensorFlow</em> (3.ª ed.). O'Reilly.</li>
                            <li>Chollet, F. (2021). <em>Deep Learning with Python</em> (2.ª ed.). Manning.</li>
                            <li>Zhang, A., Lipton, Z. C., Li, M., &amp; Smola, A. J. (2023). <em>Dive into Deep Learning</em>. d2l.ai</li>
                        </ul>
                    },
                ]} />

                <Box type="tip" label="¡Módulo 1 completado!">
                    Si respondió bien la evaluación integradora, está listo para el <strong>Módulo 2: Arquitecturas especializadas</strong>
                    (CNN, RNN/LSTM y modelos generativos). De lo contrario, repase los capítulos marcados como dudosos: aprender es,
                    al fin y al cabo, iterar para minimizar el error.
                </Box>
            </div>
        );

        /* === FIN DE LAS LECCIONES (las siguientes se insertan aquí) === */

        /* ============================================================
           CURRÍCULO
        ============================================================ */
        const curriculum = [
            { id: 'portada', title: 'Portada y objetivos', icon: 'BookOpen', component: PortadaSection },
            { id: 'cap1', title: '1. Historia y contexto', icon: 'History', component: Cap1Section },
            { id: 'cap2', title: '2. El Perceptrón Multicapa', icon: 'Network', component: Cap2Section },
            { id: 'cap3', title: '3. Error y optimización', icon: 'TrendingDown', component: Cap3Section },
            { id: 'cap4', title: '4. Retropropagación', icon: 'GitBranch', component: Cap4Section },
            { id: 'cap5', title: '5. Ajuste, evaluación y ética', icon: 'Scale', component: Cap5Section },
            { id: 'eval', title: 'Evaluación y glosario', icon: 'Award', component: EvaluacionSection },
        ];

        /* ============================================================
           APP — sidebar + barra de progreso + navegación + reanudar
        ============================================================ */
        const STORAGE_KEY = 'm1_deep_learning_leccion';

        const App = () => {
            const [activeLessonIndex, setActiveLessonIndex] = useState(() => {
                const saved = parseInt(localStorage.getItem(STORAGE_KEY), 10);
                return Number.isInteger(saved) && saved >= 0 ? saved : 0;
            });
            const [sidebarOpen, setSidebarOpen] = useState(true);

            const safeIndex = Math.min(activeLessonIndex, curriculum.length - 1);
            const activeLesson = curriculum[safeIndex];
            const ActiveComponent = activeLesson.component;
            const progreso = Math.round(((safeIndex + 1) / curriculum.length) * 100);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, String(safeIndex));
                typesetMath();
                const cont = document.getElementById('contenido-scroll');
                if (cont) cont.scrollTo({ top: 0, behavior: 'smooth' });
            }, [safeIndex]);

            const irA = (idx) => {
                setActiveLessonIndex(idx);
                if (window.innerWidth < 1024) setSidebarOpen(false);
            };

            return (
                <div className="flex h-screen overflow-hidden relative">
                    <button onClick={() => setSidebarOpen(p => !p)}
                        className="fixed top-4 left-4 z-50 p-2.5 rounded-full shadow-lg text-white transition-all hover:scale-110 usta-gradient"
                        title={sidebarOpen ? 'Ocultar menú' : 'Mostrar menú'}>
                        <i className={`fas ${sidebarOpen ? 'fa-times' : 'fa-bars'} text-sm`}></i>
                    </button>

                    {sidebarOpen && <div className="fixed inset-0 bg-black/20 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}

                    <aside className="flex-shrink-0 overflow-y-auto z-40 flex flex-col usta-header"
                        style={{
                            width: sidebarOpen ? '18rem' : '0', minWidth: sidebarOpen ? '18rem' : '0',
                            opacity: sidebarOpen ? 1 : 0, transition: 'width 0.3s ease, min-width 0.3s ease, opacity 0.25s ease',
                            overflow: sidebarOpen ? 'visible auto' : 'hidden'
                        }}>
                        <div className="p-6 pt-16 border-b border-white/10">
                            <p className="text-[0.65rem] uppercase tracking-widest text-gold font-bold">Universidad Santo Tomás</p>
                            <h1 className="text-white font-bold text-lg tracking-tight mt-1">Deep Learning · <span className="text-secondary">Módulo 1</span></h1>
                            <p className="text-xs text-white/50 mt-1">Fundamentos del Aprendizaje Profundo</p>
                        </div>

                        <nav className="p-4 space-y-2 flex-1">
                            {curriculum.map((lesson, idx) => (
                                <button key={lesson.id} onClick={() => irA(idx)}
                                    className={`w-full flex items-start gap-3 px-3 py-3 text-sm rounded-lg transition-all text-left ${safeIndex === idx ? 'text-white shadow-lg usta-gradient' : 'text-white/60 hover:text-white hover:bg-white/10'}`}>
                                    <span className="flex-shrink-0 mt-0.5" style={{ width: 18, height: 18 }}>{renderIcon(lesson.icon, 18)}</span>
                                    <span className="font-medium leading-tight break-words">{lesson.title}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 text-[10px] text-white/40 border-t border-white/10">
                            <p>Maestría en Ciencia de Datos · EA-N-F-004</p>
                            <p>numpy · PyTorch · 3 créditos</p>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col overflow-hidden bg-bg">
                        {/* Barra de progreso */}
                        <div className="h-1.5 bg-gray-200 flex-shrink-0">
                            <div className="h-full usta-gradient transition-all duration-500" style={{ width: `${progreso}%` }}></div>
                        </div>

                        <div id="contenido-scroll" className="flex-1 overflow-y-auto p-6 lg:p-12">
                            <div className="max-w-4xl mx-auto w-full">
                                <div className="mb-6 flex items-center justify-between flex-wrap gap-3">
                                    <span className="text-xs font-bold tracking-wider text-secondary uppercase">
                                        Lección {safeIndex + 1} de {curriculum.length} · {progreso}%
                                    </span>
                                    <div className="flex gap-2">
                                        <button disabled={safeIndex === 0} onClick={() => setActiveLessonIndex(c => c - 1)}
                                            className="flex items-center gap-1 px-3 py-2 rounded-full hover:bg-gray-100 disabled:opacity-30 transition-colors text-sm font-medium text-navy">
                                            {renderIcon('ChevronLeft', 18)} Anterior
                                        </button>
                                        <button disabled={safeIndex === curriculum.length - 1} onClick={() => setActiveLessonIndex(c => c + 1)}
                                            className="flex items-center gap-1 px-3 py-2 rounded-full text-white usta-gradient disabled:opacity-30 transition-colors text-sm font-medium">
                                            Siguiente {renderIcon('ChevronRight', 18)}
                                        </button>
                                    </div>
                                </div>

                                <SectionHeader title={activeLesson.title} icon={Icons[activeLesson.icon]} />

                                {safeIndex === 0 && (
                                    <div className="mb-8 text-center bg-white p-7 rounded-2xl shadow-sm border border-gray-100">
                                        <p className="text-xs uppercase tracking-widest text-secondary font-bold mb-2">Profundización I · Redes Neuronales</p>
                                        <h1 className="text-2xl font-bold text-primary mb-2">Fundamentos del Aprendizaje Profundo</h1>
                                        <p className="text-gray-600 font-light">De la neurona de McCulloch-Pitts al perceptrón multicapa: historia, matemática del error, retropropagación, regularización y ética.</p>
                                        <div className="flex justify-center flex-wrap gap-2 mt-4 text-xs">
                                            {['Historia', 'MLP', 'Optimización', 'Backpropagation', 'Regularización', 'Ética'].map(t => (
                                                <span key={t} className="px-3 py-1 rounded-full bg-primary/10 text-primary">{t}</span>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="animate-fade-in" key={activeLesson.id}>
                                    <ActiveComponent />
                                </div>

                                {/* Navegación inferior */}
                                <div className="mt-12 flex items-center justify-between gap-3">
                                    <button disabled={safeIndex === 0} onClick={() => setActiveLessonIndex(c => c - 1)}
                                        className="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-gray-300 bg-white hover:bg-gray-50 disabled:opacity-30 text-sm font-medium text-navy">
                                        {renderIcon('ChevronLeft', 18)}
                                        <span className="hidden sm:inline">{safeIndex > 0 ? curriculum[safeIndex - 1].title : 'Inicio'}</span>
                                        <span className="sm:hidden">Anterior</span>
                                    </button>
                                    <button disabled={safeIndex === curriculum.length - 1} onClick={() => setActiveLessonIndex(c => c + 1)}
                                        className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-white usta-gradient hover:opacity-90 disabled:opacity-30 text-sm font-medium">
                                        <span className="hidden sm:inline">{safeIndex < curriculum.length - 1 ? curriculum[safeIndex + 1].title : 'Fin'}</span>
                                        <span className="sm:hidden">Siguiente</span>
                                        {renderIcon('ChevronRight', 18)}
                                    </button>
                                </div>

                                <footer className="mt-16 pt-8 border-t border-gray-200">
                                    <div className="usta-header rounded-xl p-6 text-center">
                                        <p className="text-white font-medium text-sm"><strong>Módulo 1 · Fundamentos del Aprendizaje Profundo</strong></p>
                                        <p className="text-xs mt-1 text-white/70">Maestría en Ciencia de Datos · Universidad Santo Tomás · Profundización I: Redes Neuronales - Deep Learning</p>
                                        <p className="text-[10px] mt-2 text-white/50">Material de aprendizaje autónomo. Analogías contextualizadas al entorno colombiano.</p>
                                    </div>
                                </footer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
