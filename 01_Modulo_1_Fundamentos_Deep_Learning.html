        /* Gráfico interactivo: cómo una capa oculta resuelve el XOR */
        const XorMLP = () => {
            const [paso, setPaso] = useState(0);
            const ref = useRef(null);
            const pasos = [
                { t: 'XOR solo', d: <span>Como se vio en el Capítulo 1: ninguna recta separa los puntos. Una sola neurona fracasa.</span> },
                { t: '+ Oculta 1', d: <span>La primera neurona oculta traza la recta {String.raw`\(x_1 + x_2 = 0.5\)`} (equivale a un OR): «¿hay al menos una entrada activa?».</span> },
                { t: '+ Oculta 2', d: <span>La segunda neurona oculta traza {String.raw`\(x_1 + x_2 = 1.5\)`} (equivale a un NAND): «¿NO están ambas activas a la vez?».</span> },
                { t: 'Región combinada', d: <span>La neurona de salida combina ambas: <strong>XOR = 1 solo en la franja</strong> entre las dos rectas. ¡Una región no lineal construida con dos fronteras lineales!</span> },
            ];
            useTypeset(ref, [paso]);

            usePlotly('chart-xor-mlp', () => {
                const traces = [];
                if (paso >= 3) {
                    traces.push({ x: [-0.35, 1.35, 1.35, -0.35], y: [0.85, -0.85, 0.15, 1.85], fill: 'toself', mode: 'none', name: 'XOR = 1', fillcolor: 'rgba(21,128,61,0.15)', hoverinfo: 'skip' });
                }
                const lx = [-0.3, 1.3];
                if (paso >= 1) traces.push({ x: lx, y: lx.map(x => 0.5 - x), mode: 'lines', name: 'Oculta 1 (OR)', line: { color: '#ED1E79', width: 3, dash: 'dash' } });
                if (paso >= 2) traces.push({ x: lx, y: lx.map(x => 1.5 - x), mode: 'lines', name: 'Oculta 2 (NAND)', line: { color: '#3D008D', width: 3, dash: 'dash' } });
                traces.push({ x: [0, 1], y: [0, 1], mode: 'markers', name: 'Salida 0', marker: { size: 20, color: '#fff', symbol: 'circle', line: { color: '#B91C1C', width: 3 } } });
                traces.push({ x: [0, 1], y: [1, 0], mode: 'markers', name: 'Salida 1', marker: { size: 20, color: '#15803D', symbol: 'circle', line: { color: '#0b5d2a', width: 2 } } });
                return traces;
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 40 }, legend: { orientation: 'h', y: -0.2 },
                xaxis: { title: 'Entrada x₁', range: [-0.35, 1.35], tick0: 0, dtick: 1, gridcolor: '#eee', zeroline: false },
                yaxis: { title: 'Entrada x₂', range: [-0.35, 1.35], tick0: 0, dtick: 1, gridcolor: '#eee', zeroline: false },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [paso]);

            return (
                <div ref={ref} className="my-4">
                    <div className="flex flex-wrap gap-2 mb-2">
                        {pasos.map((p, i) => (
                            <button key={i} onClick={() => setPaso(i)}
                                className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${paso === i ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                {i + 1}. {p.t}
                            </button>
                        ))}
                    </div>
                    <ChartFrame id="chart-xor-mlp" height="chart-h-360" caption="XOR resuelto por un MLP: 2 entradas → 2 neuronas ocultas → 1 salida." />
                    <div key={paso} className="text-[0.9rem] text-gray-700 bg-bg rounded-lg p-4 border-l-4" style={{ borderColor: '#15803D' }}>
                        {pasos[paso].d}
                    </div>
                </div>
            );
        };

        /* ============================================================
           CAPÍTULO 2 — EL PERCEPTRÓN MULTICAPA (MLP)
        ============================================================ */
        const neuronaNumpy = `import numpy as np

# Una neurona: suma ponderada + sesgo, seguida de una activación (ReLU)
x = np.array([0.8, 0.3, 0.6])      # entradas (ej. altitud, humedad, sol normalizados)
w = np.array([0.9, -0.4, 0.7])     # pesos: importancia aprendida de cada entrada
b = 0.1                             # sesgo: umbral base

z = np.dot(w, x) + b               # z = w1*x1 + w2*x2 + w3*x3 + b
y = max(0.0, z)                    # ReLU: f(z) = max(0, z)
print(round(z, 3), round(y, 3))    # -> 1.12  1.12`;

        const mlpTorch = `import torch.nn as nn

# Un MLP en PyTorch: 4 entradas -> 16 -> 8 -> 1 salida
modelo = nn.Sequential(
    nn.Linear(4, 16),   # capa oculta 1 (4 entradas -> 16 neuronas)
    nn.ReLU(),          # no linealidad
    nn.Linear(16, 8),   # capa oculta 2
    nn.ReLU(),
    nn.Linear(8, 1),    # capa de salida
    nn.Sigmoid(),       # probabilidad para clasificación binaria
)`;

        /* Tarjeta del Teorema de Aproximación Universal con gráfica interactiva:
           una función objetivo y su aproximación por bloques (más neuronas = mejor ajuste). */
        const TeoremaAproximacion = () => {
            const [n, setN] = useState(6);
            const target = (x) => 1.7 + 0.9 * Math.sin(x * 0.9) + 0.5 * Math.sin(x * 1.9 + 0.8) + 0.3 * Math.cos(x * 0.5);
            usePlotly('chart-teorema', () => {
                const xt = []; for (let x = 0; x <= 10; x += 0.05) xt.push(+x.toFixed(2));
                const yt = xt.map(target);
                const xs = [], ys = []; const w = 10 / n;
                for (let i = 0; i < n; i++) { const x0 = i * w, x1 = (i + 1) * w, v = target((x0 + x1) / 2); xs.push(x0, x1); ys.push(v, v); }
                return [
                    { x: xs, y: ys, name: `Aproximación (${n} neuronas)`, mode: 'lines', line: { color: '#ED1E79', width: 2 }, fill: 'tozeroy', fillcolor: 'rgba(237,30,121,0.09)' },
                    { x: xt, y: yt, name: 'Función objetivo', mode: 'lines', line: { color: '#3D008D', width: 3 } },
                ];
            }, () => ({
                margin: { t: 8, r: 8, b: 22, l: 8 }, legend: { orientation: 'h', y: -0.16, font: { size: 10 } },
                xaxis: { visible: false, range: [0, 10] }, yaxis: { visible: false, range: [0, 3.6] },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [n]);

            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    {/* Cabecera con gradiente USTA */}
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M2 17 C 5 5, 9 5, 12 12 S 19 19, 22 7" />
                            </svg>
                        </span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Teorema de Aproximación Universal</div>
                            <div className="text-white/80 text-xs">El porqué de las capas ocultas</div>
                        </div>
                    </div>
                    <div className="p-5">
                        {/* Enunciado destacado */}
                        <div className="rounded-xl px-4 py-3 mb-4 text-[0.95rem] text-gray-800 border-l-4" style={{ background: 'rgba(61,0,141,0.05)', borderColor: '#ED1E79' }}>
                            Una red con <strong>al menos una capa oculta</strong> y suficientes neuronas puede aproximar <strong>cualquier función continua</strong>.
                        </div>
                        <p className="text-[0.92rem] text-gray-700 leading-relaxed mb-3">
                            Considérese el perfil de la <strong>Cordillera Central</strong> al cruzar el Túnel de La Línea. Una regresión
                            lineal es una rampa rígida que no encaja; una red neuronal es como tener <strong>millones de piezas de
                                Lego</strong>: cada neurona aporta un bloque y, al sumar suficientes y ajustar sus alturas (<em>w</em>) y
                            posiciones (<em>b</em>), se recrea la silueta de las montañas.
                        </p>
                        <ChartFrame id="chart-teorema" height="chart-h-320" />
                        <div className="flex flex-wrap items-center gap-2">
                            <span className="text-xs font-semibold text-gray-500 mr-1">Neuronas:</span>
                            {[3, 6, 12, 24].map(k => (
                                <button key={k} onClick={() => setN(k)}
                                    className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${n === k ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                    {k}
                                </button>
                            ))}
                            <span className="text-xs text-gray-400 ml-1">→ más neuronas, mejor aproximación</span>
                        </div>
                    </div>
                </div>
            );
        };

        /* Neurona interactiva: mover pesos/sesgo y ver z y la activación en vivo (Cap. 2) */
        const NeuronaInteractiva = () => {
            const x = [0.8, 0.3, 0.6];                 // entradas fijas (café: altitud, humedad, sol — normalizadas)
            const etiquetas = ['Altitud', 'Humedad', 'Sol'];
            const [w, setW] = useState([0.9, -0.4, 0.7]);
            const [b, setB] = useState(0.1);
            const [act, setAct] = useState('relu');
            const fns = { relu: v => Math.max(0, v), sigmoide: v => 1 / (1 + Math.exp(-v)), tanh: v => Math.tanh(v) };
            const z = w[0] * x[0] + w[1] * x[1] + w[2] * x[2] + b;
            const a = fns[act](z);
            const aNorm = act === 'relu' ? Math.min(1, a / 3) : act === 'tanh' ? (a + 1) / 2 : a;
            const nota = act === 'relu' ? 'ReLU anula los valores negativos' : act === 'sigmoide' ? 'Sigmoide comprime la salida a (0, 1)' : 'Tanh comprime la salida a (−1, 1)';
            const setWi = (i, v) => setW(prev => prev.map((p, j) => (j === i ? v : p)));
            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0"><i className="fas fa-sliders"></i></span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Neurona interactiva</div>
                            <div className="text-white/80 text-xs">Al ajustar los pesos y el sesgo, la salida cambia en vivo</div>
                        </div>
                    </div>
                    <div className="p-5 grid md:grid-cols-2 gap-5">
                        <div className="space-y-3">
                            {w.map((wi, i) => (
                                <div key={i}>
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                        <span>{etiquetas[i]} · <span className="text-primary">w{i + 1} = {wi.toFixed(2)}</span></span>
                                        <span className="text-gray-400">x{i + 1} = {x[i]}</span>
                                    </div>
                                    <input type="range" min="-2" max="2" step="0.05" value={wi} onChange={e => setWi(i, +e.target.value)} className="usta-range" aria-label={`Peso w${i + 1} (${etiquetas[i]})`} />
                                </div>
                            ))}
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Sesgo · <span className="text-secondary">b = {b.toFixed(2)}</span></span>
                                </div>
                                <input type="range" min="-2" max="2" step="0.05" value={b} onChange={e => setB(+e.target.value)} className="usta-range" aria-label="Sesgo b" />
                            </div>
                            <div className="flex items-center gap-2 pt-1">
                                <span className="text-xs font-semibold text-gray-500">Activación:</span>
                                {['relu', 'sigmoide', 'tanh'].map(k => (
                                    <button key={k} onClick={() => setAct(k)} className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${act === k ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                        {k === 'relu' ? 'ReLU' : k === 'sigmoide' ? 'Sigmoide' : 'Tanh'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex flex-col justify-center">
                            <div className="rounded-xl bg-bg p-4 border border-gray-200">
                                <div className="text-center text-xs text-gray-500">Suma ponderada</div>
                                <div className="text-center font-mono text-lg text-navy">z = w·x + b = <strong>{z.toFixed(3)}</strong></div>
                                <div className="h-px bg-gray-200 my-3"></div>
                                <div className="text-center text-xs text-gray-500">Salida tras la activación</div>
                                <div className="text-center font-mono text-2xl font-extrabold" style={{ color: '#15803D' }}>a = {a.toFixed(3)}</div>
                                <div className="mt-3 h-3 rounded-full bg-gray-200 overflow-hidden">
                                    <div className="h-full usta-gradient transition-all duration-150" style={{ width: `${Math.max(0, Math.min(1, aNorm)) * 100}%` }}></div>
                                </div>
                                <div className="text-center text-[0.7rem] text-gray-400 mt-1">{nota}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ============================================================
           LABORATORIO: frontera de decisión de un MLP (Cap. 2)
           Red neuronal "desde cero" (sin librerías de ML) + mapa de calor
           en un <canvas> oscuro. Entrena por descenso del gradiente sobre la
           entropía cruzada binaria (BCE) y dibuja la frontera en tiempo real.
        ============================================================ */
        // Auditor de Equidad (Cap 5): matrices de confusión por subgrupo protegido g, FNR/FPR, brecha y umbral LOCAL.
        // Recibe `preds` = [{prob, t, g}] sobre el conjunto de validación (g nunca entró a la red).
        const FairnessAuditor = ({ preds, costoFN, setCostoFN }) => {
            const [umbral, setUmbral] = useState(0.5);
            if (!preds || preds.length < 4) return null;
            const stats = (g) => {
                const sub = preds.filter(p => p.g === g);
                let TP = 0, FP = 0, FN = 0, TN = 0;
                for (const p of sub) { const yhat = p.prob >= umbral ? 1 : 0; if (p.t === 1 && yhat === 1) TP++; else if (p.t === 0 && yhat === 1) FP++; else if (p.t === 1 && yhat === 0) FN++; else TN++; }
                const n = sub.length;
                return { TP, FP, FN, TN, n, fnr: (FN + TP) > 0 ? FN / (FN + TP) : null, fpr: (FP + TN) > 0 ? FP / (FP + TN) : null, acc: n > 0 ? (TP + TN) / n : null };
            };
            const A = stats(0), B = stats(1);
            const pct = v => v == null ? '—' : `${Math.round(v * 100)}%`;
            const brechaFNR = (A.fnr != null && B.fnr != null) ? Math.abs(A.fnr - B.fnr) : null;
            const matriz = (S, nombre, color) => (
                <div className="rounded-lg border-2 p-2" style={{ borderColor: color }}>
                    <div className="text-xs font-bold mb-1" style={{ color }}>Subgrupo {nombre} <span className="text-gray-400 font-normal">(n={S.n})</span></div>
                    <div className="grid gap-1 text-[0.62rem]" style={{ gridTemplateColumns: 'auto 1fr 1fr' }}>
                        <div></div><div className="text-center font-semibold text-gray-500">Pred +</div><div className="text-center font-semibold text-gray-500">Pred −</div>
                        <div className="font-semibold text-gray-500 flex items-center">Real +</div>
                        <div className="rounded text-center py-1 font-bold" style={{ background: '#F0FDF4', color: '#15803D' }}>VP {S.TP}</div>
                        <div className="rounded text-center py-1 font-bold" style={{ background: '#FEF2F2', color: '#B91C1C' }}>FN {S.FN}</div>
                        <div className="font-semibold text-gray-500 flex items-center">Real −</div>
                        <div className="rounded text-center py-1 font-bold" style={{ background: '#FFFBEB', color: '#B45309' }}>FP {S.FP}</div>
                        <div className="rounded text-center py-1 font-bold" style={{ background: '#F0FDF4', color: '#15803D' }}>VN {S.TN}</div>
                    </div>
                    <div className="text-[0.62rem] text-gray-600 mt-1 flex justify-between"><span>Exac. {pct(S.acc)}</span><span style={{ color: '#B91C1C' }}>FNR {pct(S.fnr)}</span><span style={{ color: '#B45309' }}>FPR {pct(S.fpr)}</span></div>
                </div>
            );
            return (
                <div className="px-5 pb-5">
                    <div className="rounded-xl border-2 border-dashed p-4" style={{ borderColor: '#3D008D' }}>
                        <div className="flex items-center gap-2 mb-1 flex-wrap"><i className="fas fa-scale-balanced text-primary"></i><span className="text-sm font-bold text-navy">Auditor de Equidad</span><span className="text-[0.55rem] font-bold text-white px-1.5 py-0.5 rounded-full" style={{ background: '#3D008D' }}>NUEVO · Cap 5 · ética</span></div>
                        <p className="text-[0.72rem] text-gray-600 mb-3">El atributo protegido <strong>g</strong> (subgrupo A/B) <strong>no entra</strong> en la red; solo particiona la evaluación. Aun así, el modelo trata sistemáticamente peor al subgrupo con más ruido: el <strong>sesgo se hereda de los datos</strong>.</p>
                        <div className="grid sm:grid-cols-2 gap-3">{matriz(A, 'A', '#15803D')}{matriz(B, 'B', '#B45309')}</div>
                        <div className="mt-3">
                            <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1"><span>Umbral de decisión <span className="text-gray-400">(local al auditor; no afecta la frontera)</span></span><span className="text-primary">{umbral.toFixed(2)}</span></div>
                            <input type="range" min="0.05" max="0.95" step="0.05" value={umbral} onChange={e => setUmbral(+e.target.value)} className="usta-range" aria-label="Umbral de decisión del auditor" />
                        </div>
                        <div className="mt-3 rounded-lg p-3 text-[0.78rem]" style={{ background: '#FAF5FF', border: '1px solid rgba(61,0,141,0.15)' }}>
                            <strong className="text-navy">Veredicto:</strong> con el umbral en {umbral.toFixed(2)}, el modelo deja sin alerta (falso negativo) al <strong style={{ color: '#B91C1C' }}>{pct(B.fnr)}</strong> de los casos positivos del <strong>subgrupo B</strong>, frente al <strong style={{ color: '#15803D' }}>{pct(A.fnr)}</strong> del subgrupo A{brechaFNR != null ? <> — una <strong>brecha de oportunidad de {Math.round(brechaFNR * 100)} puntos</strong>.</> : '.'}
                        </div>
                        <div className="mt-3 flex items-center justify-between gap-2 flex-wrap">
                            <span className="text-[0.76rem] text-gray-700"><strong>Costo del error:</strong> penalizar el falso negativo <strong>6×</strong> (recall sobre exactitud). Tras activarlo, <strong>reinicia los pesos y reentrena</strong>.</span>
                            <button onClick={() => setCostoFN(!costoFN)} className="px-3 py-1 rounded-full text-xs font-bold transition-all" style={costoFN ? { background: '#3D008D', color: '#fff' } : { background: '#F1F5F9', color: '#475569' }}>{costoFN ? 'Activado' : 'Desactivado'}</button>
                        </div>
                    </div>
                </div>
            );
        };
        const RedFrontera = ({ chapter = 2 }) => {
            // --- Configuración de la arquitectura (estado de la UI) ---
            const [dataset, setDataset] = useState('lunas');        // 'lunas' | 'circulos'
            const [nCapas, setNCapas] = useState(2);                // capas ocultas: 1..3
            const [nNodos, setNNodos] = useState(6);                // nodos por capa: 1..10
            const [activacion, setActivacion] = useState('tanh');   // 'relu'|'sigmoide'|'tanh'
            const [lrExp, setLrExp] = useState(0.8);                // 0..1 -> lr logarítmico
            const [corriendo, setCorriendo] = useState(false);      // animación activa
            const [metricas, setMetricas] = useState({ epoca: 0, perdida: NaN, acc: 0 });
            const [hayCongelada, setHayCongelada] = useState(false);
            const [optim, setOptim] = useState('sgd');             // 'sgd' | 'momentum' | 'adam'  (revelado en Cap 3+)
            const [lambda, setLambda] = useState(0);               // regularización L2 (revelado en Cap 5)
            const [dropout, setDropout] = useState(0);             // dropout en capas ocultas (revelado en Cap 5)
            const [costoFN, setCostoFN] = useState(false);         // ponderar el costo del falso negativo (Cap 5 ética)

            const lr = Math.pow(10, -3 + 3 * lrExp);                // escala logarítmica: 0.001 .. 1.0

            // --- Refs de trabajo (no provocan re-render) ---
            const canvasRef = useRef(null);
            const redCanvasRef = useRef(null);  // canvas del diagrama de la red (neuronas + pesos)
            const offRef = useRef(null);        // canvas auxiliar RES×RES para el mapa de calor
            const datosRef = useRef([]);        // [{x, y, t}]  t = etiqueta 0/1
            const redRef = useRef(null);        // {sizes, W, b, act}
            const congeladaRef = useRef(null);  // grilla RES×RES de la frontera "fantasma"
            const animRef = useRef(null);       // id de requestAnimationFrame
            const corriendoRef = useRef(false); // espejo de `corriendo` para el bucle
            const epocaRef = useRef(0);
            const lrRef = useRef(lr);
            const curvaCanvasRef = useRef(null);  // sparkline de la pérdida (Cap 3+)
            const lossHistRef = useRef([]);        // historial de pérdida por época
            const optimRef = useRef('sgd');        // espejo de `optim` para el bucle (Cap 3+)
            const linternaRef = useRef({ prog: 0, raf: null, gradNorm: null });  // estado del "modo linterna" (Cap 4)
            const lambdaRef = useRef(0), dropoutRef = useRef(0);   // espejos de λ y dropout para el bucle (Cap 5)
            const classWRef = useRef([1, 1]);      // pesos de clase [neg, pos] para el bucle (Cap 5 ética)
            const valRef = useRef([]);             // conjunto de validación (Cap 5)
            const valHistRef = useRef([]);         // historial de pérdida de validación (Cap 5)

            const DOM = 3.5;     // dominio del mundo: [-DOM, DOM] en X e Y
            const RES = 56;      // resolución del mapa de calor (RES×RES predicciones)
            const LIENZO = 380;  // lado del canvas en px

            // ===== Activaciones y sus derivadas (en función de la salida activada `a`) =====
            const sigmoide = (z) => 1 / (1 + Math.exp(-z));
            const activar = { relu: (z) => Math.max(0, z), sigmoide, tanh: (z) => Math.tanh(z) };
            const dActivar = { relu: (a) => (a > 0 ? 1 : 0), sigmoide: (a) => a * (1 - a), tanh: (a) => 1 - a * a };

            // ===== Datos sintéticos =====
            const gauss = () => {                       // ruido gaussiano (Box-Muller)
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
            };
            // conG=true (Cap 5 ética): añade el atributo protegido g (0=A, 1=B). El subgrupo B lleva MÁS ruido →
            // el modelo hereda un sesgo observable. g NUNCA entra en X (forward sigue usando solo x,y).
            const genLunas = (n = 220, ruido = 0.18, conG = false) => {   // dos medias lunas entrelazadas
                const pts = [], m = n / 2;
                const mk = (bx, by, cls) => { const g = conG ? (Math.random() < 0.5 ? 1 : 0) : 0; const r = ruido * (conG && g ? 2.0 : 1); return { x: bx + gauss() * r, y: by + gauss() * r, t: cls, g }; };
                for (let i = 0; i < m; i++) {
                    const t = Math.PI * i / m;
                    pts.push(mk((Math.cos(t) - 0.5) * 1.9, (Math.sin(t) - 0.25) * 1.9, 0));
                    pts.push(mk((1 - Math.cos(t) - 0.5) * 1.9, (0.5 - Math.sin(t) - 0.25) * 1.9, 1));
                }
                return pts;
            };
            const genCirculos = (n = 220, ruido = 0.14, conG = false) => {  // dos anillos concéntricos
                const pts = [], m = n / 2;
                const mk = (bx, by, cls) => { const g = conG ? (Math.random() < 0.5 ? 1 : 0) : 0; const r = ruido * (conG && g ? 2.2 : 1); return { x: bx + gauss() * r, y: by + gauss() * r, t: cls, g }; };
                for (let i = 0; i < m; i++) {
                    const t = 2 * Math.PI * i / m;
                    pts.push(mk(2.4 * Math.cos(t), 2.4 * Math.sin(t), 0));
                    pts.push(mk(1.1 * Math.cos(t), 1.1 * Math.sin(t), 1));
                }
                return pts;
            };

            // ===== Construcción de la red (pesos aleatorios He/Xavier) =====
            const crearRed = () => {
                const sizes = [2];
                for (let i = 0; i < nCapas; i++) sizes.push(nNodos);
                sizes.push(1);
                const W = [], b = [];
                for (let l = 1; l < sizes.length; l++) {
                    const fanIn = sizes[l - 1], fanOut = sizes[l];
                    const esReluOculta = activacion === 'relu' && l < sizes.length - 1;
                    const std = Math.sqrt((esReluOculta ? 2 : 1) / fanIn);   // He si ReLU, Xavier si no
                    const Wl = [], bl = [];
                    for (let j = 0; j < fanOut; j++) {
                        const fila = [];
                        for (let i = 0; i < fanIn; i++) fila.push(gauss() * std);
                        Wl.push(fila); bl.push(0);
                    }
                    W.push(Wl); b.push(bl);
                }
                // Acumuladores del optimizador (velocidad de Momentum; momentos de Adam), con la forma de W y b.
                const cerosW = () => W.map(Wl => Wl.map(r => r.map(() => 0)));
                const cerosB = () => b.map(bl => bl.map(() => 0));
                return { sizes, W, b, act: activacion, velW: cerosW(), velB: cerosB(), mW: cerosW(), sW: cerosW(), mB: cerosB(), sB: cerosB(), t: 0 };
            };

            // ===== Forward pass: devuelve la activación de CADA capa =====
            // acts[0] = entrada; acts[k] = salida activada de la capa k-1;
            // la última capa usa siempre sigmoide (clasificación binaria).
            const adelante = (red, x0, x1) => {
                let a = [x0, x1];
                const acts = [a];
                for (let l = 0; l < red.W.length; l++) {
                    const esSalida = l === red.W.length - 1;
                    a = red.b[l].map((bj, j) => {
                        let z = bj; const wj = red.W[l][j];
                        for (let i = 0; i < acts[l].length; i++) z += wj[i] * acts[l][i];  // z = w·a + b
                        return esSalida ? sigmoide(z) : activar[red.act](z);
                    });
                    acts.push(a);
                }
                return acts;
            };

            // ===== Backward pass + actualización (descenso del gradiente, full-batch) =====
            // ===== Acumulación de gradientes (forward + backward, full-batch), SEPARADA del paso del
            //       optimizador para poder leer las NORMAS por capa (Cap 4) sin alterar el entrenamiento =====
            const acumularGradientes = (red, datos, dropout = 0, classW = [1, 1]) => {
                const { W, b } = red;
                const gW = W.map(Wl => Wl.map(row => row.map(() => 0)));   // gradientes acumulados
                const gB = b.map(bl => bl.map(() => 0));
                if (dropout > 0) {
                    // Dropout (Cap 5): máscara por época sobre capas OCULTAS; inverted dropout (escala 1/(1-p)).
                    // Solo en entrenamiento; la inferencia (evaluar/predecirGrilla) NO lleva dropout → es determinista.
                    const keep = 1 - dropout;
                    const masks = red.sizes.map((n, idx) => (idx > 0 && idx < red.sizes.length - 1)
                        ? Array.from({ length: n }, () => Math.random() < dropout ? 0 : 1 / keep) : null);
                    for (const p of datos) {
                        let aM = [p.x, p.y]; const aRawL = [aM], aMaskL = [aM];   // activación cruda y enmascarada por capa
                        for (let l = 0; l < W.length; l++) {
                            const esSal = l === W.length - 1;
                            const aRaw = b[l].map((bj, j) => { let z = bj; const wj = W[l][j]; for (let i = 0; i < aM.length; i++) z += wj[i] * aM[i]; return esSal ? sigmoide(z) : activar[red.act](z); });
                            const m = masks[l + 1];
                            const aMask = m ? aRaw.map((v, i) => v * m[i]) : aRaw;
                            aRawL.push(aRaw); aMaskL.push(aMask); aM = aMask;
                        }
                        let delta = [classW[p.t] * (aMaskL[aMaskL.length - 1][0] - p.t)];
                        for (let l = W.length - 1; l >= 0; l--) {
                            const aPrev = aMaskL[l];
                            for (let j = 0; j < W[l].length; j++) { gB[l][j] += delta[j]; for (let i = 0; i < aPrev.length; i++) gW[l][j][i] += delta[j] * aPrev[i]; }
                            if (l > 0) {
                                const nuevo = new Array(aPrev.length).fill(0), m = masks[l];
                                for (let i = 0; i < aPrev.length; i++) { let s = 0; for (let j = 0; j < W[l].length; j++) s += delta[j] * W[l][j][i]; nuevo[i] = s * dActivar[red.act](aRawL[l][i]) * (m ? m[i] : 1); }
                                delta = nuevo;
                            }
                        }
                    }
                    return { gW, gB };
                }
                for (const p of datos) {
                    const acts = adelante(red, p.x, p.y);
                    // delta de la capa de salida: con BCE + sigmoide se simplifica a (â - y)
                    let delta = [classW[p.t] * (acts[acts.length - 1][0] - p.t)];
                    for (let l = W.length - 1; l >= 0; l--) {
                        const aPrev = acts[l];                          // entrada de la capa l
                        for (let j = 0; j < W[l].length; j++) {
                            gB[l][j] += delta[j];
                            for (let i = 0; i < aPrev.length; i++) gW[l][j][i] += delta[j] * aPrev[i];
                        }
                        if (l > 0) {                                    // propagar el error a la capa anterior
                            const nuevo = new Array(aPrev.length).fill(0);
                            for (let i = 0; i < aPrev.length; i++) {
                                let s = 0;
                                for (let j = 0; j < W[l].length; j++) s += delta[j] * W[l][j][i];
                                nuevo[i] = s * dActivar[red.act](aPrev[i]);   // × derivada de la activación oculta
                            }
                            delta = nuevo;
                        }
                    }
                }
                return { gW, gB };
            };

            // Norma L2 del gradiente MEDIO de cada capa de conexiones (alimenta el "modo linterna" del Cap 4)
            const normaDeCapa = (gW, N) => gW.map(Wl => Math.sqrt(Wl.reduce((s, row) => s + row.reduce((a, w) => a + w * w, 0), 0)) / N);
            const normasGradiente = (red, datos) => normaDeCapa(acumularGradientes(red, datos).gW, Math.max(1, datos.length));

            const entrenarEpoca = (red, datos, tasa, optim = 'sgd', beta = 0.9, lambda = 0, dropout = 0, classW = [1, 1]) => {
                const { W, b } = red;
                const { gW, gB } = acumularGradientes(red, datos, dropout, classW);
                const N = datos.length;                                  // promedio del gradiente y paso
                const b1 = 0.9, b2 = 0.999, eps = 1e-8;                  // hiperparámetros de Adam
                red.t = (red.t || 0) + 1;
                const c1 = 1 - Math.pow(b1, red.t), c2 = 1 - Math.pow(b2, red.t);   // corrección de sesgo de Adam
                for (let l = 0; l < W.length; l++)
                    for (let j = 0; j < W[l].length; j++) {
                        // --- sesgo ---
                        let g = gB[l][j] / N;
                        if (optim === 'momentum') { red.velB[l][j] = beta * red.velB[l][j] - tasa * g; b[l][j] += red.velB[l][j]; }
                        else if (optim === 'adam') {
                            red.mB[l][j] = b1 * red.mB[l][j] + (1 - b1) * g;
                            red.sB[l][j] = b2 * red.sB[l][j] + (1 - b2) * g * g;
                            b[l][j] -= tasa * (red.mB[l][j] / c1) / (Math.sqrt(red.sB[l][j] / c2) + eps);
                        } else b[l][j] -= tasa * g;                       // sgd (idéntico al comportamiento previo)
                        // --- pesos ---
                        for (let i = 0; i < W[l][j].length; i++) {
                            g = gW[l][j][i] / N + lambda * W[l][j][i];   // + término L2 (decaimiento de pesos)
                            if (optim === 'momentum') { red.velW[l][j][i] = beta * red.velW[l][j][i] - tasa * g; W[l][j][i] += red.velW[l][j][i]; }
                            else if (optim === 'adam') {
                                red.mW[l][j][i] = b1 * red.mW[l][j][i] + (1 - b1) * g;
                                red.sW[l][j][i] = b2 * red.sW[l][j][i] + (1 - b2) * g * g;
                                W[l][j][i] -= tasa * (red.mW[l][j][i] / c1) / (Math.sqrt(red.sW[l][j][i] / c2) + eps);
                            } else W[l][j][i] -= tasa * g;
                        }
                    }
                red.gradNorm = normaDeCapa(gW, N);   // normas por capa, para el diagrama del Cap 4
            };

            // ===== Pérdida (BCE) y precisión sobre todo el conjunto =====
            const evaluar = (red, datos) => {
                let L = 0, ok = 0; const eps = 1e-7;
                for (const p of datos) {
                    const acts = adelante(red, p.x, p.y);
                    const yhat = Math.min(1 - eps, Math.max(eps, acts[acts.length - 1][0]));
                    L += -(p.t * Math.log(yhat) + (1 - p.t) * Math.log(1 - yhat));
                    if ((yhat >= 0.5 ? 1 : 0) === p.t) ok++;
                }
                return { perdida: L / datos.length, acc: ok / datos.length };
            };

            // ===== Predicción en una grilla RES×RES (para el mapa de calor) =====
            const predecirGrilla = (red) => {
                const g = new Float32Array(RES * RES);
                for (let yi = 0; yi < RES; yi++) {
                    const wy = DOM - 2 * DOM * (yi + 0.5) / RES;     // fila 0 = y máximo (arriba)
                    for (let xi = 0; xi < RES; xi++) {
                        const wx = -DOM + 2 * DOM * (xi + 0.5) / RES;
                        const acts = adelante(red, wx, wy);
                        g[yi * RES + xi] = acts[acts.length - 1][0];
                    }
                }
                return g;
            };

            // ===== Dibujo del canvas =====
            const pintar = () => {
                const cv = canvasRef.current, red = redRef.current;
                if (!cv || !red) return;
                const ctx = cv.getContext('2d'), Wd = cv.width, Hd = cv.height;

                // 1) Mapa de calor de la red actual (grilla pequeña escalada y suavizada)
                let off = offRef.current;
                if (!off) { off = document.createElement('canvas'); offRef.current = off; }
                off.width = RES; off.height = RES;
                const octx = off.getContext('2d'), im = octx.createImageData(RES, RES);
                const bg = [11, 15, 28], cP = [150, 99, 224], cK = [240, 70, 150];  // fondo, clase 0 (morado), clase 1 (rosa)
                const g = predecirGrilla(red);
                for (let k = 0; k < RES * RES; k++) {
                    const p = isFinite(g[k]) ? g[k] : 0.5;
                    const conf = Math.min(1, Math.abs(p - 0.5) * 2);   // confianza: 0 en la frontera, 1 al estar seguro
                    const col = p < 0.5 ? cP : cK, mix = 0.12 + 0.72 * conf, o = k * 4;
                    im.data[o] = bg[0] + (col[0] - bg[0]) * mix;
                    im.data[o + 1] = bg[1] + (col[1] - bg[1]) * mix;
                    im.data[o + 2] = bg[2] + (col[2] - bg[2]) * mix;
                    im.data[o + 3] = 255;
                }
                octx.putImageData(im, 0, 0);
                ctx.imageSmoothingEnabled = true;
                ctx.drawImage(off, 0, 0, RES, RES, 0, 0, Wd, Hd);

                // 2) Ejes centrales tenues
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(Wd / 2, 0); ctx.lineTo(Wd / 2, Hd); ctx.moveTo(0, Hd / 2); ctx.lineTo(Wd, Hd / 2); ctx.stroke();

                // 3) Frontera "congelada": banda dorada donde la grilla fantasma cruza 0.5
                if (congeladaRef.current) {
                    const fg = congeladaRef.current, cw = Wd / RES, ch = Hd / RES;
                    ctx.fillStyle = 'rgba(253,185,19,0.6)';
                    for (let yi = 0; yi < RES; yi++) for (let xi = 0; xi < RES; xi++)
                        if (Math.abs(fg[yi * RES + xi] - 0.5) < 0.045) ctx.fillRect(xi * cw, yi * ch, cw + 1, ch + 1);
                }

                // 4) Puntos de datos (color claro de su clase + borde oscuro para que resalten)
                for (const p of datosRef.current) {
                    const px = (p.x + DOM) / (2 * DOM) * Wd, py = (DOM - p.y) / (2 * DOM) * Hd;
                    ctx.beginPath(); ctx.arc(px, py, 4.2, 0, 2 * Math.PI);
                    ctx.fillStyle = p.t === 0 ? '#CBB6FF' : '#FF9DC8';
                    ctx.fill(); ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(5,8,18,0.85)'; ctx.stroke();
                }
                (chapter === 4 ? pintarLinterna() : pintarRed());   // Cap 4: linterna de gradientes; resto (incl. Cap 5): diagrama de pesos
            };

            // ===== Diagrama del "estado de la red": neuronas por capa y conexiones coloreadas por peso =====
            const pintarRed = () => {
                const cv = redCanvasRef.current, red = redRef.current;
                if (!cv || !red) return;
                const ctx = cv.getContext('2d'), Wd = cv.width, Hd = cv.height;
                ctx.clearRect(0, 0, Wd, Hd);
                const sz = red.sizes, L = sz.length, padX = 52, padY = 26;
                const maxN = Math.max(...sz);
                const r = Math.max(5, Math.min(12, (Hd - 2 * padY) / (maxN * 2.3)));   // radio de neurona, adaptado al nº de nodos
                const xs = sz.map((_, i) => padX + (Wd - 2 * padX) * (L === 1 ? 0.5 : i / (L - 1)));
                const ys = sz.map(n => Array.from({ length: n }, (_, j) => padY + (Hd - 2 * padY) * (n === 1 ? 0.5 : j / (n - 1))));

                // Magnitud máxima de los pesos, para normalizar grosor y opacidad
                let maxAbs = 0.5;
                for (const Wl of red.W) for (const row of Wl) for (const w of row) maxAbs = Math.max(maxAbs, Math.abs(w));

                // 1) Conexiones = pesos (morado = positivo, rosa = negativo); grosor ∝ magnitud
                for (let l = 0; l < red.W.length; l++) {
                    const Wl = red.W[l];
                    for (let j = 0; j < Wl.length; j++)
                        for (let i = 0; i < Wl[j].length; i++) {
                            const w = Wl[j][i], mag = Math.abs(w) / maxAbs;
                            const base = w >= 0 ? '124,77,201' : '237,30,121';
                            ctx.beginPath();
                            ctx.moveTo(xs[l], ys[l][i]);
                            ctx.lineTo(xs[l + 1], ys[l + 1][j]);
                            ctx.strokeStyle = `rgba(${base},${0.12 + 0.65 * mag})`;
                            ctx.lineWidth = 0.4 + 2.6 * mag;
                            ctx.stroke();
                        }
                }

                // 2) Neuronas (entrada navy, ocultas moradas, salida verde)
                for (let l = 0; l < L; l++) {
                    const esEnt = l === 0, esSal = l === L - 1;
                    for (let j = 0; j < sz[l]; j++) {
                        ctx.beginPath();
                        ctx.arc(xs[l], ys[l][j], r, 0, 2 * Math.PI);
                        ctx.fillStyle = esEnt ? '#001A4D' : esSal ? '#15803D' : '#3D008D';
                        ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                    }
                }

                // 3) Etiquetas: dentro de las neuronas de entrada/salida y bajo cada capa
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
                if (r >= 7) {
                    ctx.font = `700 ${Math.max(9, r - 1)}px Montserrat`;
                    ctx.fillText('x', xs[0], ys[0][0]);
                    ctx.fillText('y', xs[0], ys[0][1]);
                    ctx.fillText('ŷ', xs[L - 1], ys[L - 1][0]);
                }
                ctx.fillStyle = '#64748B'; ctx.font = '600 11px Montserrat'; ctx.textBaseline = 'alphabetic';
                ctx.fillText('Entrada', xs[0], Hd - 8);
                ctx.fillText('Salida', xs[L - 1], Hd - 8);
                for (let l = 1; l < L - 1; l++) ctx.fillText('Oculta ' + l, xs[l], Hd - 8);
            };

            // ===== "Modo linterna" (Cap 4): anima el flujo forward → pausa → backward sobre el diagrama;
            //       en el backward, el grosor de cada capa ∝ su norma de gradiente (desvanecimiento visible) =====
            const faseLinterna = (prog, nConn) => prog < nConn ? 'forward' : (prog < nConn + 1 ? 'pausa' : 'backward');
            const pintarLinterna = () => {
                const cv = redCanvasRef.current, red = redRef.current;
                if (!cv || !red) return;
                const ctx = cv.getContext('2d'), Wd = cv.width, Hd = cv.height;
                ctx.clearRect(0, 0, Wd, Hd);
                const sz = red.sizes, L = sz.length, padX = 52, padY = 30;
                const maxN = Math.max(...sz);
                const r = Math.max(5, Math.min(12, (Hd - 2 * padY) / (maxN * 2.3)));
                const xs = sz.map((_, i) => padX + (Wd - 2 * padX) * (L === 1 ? 0.5 : i / (L - 1)));
                const ys = sz.map(n => Array.from({ length: n }, (_, j) => padY + (Hd - 2 * padY) * (n === 1 ? 0.5 : j / (n - 1))));
                const lin = linternaRef.current, nConn = red.W.length;
                const fase = faseLinterna(lin.prog, nConn);
                const activa = fase === 'forward' ? Math.floor(lin.prog)
                    : fase === 'backward' ? nConn - 1 - Math.floor(lin.prog - (nConn + 1)) : -1;
                const gn = lin.gradNorm || red.gradNorm || sz.slice(1).map(() => 1);
                const gmax = Math.max(1e-12, ...gn);
                // 1) todas las conexiones, como "fantasma" tenue
                for (let l = 0; l < nConn; l++) {
                    const Wl = red.W[l];
                    for (let j = 0; j < Wl.length; j++) for (let i = 0; i < Wl[j].length; i++) {
                        ctx.beginPath(); ctx.moveTo(xs[l], ys[l][i]); ctx.lineTo(xs[l + 1], ys[l + 1][j]);
                        ctx.strokeStyle = 'rgba(120,120,140,0.10)'; ctx.lineWidth = 1; ctx.stroke();
                    }
                }
                // 2) capa activa: azul plena en forward; rosa con intensidad ∝ gradiente en backward
                if (activa >= 0) {
                    const Wl = red.W[activa], esFwd = fase === 'forward';
                    const rel = esFwd ? 1 : (gn[activa] / gmax), col = esFwd ? '59,130,246' : '237,30,121';
                    for (let j = 0; j < Wl.length; j++) for (let i = 0; i < Wl[j].length; i++) {
                        ctx.beginPath(); ctx.moveTo(xs[activa], ys[activa][i]); ctx.lineTo(xs[activa + 1], ys[activa + 1][j]);
                        ctx.strokeStyle = `rgba(${col},${0.12 + 0.85 * rel})`; ctx.lineWidth = 0.5 + 4 * rel; ctx.stroke();
                    }
                }
                // 3) neuronas
                for (let l = 0; l < L; l++) {
                    const esEnt = l === 0, esSal = l === L - 1;
                    for (let j = 0; j < sz[l]; j++) {
                        ctx.beginPath(); ctx.arc(xs[l], ys[l][j], r, 0, 2 * Math.PI);
                        ctx.fillStyle = esEnt ? '#001A4D' : esSal ? '#15803D' : '#3D008D'; ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                    }
                }
                // 4) etiqueta de la fase
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '700 12px Montserrat';
                ctx.fillStyle = fase === 'forward' ? '#3b82f6' : fase === 'backward' ? '#ED1E79' : '#94A3B8';
                ctx.fillText(fase === 'forward' ? '▶  Hacia adelante: la predicción fluye'
                    : fase === 'backward' ? '◀  Retropropagación: grosor ∝ gradiente de la capa'
                        : '·  ·  ·', Wd / 2, 14);
            };
            const avanzarLinterna = () => {
                const red = redRef.current; if (!red) return;
                const lin = linternaRef.current, nConn = red.W.length, total = 2 * nConn + 1;
                const antes = faseLinterna(lin.prog, nConn);
                lin.prog += 0.05; if (lin.prog >= total) lin.prog = 0;
                if (faseLinterna(lin.prog, nConn) === 'backward' && antes !== 'backward') lin.gradNorm = red.gradNorm || normasGradiente(red, datosRef.current);
                pintarLinterna();
            };
            const pasoLinterna = () => {
                if (chapter !== 4 || !redRef.current || !redCanvasRef.current) { linternaRef.current.raf = null; return; }
                avanzarLinterna();
                linternaRef.current.raf = requestAnimationFrame(pasoLinterna);
            };

            // ===== Sparkline de la pérdida a lo largo de las épocas (visible en Cap 3+) =====
            const pintarCurva = () => {
                const cv = curvaCanvasRef.current; if (!cv) return;
                const ctx = cv.getContext('2d'), Wd = cv.width, Hd = cv.height;
                ctx.clearRect(0, 0, Wd, Hd);
                const h = lossHistRef.current, hv = (chapter >= 5 ? valHistRef.current : []);
                const padL = 36, padT = 8, padR = 8, padB = 16;
                const plotW = Wd - padL - padR, plotH = Hd - padT - padB;
                ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + plotH); ctx.lineTo(padL + plotW, padT + plotH); ctx.stroke();
                ctx.fillStyle = '#94A3B8'; ctx.font = '9px Montserrat'; ctx.textBaseline = 'middle';
                if (h.length < 2) { ctx.textAlign = 'center'; ctx.fillText('Pulsa «Entrenar» para ver caer la pérdida', Wd / 2, Hd / 2); return; }
                let lo = Infinity, hi = -Infinity;
                for (const v of h) { if (v < lo) lo = v; if (v > hi) hi = v; }
                for (const v of hv) { if (v < lo) lo = v; if (v > hi) hi = v; }
                if (hi - lo < 1e-9) hi = lo + 1e-9;
                const Y = v => padT + plotH * (1 - (v - lo) / (hi - lo));
                const traza = (arr, color) => {
                    const n = arr.length; if (n < 2) return;
                    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
                    for (let i = 0; i < n; i++) { const x = padL + plotW * (i / (n - 1)), y = Y(arr[i]); if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
                    ctx.stroke();
                };
                ctx.textAlign = 'right';
                ctx.fillText(hi.toFixed(2), padL - 4, padT);
                ctx.fillText(lo.toFixed(2), padL - 4, padT + plotH);
                traza(h, '#ED1E79');                          // entrenamiento (rosa)
                if (hv.length >= 2) traza(hv, '#3D008D');      // validación (morado) — la «U»
                ctx.fillStyle = '#64748B'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
                ctx.fillText(hv.length >= 2 ? 'BCE — rosa: entrenamiento · morado: validación (la «U»)' : 'Pérdida (BCE) vs. época', padL + plotW / 2, Hd - 3);
            };

            // ===== Bucle de entrenamiento animado =====
            const bucle = () => {
                const red = redRef.current;
                if (!red || !corriendoRef.current) return;
                for (let e = 0; e < 3; e++) { entrenarEpoca(red, datosRef.current, lrRef.current, optimRef.current, 0.9, lambdaRef.current, dropoutRef.current, classWRef.current); epocaRef.current++; }
                pintar();
                const { perdida, acc } = evaluar(red, datosRef.current);
                if (isFinite(perdida)) lossHistRef.current.push(perdida);
                if (valRef.current.length) { const ve = evaluar(red, valRef.current); if (isFinite(ve.perdida)) valHistRef.current.push(ve.perdida); }
                setMetricas({ epoca: epocaRef.current, perdida, acc });
                pintarCurva();
                if (corriendoRef.current) animRef.current = requestAnimationFrame(bucle);
            };

            const detener = () => { corriendoRef.current = false; setCorriendo(false); if (animRef.current) cancelAnimationFrame(animRef.current); };
            const alternarEntrenar = () => {
                if (corriendoRef.current) { detener(); return; }
                corriendoRef.current = true; setCorriendo(true);
                animRef.current = requestAnimationFrame(bucle);
            };

            // Rehacer la red (mismos datos): pesos nuevos, época y métricas a cero
            const reconstruir = () => {
                detener();
                redRef.current = crearRed();
                epocaRef.current = 0;
                lossHistRef.current = []; valHistRef.current = [];
                if (datosRef.current.length) setMetricas({ epoca: 0, ...evaluar(redRef.current, datosRef.current) });
                pintar(); pintarCurva();
            };
            const congelar = () => { congeladaRef.current = predecirGrilla(redRef.current); setHayCongelada(true); pintar(); };
            const limpiar = () => { congeladaRef.current = null; setHayCongelada(false); pintar(); };

            // Regenerar datos al cambiar de conjunto
            useEffect(() => {
                if (chapter >= 5) {                       // Cap 5: datos MÁS RUIDOSOS (clases solapadas) + split train/val 70/30
                    const all = dataset === 'lunas' ? genLunas(280, 0.42, true) : genCirculos(280, 0.34, true);
                    const sh = all.slice(); for (let i = sh.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = sh[i]; sh[i] = sh[j]; sh[j] = t; }
                    const cut = Math.floor(sh.length * 0.7);
                    datosRef.current = sh.slice(0, cut); valRef.current = sh.slice(cut);
                } else { datosRef.current = dataset === 'lunas' ? genLunas() : genCirculos(); valRef.current = []; }
                reconstruir();
            }, [dataset]);
            // Reconstruir la red al cambiar la arquitectura (capas, nodos, activación u optimizador)
            useEffect(() => { optimRef.current = optim; reconstruir(); }, [nCapas, nNodos, activacion, optim]);
            // La tasa de aprendizaje se ajusta en caliente, sin reiniciar
            useEffect(() => { lrRef.current = lr; }, [lr]);
            // λ (L2) y dropout se ajustan en caliente (Cap 5)
            useEffect(() => { lambdaRef.current = lambda; }, [lambda]);
            useEffect(() => { dropoutRef.current = dropout; }, [dropout]);
            useEffect(() => { classWRef.current = costoFN ? [1, 6] : [1, 1]; }, [costoFN]);
            // "Modo linterna" del Cap 4: anima el flujo de gradientes de forma continua
            useEffect(() => {
                if (chapter !== 4) return;
                const lin = linternaRef.current; lin.prog = 0;
                if (redRef.current && datosRef.current.length) lin.gradNorm = normasGradiente(redRef.current, datosRef.current);
                pasoLinterna();
                return () => { if (lin.raf) cancelAnimationFrame(lin.raf); lin.raf = null; };
            }, [chapter]);
            // Limpieza al desmontar
            useEffect(() => () => { corriendoRef.current = false; if (animRef.current) cancelAnimationFrame(animRef.current); }, []);
            // Arnés de verificación (no altera el uso normal): expone estado + un paso síncrono para preview_eval
            useEffect(() => {
                window.__nnlab = {
                    chapter, epoca: metricas.epoca, perdida: metricas.perdida, acc: metricas.acc,
                    n: lossHistRef.current.length, lossHist: lossHistRef.current,
                    _step: (k = 1) => {
                        k = Math.min(k, 5000);   // tope defensivo (arnés de consola)
                        for (let i = 0; i < k; i++) {
                            entrenarEpoca(redRef.current, datosRef.current, lrRef.current, optimRef.current, 0.9, lambdaRef.current, dropoutRef.current, classWRef.current); epocaRef.current++;
                            const { perdida } = evaluar(redRef.current, datosRef.current);
                            if (isFinite(perdida)) lossHistRef.current.push(perdida);
                            if (valRef.current.length) { const ve = evaluar(redRef.current, valRef.current); if (isFinite(ve.perdida)) valHistRef.current.push(ve.perdida); }
                        }
                        pintar(); pintarCurva();
                        const r = evaluar(redRef.current, datosRef.current);
                        setMetricas({ epoca: epocaRef.current, ...r });
                        return { epoca: epocaRef.current, ...r, n: lossHistRef.current.length };
                    },
                    _reset: () => reconstruir(),
                    optim: optimRef.current,
                    // Verificación del optimizador sobre clones de UNA misma red base (comparación justa, sin azar entre corridas):
                    _optimCheck: (k = 40) => {
                        k = Math.min(k, 5000);
                        const clon = () => JSON.parse(JSON.stringify(redRef.current));
                        const correr = (net, op, be) => { for (let i = 0; i < k; i++) entrenarEpoca(net, datosRef.current, lrRef.current, op, be); return net; };
                        const A = correr(clon(), 'sgd', 0), B = correr(clon(), 'momentum', 0);
                        let maxDiff = 0;
                        for (let l = 0; l < A.W.length; l++) for (let j = 0; j < A.W[l].length; j++) for (let i = 0; i < A.W[l][j].length; i++) maxDiff = Math.max(maxDiff, Math.abs(A.W[l][j][i] - B.W[l][j][i]));
                        const AD = correr(clon(), 'adam', 0.95);
                        let adamNaN = false;
                        for (const Wl of AD.W) for (const row of Wl) for (const w of row) if (!isFinite(w)) adamNaN = true;
                        return { sgdVsMomentumBeta0_maxDiff: maxDiff, adamNaN_beta095: adamNaN };
                    },
                    _compareOptims: (thr = 0.3, maxEp = 600) => {
                        maxEp = Math.min(maxEp, 3000);
                        const base = crearRed();
                        const epocasHasta = (op) => { const net = JSON.parse(JSON.stringify(base)); for (let e = 1; e <= maxEp; e++) { entrenarEpoca(net, datosRef.current, lrRef.current, op, 0.9); if (evaluar(net, datosRef.current).perdida < thr) return e; } return -1; };
                        return { thr, sgd: epocasHasta('sgd'), momentum: epocasHasta('momentum'), adam: epocasHasta('adam') };
                    },
                    // --- Cap 4: linterna de gradientes ---
                    linterna: { prog: linternaRef.current.prog, gradNorm: linternaRef.current.gradNorm },
                    _advanceLinterna: (k = 1) => { for (let i = 0; i < k; i++) avanzarLinterna(); const nConn = redRef.current.W.length; return { prog: linternaRef.current.prog, fase: faseLinterna(linternaRef.current.prog, nConn) }; },
                    _gradNorms: () => normasGradiente(redRef.current, datosRef.current),
                    // Desvanecimiento: con LOS MISMOS pesos, sigmoide atenúa el gradiente hacia la entrada mucho más que ReLU.
                    _vanishingCheck: () => {
                        const base = JSON.parse(JSON.stringify(redRef.current));
                        const conAct = (act) => { const g = normasGradiente({ ...base, act }, datosRef.current); return { porCapa: g, ratioEntradaSalida: g[0] / g[g.length - 1] }; };
                        return { sigmoide: conAct('sigmoide'), relu: conAct('relu') };
                    },
                    // --- Cap 5: validación, regularización ---
                    nVal: valRef.current.length, valHist: valHistRef.current, lambda: lambdaRef.current, dropout: dropoutRef.current,
                    _valLoss: () => valRef.current.length ? evaluar(redRef.current, valRef.current).perdida : null,
                    // λ↑ ⇒ ‖W‖² final ↓ (misma red base, entrenada con Adam)
                    _lambdaCheck: (ep = 300) => {
                        ep = Math.min(ep, 3000);
                        const base = crearRed();
                        const norma2 = (net) => net.W.reduce((s, Wl) => s + Wl.reduce((a, row) => a + row.reduce((u, w) => u + w * w, 0), 0), 0);
                        const correr = (lam) => { const net = JSON.parse(JSON.stringify(base)); for (let e = 0; e < ep; e++) entrenarEpoca(net, datosRef.current, lrRef.current, 'adam', 0.9, lam, 0); return +norma2(net).toFixed(3); };
                        return { lambda0: correr(0), lambda001: correr(0.01), lambda01: correr(0.1) };
                    },
                    // Dropout solo en entrenamiento → la inferencia (evaluar) es determinista; sin NaN con p=0.5
                    _dropoutDeterminista: () => {
                        const net = crearRed();
                        for (let e = 0; e < 30; e++) entrenarEpoca(net, datosRef.current, lrRef.current, 'sgd', 0.9, 0, 0.5);
                        const a = evaluar(net, datosRef.current), b2 = evaluar(net, datosRef.current);
                        let nan = false; for (const Wl of net.W) for (const row of Wl) for (const w of row) if (!isFinite(w)) nan = true;
                        return { inferenciaDeterminista: a.perdida === b2.perdida && a.acc === b2.acc, sinNaNconP05: !nan };
                    },
                    // ¿Aparece la «U»? entrena (Adam) y reporta época del mínimo de validación y si repunta al final
                    _uCheck: (ep = 500) => {
                        ep = Math.min(ep, 3000);
                        if (!valRef.current.length) return { hayVal: false };
                        const net = crearRed(); const tr = [], va = [];
                        for (let e = 0; e < ep; e++) { entrenarEpoca(net, datosRef.current, lrRef.current, 'adam', 0.9, 0, 0); tr.push(evaluar(net, datosRef.current).perdida); va.push(evaluar(net, valRef.current).perdida); }
                        let mi = 0; for (let i = 1; i < va.length; i++) if (va[i] < va[mi]) mi = i;
                        return { epocaMinVal: mi, valMin: +va[mi].toFixed(4), valFinal: +va[va.length - 1].toFixed(4), trainFinal: +tr[tr.length - 1].toFixed(4), hayU: mi < va.length - 1 && va[va.length - 1] > va[mi] * 1.03 };
                    },
                    // --- Cap 5 ética: auditoría de equidad por subgrupo g ---
                    _fairness: (umbral = 0.5) => {
                        if (!valRef.current.length) return { hayVal: false };
                        const preds = valRef.current.map(p => { const a = adelante(redRef.current, p.x, p.y); return { prob: a[a.length - 1][0], t: p.t, g: p.g }; });
                        const stat = (g) => { const sub = preds.filter(p => p.g === g); let TP = 0, FP = 0, FN = 0, TN = 0; for (const p of sub) { const y = p.prob >= umbral ? 1 : 0; if (p.t === 1 && y === 1) TP++; else if (p.t === 0 && y === 1) FP++; else if (p.t === 1 && y === 0) FN++; else TN++; } return { n: sub.length, suma: TP + FP + FN + TN, fnr: (FN + TP) > 0 ? FN / (FN + TP) : null, fpr: (FP + TN) > 0 ? FP / (FP + TN) : null }; };
                        const A = stat(0), B = stat(1), gIn = valRef.current.some(p => p.g === 1);
                        return { A, B, gExiste: gIn, sumaOk: A.suma === A.n && B.suma === B.n, brechaFNR: (A.fnr != null && B.fnr != null) ? +Math.abs(A.fnr - B.fnr).toFixed(3) : null };
                    },
                    _classW: () => classWRef.current,
                };
            });

            // Arquitectura y conteo de parámetros (pesos + sesgos) para mostrar
            const sizes = [2, ...Array(nCapas).fill(nNodos), 1];
            const nParams = sizes.slice(1).reduce((s, n, i) => s + sizes[i] * n + n, 0);

            // Predicciones sobre validación para el Auditor de Equidad (Cap 5). g NUNCA entra en la red.
            const valPreds = (chapter >= 5 && redRef.current && valRef.current.length)
                ? valRef.current.map(p => { const a = adelante(redRef.current, p.x, p.y); return { prob: a[a.length - 1][0], t: p.t, g: p.g }; })
                : null;

            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0"><i className="fas fa-vector-square"></i></span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Laboratorio de fronteras de decisión</div>
                            <div className="text-white/80 text-xs">{chapter >= 3 ? 'Mira caer la curva de pérdida y experimenta con la tasa de aprendizaje' : 'Una red neuronal entrenándose desde cero, en vivo'}</div>
                        </div>
                    </div>
                    <div className="p-5 grid md:grid-cols-2 gap-5 items-start">
                        {/* ---------- Controles ---------- */}
                        <div className="space-y-4 order-2 md:order-1">
                            <div>
                                <div className="text-xs font-semibold text-gray-500 mb-1.5">Conjunto de datos</div>
                                <div className="flex gap-2">
                                    <button onClick={() => setDataset('lunas')} className={pillBtn(dataset === 'lunas')}><i className="fas fa-circle-half-stroke mr-1"></i>Dos lunas</button>
                                    <button onClick={() => setDataset('circulos')} className={pillBtn(dataset === 'circulos')}><i className="fas fa-bullseye mr-1"></i>Círculos</button>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Capas ocultas</span><span className="text-primary">{nCapas}</span>
                                </div>
                                <input type="range" min="1" max="3" step="1" value={nCapas} onChange={e => setNCapas(+e.target.value)} className="usta-range" aria-label="Número de capas ocultas" />
                            </div>
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Nodos por capa</span><span className="text-primary">{nNodos}</span>
                                </div>
                                <input type="range" min="1" max="10" step="1" value={nNodos} onChange={e => setNNodos(+e.target.value)} className="usta-range" aria-label="Nodos por capa oculta" />
                            </div>
                            <div>
                                <div className="text-xs font-semibold text-gray-500 mb-1.5">Activación (capas ocultas)</div>
                                <div className="flex gap-2">
                                    {['relu', 'tanh', 'sigmoide'].map(k => (
                                        <button key={k} onClick={() => setActivacion(k)} className={pillBtn(activacion === k)}>
                                            {k === 'relu' ? 'ReLU' : k === 'tanh' ? 'Tanh' : 'Sigmoide'}

                                    ))}
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                    <span>Tasa de aprendizaje</span><span className="text-secondary">{lr < 0.01 ? lr.toFixed(4) : lr.toFixed(3)}</span>
                                </div>
                                <input type="range" min="0" max="1" step="0.01" value={lrExp} onChange={e => setLrExp(+e.target.value)} className="usta-range" aria-label="Tasa de aprendizaje (escala logarítmica)" />
                                <div className="flex justify-between text-[0.65rem] text-gray-400 mt-0.5"><span>0.001</span><span>escala logarítmica</span><span>1.0</span></div>
                            </div>
                            {chapter >= 3 && (
                                <div>
                                    <div className="text-xs font-semibold text-gray-500 mb-1.5 flex items-center gap-2">
                                        Optimizador
                                        <span className="text-[0.58rem] font-bold text-white px-1.5 py-0.5 rounded-full" style={{ background: '#ED1E79' }}>NUEVO · Cap 3</span>
                                    </div>
                                    <div className="flex gap-2">
                                        {[['sgd', 'SGD'], ['momentum', 'Momentum'], ['adam', 'Adam']].map(([k, lbl]) => (
                                            <button key={k} onClick={() => setOptim(k)} className={pillBtn(optim === k)}>{lbl}</button>

                                    <div className="text-[0.66rem] text-gray-500 mt-1">
                                        {optim === 'sgd' ? 'Descenso simple: un paso fijo en contra del gradiente; zigzaguea en valles estrechos.'
                                            : optim === 'momentum' ? 'Momentum (β = 0,9): acumula inercia y atraviesa los baches del paisaje.'

                            {chapter >= 5 && (
                                <div>
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1">
                                        <span className="flex items-center gap-2">Regularización L2 (λ) <span className="text-[0.55rem] font-bold text-white px-1.5 py-0.5 rounded-full" style={{ background: '#15803D' }}>NUEVO · Cap 5</span></span>
                                        <span className="text-primary">{lambda.toFixed(3)}</span>
                                    </div>
                                    <input type="range" min="0" max="0.2" step="0.005" value={lambda} onChange={e => setLambda(+e.target.value)} className="usta-range" aria-label="Fuerza de regularización L2 (lambda)" />
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1 mt-3">
                                        <span className="flex items-center gap-2">Dropout (capas ocultas) <span className="text-[0.55rem] font-bold text-white px-1.5 py-0.5 rounded-full" style={{ background: '#15803D' }}>NUEVO · Cap 5</span></span>

                                </div>
                            )}
                            <div className="flex flex-wrap gap-2 pt-1">
                                <button onClick={alternarEntrenar} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white usta-gradient shadow hover:opacity-90 transition">
                                    <i className={`fas ${corriendo ? 'fa-pause' : 'fa-play'} mr-1`}></i>{corriendo ? 'Pausar' : (metricas.epoca > 0 ? 'Reanudar' : 'Entrenar')}
                                </button>
