                            onChange={e => setLr(+e.target.value)} className="usta-range flex-1" style={{ minWidth: 160 }}
                            aria-label="Tasa de aprendizaje eta" />
                        <span className="text-xs font-bold px-3 py-1 rounded-full text-white whitespace-nowrap" style={{ background: color }}>{estado}</span>
                    </div>
                    <ChartFrame id="chart-lr-playground" caption="Al variar η: con pasos pequeños el descenso es recto; cerca de η=0.5 alcanza el valle casi de un salto; por encima de η=1 diverge." />
                </div>
            );
        };

        /* Comparador interactivo de optimizadores sobre un tazón mal condicionado */
        const OptimizerCompare = () => {
            const [vis, setVis] = useState({ gd: true, mom: true, adam: true });
            const toggle = k => setVis(s => ({ ...s, [k]: !s[k] }));
            usePlotly('chart-optim-compare', () => {
                const a = 6, b = 0.6;                    // valle estrecho: relación de curvatura 10:1
                const gx = x => 2 * a * x, gy = y => 2 * b * y;
                const x0 = -2.6, y0 = 2.6, N = 48;
                const traj = (init, step) => {
                    let x = x0, y = y0; const px = [x], py = [y]; const s = init();
                    for (let k = 0; k < N; k++) {
                        const [nx, ny] = step(x, y, gx(x), gy(y), s, k + 1);
                        x = nx; y = ny; px.push(x); py.push(y);
                        if (!isFinite(x) || !isFinite(y) || Math.abs(x) > 3.2 || Math.abs(y) > 3.2) break;
                    }
                    return { px, py };
                };
                const gd = traj(() => ({}), (x, y, dx, dy) => [x - 0.13 * dx, y - 0.13 * dy]);
                const mom = traj(() => ({ vx: 0, vy: 0 }), (x, y, dx, dy, s) => {
                    s.vx = 0.85 * s.vx - 0.045 * dx; s.vy = 0.85 * s.vy - 0.045 * dy;
                    return [x + s.vx, y + s.vy];
                });
                const adam = traj(() => ({ mx: 0, my: 0, vx: 0, vy: 0 }), (x, y, dx, dy, s, t) => {
                    const b1 = 0.9, b2 = 0.999, e = 1e-8, lr = 0.35;
                    s.mx = b1 * s.mx + (1 - b1) * dx; s.my = b1 * s.my + (1 - b1) * dy;
                    s.vx = b2 * s.vx + (1 - b2) * dx * dx; s.vy = b2 * s.vy + (1 - b2) * dy * dy;
                    const mxh = s.mx / (1 - Math.pow(b1, t)), myh = s.my / (1 - Math.pow(b1, t));
                    const vxh = s.vx / (1 - Math.pow(b2, t)), vyh = s.vy / (1 - Math.pow(b2, t));
                    return [x - lr * mxh / (Math.sqrt(vxh) + e), y - lr * myh / (Math.sqrt(vyh) + e)];
                });
                const gridx = [], gridy = [];
                for (let i = -3; i <= 3; i += 0.12) gridx.push(+i.toFixed(2));
                for (let j = -3; j <= 3; j += 0.12) gridy.push(+j.toFixed(2));
                const z = gridy.map(yy => gridx.map(xx => a * xx * xx + b * yy * yy));
                const traces = [
                    { type: 'contour', x: gridx, y: gridy, z, showscale: false, colorscale: [[0, '#EDE7F6'], [1, '#C7B8E0']], contours: { coloring: 'lines' }, line: { width: 1 }, hoverinfo: 'skip' },
                ];
                if (vis.gd) traces.push({ x: gd.px, y: gd.py, mode: 'lines+markers', name: 'GD simple', line: { color: '#B91C1C', width: 2 }, marker: { size: 5 } });
                if (vis.mom) traces.push({ x: mom.px, y: mom.py, mode: 'lines+markers', name: 'Momentum', line: { color: '#ED1E79', width: 2 }, marker: { size: 5 } });
                if (vis.adam) traces.push({ x: adam.px, y: adam.py, mode: 'lines+markers', name: 'Adam', line: { color: '#15803D', width: 2 }, marker: { size: 5 } });
                traces.push({ x: [0], y: [0], mode: 'markers', name: 'mínimo', marker: { size: 14, color: '#FDB913', symbol: 'star', line: { color: '#3D008D', width: 1 } } });
                return traces;
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 40 }, legend: { orientation: 'h', y: -0.18 },
                xaxis: { title: 'parámetro θ₁', range: [-3, 3], gridcolor: '#eee', zeroline: false },
                yaxis: { title: 'parámetro θ₂', range: [-3, 3], gridcolor: '#eee', zeroline: false },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [vis.gd, vis.mom, vis.adam]);

            const defs = { gd: { name: 'GD simple', color: '#B91C1C' }, mom: { name: 'Momentum', color: '#ED1E79' }, adam: { name: 'Adam', color: '#15803D' } };
            return (
                <div className="my-4">
                    <div className="flex flex-wrap gap-2 mb-2">
                        {Object.keys(defs).map(k => (
                            <button key={k} onClick={() => toggle(k)}
                                className={`px-3 py-1 rounded-full text-xs font-bold border-2 transition-all ${vis[k] ? 'text-white shadow' : 'bg-white text-gray-500'}`}
                                style={vis[k] ? { background: defs[k].color, borderColor: defs[k].color } : { borderColor: '#e5e7eb' }}>
                                {defs[k].name}
                            </button>
                        ))}
                    </div>
                    <ChartFrame id="chart-optim-compare" height="chart-h-360" caption="Tazón mal condicionado (valle estrecho 10:1). GD simple zigzaguea; Momentum amortigua el rebote; Adam adapta el paso de cada eje y baja casi recto al mínimo (★)." />
                </div>
            );
        };

        /* Gráfica SVG nativa: curva de la entropía cruzada L = -log(ŷ).
           Se dibuja a mano (sin Plotly) y marca sobre la curva los valores de la tabla BCE. */
        const EntropiaCruzadaChart = () => {
            const W = 560, H = 340;
            const padL = 56, padR = 18, padT = 18, padB = 46;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;
            const Lmax = 5;
            const xPix = p => padL + p * plotW;                              // p (probabilidad) en [0,1]
            const yPix = L => padT + plotH - (Math.min(L, Lmax) / Lmax) * plotH;

            // Curva L = -ln(p) muestreada finamente
            let d = '';
            for (let p = 0.01; p <= 1.0001; p += 0.004) {
                const L = -Math.log(p);
                if (L > Lmax) continue;
                d += (d === '' ? 'M' : 'L') + xPix(p).toFixed(1) + ' ' + yPix(L).toFixed(1) + ' ';
            }

            const puntos = [
                { p: 0.99, L: 0.01 }, { p: 0.90, L: 0.11 }, { p: 0.50, L: 0.69 },
                { p: 0.10, L: 2.30 }, { p: 0.01, L: 4.61 },
            ];
            const xticks = [0, 0.25, 0.5, 0.75, 1];
            const yticks = [0, 1, 2, 3, 4, 5];
            const cy = padT + plotH / 2;

            return (
                <div className="my-4">
                    <svg viewBox={`0 0 ${W} ${H}`} width="100%" role="img"
                        aria-label="Curva de la entropía cruzada: el costo menos logaritmo de y-hat crece sin límite cuando la probabilidad asignada a la clase correcta tiende a cero, y vale cero cuando esa probabilidad es uno."
                        style={{ display: 'block', maxWidth: '640px', margin: '0 auto', background: '#FAF8FF', borderRadius: '12px', border: '1px solid rgba(61,0,141,0.12)' }}>
                        {yticks.map(t => (
                            <g key={'y' + t}>
                                <line x1={padL} y1={yPix(t)} x2={W - padR} y2={yPix(t)} stroke="#E2E8F0" strokeWidth="1" />
                                <text x={padL - 8} y={yPix(t) + 4} textAnchor="end" fontSize="11" fill="#64748B" fontFamily="Montserrat">{t}</text>
                            </g>
                        ))}
                        {xticks.map(t => (
                            <text key={'x' + t} x={xPix(t)} y={padT + plotH + 18} textAnchor="middle" fontSize="11" fill="#64748B" fontFamily="Montserrat">{t.toFixed(2)}</text>
                        ))}
                        <line x1={padL} y1={padT} x2={padL} y2={padT + plotH} stroke="#94A3B8" strokeWidth="1.5" />
                        <line x1={padL} y1={padT + plotH} x2={W - padR} y2={padT + plotH} stroke="#94A3B8" strokeWidth="1.5" />
                        <path d={d} fill="none" stroke="#ED1E79" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                        {puntos.map((pt, i) => (
                            <g key={'pt' + i}>
                                <circle cx={xPix(pt.p)} cy={yPix(pt.L)} r="5" fill="#3D008D" stroke="#fff" strokeWidth="1.5" />
                                <text x={xPix(pt.p) + (pt.p > 0.8 ? -9 : 9)} y={yPix(pt.L) - 7}
                                    textAnchor={pt.p > 0.8 ? 'end' : 'start'} fontSize="10.5" fill="#3D008D" fontFamily="Montserrat" fontWeight="700">{pt.L.toFixed(2)}</text>
                            </g>
                        ))}
                        <text x={padL + plotW / 2} y={H - 8} textAnchor="middle" fontSize="12" fill="#334155" fontFamily="Montserrat" fontWeight="600">ŷ — probabilidad asignada a la clase correcta</text>
                        <text transform={`rotate(-90 16 ${cy})`} x="16" y={cy} textAnchor="middle" fontSize="12" fill="#334155" fontFamily="Montserrat" fontWeight="600">Costo  −log(ŷ)</text>
                    </svg>
                    <p className="text-xs text-gray-500 text-center mt-2" style={{ fontStyle: 'italic' }}>
                        El costo vale 0 cuando la red asigna toda la probabilidad a la clase correcta (ŷ = 1) y crece sin límite a medida que ŷ → 0:
                        equivocarse con seguridad se penaliza de forma desmedida. Los puntos marcan los valores de la tabla anterior.
                    </p>
                </div>
            );
        };

        const Cap3Section = () => (
            <div className="prose-usta">
                <Box type="info" label="Idea central">
                    En Deep Learning, <strong>aprender es minimizar el error</strong>. Una red recién inicializada (pesos aleatorios)
                    es como un turista perdido en la Cordillera Central sin mapa. Se necesitan dos herramientas: una <strong>función
                        de costo</strong> (el altímetro que mide qué tan mal va el modelo) y un <strong>optimizador</strong> (la estrategia para
                    descender).
                </Box>

                <h3>Funciones de costo</h3>
                <p>
                    La función de costo {String.raw`\(L(\hat{y}, y)\)`} compara las predicciones con la realidad: si la diferencia es
                    grande, el costo es alto; si la predicción es perfecta, el costo es cero. La elección no es trivial: define
                    <em> qué le importa</em> al modelo. Retomando la analogía inicial, la función de costo es el <strong>altímetro</strong> del
                    excursionista: cuanto más alto su valor, más lejos queda el valle que representa la solución.
                </p>

                <h4>Error Cuadrático Medio (MSE) — regresión</h4>
                <Eq>{String.raw`$$ \text{MSE} = \frac{1}{N}\sum_{i=1}^{N}(y_i - \hat{y}_i)^2 $$`}</Eq>
                <p>
                    Al elevar al cuadrado, se penalizan desproporcionadamente los errores grandes. Considérese un modelo que predice la
                    precipitación diaria (mm) en tres estaciones de la cuenca del Río Magdalena:
                </p>
                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">Estación</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Real {String.raw`\(y\)`}</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Predicho {String.raw`\(\hat{y}\)`}</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">{String.raw`\(|y-\hat{y}|\)`}</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">{String.raw`\((y-\hat{y})^2\)`}</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2 border-b border-gray-100">Honda</td><td className="p-2 border-b border-gray-100">12</td><td className="p-2 border-b border-gray-100">10</td><td className="p-2 border-b border-gray-100">2</td><td className="p-2 border-b border-gray-100">4</td></tr>
                            <tr><td className="p-2 border-b border-gray-100">Girardot</td><td className="p-2 border-b border-gray-100">8</td><td className="p-2 border-b border-gray-100">9</td><td className="p-2 border-b border-gray-100">1</td><td className="p-2 border-b border-gray-100">1</td></tr>
                            <tr><td className="p-2">Barrancabermeja</td><td className="p-2">100</td><td className="p-2">60</td><td className="p-2">40</td><td className="p-2">1600</td></tr>
                        </tbody>
                    </table>
                </div>
                <p>
                    Un solo fallo grande —el evento extremo no anticipado— domina el resultado: {String.raw`\(\text{MSE} = \frac{4+1+1600}{3} = 535\)`},
                    frente a un error absoluto medio de apenas {String.raw`\(\frac{2+1+40}{3} \approx 14.3\)`}. El cuadrado convierte ese fallo en la
                    prioridad del entrenamiento; por ello el MSE resulta apropiado cuando los valores atípicos importan (alertas de inundación) y
                    problemático cuando son ruido que conviene ignorar.
                </p>

                <h4>Error Absoluto Medio (MAE) y pérdida de Huber — regresión robusta</h4>
                <Eq>{String.raw`$$ \text{MAE} = \frac{1}{N}\sum_{i=1}^{N}|y_i - \hat{y}_i| $$`}</Eq>
                <p>
                    El <strong>MAE</strong> mide el error en línea recta, sin elevarlo al cuadrado, de modo que cada fallo pesa en
                    proporción exacta a su tamaño. Retomando el ejemplo del Magdalena, ese {String.raw`\(\approx 14.3\)`} que ya
                    apareció <em>es</em> precisamente el MAE: el evento extremo de Barrancabermeja deja de dominar (frente a los 535 del
                    MSE). Por eso el MAE es <strong>robusto a los valores atípicos</strong> y conviene cuando esos extremos son ruido que
                    no debe marcar el rumbo del entrenamiento.
                </p>
                <Box type="warn" label="El precio del MAE: un gradiente que no se suaviza">
                    El valor absoluto <strong>no es diferenciable en 0</strong>: su derivada salta de {String.raw`\(-1\)`} a
                    {String.raw` \(+1\)`} sin pasar por valores intermedios. Cerca del óptimo, el gradiente conserva magnitud constante en
                    vez de menguar, de modo que el descenso (sección siguiente) tiende a oscilar alrededor del mínimo en lugar de asentarse
                    con suavidad.
                </Box>
                <p>
                    La <strong>pérdida de Huber</strong> busca lo mejor de ambos mundos: se comporta como el <strong>MSE</strong> para
                    errores pequeños —suave y diferenciable— y como el <strong>MAE</strong> para errores grandes —robusta a atípicos—. Un
                    umbral {String.raw`\(\delta\)`} marca la frontera entre ambos regímenes:
                </p>
                <Eq>{String.raw`$$ L_\delta(e) = \begin{cases} \tfrac{1}{2}\,e^2 & \text{si } |e| \le \delta, \\ \delta\,(|e| - \tfrac{1}{2}\delta) & \text{si } |e| > \delta, \end{cases} \qquad e = y - \hat{y} $$`}</Eq>
                <p>
                    Por debajo de {String.raw`\(\delta\)`} la curva es una parábola (penaliza con fuerza y entrega un gradiente que se
                    desvanece cerca del óptimo); por encima, se vuelve una recta (no deja que un solo atípico domine). El propio
                    {String.raw` \(\delta\)`} es un hiperparámetro: valores pequeños acercan Huber al MAE; grandes, al MSE.
                </p>
                <CodeBlock title="MSE, MAE y Huber en PyTorch" code={regresLosses} lang="pytorch" />

                <h4>Entropía Cruzada Binaria (BCE) — clasificación</h4>
                <Eq>{String.raw`$$ \text{BCE} = -\frac{1}{N}\sum_{i=1}^{N}\big[\,y_i\log(\hat{y}_i) + (1-y_i)\log(1-\hat{y}_i)\,\big] $$`}</Eq>
                <p>
                    Se usa, por ejemplo, para diagnosticar si una hoja de café tiene roya. No importa la distancia numérica, sino la probabilidad
                    asignada a la respuesta correcta. Para un único ejemplo, la BCE se reduce a {String.raw`\(-\log(\hat{y})\)`}, donde
                    {String.raw` \(\hat{y}\)`} es la probabilidad que el modelo otorga a la clase <em>verdadera</em>:
                </p>
                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">{String.raw`\(\hat{y}\)`} (prob. de la clase correcta)</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">0.99</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">0.90</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">0.50</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">0.10</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">0.01</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2">Costo {String.raw`\(-\log(\hat{y})\)`}</td><td className="p-2">0.01</td><td className="p-2">0.11</td><td className="p-2">0.69</td><td className="p-2">2.30</td><td className="p-2">4.61</td></tr>
                        </tbody>
                    </table>
                </div>
                <p>
                    La penalización no es lineal: equivocarse con seguridad —asignar {String.raw`\(0.01\)`} a una hoja realmente enferma— cuesta unas
                    460 veces más que acertar con seguridad, y cerca de 7 veces más que la simple indecisión ({String.raw`\(0.69\)`}). Esa asimetría es
                    precisamente lo que disuade a la red de emitir afirmaciones rotundas y falsas.
                </p>
                <EntropiaCruzadaChart />

                <h4>Entropía Cruzada Categórica (CCE) — clasificación multiclase</h4>
                <p>
                    Cuando hay más de dos clases —por ejemplo, diagnosticar si una hoja de café tiene <em>roya</em>, <em>mancha de hierro</em>,
                    <em>antracnosis</em> o está <em>sana</em>— la última capa entrega un puntaje crudo por clase, los
                    {' '}<Termino def="Salidas numéricas sin normalizar de la última capa, antes de convertirse en probabilidades.">logits</Termino>
                    {' '}{String.raw`\(z_k\)`}. La función <strong>Softmax</strong> los convierte en una distribución de probabilidad que suma 1:
                </p>
                <Eq>{String.raw`$$ \hat{y}_k = \text{softmax}(z_k) = \frac{e^{z_k}}{\sum_{j=1}^{C} e^{z_j}}, \qquad \sum_{k=1}^{C}\hat{y}_k = 1 $$`}</Eq>
                <p>
                    Sobre esas probabilidades se aplica la <strong>entropía cruzada categórica</strong>, que solo mira la probabilidad asignada a la
                    clase <em>verdadera</em> (con {String.raw`\(y_{ik}\)`} en codificación <em>one-hot</em>: vale 1 en la clase correcta y 0 en el resto):
                </p>
                <Eq>{String.raw`$$ \text{CCE} = -\frac{1}{N}\sum_{i=1}^{N}\sum_{k=1}^{C} y_{ik}\,\log(\hat{y}_{ik}) $$`}</Eq>
                <p>
                    Es la generalización natural de la BCE a {String.raw`\(C\)`} clases: si la red asigna baja probabilidad a la enfermedad correcta,
                    {String.raw` \(-\log(\hat{y})\)`} se dispara y el costo crece. De hecho, <strong>la BCE es el caso particular de la CCE con {String.raw`\(C = 2\)`}</strong>.
                </p>
                <p>
                    Un ejemplo concreto: una hoja cuya clase verdadera es <em>roya</em>. La red emite los logits
                    {String.raw` \(z = [\,2.0,\ 1.0,\ 0.1,\ 0.5\,]\)`} para [roya, mancha de hierro, antracnosis, sana]; tras la Softmax se obtiene la
                    distribución {String.raw`\([\,0.57,\ 0.21,\ 0.09,\ 0.13\,]\)`}. La CCE solo considera la probabilidad de la clase verdadera:
                    {String.raw` \(-\log(0.57) \approx 0.55\)`}. Si la red hubiese asignado {String.raw`\(0.90\)`} a <em>roya</em>, el costo bajaría a
                    {String.raw` \(0.11\)`}; si la hubiese relegado a {String.raw`\(0.10\)`}, treparía a {String.raw`\(2.30\)`}. Las clases incorrectas no
                    figuran directamente en la suma: su influencia es indirecta, pues la Softmax les resta masa de probabilidad a costa de la correcta.
                </p>

                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">Tarea</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Salida típica</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Función de costo</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Ejemplo local</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Regresión</strong></td><td className="p-2 border-b border-gray-100">1 neurona lineal</td><td className="p-2 border-b border-gray-100">MSE</td><td className="p-2 border-b border-gray-100">mm de lluvia en el Magdalena</td></tr>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Regresión robusta</strong></td><td className="p-2 border-b border-gray-100">1 neurona lineal</td><td className="p-2 border-b border-gray-100">MAE / Huber</td><td className="p-2 border-b border-gray-100">lluvia con atípicos (ruido)</td></tr>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Clasif. binaria</strong></td><td className="p-2 border-b border-gray-100">1 neurona + Sigmoide</td><td className="p-2 border-b border-gray-100">BCE</td><td className="p-2 border-b border-gray-100">¿la hoja tiene roya? (sí / no)</td></tr>
                            <tr><td className="p-2"><strong>Clasif. multiclase</strong></td><td className="p-2">C neuronas + Softmax</td><td className="p-2">CCE</td><td className="p-2">tipo de enfermedad (4 clases)</td></tr>
                        </tbody>
                    </table>
                </div>

                <Box type="tip" label="El hilo común: máxima verosimilitud">
                    Estas tres funciones no son arbitrarias: cada una surge de <strong>maximizar la verosimilitud</strong> de los datos
                    bajo un supuesto distinto sobre su naturaleza —un ruido gaussiano conduce al <strong>MSE</strong>; un resultado
                    Bernoulli (sí/no), a la <strong>BCE</strong>; y una variable categórica de {String.raw`\(C\)`} clases, a la
                    <strong>CCE</strong>—. Minimizar el costo equivale, en los tres casos, a hacer que los datos observados resulten
                    lo más probables posible para el modelo.
                </Box>

                <CalloutPro tema="eth" titulo="Dimensión ética" subtitulo="Cuando los datos están desbalanceados">
                    Si los datos de dengue están muy desbalanceados (95 % no graves, 5 % graves), una función de costo estándar
                    podría minimizar el error global <strong>ignorando los casos graves</strong>. En salud pública, un falso negativo
                    puede ser fatal. La elección del costo no es solo técnica, también ética: conviene incorporar <strong>pesos
                        diferenciales</strong> que indiquen que equivocarse en un caso grave cuesta, por ejemplo, diez veces más.
                </CalloutPro>

                <h3>Descenso del gradiente: una analogía andina</h3>
                <p>
                    Un excursionista se halla en el <strong>Páramo de Letras</strong>, a 3.677 m, de noche y con niebla densa (visibilidad &lt; 1 m).
                    Debe llegar al valle (error mínimo) pero no ve nada, así que tantea con los pies la inclinación: el <strong>gradiente</strong>
                    es la flecha que apunta hacia arriba. Para descender, da un paso en la dirección <strong>opuesta</strong>:
                </p>
                <Eq>{String.raw`$$ \theta_{t+1} = \theta_t - \eta\,\nabla_\theta L(\theta_t) $$`}</Eq>
                <p>donde {String.raw`\(\nabla_\theta L\)`} es el gradiente y {String.raw`\(\eta\)`} (eta) es la tasa de aprendizaje.</p>
                <GradienteChart />
                <CodeBlock title="Descenso del gradiente en numpy" code={sgdNumpy} />

                <Box type="tip" label="De un parámetro a millones">
                    En esta analogía {String.raw`\(\theta\)`} es un solo número, pero en una red real es un <strong>vector con millones de
                    componentes</strong> (todos los pesos y sesgos). El gradiente {String.raw`\(\nabla_\theta L\)`} es entonces un vector de
                    derivadas parciales —una por parámetro— y la actualización las mueve todas a la vez. ¿Cómo se calcula ese vector gigante de
                    forma eficiente? Ese es justamente el tema del <strong>Capítulo 4: Retropropagación</strong>.
                </Box>

                <h3>La tasa de aprendizaje: cuestión de vida o muerte</h3>
                <p>
                    El siguiente laboratorio usa el mismo valle simple {String.raw`\(L(\theta)=\theta^2\)`}. Al variar la tasa de aprendizaje
                    {String.raw` \(\eta\)`} se aprecia cómo cambia el comportamiento del descenso; el resumen de los tres regímenes aparece debajo:
                </p>
                <LRPlayground />
                <Tabs tabs={[
                    { label: 'Muy alta', content: <p>Saltos de 50 metros: probablemente pase por encima del valle y suba la ladera opuesta, o se desbarranque. En matemáticas, esto es <strong>divergencia</strong>: el error aumenta en vez de disminuir.</p> },
                    { label: 'Muy baja', content: <p>Pasos de hormiga, milímetro a milímetro: tardaría años en llegar. El modelo podría «morir de hipotermia» (no converger en un tiempo razonable).</p> },
                    { label: 'Ideal', content: <p>Pasos firmes y seguros que se reducen a medida que el terreno se aplana (al acercarse al valle). Convergencia estable y razonablemente rápida.</p> },
                ]} />

                <h3>Lotes, épocas e iteraciones</h3>
                <p>
                    Antes de comparar estrategias de descenso conviene fijar tres términos que suelen confundirse:
                </p>
                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">Término</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Qué es</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Lote (batch)</strong></td><td className="p-2 border-b border-gray-100">Grupo de ejemplos que se procesan juntos antes de una actualización de pesos.</td></tr>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Iteración</strong></td><td className="p-2 border-b border-gray-100">Una actualización de pesos = procesar <em>un</em> lote (un paso del descenso).</td></tr>
                            <tr><td className="p-2"><strong>Época (epoch)</strong></td><td className="p-2">Una pasada completa por <em>todo</em> el conjunto de entrenamiento.</td></tr>
                        </tbody>
                    </table>
                </div>
                <Box type="info" label="Ejemplo numérico">
                    Supóngase un conjunto de <strong>50.000</strong> imágenes entrenado con un tamaño de lote de <strong>100</strong>:
                    <ul>
                        <li>Cada <strong>iteración</strong> procesa un lote de 100 imágenes y ajusta los pesos <em>una</em> vez.</li>
                        <li>Recorrer las 50.000 imágenes (una <strong>época</strong>) requiere, por tanto, {String.raw`\(50\,000 / 100 = 500\)`} iteraciones.</li>
                        <li>Entrenar durante <strong>20 épocas</strong> acumula {String.raw`\(500 \times 20 = 10\,000\)`} actualizaciones de pesos.</li>
                    </ul>
                    El tamaño del lote fija <strong>cuántas veces se ajustan los pesos por época</strong>: con lotes de 10 en lugar de 100, la
                    misma época tendría {String.raw`\(50\,000 / 10 = 5\,000\)`} iteraciones —cinco veces más actualizaciones, cada una a partir de
                    menos datos—. Esa disyuntiva, pocos pasos grandes o muchos pasos pequeños, es justamente el tema de la siguiente sección.
                </Box>

                <h3>SGD vs. Batch Gradient Descent</h3>
                <p>
                    El descenso del gradiente plantea una pregunta práctica: <strong>¿con cuántos datos conviene estimar la pendiente
                    antes de dar cada paso?</strong> Tres respuestas distintas dan origen a tres variantes, y cada una aparece para
                    corregir el defecto de la anterior.
                </p>
                <p>
                    <strong>1. Batch Gradient Descent — todos los datos.</strong> Retomando al excursionista, equivale a promediar la
                    inclinación de <em>todo</em> el terreno antes de cada paso: la dirección es <strong>exacta</strong> y el descenso, suave.
                    El problema aparece con la escala: con un millón (1.000.000) de ejemplos, cada paso exige recorrer el conjunto completo
                    —<strong>una sola actualización por época</strong>, lentísimo, y a menudo el lote ni siquiera cabe en memoria—.
                </p>
                <p>
                    <strong>2. SGD estocástico puro — un solo ejemplo.</strong> El extremo opuesto: estimar la pendiente con
                    <strong> un único ejemplo</strong> y dar el paso de inmediato. Los pasos resultan baratísimos y hay millones por época,
                    y el ruido incluso ayuda a escapar de mínimos pobres. Pero un ejemplo no representa al conjunto: la estimación es
                    <strong> muy ruidosa</strong> y la convergencia, inestable.
                </p>
                <p>
                    <strong>3. Mini-batch — el término medio</strong> (lo que hoy se llama, por costumbre, «SGD»). Promediar un puñado de
                    ejemplos (8–512; por ejemplo, 32) <strong>reduce el ruido sin renunciar a la frecuencia</strong> de actualización, y
                    aprovecha el paralelismo de la GPU. Es el estándar de facto.
                </p>
                <Box type="info" label="La intuición clave">
                    El gradiente de un mini-lote es un <strong>estimador insesgado</strong> del gradiente verdadero: en promedio apunta en la
                    dirección correcta, solo que con ruido. Por eso conviene cambiar <strong>pocos pasos exactos y costosos por muchos pasos
                    aproximados y baratos</strong>: se avanza más en el mismo tiempo.
                </Box>
                <div className="overflow-x-auto my-4">
                    <table className="w-full text-sm border-collapse">
                        <thead>
                            <tr className="bg-bg text-navy">
                                <th className="text-left p-2 border-b-2 border-gray-200">Variante</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Ejemplos por paso</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Pasos por época</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Ruido del gradiente</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Memoria</th>
                                <th className="text-left p-2 border-b-2 border-gray-200">Uso típico</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td className="p-2 border-b border-gray-100"><strong>Batch GD</strong></td><td className="p-2 border-b border-gray-100">Todo el conjunto</td><td className="p-2 border-b border-gray-100">1</td><td className="p-2 border-b border-gray-100">Nulo (exacto)</td><td className="p-2 border-b border-gray-100">Alta</td><td className="p-2 border-b border-gray-100">Conjuntos pequeños</td></tr>
                            <tr><td className="p-2 border-b border-gray-100"><strong>SGD (puro)</strong></td><td className="p-2 border-b border-gray-100">1</td><td className="p-2 border-b border-gray-100">N</td><td className="p-2 border-b border-gray-100">Muy alto</td><td className="p-2 border-b border-gray-100">Mínima</td><td className="p-2 border-b border-gray-100">Casi en desuso</td></tr>
                            <tr><td className="p-2"><strong>Mini-batch</strong></td><td className="p-2">8–512</td><td className="p-2">N ÷ tamaño de lote</td><td className="p-2">Moderado</td><td className="p-2">Media</td><td className="p-2"><strong>Estándar actual</strong></td></tr>
                        </tbody>
                    </table>
                </div>
                <p>
                    Con 1.000.000 de ejemplos (N), el Batch GD realiza 1 actualización por época; un mini-lote de 32 realiza
                    <strong> 31.250</strong>. Más pasos —aunque aproximados— suelen alcanzar un buen mínimo mucho antes.
                </p>
                <Box type="tip" label="El tamaño del lote importa">
                    Lotes <strong>pequeños</strong> (8–32) → más ruido por paso: el camino zigzaguea, pero ese ruido ayuda a escapar de malos
                    mínimos y suele generalizar mejor. Lotes <strong>grandes</strong> (256–1024) → gradiente más estable y mejor uso de la GPU,
                    pero exigen más memoria y a veces caen en mínimos «afilados» que generalizan peor. El tamaño de lote es, por eso, un
                    hiperparámetro que se ajusta.
                </Box>

                <h3>El paisaje del error: convexo vs. real</h3>
                <p>
                    El valle {String.raw`\(L(\theta)=\theta^2\)`} de las gráficas anteriores es <strong>convexo</strong>: un único fondo, sin
                    trampas. Es ideal para entender el descenso, pero el paisaje de error de una red profunda no es así. Con millones de
                    parámetros, la superficie es <strong>no convexa</strong> y está llena de accidentes:
                </p>
                <ul className="list-disc pl-6 space-y-1 text-[0.95rem] text-gray-700 my-3">
                    <li><strong>Mínimos locales:</strong> valles que no son el más profundo, donde el descenso podría detenerse.</li>
                    <li><strong>Puntos silla (<Termino def="Punto donde el terreno sube en unas direcciones y baja en otras, como una silla de montar: el gradiente es casi cero pero no es un mínimo.">saddle points</Termino>):</strong> el gradiente es casi nulo y el avance se «estanca», aunque no sea un mínimo real.</li>
                    <li><strong>Mesetas:</strong> zonas casi planas donde el gradiente es diminuto y el aprendizaje se vuelve lentísimo.</li>
                </ul>
                <Box type="info" label="Buenas noticias en alta dimensión">
                    Paradójicamente, con muchísimos parámetros los mínimos locales «malos» son raros: casi todos los puntos de gradiente nulo
                    resultan ser puntos silla, y la mayoría de los mínimos son casi tan buenos como el global. Además, el <strong>ruido del
                    SGD</strong> (lotes pequeños) da pequeños empujones que ayudan a salir de sillas y mesetas. Por eso, en la práctica, no se
                    persigue «el» óptimo global: basta con un mínimo suficientemente bueno.
                </Box>

                <h3>Momentum y optimizadores adaptativos</h3>
                <p>
                    Para corregir el zigzagueo del SGD se usa el <strong>momentum</strong>, un concepto físico: al bajar en bicicleta
                    el Alto de Letras, la inercia permite superar pequeños baches (el ruido de los datos) sin desviarse. El optimizador
                    acumula una «velocidad» basada en gradientes previos: mantiene el impulso en direcciones consistentes y atenúa las
                    oscilaciones.
                </p>
                <Eq>{String.raw`$$ v_{t+1} = \beta\,v_t - \eta\,\nabla_\theta L(\theta_t), \qquad \theta_{t+1} = \theta_t + v_{t+1} $$`}</Eq>
                <p>
                    El coeficiente {String.raw`\(\beta\)`} (típicamente {String.raw`\(0.9\)`}) fija cuánta inercia se conserva. Pero existe una idea
                    aún más potente: <strong>adaptar la tasa de aprendizaje a cada parámetro</strong>.
                </p>

                <h4>RMSProp: un paso a la medida de cada parámetro</h4>
                <p>
                    Una sola {String.raw`\(\eta\)`} para todos los pesos es un traje genérico. <strong>RMSProp</strong> lleva una media móvil del
                    <em>cuadrado</em> del gradiente reciente de cada parámetro (su valor RMS, de ahí el nombre) y divide su paso por esa raíz: los parámetros con gradientes grandes y
                    ruidosos avanzan con cautela, y los de gradientes pequeños y constantes avanzan más rápido. Es como dar pasos largos en terreno
                    parejo y pasos cortos donde hay piedras.
                </p>

                <h4>Adam: lo mejor de los dos mundos</h4>
                <p>
                    <strong>Adam</strong> (<em>Adaptive Moment Estimation</em>) combina ambas ideas: <strong>momentum</strong> (inercia, el primer
                    momento del gradiente) <strong>+</strong> <strong>paso adaptativo por parámetro</strong> al estilo RMSProp (el segundo momento).
                    Es robusto, casi no requiere ajuste fino y por eso es hoy <strong>el optimizador por defecto</strong> en la mayoría de proyectos
                    de Deep Learning.
                </p>
                <CodeBlock title="Optimizadores en PyTorch (ilustrativo)" code={optimTorch} lang="pytorch" />
                <p>
                    El comparador pasa de uno a <strong>dos</strong> parámetros ({String.raw`\(\theta_1, \theta_2\)`}) para revelar un fenómeno que
                    con un solo eje no se aprecia: un <strong>valle alargado</strong>, mucho más empinado en una dirección que en la otra (aquí, una
                    relación de pendientes de 10:1). En esa geometría —que se denomina problema <strong>mal condicionado</strong>— el descenso
                    simple zigzaguea de pared a pared en lugar de avanzar hacia el fondo. Sobre ese mismo valle estrecho se contrastan las tres
                    estrategias; cada botón activa o desactiva una trayectoria:
                </p>
                <OptimizerCompare />
                <Box type="tip" label="¿Cuál elegir?">
                    En la práctica conviene empezar con <strong>Adam</strong> ({String.raw`\(\eta \approx 0.001\)`}): converge rápido y tolera una mala elección de la tasa de aprendizaje.
                    <strong>SGD con momentum</strong> a veces generaliza un poco mejor en visión por computador, pero exige ajustar con más cuidado la
                    tasa de aprendizaje. Ante la duda, Adam es un punto de partida seguro.
                </Box>

                <h3>Laboratorio: el descenso del gradiente en acción</h3>

        const chainNumpy = `import numpy as np

# Grafo de una neurona:  z = w*x + b  ->  a = ReLU(z)  ->  L = (a - y)^2
x, w, b, y = 2.0, -1.5, 1.0, 1.0

# --- Forward pass (predicción) ---
z = w * x + b            # = -2.0
a = max(0.0, z)          # ReLU -> 0.0  (z es negativo)
L = (a - y) ** 2         # error = 1.0  (a=0, y=1: sí hay error)

# --- Backward pass (regla de la cadena, de atrás hacia adelante) ---
dL_da = 2 * (a - y)            # dL/da = -2.0  (hay error que repartir)
da_dz = 1.0 if z > 0 else 0.0  # derivada de ReLU = 0.0  (z<0: neurona apagada)
dz_dw = x                      # dz/dw = 2.0
dL_dw = dL_da * da_dz * dz_dw  # efecto dominó: producto de derivadas locales
print(dL_dw)                   # -> 0.0  (el factor da_dz=0 corta la cadena)`;

# requires_grad=True activa el "secretario invisible" que registra cada operación
x = torch.tensor(2.0, requires_grad=True)
w = torch.tensor(-1.5, requires_grad=True)
b = torch.tensor(1.0, requires_grad=True)

z = w * x + b
a = torch.relu(z)
L = (a - 1.0) ** 2

L.backward()        # autograd lee la bitácora al revés y aplica la regla de la cadena
print(w.grad)       # tensor(0.) -> reproduce el cálculo a mano de arriba`;

# Mini-red:  x --[w1,b1]--> z1 --ReLU--> a1 --[w2,b2]--> z2 = y_hat ;  L = (y_hat - y)^2
x, y = 2.0, 0.0
w1, b1, w2, b2 = 0.5, 0.0, 2.0, 0.0

# --- Forward (predicción) ---
z1 = w1*x + b1                 # 1.0
a1 = max(0.0, z1)              # ReLU -> 1.0
z2 = w2*a1 + b2                # 2.0
y_hat = z2                     # salida lineal -> 2.0
L = (y_hat - y)**2            # (2 - 0)^2 = 4.0

# --- Backward (recursión de delta, de atrás hacia adelante) ---
d2 = 2*(y_hat - y)             # delta de salida = 4.0

d1 = (w2*d2) * (1.0 if z1 > 0 else 0.0)   # delta oculta = (2*4)*1 = 8.0
dW1, db1 = d1*x, d1            # 16.0 , 8.0

                <h3>Pensar en grafos, no en neuronas</h3>
                <p>
                    Antes de aplicar la idea a la red conviene precisar el término. Un <strong>grafo</strong> es un conjunto de
                    <strong> nodos</strong> conectados por <strong>aristas</strong> (flechas que indican qué alimenta a qué); un
                    <strong> grafo computacional</strong> es aquel en el que cada nodo ejecuta una <strong>operación
                    elemental</strong> (sumar, multiplicar, aplicar ReLU…) y cada arista transporta el valor resultante hacia la
                    siguiente. Por ejemplo,
                    la expresión {String.raw`\(f = (a + b)\cdot c\)`} se descompone en dos nodos —una suma {String.raw`\(s = a + b\)`} y
                    un producto {String.raw`\(f = s\cdot c\)`}—; con {String.raw`\(a=2,\ b=3,\ c=4\)`} la información recorre el grafo
                    hacia adelante: primero {String.raw`\(s = 5\)`} y luego {String.raw`\(f = 20\)`}.
                </p>
                <GrafoAritmetico />
                <p>
                    Aquí se aprecia <strong>por qué esta estructura es útil</strong> para la retropropagación: el mismo grafo,
                    recorrido hacia adelante (azul), entrega el resultado; recorrido hacia atrás (rojo), entrega en una sola pasada la
                    <strong> sensibilidad de la salida ante cada entrada</strong>. La clave es la <strong>localidad</strong>: cada nodo
                    solo necesita su propia derivada —en el producto, {String.raw`\(\partial f/\partial c = s = 5\)`}, que reutiliza el
                    valor ya calculado en el forward— y el gradiente global se obtiene multiplicando esas derivadas locales a lo largo de
                    cada camino, por ejemplo {String.raw`\(\partial f/\partial a = \partial f/\partial s \cdot \partial s/\partial a = 4\cdot 1\)`}.
                    Así, derivar una función de millones de parámetros deja de ser un problema monstruoso y se vuelve un conjunto de pasos
                    triviales enlazados por la <strong>regla de la cadena</strong>.
                </p>
                <p>
                    Conviene abandonar la analogía del «cerebro» y ver la red como un <strong>grafo computacional</strong> mucho mayor:
                    la ecuación {String.raw`\(y = \text{ReLU}(w\cdot x + b)\)`} se descompone igual, en nodos. La información fluye hacia
                    adelante (forward) para predecir; la <strong>responsabilidad (el gradiente) fluye hacia atrás (backward)</strong>.
                </p>
                <GrafoComputacional />
                <Box type="info" label="Cuando un valor influye por varios caminos: los gradientes se suman">
                    En el grafo aritmético anterior cada entrada llega a la salida por un <strong>único</strong> camino. Pero en una red
                    real una misma neurona suele alimentar a <strong>muchas</strong> de la capa siguiente, de modo que influye en el error
                    por <strong>varias rutas</strong> a la vez. La regla es sencilla: <strong>dentro</strong> de cada ruta se
                    <em> multiplican</em> las derivadas locales (la cadena de siempre), y <strong>entre</strong> rutas que parten del mismo
                    valor se <em>suman</em> esas contribuciones. Es la versión precisa de la analogía del crédito: si una decisión temprana
                    provocó el retraso por <em>dos</em> vías distintas, su responsabilidad total es la suma de ambas.
                </Box>

                <h3>La regla de la cadena: el efecto dominó</h3>
                <p>
                    Matemáticamente, la retropropagación se basa enteramente en la regla de la cadena. Si {String.raw`\(y=f(u)\)`} y
                    {String.raw` \(u=g(x)\)`}, entonces:
                </p>
                <Eq>{String.raw`$$ \frac{dy}{dx} = \frac{dy}{du}\cdot\frac{du}{dx} $$`}</Eq>
                <Box type="tip" label="Analogía: el rumor">
                    Si una persona transmite información a un colega y este la exagera ante el jefe, el impacto de la información
                    original sobre la reacción final es el <strong>producto</strong> de dos factores: cuánto distorsiona el colega
                    (derivada local) y la intensidad de la información inicial (otra derivada local). La capa final retropropaga
                    una señal; cada capa la multiplica por su «factor de distorsión» local y la pasa hacia atrás, hasta la entrada.
                    Si, en cambio, cada eslabón <strong>atenúa</strong> el mensaje (un factor menor que 1), tras muchas capas la señal puede desvanecerse.
                </Box>
                <CodeBlock title="Regla de la cadena a mano (numpy)" code={chainNumpy} />

                <h4>De la cadena escalar a la red: las ecuaciones del backprop</h4>
                <p>
                    Conviene separar dos cantidades en cada capa: la <strong>preactivación</strong> {String.raw`\(\mathbf{z}^{[l]}=\mathbf{W}^{[l]}\mathbf{a}^{[l-1]}+\mathbf{b}^{[l]}\)`}
                    (la suma ponderada) y la <strong>activación</strong> {String.raw`\(\mathbf{a}^{[l]}=\sigma(\mathbf{z}^{[l]})\)`} (tras la no linealidad). La
                    retropropagación define un vector de <strong>error por capa</strong> {String.raw`\(\delta^{[l]}=\partial L/\partial \mathbf{z}^{[l]}\)`}
                    —cuánta responsabilidad del error carga la preactivación de esa capa— y lo calcula <strong>de atrás hacia adelante</strong> con tres reglas:
                </p>
                <Eq>{String.raw`$$ \delta^{[L]} = \nabla_{\mathbf{a}}L \;\odot\; \sigma'(\mathbf{z}^{[L]}) \qquad \text{(error en la salida)} $$`}</Eq>
                <Eq>{String.raw`$$ \delta^{[l]} = \big((\mathbf{W}^{[l+1]})^{\top}\delta^{[l+1]}\big)\;\odot\;\sigma'(\mathbf{z}^{[l]}) \qquad \text{(propagar hacia atrás)} $$`}</Eq>
                <Eq>{String.raw`$$ \frac{\partial L}{\partial \mathbf{W}^{[l]}} = \delta^{[l]}(\mathbf{a}^{[l-1]})^{\top}, \qquad \frac{\partial L}{\partial \mathbf{b}^{[l]}} = \delta^{[l]} $$`}</Eq>
                <p>
                    Es exactamente «el dominó», pero en matrices: {String.raw`\((\mathbf{W}^{[l+1]})^{\top}\delta^{[l+1]}\)`} reparte hacia atrás la
                    responsabilidad de la capa siguiente, y el producto de Hadamard {String.raw`\(\odot\,\sigma'(\mathbf{z}^{[l]})\)`} la multiplica por el
                    <strong> «factor de distorsión» local</strong> de la activación. Ese factor {String.raw`\(\sigma'(\mathbf{z}^{[l]})\)`} es la pieza decisiva: si es
                    pequeño, la señal se apaga capa a capa. <em>Es el mismo cálculo que ejecuta el laboratorio de abajo en cada época.</em>
                </p>
                <Box type="info" label="Conexión con el Capítulo 3">
                    Con <strong>salida sigmoide y pérdida BCE</strong> —el caso del laboratorio de clasificación— el primer renglón se simplifica
                    al elegante {String.raw`\(\delta^{[L]}=\hat{\mathbf{y}}-\mathbf{y}\)`}: la derivada de la sigmoide y la de la BCE se
                    cancelan. Por eso el «vector gigante de derivadas parciales» que dejó planteado el Capítulo 3 arranca, literalmente, de la diferencia
                    entre lo predicho y lo real.
                </Box>

                <Box type="warn" label="Cuando la cadena se apaga: el desvanecimiento del gradiente">
                    El ejemplo anterior muestra el caso extremo: una ReLU apagada (factor 0) corta la cadena y anula por completo el
                    gradiente. De forma más sutil, si la señal atraviesa muchas capas y cada una la multiplica por su factor local {String.raw`\(\sigma'(z)\)`}
                    <strong> menor que 1</strong> —la sigmoide, por ejemplo, tiene una derivada máxima de 0,25—, el producto encadenado
                    se vuelve diminuto y las primeras capas apenas aprenden: es el <strong>desvanecimiento del gradiente</strong>,
                    anticipado en el Capítulo 1. ReLU, con derivada igual a 1 en su zona activa, lo mitiga (aunque a cambio arriesga
                    «morir» si una neurona queda apagada).
                </Box>

                <Box type="danger" label="El gemelo opuesto: la explosión del gradiente">
                    Si en vez de atenuar, cada eslabón <strong>amplifica</strong> (factores locales mayores que 1, p. ej. pesos grandes), el
                    producto encadenado <strong>crece sin control</strong>: los gradientes explotan, los pesos saltan a {String.raw`\(\pm\infty\)`} y la
                    pérdida se vuelve <span className="inline-code">NaN</span>. Es típico de las redes recurrentes (Módulo 2). La cura habitual es el
                    <strong> recorte de gradiente</strong> (<em>gradient clipping</em>): si la norma del gradiente supera un umbral, se reescala hacia
                    abajo antes de dar el paso. <strong>Desvanecimiento</strong> y <strong>explosión</strong> son las dos caras de multiplicar muchos
                    factores en cadena: el primero los hace {String.raw`\(\to 0\)`}; el segundo, {String.raw`\(\to\infty\)`}.
                </Box>

                <h3>Retropropaga a mano: una mini-red de dos capas</h3>
                <p>
                    El cálculo se vuelve mecánico al aplicar la recursión. Antes de ver la linterna animarlo, conviene hacerlo a mano
                    <strong> una vez</strong> sobre la red más pequeña posible: una entrada, una neurona oculta (ReLU) y una salida lineal, con
                    pérdida {String.raw`\(L=(\hat{y}-y)^2\)`}.
                </p>
                <Reto titulo="Reto · Retropropagación a mano (2 capas)"
                    solucion={
                        <div className="space-y-2 text-[0.95rem]">
                            <p><strong>(a) Forward:</strong> {String.raw`\(z_1=w_1x+b_1=0{,}5\cdot2=1\)`}; {String.raw`\(a_1=\mathrm{ReLU}(1)=1\)`};
                                {String.raw`\(z_2=w_2a_1+b_2=2\cdot1=2\)`}; {String.raw`\(\hat{y}=z_2=2\)`}. Error {String.raw`\(L=(2-0)^2=4\)`}.</p>
                            <p><strong>(b) δ de salida:</strong> {String.raw`\(\delta_2=\dfrac{\partial L}{\partial z_2}=2(\hat{y}-y)=4\)`} (salida lineal).
                                Gradientes: {String.raw`\(\partial L/\partial w_2=\delta_2\,a_1=4\)`}, {String.raw`\(\partial L/\partial b_2=\delta_2=4\)`}.</p>
                            <p><strong>(c) Propagar a la oculta:</strong> {String.raw`\(\delta_1=(w_2\,\delta_2)\cdot\mathrm{ReLU}'(z_1)=(2\cdot4)\cdot1=8\)`}.
                                Gradientes: {String.raw`\(\partial L/\partial w_1=\delta_1\,x=16\)`}, {String.raw`\(\partial L/\partial b_1=\delta_1=8\)`}.</p>
                            <p style={{ color: '#B45309' }}><strong>Observa la recursión:</strong> {String.raw`\(\delta_1=w_2\,\delta_2\,\sigma'(z_1)\)`}. Si la
                                oculta fuera <strong>sigmoide</strong>, {String.raw`\(\sigma'(z_1)\approx0{,}20\)`} en vez de {String.raw`\(1\)`}, y {String.raw`\(\delta_1\)`}
                                caería de {String.raw`\(8\)`} a {String.raw`\(1{,}6\)`}: el <strong>desvanecimiento</strong>, visible en una sola capa.</p>
                            <p style={{ color: '#15803D' }}><strong>Un paso (η = 0,1):</strong> {String.raw`\(w_2\leftarrow2-0{,}1\cdot4=1{,}6\)`};
                                {String.raw`\(w_1\leftarrow0{,}5-0{,}1\cdot16=-1{,}1\)`}. ✓</p>
                        </div>
                    }>
                    Una mini-red con {String.raw`\(x=2\)`}, objetivo {String.raw`\(y=0\)`} y pesos {String.raw`\(w_1=0{,}5,\ b_1=0,\ w_2=2,\ b_2=0\)`}
                    (oculta ReLU, salida lineal). Calcula a mano: (a) el <strong>forward</strong> ({String.raw`\(z_1,a_1,z_2,\hat{y},L\)`}),
                    (b) {String.raw`\(\delta_2\)`} y {String.raw`\(\partial L/\partial w_2\)`}, y (c) propaga para hallar {String.raw`\(\delta_1\)`} y {String.raw`\(\partial L/\partial w_1\)`}.
                </Reto>
                <CodeBlock title="La misma retropropagación, en código (numpy)" code={backpropNumpy} />
                <MCQ
                    pregunta="En la recursión \(\delta^{[l]}=(W^{[l+1]})^\top\delta^{[l+1]}\odot\sigma'(z^{[l]})\), ¿qué factor explica el desvanecimiento del gradiente con sigmoide?"
                    opciones={[
                        { texto: 'El factor \\(\\sigma\'(z^{[l]})\\): la derivada de la sigmoide nunca supera 0,25, y multiplicarla capa tras capa encoge la señal.', correcta: true, justificacion: 'Cada capa añade un factor \\(\\sigma\'(z)\\le0{,}25\\); el producto encadenado de muchos factores menores que 1 tiende a cero.' },
                        { texto: 'La transpuesta \\((W^{[l+1]})^\\top\\), que invierte el signo del gradiente.', correcta: false },
                        { texto: 'El producto de Hadamard, que siempre anula los vectores.', correcta: false },
                    ]} />

                <h3>El mismo laboratorio, ahora con el flujo de gradientes encendido</h3>
                <p>
                    Es la <strong>misma red</strong> de los Capítulos 2 y 3, pero el diagrama inferior pasa a <strong>«modo linterna»</strong>:
                    primero la señal viaja <strong>hacia adelante</strong> (azul, de la entrada a la salida) y luego la <strong>responsabilidad
                    retropropaga</strong> (rosa, de la salida hacia la entrada). En la fase de retropropagación, el <strong>grosor de cada
                    capa es proporcional a la norma de su gradiente</strong>: así se <em>ve</em> qué capas reciben señal de aprendizaje y
                    cuáles apenas la perciben.
                </p>
                <RedFrontera chapter={4} />
                <Box type="tip" label="Qué conviene observar (desde el Capítulo 4)">
                    <ul>
                        <li>Con <strong>Sigmoide</strong> y varias <strong>capas ocultas</strong>, las flechas rosadas de la retropropagación
                            <strong> se apagan</strong> al acercarse a la entrada: es el <strong>desvanecimiento del gradiente</strong> en vivo —las
                            primeras capas casi no aprenden—.</li>
                        <li>Cambia a <strong>ReLU</strong>: el flujo hacia atrás llega <strong>mucho más brillante</strong> a las capas iniciales (su
                            derivada vale 1 en la zona activa).</li>
                        <li>La fase <strong>azul</strong> (predicción) siempre se completa <strong>antes</strong> de que empiece la fase <strong>rosa</strong>
                            (cálculo del gradiente): es el orden real <em>forward → backward</em>.</li>
                    </ul>
                </Box>

                <h3>Autograd en PyTorch</h3>
                <p>
                    Hace una década, los estudiantes derivaban estas fórmulas a mano. Hoy existe <strong>autograd</strong>. Al crear
                    un tensor con <span className="inline-code">requires_grad=True</span>, PyTorch asigna un «secretario invisible»
                    que registra cada operación. Al llamar <span className="inline-code">loss.backward()</span>, autograd lee la
                    bitácora de atrás hacia adelante y calcula todos los gradientes con la regla de la cadena, automáticamente.
                </p>
                <CodeBlock title="Autograd: derivación automática (PyTorch)" code={autogradTorch} lang="pytorch" />

                <Box type="info" label="¿Por qué «retro» y no fuerza bruta?">
                    Calcular el gradiente de cada peso por separado obligaría a recorrer la red una vez por parámetro: inviable con
                    millones de ellos. La retropropagación reutiliza, en una <strong>sola pasada hacia atrás</strong>, los valores ya
                    obtenidos en la pasada hacia adelante, y así produce el «vector gigante» de derivadas parciales —el que dejó
                    planteado el Capítulo 3— de forma <strong>eficiente</strong>. Conviene recordar que <span className="inline-code">backward()</span> solo
                    <strong> calcula</strong> ese vector; la actualización de los pesos corre por cuenta de <span className="inline-code">optimizer.step()</span>,
                    que se integra en el bucle de entrenamiento del Capítulo 5.
                </Box>

                <MCQ
                    pregunta="Si el gradiente de un peso es exactamente cero, entonces…"
                    opciones={[
                        { texto: 'cambiar ese peso no afecta (localmente) el error: el punto es estacionario.', correcta: true, justificacion: 'Gradiente cero significa pendiente plana; mover el peso no sube ni baja el error en ese punto, no hay dirección de mejora local.' },
                        { texto: 'el peso es el más importante de la red.', correcta: false },
                        { texto: 'la red ya alcanzó el óptimo global con certeza.', correcta: false },
                        { texto: 'hay un error de hardware.', correcta: false },
                    ]} />

                <MCQ
                    pregunta="¿Qué hace exactamente loss.backward() en PyTorch?"
                    opciones={[
                        { texto: 'Actualiza los pesos restando el gradiente.', correcta: false },
                        { texto: 'Calcula las derivadas del error respecto a cada parámetro, aplicando la regla de la cadena hacia atrás.', correcta: true, justificacion: 'backward() solo CALCULA gradientes; quien actualiza los pesos es optimizer.step().' },
                        { texto: 'Reinicia los gradientes a cero.', correcta: false },
                        { texto: 'Ejecuta el forward pass.', correcta: false },
                    ]} />

                <Quiz titulo="Mini-cuestionario · Capítulo 4" preguntas={[
                    {
                        pregunta: 'El "problema de asignación de crédito" se refiere a…',
                        opciones: [
                            { texto: 'determinar cuánto contribuyó cada neurona/peso al error total.', correcta: true },
                            { texto: 'repartir el presupuesto del proyecto.', correcta: false },
                            { texto: 'asignar tarjetas de crédito a los usuarios.', correcta: false },
                        ],
                        justificacion: 'Backpropagation resuelve este problema distribuyendo la "culpa" del error hacia atrás.'
                    },
                    {
                        pregunta: 'La retropropagación se fundamenta matemáticamente en…',
                        opciones: [
                            { texto: 'la regla de la cadena del cálculo diferencial.', correcta: true },
                            { texto: 'el teorema de Pitágoras.', correcta: false },
                            { texto: 'la regla de tres simple.', correcta: false },
                        ],

                    },
                    {
                        pregunta: 'En un grafo computacional, durante el forward pass fluye la predicción y durante el backward pass fluye…',
                        opciones: [
                            { texto: 'el gradiente (la responsabilidad del error).', correcta: true },

                    {

                        opciones: [
                            { texto: 'Crear el tensor con requires_grad=True.', correcta: true },
                            { texto: 'Llamar a print().', correcta: false },

                        justificacion: 'Con requires_grad=True, PyTorch registra cada operación para luego derivarla en backward().'
                    },
                ]} />
            </div>
        );

        /* Gráfica de curvas de aprendizaje (sobreajuste) */
        const CurvaAprendizajeChart = () => {
            usePlotly('chart-curvas', () => {

                const train = ep.map(e => 0.9 * Math.exp(-e / 22) + 0.04);

        const ConfusionMatrix = () => {

                        {cell('FP', 'Pasilla → Excelso. Daña la reputación de la marca.', '#FFFBEB', '#B45309')}
