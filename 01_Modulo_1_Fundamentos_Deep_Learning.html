                                <button onClick={limpiar} disabled={!hayCongelada} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${hayCongelada ? 'text-gray-700 bg-gray-100 hover:bg-gray-200' : 'text-gray-300 bg-gray-50 cursor-not-allowed'}`}><i className="fas fa-eraser mr-1"></i>Limpiar congelada</button>
                            </div>
                        </div>
                        {/* ---------- Lienzo + métricas ---------- */}
                        <div className="order-1 md:order-2">
                            <div className="rounded-xl overflow-hidden border border-gray-800 shadow-inner mx-auto" style={{ maxWidth: LIENZO }}>
                                <canvas ref={canvasRef} width={LIENZO} height={LIENZO} style={{ width: '100%', height: 'auto', display: 'block', background: '#0b0f1c' }} aria-label="Mapa de calor de la frontera de decisión" />
                            </div>
                            <div className="grid grid-cols-3 gap-2 mt-3">
                                {[
                                    { etq: 'Época', val: metricas.epoca, col: '#001A4D' },
                                    { etq: 'Pérdida (BCE)', val: isFinite(metricas.perdida) ? metricas.perdida.toFixed(4) : '—', col: '#ED1E79' },
                                    { etq: 'Precisión', val: `${Math.round(metricas.acc * 100)}%`, col: '#15803D' },
                                ].map(m => (
                                    <div key={m.etq} className="rounded-lg bg-bg border border-gray-200 px-2 py-1.5 text-center">
                                        <div className="text-[0.62rem] uppercase tracking-wide text-gray-400">{m.etq}</div>
                                        <div className="font-mono font-bold text-sm" style={{ color: m.col }}>{m.val}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="text-[0.7rem] text-gray-500 mt-2 flex flex-wrap items-center gap-x-3 gap-y-1 justify-center">
                                <span><span className="inline-block w-2.5 h-2.5 rounded-full align-middle mr-1" style={{ background: '#CBB6FF' }}></span>Clase 0</span>
                                <span><span className="inline-block w-2.5 h-2.5 rounded-full align-middle mr-1" style={{ background: '#FF9DC8' }}></span>Clase 1</span>
                                <span><span className="inline-block w-3 h-2 align-middle mr-1" style={{ background: '#D97706' }}></span>Frontera congelada</span>
                                <span className="text-gray-400">Arquitectura {sizes.join('→')} · {nParams.toLocaleString('es-CO')} parámetros</span>
                            </div>
                            {chapter >= 3 && (
                                <div className="mt-3 rounded-lg border border-gray-200 bg-white p-2">
                                    <div className="text-[0.7rem] font-bold text-navy mb-1 flex items-center gap-1"><i className="fas fa-chart-line text-secondary"></i>Curva de pérdida — la huella del descenso del gradiente</div>
                                    <canvas ref={curvaCanvasRef} width={360} height={120} style={{ width: '100%', height: 'auto', display: 'block' }} aria-label="Curva de la pérdida BCE a lo largo de las épocas de entrenamiento" />
                                </div>
                            )}
                        </div>
                    </div>
                    {/* ---------- Estado de la red: diagrama de neuronas + explicación de componentes ---------- */}
                    <div className="px-5 pb-5">
                        <div className="rounded-xl border border-gray-200 bg-bg overflow-hidden">
                            <div className="px-4 py-2 border-b border-gray-200 bg-white flex items-center gap-2 flex-wrap">
                                <i className="fas fa-diagram-project text-primary"></i>
                                <span className="text-xs font-bold text-navy">Estado de la red</span>
                                <span className="text-[0.7rem] text-gray-400">— {chapter === 4 ? 'el flujo recorre la red: azul hacia adelante, rosa la retropropagación' : 'las conexiones son los pesos; se reajustan en cada época de entrenamiento'}</span>
                            </div>
                            <div className="p-4 grid md:grid-cols-2 gap-4 items-center">
                                {/* Diagrama de neuronas y conexiones */}
                                <div className="rounded-lg border border-gray-200 bg-white p-2">
                                    <canvas ref={redCanvasRef} width={580} height={230} style={{ width: '100%', height: 'auto', display: 'block' }} aria-label="Diagrama de la red neuronal: neuronas por capa y conexiones (pesos)" />
                                    <div className="flex flex-wrap justify-center gap-x-3 gap-y-1 text-[0.68rem] text-gray-500 mt-1">
                                        {chapter === 4 ? (<>
                                            <span><span className="inline-block w-4 align-middle mr-1" style={{ borderTop: '3px solid #3b82f6' }}></span>Hacia adelante</span>
                                            <span><span className="inline-block w-4 align-middle mr-1" style={{ borderTop: '3px solid #ED1E79' }}></span>Retropropagación</span>
                                            <span className="text-gray-400">grosor ∝ gradiente de la capa</span>
                                        </>) : (<>
                                            <span><span className="inline-block w-4 align-middle mr-1" style={{ borderTop: '3px solid #7C4DC9' }}></span>Peso positivo</span>
                                            <span><span className="inline-block w-4 align-middle mr-1" style={{ borderTop: '3px solid #ED1E79' }}></span>Peso negativo</span>
                                            <span className="text-gray-400">grosor ∝ magnitud</span>
                                        </>)}
                                    </div>
                                </div>
                                {/* Explicación de cada componente */}
                                <div className="space-y-2 text-[0.8rem] text-gray-700">
                                    {[
                                        { ic: 'fa-right-to-bracket', col: '#001A4D', t: 'Capa de entrada', d: 'Dos neuronas: las coordenadas (x, y) de cada punto del plano.' },
                                        { ic: 'fa-layer-group', col: '#3D008D', t: 'Capas ocultas', d: 'Transforman los datos en características; más capas o nodos curvan más la frontera.' },
                                        { ic: 'fa-flag-checkered', col: '#15803D', t: 'Capa de salida', d: 'Una neurona con sigmoide: la probabilidad ŷ de pertenecer a la clase 1.' },
                                        { ic: 'fa-rotate', col: '#ED1E79', t: 'Época', d: 'Una pasada completa por todos los datos ajustando los pesos; el contador sube al entrenar.' },
                                        { ic: 'fa-snowflake', col: '#D97706', t: 'Congelar frontera', d: 'Guarda la frontera actual (banda dorada) y la fija para comparar el antes y el después de reentrenar.' },
                                    ].map(c => (
                                        <div key={c.t} className="flex gap-2.5 items-start">
                                            <span className="mt-0.5 flex-shrink-0 w-6 h-6 rounded-md flex items-center justify-center text-white text-xs" style={{ background: c.col }}><i className={`fas ${c.ic}`}></i></span>
                                            <span><strong className="text-navy">{c.t}:</strong> {c.d}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                    {chapter >= 5 && <FairnessAuditor preds={valPreds} costoFN={costoFN} setCostoFN={setCostoFN} />}
                </div>
            );
        };

        /* ============================================================
           INTERPOLADOR DE CURVA 1D (Cap. 2): regresión con red desde cero.
           El estudiante coloca/arrastra puntos (x, y) y la red ajusta una
           curva y=f(x). Salida LINEAL, pérdida MSE, optimizador Adam.
           La activación de las ocultas cambia la forma: ReLU (quebrada) vs
           Tanh/Sigmoide (suave). Lienzo claro: es una gráfica de función.
        ============================================================ */
        const InterpoladorCurva = () => {
            const [nCapas, setNCapas] = useState(2);
            const [nNodos, setNNodos] = useState(10);
            const [activacion, setActivacion] = useState('tanh');
            const [lrExp, setLrExp] = useState(0.62);            // 0..1 -> lr logarítmico
            const [corriendo, setCorriendo] = useState(false);
            const [metricas, setMetricas] = useState({ epoca: 0, mse: NaN });

            const lr = Math.pow(10, -3 + 3 * lrExp);             // 0.001 .. 1.0

            const canvasRef = useRef(null);
            const datosRef = useRef([]);
            const redRef = useRef(null);
            const animRef = useRef(null);
            const corriendoRef = useRef(false);
            const epocaRef = useRef(0);
            const lrRef = useRef(lr);
            const dragRef = useRef(null);

            const LW = 560, LH = 320;
            const DX0 = -1.05, DX1 = 1.05, DY0 = -1.18, DY1 = 1.18;   // dominio de visualización

            // Activaciones (ocultas); la salida es LINEAL
            const sigmoide = (z) => 1 / (1 + Math.exp(-z));
            const activar = { relu: (z) => Math.max(0, z), tanh: (z) => Math.tanh(z), sigmoide };
            const dActivar = { relu: (a) => (a > 0 ? 1 : 0), tanh: (a) => 1 - a * a, sigmoide: (a) => a * (1 - a) };
            const gauss = () => { let u = 0, v = 0; while (u === 0) u = Math.random(); while (v === 0) v = Math.random(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); };

            // Puntos de ejemplo (una onda)
            const puntosEjemplo = () => {
                const pts = [];
                for (let i = 0; i < 9; i++) { const x = -0.9 + i * 0.225; pts.push({ x: +x.toFixed(3), y: +(0.55 * Math.sin(x * 3.0)).toFixed(3) }); }
                return pts;
            };

            // Construir red [1, oculta..., 1] con momentos de Adam
            const crearRed = () => {
                const sizes = [1]; for (let i = 0; i < nCapas; i++) sizes.push(nNodos); sizes.push(1);
                const W = [], b = [], mW = [], vW = [], mB = [], vB = [];
                for (let l = 1; l < sizes.length; l++) {
                    const fi = sizes[l - 1], fo = sizes[l];
                    const esRelu = activacion === 'relu' && l < sizes.length - 1;
                    const std = Math.sqrt((esRelu ? 2 : 1) / fi);
                    const Wl = [], bl = [], mWl = [], vWl = [], mBl = [], vBl = [];
                    for (let j = 0; j < fo; j++) {
                        const f = [], mf = [], vf = [];
                        for (let i = 0; i < fi; i++) { f.push(gauss() * std); mf.push(0); vf.push(0); }
                        Wl.push(f); mWl.push(mf); vWl.push(vf); bl.push(0); mBl.push(0); vBl.push(0);
                    }
                    W.push(Wl); b.push(bl); mW.push(mWl); vW.push(vWl); mB.push(mBl); vB.push(vBl);
                }
                return { sizes, W, b, act: activacion, mW, vW, mB, vB, t: 0 };
            };

            // Forward pass (la capa de salida NO lleva activación)
            const adelante = (red, x0) => {
                let a = [x0]; const acts = [a];
                for (let l = 0; l < red.W.length; l++) {
                    const esSalida = l === red.W.length - 1;
                    a = red.b[l].map((bj, j) => {
                        let z = bj; const wj = red.W[l][j];
                        for (let i = 0; i < acts[l].length; i++) z += wj[i] * acts[l][i];
                        return esSalida ? z : activar[red.act](z);
                    });
                    acts.push(a);
                }
                return acts;
            };

            const salida = (red, x0) => adelante(red, x0)[red.W.length][0];

            // Backward pass + actualización con Adam (pérdida MSE)
            const entrenarPaso = (red, datos, tasa) => {
                const { W, b } = red;
                const gW = W.map(Wl => Wl.map(r => r.map(() => 0)));
                const gB = b.map(bl => bl.map(() => 0));
                for (const p of datos) {
                    const acts = adelante(red, p.x);
                    let delta = [acts[acts.length - 1][0] - p.y];   // MSE + salida lineal -> (ŷ - y)
                    for (let l = W.length - 1; l >= 0; l--) {
                        const aPrev = acts[l];
                        for (let j = 0; j < W[l].length; j++) {
                            gB[l][j] += delta[j];
                            for (let i = 0; i < aPrev.length; i++) gW[l][j][i] += delta[j] * aPrev[i];
                        }
                        if (l > 0) {
                            const nuevo = new Array(aPrev.length).fill(0);
                            for (let i = 0; i < aPrev.length; i++) {
                                let s = 0; for (let j = 0; j < W[l].length; j++) s += delta[j] * W[l][j][i];
                                nuevo[i] = s * dActivar[red.act](aPrev[i]);
                            }
                            delta = nuevo;
                        }
                    }
                }
                // Paso de Adam (corrige el sesgo de los momentos)
                const N = datos.length, b1 = 0.9, b2 = 0.999, eps = 1e-8;
                red.t++; const cb1 = 1 - Math.pow(b1, red.t), cb2 = 1 - Math.pow(b2, red.t);
                for (let l = 0; l < W.length; l++)
                    for (let j = 0; j < W[l].length; j++) {
                        let g = gB[l][j] / N;
                        red.mB[l][j] = b1 * red.mB[l][j] + (1 - b1) * g;
                        red.vB[l][j] = b2 * red.vB[l][j] + (1 - b2) * g * g;
                        b[l][j] -= tasa * (red.mB[l][j] / cb1) / (Math.sqrt(red.vB[l][j] / cb2) + eps);
                        for (let i = 0; i < W[l][j].length; i++) {
                            g = gW[l][j][i] / N;
                            red.mW[l][j][i] = b1 * red.mW[l][j][i] + (1 - b1) * g;
                            red.vW[l][j][i] = b2 * red.vW[l][j][i] + (1 - b2) * g * g;
                            W[l][j][i] -= tasa * (red.mW[l][j][i] / cb1) / (Math.sqrt(red.vW[l][j][i] / cb2) + eps);
                        }
                    }
            };

            const errorCuadratico = (red, datos) => {
                if (!datos.length) return NaN;
                let s = 0; for (const p of datos) s += (salida(red, p.x) - p.y) ** 2; return s / datos.length;
            };

            const toPx = (wx, wy) => [(wx - DX0) / (DX1 - DX0) * LW, (DY1 - wy) / (DY1 - DY0) * LH];

            const pintar = () => {
                const cv = canvasRef.current, red = redRef.current;
                if (!cv || !red) return;
                const ctx = cv.getContext('2d');
                ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, LW, LH);
                // rejilla
                ctx.strokeStyle = '#EEE9F6'; ctx.lineWidth = 1;
                for (let gx = -1; gx <= 1.001; gx += 0.25) { const [px] = toPx(gx, 0); ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, LH); ctx.stroke(); }
                for (let gy = -1; gy <= 1.001; gy += 0.25) { const [, py] = toPx(0, gy); ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(LW, py); ctx.stroke(); }
                // ejes
                const [px0, py0] = toPx(0, 0);
                ctx.strokeStyle = '#D9D2EA'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(0, py0); ctx.lineTo(LW, py0); ctx.moveTo(px0, 0); ctx.lineTo(px0, LH); ctx.stroke();
                // residuos: línea punteada de cada punto a la curva (lo que minimiza el MSE)
                ctx.strokeStyle = 'rgba(100,116,139,0.5)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                for (const p of datosRef.current) {
                    const [px, py] = toPx(p.x, p.y); const [, pyf] = toPx(p.x, salida(red, p.x));
                    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, pyf); ctx.stroke();
                }
                ctx.setLineDash([]);
                // curva ajustada por la red
                ctx.strokeStyle = '#ED1E79'; ctx.lineWidth = 2.6; ctx.beginPath();
                for (let s = 0; s <= 240; s++) {
                    const wx = DX0 + (DX1 - DX0) * s / 240;
                    const wy = Math.max(DY0 - 1, Math.min(DY1 + 1, salida(red, wx)));
                    const [px, py] = toPx(wx, wy);
                    if (s === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.stroke();
                // puntos (arrastrables)
                datosRef.current.forEach((p, idx) => {
                    const [px, py] = toPx(p.x, p.y);
                    ctx.beginPath(); ctx.arc(px, py, idx === dragRef.current ? 8 : 6, 0, 2 * Math.PI);
                    ctx.fillStyle = idx === dragRef.current ? '#FDB913' : '#3D008D';
                    ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                });
            };

            const bucle = () => {
                const red = redRef.current;
                if (!red || !corriendoRef.current) return;
                for (let s = 0; s < 5; s++) { entrenarPaso(red, datosRef.current, lrRef.current); epocaRef.current++; }
                pintar();
                setMetricas({ epoca: epocaRef.current, mse: errorCuadratico(red, datosRef.current) });
                if (corriendoRef.current) animRef.current = requestAnimationFrame(bucle);
            };
            const detener = () => { corriendoRef.current = false; setCorriendo(false); if (animRef.current) cancelAnimationFrame(animRef.current); };
            const alternar = () => { if (corriendoRef.current) { detener(); return; } corriendoRef.current = true; setCorriendo(true); animRef.current = requestAnimationFrame(bucle); };
            const reconstruir = () => { detener(); redRef.current = crearRed(); epocaRef.current = 0; setMetricas({ epoca: 0, mse: errorCuadratico(redRef.current, datosRef.current) }); pintar(); };
            const ejemplo = () => { datosRef.current = puntosEjemplo(); reconstruir(); };
            const borrarUltimo = () => { if (datosRef.current.length > 2) { datosRef.current.pop(); pintar(); setMetricas(m => ({ ...m, mse: errorCuadratico(redRef.current, datosRef.current) })); } };

            // Interacción: clic para añadir, arrastrar para mover
            const eventoMundo = (e) => {
                const cv = canvasRef.current, rect = cv.getBoundingClientRect();
                const px = (e.clientX - rect.left) * (LW / rect.width);
                const py = (e.clientY - rect.top) * (LH / rect.height);
                return { px, py, wx: DX0 + px / LW * (DX1 - DX0), wy: DY1 - py / LH * (DY1 - DY0) };
            };
            const clamp = (v) => Math.max(-1, Math.min(1, v));
            const onDown = (e) => {
                e.preventDefault();
                const { px, py, wx, wy } = eventoMundo(e);
                let idx = -1, mejor = 196;   // radio de captura 14px
                datosRef.current.forEach((p, i) => { const [qx, qy] = toPx(p.x, p.y); const d = (qx - px) ** 2 + (qy - py) ** 2; if (d < mejor) { mejor = d; idx = i; } });
                if (idx === -1 && datosRef.current.length < 24) { datosRef.current.push({ x: clamp(wx), y: clamp(wy) }); idx = datosRef.current.length - 1; }
                dragRef.current = idx >= 0 ? idx : null;
                if (e.pointerId != null && e.target.setPointerCapture) { try { e.target.setPointerCapture(e.pointerId); } catch (_) { } }
                pintar();
            };
            const onMove = (e) => {
                if (dragRef.current == null) return;
                const { wx, wy } = eventoMundo(e);
                datosRef.current[dragRef.current] = { x: clamp(wx), y: clamp(wy) };
                if (!corriendoRef.current) pintar();
            };
            const onUp = () => { dragRef.current = null; pintar(); };

            useEffect(() => { datosRef.current = puntosEjemplo(); reconstruir(); }, []);
            useEffect(() => { reconstruir(); }, [nCapas, nNodos, activacion]);
            useEffect(() => { lrRef.current = lr; }, [lr]);
            useEffect(() => () => { corriendoRef.current = false; if (animRef.current) cancelAnimationFrame(animRef.current); }, []);

            const pill = (a) => `px-3 py-1 rounded-full text-xs font-bold transition-all ${a ? 'usta-gradient text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;

            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border border-primary/15 bg-white not-prose">
                    <div className="usta-gradient px-5 py-3 flex items-center gap-3">
                        <span className="bg-white/20 rounded-lg p-2 text-white flex items-center justify-center flex-shrink-0"><i className="fas fa-bezier-curve"></i></span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">Interpolador de curvas</div>
                            <div className="text-white/80 text-xs">La red ajusta y = f(x) a los puntos; la activación cambia la forma</div>
                        </div>
                    </div>
                    <div className="p-5">
                        <p className="text-xs text-gray-500 mb-2"><i className="fas fa-hand-pointer mr-1"></i>Un clic en el lienzo <strong>añade</strong> un punto; al <strong>arrastrarlo</strong> se desplaza. La salida es lineal y la pérdida es el error cuadrático medio (MSE).</p>
                        <div className="rounded-xl overflow-hidden border border-gray-200 shadow-inner">
                            <canvas ref={canvasRef} width={LW} height={LH}
                                onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
                                style={{ width: '100%', height: 'auto', display: 'block', background: '#fff', touchAction: 'none', cursor: 'pointer' }}
                                aria-label="Lienzo de interpolación: puntos arrastrables y la curva ajustada por la red" />
                        </div>
                        <div className="flex flex-wrap items-center justify-center gap-x-4 gap-y-1 text-[0.7rem] text-gray-500 mt-2">
                            <span><span className="inline-block w-2.5 h-2.5 rounded-full align-middle mr-1" style={{ background: '#3D008D' }}></span>Puntos</span>
                            <span><span className="inline-block w-5 align-middle mr-1" style={{ borderTop: '3px solid #ED1E79' }}></span>Curva de la red</span>
                            <span><span className="inline-block w-5 align-middle mr-1" style={{ borderTop: '2px dashed #94A3B8' }}></span>Residuos (MSE)</span>
                        </div>

                        <div className="grid sm:grid-cols-2 gap-4 mt-4">
                            <div className="space-y-3">
                                <div>
                                    <div className="text-xs font-semibold text-gray-500 mb-1.5">Activación (capas ocultas)</div>
                                    <div className="flex gap-2">
                                        {['relu', 'tanh', 'sigmoide'].map(k => (
                                            <button key={k} onClick={() => setActivacion(k)} className={pill(activacion === k)}>{k === 'relu' ? 'ReLU' : k === 'tanh' ? 'Tanh' : 'Sigmoide'}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1"><span>Tasa de aprendizaje</span><span className="text-secondary">{lr < 0.01 ? lr.toFixed(4) : lr.toFixed(3)}</span></div>
                                    <input type="range" min="0" max="1" step="0.01" value={lrExp} onChange={e => setLrExp(+e.target.value)} className="usta-range" aria-label="Tasa de aprendizaje (escala logarítmica)" />
                                </div>
                            </div>
                            <div className="space-y-3">
                                <div>
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1"><span>Capas ocultas</span><span className="text-primary">{nCapas}</span></div>
                                    <input type="range" min="1" max="3" step="1" value={nCapas} onChange={e => setNCapas(+e.target.value)} className="usta-range" aria-label="Número de capas ocultas" />
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1"><span>Nodos por capa</span><span className="text-primary">{nNodos}</span></div>
                                    <input type="range" min="1" max="16" step="1" value={nNodos} onChange={e => setNNodos(+e.target.value)} className="usta-range" aria-label="Nodos por capa oculta" />
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-2 mt-4">
                            <button onClick={alternar} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white usta-gradient shadow hover:opacity-90 transition">
                                <i className={`fas ${corriendo ? 'fa-pause' : 'fa-play'} mr-1`}></i>{corriendo ? 'Pausar' : (metricas.epoca > 0 ? 'Reanudar' : 'Entrenar')}
                            </button>
                            <button onClick={reconstruir} className="px-3 py-1.5 rounded-lg text-xs font-bold text-primary bg-gray-100 hover:bg-gray-200 transition"><i className="fas fa-rotate-left mr-1"></i>Reiniciar pesos</button>
                            <button onClick={ejemplo} className="px-3 py-1.5 rounded-lg text-xs font-bold text-primary bg-gray-100 hover:bg-gray-200 transition"><i className="fas fa-wave-square mr-1"></i>Puntos de ejemplo</button>
                            <button onClick={borrarUltimo} className="px-3 py-1.5 rounded-lg text-xs font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition"><i className="fas fa-delete-left mr-1"></i>Borrar último</button>
                            <div className="ml-auto flex gap-2">
                                <span className="rounded-lg bg-bg border border-gray-200 px-2.5 py-1 text-center"><span className="text-[0.62rem] uppercase tracking-wide text-gray-400 mr-1">Época</span><span className="font-mono font-bold text-sm text-navy">{metricas.epoca}</span></span>
                                <span className="rounded-lg bg-bg border border-gray-200 px-2.5 py-1 text-center"><span className="text-[0.62rem] uppercase tracking-wide text-gray-400 mr-1">MSE</span><span className="font-mono font-bold text-sm" style={{ color: '#ED1E79' }}>{isFinite(metricas.mse) ? metricas.mse.toFixed(4) : '—'}</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Cap2Section = () => (
            <div className="prose-usta">
                <p>
                    El Perceptrón Multicapa (MLP) es la arquitectura de red neuronal más básica y fundamental. Aunque hoy
                    existen arquitecturas especializadas (CNN para imágenes, RNN para secuencias, Transformers para lenguaje),
                    comprender el MLP es esencial: en él se manifiestan, en su forma más pura, las neuronas, las funciones de
                    activación, la propagación de señales y los gradientes. <strong>Quien comprende un MLP domina los
                        fundamentos que sostienen la mayor parte del aprendizaje profundo moderno.</strong>
                </p>

                <Box type="info" label="Lo que se aprenderá en este capítulo">
                    <ul>
                        <li>Por qué los problemas reales son <strong>no lineales</strong> y por qué una sola recta no basta.</li>
                        <li>La <strong>anatomía de una neurona</strong> (suma ponderada + sesgo + activación) y cómo encadenarla en capas.</li>
                        <li>Cómo una <strong>capa oculta</strong> resuelve el XOR y qué dice el <strong>Teorema de Aproximación Universal</strong>.</li>
                        <li>Qué <strong>función de activación</strong> usar en cada caso y cómo cuesta una red en <strong>parámetros</strong>.</li>
                    </ul>
                </Box>

                <h3>La ilusión de la línea recta</h3>
                <p>
                    Considérese a un agrónomo de la Zona Cafetera que predice la calidad de la variedad Castillo a partir de la
                    lluvia y las horas de sol. Trazar una recta entre «más sol» y «mejor calidad» llevaría a un error: poca exposición
                    favorece hongos, pero el exceso quema las hojas. La relación real es una <strong>curva con un punto óptimo</strong>,
                    como la cima de una montaña. La realidad colombiana —geográfica, social, ecológica— es intrínsecamente no lineal.
                </p>

                <h3>Anatomía de una neurona</h3>
                <p>Una neurona artificial es, en esencia, una regresión lineal envuelta en una función de decisión:</p>
                <Eq>{String.raw`$$ y = \sigma\!\left(\sum_{i=1}^{n} w_i x_i + b\right) = \sigma(\mathbf{w}^\top \mathbf{x} + b) $$`}</Eq>
                <ul>
                    <li>{String.raw`\(\mathbf{x} = [x_1, \dots, x_n]^\top\)`} son los datos (ej. reflectancia de una hoja de café).</li>
                    <li>{String.raw`\(\mathbf{w}\)`} (pesos) indican la <strong>importancia</strong> de cada dato; entrenar es hallar los {String.raw`\(w\)`} correctos.</li>
                    <li>{String.raw`\(b\)`} (sesgo) <strong>desplaza la frontera de decisión</strong>: sube o baja el umbral de activación sin depender de las entradas (como el término independiente de una recta).</li>
                    <li>{String.raw`\(\sigma\)`} (función de activación) es la que <strong>rompe la linealidad</strong>.</li>
                </ul>
                <NeuronaSVG />
                <CodeBlock title="Una neurona en numpy" code={neuronaNumpy} />

                <h4>Una neurona, paso a paso</h4>
                <p>En resumen, toda neurona ejecuta <strong>dos pasos</strong> encadenados:</p>
                <ol>
                    <li><strong>Suma ponderada:</strong> combina las entradas y el sesgo en un solo número, {String.raw`\(z = \mathbf{w}^\top \mathbf{x} + b\)`}</li>
                    <li><strong>Activación:</strong> pasa ese número por la función no lineal para obtener la salida, {String.raw`\(a = \sigma(z)\)`}</li>
                </ol>
                <p>
                    <strong>¿Para qué sirve?</strong> Esta herramienta permite ver —sin escribir código— cómo cada parámetro
                    de una neurona influye en su salida. Al mover los <strong>pesos</strong> y el <strong>sesgo</strong>
                    y cambiar la <strong>activación</strong>, se observa cómo varían la suma ponderada y la salida en tiempo real.
                </p>
                <NeuronaInteractiva />
                <Box type="tip" label="Qué se debe concluir">
                    <p>Tras experimentar, se puede afirmar que:</p>
                    <ul>
                        <li><strong>El peso es importancia:</strong> cuanto más grande es un peso (en valor absoluto), más influye su entrada en el resultado; un peso cercano a cero vuelve casi irrelevante a esa entrada.</li>
                        <li><strong>El signo manda:</strong> un peso positivo aumenta la suma ponderada; uno negativo, la reduce.</li>
                        <li><strong>El sesgo desplaza todo:</strong> sube o baja la salida por igual, sin depender de las entradas (es el umbral base).</li>
                        <li><strong>La activación da forma a la salida:</strong> ReLU convierte en cero cualquier valor negativo (la neurona se «apaga»), la Sigmoide comprime el resultado a (0, 1) y la Tanh a (−1, 1).</li>
                        <li><strong>Idea de fondo:</strong> una neurona no es una caja negra, sino una fórmula simple y transparente. «Aprender» será, precisamente, encontrar los pesos y el sesgo adecuados — el tema de los capítulos 3 y 4.</li>
                    </ul>
                </Box>

                <Box type="warn" label="Limitación del perceptrón simple">
                    Una sola capa solo traza una frontera recta: no resuelve el XOR. Es como intentar separar agua y tierra en
                    un mapa del Chocó con una única línea recta, imposible dada su intrincada red de ríos.
                </Box>

                <h3>El poder de la capa oculta</h3>
                <p>
                    La solución es introducir <strong>capas ocultas</strong> entre la entrada y la salida. Considérese la
                    aprobación de un subsidio agrícola:
                </p>
                <Pipeline steps={[
                    { num: 1, title: 'Ventanilla (entrada)', desc: 'Recibe documentos crudos: cédula, escrituras, facturas.' },
                    { num: 2, title: 'Analistas (oculta)', desc: 'Transforman "papeles" en conceptos: ¿predio legal? ¿riesgo?' },
                    { num: 3, title: 'Director (salida)', desc: 'Decide: otorgar o no el subsidio.' },
                ]} />
                <p>
                    En la detección de minería ilegal con imágenes satelitales, las capas aprenden representaciones jerárquicas:
                    la primera detecta bordes; la segunda, formas (balsas de sedimentación); la tercera, patrones complejos
                    (agua turbia asociada a la actividad minera). Ninguna concluye sola «esto es minería», pero juntas construyen
                    la evidencia.
                </p>
                <MLPDiagram />
                <p>
                    Ese flujo de izquierda a derecha se llama <strong>propagación hacia adelante</strong> (<em>forward propagation</em>).
                    En forma matricial, la activación de cada capa {String.raw`\(l\)`} se calcula a partir de la anterior:
                </p>
                <Eq>{String.raw`$$ \mathbf{a}^{[l]} = \sigma\!\left( \mathbf{W}^{[l]}\,\mathbf{a}^{[l-1]} + \mathbf{b}^{[l]} \right) $$`}</Eq>
                <p>
                    donde {String.raw`\(\mathbf{W}^{[l]}\)`} agrupa los pesos de la capa, {String.raw`\(\mathbf{b}^{[l]}\)`} sus sesgos
                    y {String.raw`\(\mathbf{a}^{[0]} = \mathbf{x}\)`} son los datos de entrada: <strong>la salida de una capa es la entrada de la siguiente</strong>.
                </p>

                <h3>Cómo una capa oculta resuelve el XOR</h3>
                <p>
                    En el Capítulo 1 se comprobó que una sola recta no puede separar el XOR. La solución del MLP es elegante:
                    usar <strong>dos neuronas ocultas</strong>, cada una con su propia recta, y una <strong>neurona de salida</strong>
                    que las combina. Al avanzar paso a paso se observa cómo el problema imposible se vuelve resoluble:
                </p>
                <XorMLP />
                <p>
                    La capa oculta transforma un problema no separable en uno resoluble: <strong>combina fronteras lineales simples
                        para delimitar una región no lineal</strong>. Este es, en esencia, el mecanismo que el Teorema de Aproximación
                    Universal generaliza a cualquier función continua.
                </p>

                <TeoremaAproximacion />

                <h3>Interpolar puntos: la red como función</h3>
                <p>
                    El Teorema garantiza que una red puede aproximar cualquier función continua; aquí puede comprobarse de
                    forma directa. En el siguiente laboratorio se colocan puntos en el plano y una red de <strong>regresión</strong>
                    (salida lineal, pérdida del error cuadrático medio) ajusta la curva <em>y = f(x)</em> que mejor los explica.
                    Al cambiar la <strong>función de activación</strong> se observa un contraste revelador: <strong>ReLU</strong>
                    teje la curva con tramos rectos (es poligonal), mientras <strong>Tanh</strong> y <strong>Sigmoide</strong>
                    producen curvas suaves.
                </p>
                <InterpoladorCurva />
                <Box type="tip" label="Qué conviene observar en la curva">
                    <ul>
                        <li><strong>La activación moldea la curva:</strong> ReLU → quebrada (tramos rectos); Tanh/Sigmoide → suave. Es el mismo efecto del catálogo que sigue, pero visible sobre la función aprendida.</li>
                        <li><strong>Más neuronas = más flexibilidad:</strong> con pocos nodos la curva es rígida; con muchos puede pasar casi exactamente por todos los puntos… y empezar a <em>serpentear</em> entre ellos (sobreajuste, Capítulo 5).</li>
                        <li><strong>Los residuos</strong> (líneas punteadas de cada punto a la curva) son justo lo que el error cuadrático medio minimiza.</li>
                        <li><strong>En los extremos</strong> se aprecia la extrapolación: ReLU continúa recto; Tanh y Sigmoide se aplanan (saturan).</li>
                    </ul>
                </Box>

                <h3>Catálogo de funciones de activación</h3>
                <p>
                    Sin no linealidades, apilar capas es inútil: la composición de transformaciones lineales sigue siendo lineal.
                    Las activaciones introducen las «curvas» y «quiebres» necesarios.
                </p>
                <ActivacionesChart />
                <Accordion items={[
                    { titulo: 'ReLU — el estándar moderno', contenido: <span>{String.raw`\(f(z)=\max(0,z)\)`}. Rango {String.raw`\([0,\infty)\)`}. Muy rápida (solo una comparación) y mitiga el desvanecimiento del gradiente. Riesgo: «dying ReLU» (neuronas atascadas en 0). Es el «portero» que deja pasar lo positivo y anula lo negativo.</span> },
                    { titulo: 'Leaky ReLU', contenido: <span>{String.raw`\(\text{LeakyReLU}(z)=\max(0.01z,\,z)\)`}. Permite una pequeña pendiente negativa para que las neuronas nunca tengan gradiente nulo: corrige el «dying ReLU».</span> },
                    { titulo: 'Sigmoide', contenido: <span>{String.raw`\(\sigma(z)=\frac{1}{1+e^{-z}}\)`}. Rango {String.raw`\((0,1)\)`}, interpretable como probabilidad. Hoy se reserva para la capa de salida en clasificación binaria. Sufre desvanecimiento (derivada máxima 0,25).</span> },
                    { titulo: 'Tanh', contenido: <span>{String.raw`\(\tanh(z)=\frac{e^z-e^{-z}}{e^z+e^{-z}}\)`}. Rango {String.raw`\((-1,1)\)`}, centrada en cero (ayuda a converger). También satura en los extremos. Usada internamente en LSTM/GRU.</span> },
                    { titulo: 'Softmax', contenido: <span>{String.raw`\(\text{softmax}(\mathbf{z})_i=\frac{e^{z_i}}{\sum_j e^{z_j}}\)`}. Convierte {String.raw`\(K\)`} logits en probabilidades que suman 1. Capa de salida para clasificación multiclase (ej. {`{café, plátano, yuca, maíz}`}).</span> },
                ]} />

                <MCQ
                    pregunta="¿Por qué un MLP necesita funciones de activación no lineales entre sus capas?"
                    opciones={[
                        { texto: 'Para acelerar el cómputo en la GPU.', correcta: false },
                        { texto: 'Porque sin ellas, apilar capas lineales equivale a una sola transformación lineal (no aporta poder expresivo).', correcta: true, justificacion: 'La composición de funciones lineales es lineal; la no linealidad es lo que permite modelar curvas y resolver problemas como el XOR.' },
                        { texto: 'Para normalizar los datos de entrada.', correcta: false },
                        { texto: 'Para reducir el número de parámetros.', correcta: false },
                    ]} />

                <h4>Reglas prácticas de selección</h4>
                <div className="overflow-x-auto">
                    <table>
                        <thead><tr><th>Ubicación</th><th>Activación recomendada</th></tr></thead>
                        <tbody>
                            <tr><td>Capas ocultas</td><td>ReLU (o Leaky ReLU si hay «dying ReLU»)</td></tr>
                            <tr><td>Salida — regresión</td><td>Lineal (sin activación)</td></tr>
                            <tr><td>Salida — clasificación binaria</td><td>Sigmoide</td></tr>
                            <tr><td>Salida — clasificación multiclase</td><td>Softmax</td></tr>
                        </tbody>
                    </table>
                </div>

                <MCQ
                    pregunta="Para la capa de salida de un clasificador de 4 especies de cultivo, ¿qué activación corresponde?"
                    opciones={[
                        { texto: 'Sigmoide.', correcta: false },
                        { texto: 'ReLU.', correcta: false },
                        { texto: 'Softmax.', correcta: true, justificacion: 'Con 3 o más clases mutuamente excluyentes, Softmax produce una distribución de probabilidad que suma 1 sobre las K clases.' },
                        { texto: 'Lineal.', correcta: false },
                    ]} />

                <CodeBlock title="Un MLP en PyTorch (ilustrativo)" code={mlpTorch} lang="pytorch" />

                <Box type="tip" label="¿Cuántos parámetros tiene esa red?">
                    <p>Cada capa lineal aporta <em>pesos</em> (entradas × neuronas) + <em>sesgos</em> (uno por neurona). Para la red 4 → 16 → 8 → 1:</p>
                    <Eq>{String.raw`$$ \underbrace{(4{\times}16+16)}_{80} + \underbrace{(16{\times}8+8)}_{136} + \underbrace{(8{\times}1+1)}_{9} = 225 \text{ parámetros} $$`}</Eq>
                    <p className="!mb-0">Son justamente los {String.raw`\(w\)`} y {String.raw`\(b\)`} que el entrenamiento ajustará. <strong>Profundidad vs. anchura:</strong> el Teorema garantiza que <em>basta</em> una capa oculta, pero apilar varias capas suele lograr el mismo poder con <strong>muchos menos parámetros</strong> (por eso «deep» learning).</p>
                </Box>

                <h3>Laboratorio: la arquitectura en acción</h3>
                <p>
                    Las ideas anteriores —capas, nodos y activaciones— cobran sentido al verlas operar sobre datos. El
                    siguiente laboratorio entrena, <strong>desde cero y dentro del navegador</strong> (sin librerías de aprendizaje

        /* ============================================================
           CAPÍTULO 3 — MATEMÁTICA DEL ERROR Y OPTIMIZACIÓN

        const sgdNumpy = `import numpy as np

# Descenso del gradiente sobre L(theta) = theta^2 (un "valle" simple)
# El gradiente es dL/dtheta = 2*theta
theta = 2.7        # punto inicial (en lo alto de la montaña)
eta   = 0.22       # tasa de aprendizaje (tamaño del paso)

for paso in range(9):
    grad  = 2 * theta              # pendiente en el punto actual
    theta = theta - eta * grad     # paso en dirección OPUESTA al gradiente
    print(f"paso {paso}: theta={theta:.3f}  error={theta**2:.4f}")
# theta se acerca a 0 (el valle), donde el error es mínimo.`;

        const optimTorch = `import torch

# Optimizadores en PyTorch: SGD con momentum vs. Adam
opt_sgd  = torch.optim.SGD(modelo.parameters(), lr=0.01, momentum=0.9)
opt_adam = torch.optim.Adam(modelo.parameters(), lr=0.001)
# momentum=0.9 acumula "inercia" de los gradientes previos: baja más recto
# y atraviesa pequeños baches (ruido del mini-batch) sin desviarse.`;

        const regresLosses = `import torch.nn as nn

# Tres pérdidas de regresión, listas para el bucle de entrenamiento
mse   = nn.MSELoss()             # error cuadrático medio: sensible a atípicos
mae   = nn.L1Loss()              # error absoluto medio: robusto a atípicos
huber = nn.HuberLoss(delta=1.0)  # cuadrática si |error| <= delta, lineal si no

perdida = huber(pred, objetivo)  # se elige UNA según la naturaleza de los datos`;

        /* Playground interactivo: efecto de la tasa de aprendizaje (η) */
        const LRPlayground = () => {
            const [lr, setLr] = useState(0.20);

                const x = []; for (let i = -3; i <= 3; i += 0.05) x.push(+i.toFixed(2));
                let p = 2.7; const px = [p], py = [p * p];
                for (let k = 0; k < 16; k++) {
                    p = p - lr * (2 * p);                 // L(θ)=θ²  ->  grad = 2θ
                    if (!isFinite(p) || Math.abs(p) > 6) { px.push(p > 0 ? 6 : -6); py.push(36); break; }
                    px.push(+p.toFixed(3)); py.push(+(p * p).toFixed(3));
                }
                return [
                    { x, y: x.map(v => v * v), name: 'Costo L(θ)', line: { color: '#3D008D', width: 3 }, hoverinfo: 'skip' },
                    { x: px, y: py, name: 'Pasos del descenso', mode: 'lines+markers', line: { color: '#ED1E79', width: 2 }, marker: { size: 8, color: '#FDB913' } },
                ];
            }, () => ({
                margin: { t: 10, r: 10, b: 40, l: 45 }, legend: { orientation: 'h', y: -0.22 },
                xaxis: { title: 'θ (parámetro)', range: [-3.2, 3.2], gridcolor: '#eee' },
                yaxis: { title: 'Error', range: [0, 9], gridcolor: '#eee' },
                font: { family: 'Montserrat', size: 11 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
            }), [lr]);

            // Para L(θ)=θ² la actualización es θ·(1−2η): el factor decide el régimen.
            const factor = 1 - 2 * lr;
            let estado, color;
            if (Math.abs(factor) < 0.02) { estado = 'Salto perfecto: 1 paso al valle'; color = '#3D008D'; }
            else if (factor > 0) { estado = 'Converge suave (baja recto)'; color = '#15803D'; }
            else if (Math.abs(factor) < 1) { estado = 'Oscila pero converge'; color = '#B45309'; }
            else if (Math.abs(factor) < 1.02) { estado = 'Oscila sin avanzar'; color = '#ED1E79'; }
            else { estado = 'Diverge: el error explota'; color = '#B91C1C'; }

            return (
                <div className="my-4">
                    <div className="flex flex-wrap items-center gap-3 mb-2 bg-bg rounded-lg p-3">
                        <label className="text-xs font-bold text-navy whitespace-nowrap" htmlFor="lr-range">η = {lr.toFixed(2)}</label>
