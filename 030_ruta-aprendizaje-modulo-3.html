<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Ruta de Aprendizaje Interactiva del Módulo 3 — Implementación y Herramientas Profesionales de Deep Learning. Maestría en Ciencia de Datos, Universidad Santo Tomás. Mapa navegable de los 3 capítulos (Frameworks TF/PyTorch/Keras 3, Computación de Alto Rendimiento con GPU, Pipelines de Datos y Despliegue), 1 video de profundización, 2 hitos evaluativos, glosario y cronograma.">
    <title>Ruta de Aprendizaje · Módulo 3 — Implementación y Herramientas Profesionales · USTA</title>

    <!-- Preconnect para rendimiento de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel para transpilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <!-- Tailwind CSS (utilidades) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome (iconografía de apoyo) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- MathJax 3 — JUSTIFICACIÓN: el material es matemáticamente denso ($...$ y $$...$$);
         MathJax renderiza LaTeX de forma nativa y accesible sin dependencias locales. -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Google Fonts: Montserrat (texto) y Fira Code (código) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3D008D',
                        secondary: '#ED1E79',
                        navy: '#001A4D',
                        gold: '#FDB913',
                        teal: '#0E7490',
                        bg: '#F8FAFC',
                        surface: '#FFFFFF',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            scroll-behavior: smooth;
        }

        code, pre { font-family: 'Fira Code', monospace; }

        /* Gradientes institucionales USTA */
        .usta-gradient { background: linear-gradient(140deg, #3D008D 0%, #ED1E79 100%); }
        .usta-gradient-text {
            background: linear-gradient(140deg, #3D008D 0%, #ED1E79 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .usta-header   { background: linear-gradient(180deg, #001A4D 0%, #002868 100%); }

        /* Tarjeta con elevación al pasar el cursor */
        .usta-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        .usta-card:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        /* Barra de desplazamiento personalizada */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3D008D, #ED1E79); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #4A00A8, #FF2D8A); }

        /* Animación de aparición */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Accesibilidad: foco visible */
        button:focus-visible, a:focus-visible { outline: 2px solid #ED1E79; outline-offset: 2px; }

        /* Código en línea */
        .inline-code {
            background: #F1F5F9;
            color: #0F172A;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: 'Fira Code', monospace;
        }

        /* Tipografía de contenido */
        .prose-usta p { margin-bottom: 1rem; line-height: 1.75; }
        .prose-usta h3 { color: #ED1E79; font-weight: 600; font-size: 1.2rem; margin: 1.8rem 0 0.6rem; }
        .prose-usta h4 { color: #001A4D; font-weight: 600; font-size: 1.05rem; margin: 1.4rem 0 0.4rem; }
        .prose-usta ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose-usta ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose-usta li { margin-bottom: 0.35rem; line-height: 1.65; }
        .prose-usta strong { color: #0F172A; }
        .prose-usta table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 1rem 0; }
        .prose-usta th { background: #F5F0FA; color: #3D008D; text-align: left; padding: 0.6rem 0.8rem; border: 1px solid #E2E8F0; }
        .prose-usta td { padding: 0.6rem 0.8rem; border: 1px solid #E2E8F0; vertical-align: top; }

        /* Ecuación destacada */
        .eq-block {
            background: #FAF8FF;
            border: 1px solid rgba(61, 0, 141, 0.12);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            overflow-x: auto;
        }

        /* Botón flotante "Volver arriba" */
        .scroll-top-btn {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            z-index: 50;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .scroll-top-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Línea de tiempo (timeline) — nodo y línea vertical */
        .timeline-line {
            position: relative;
            border-left: 2px solid rgba(61, 0, 141, 0.3);
            margin-left: 0.75rem;
            padding-left: 1.75rem;
        }
        .timeline-node {
            position: absolute;
            left: -2.05rem;
            top: 0.25rem;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        /* ============================================================
           TIPOGRAFÍA MATEMÁTICA (MathJax) — re-tipografiado al cambiar
        ============================================================ */
        const typesetMath = (retries = 25) => {
            if (window.MathJax && window.MathJax.typesetPromise) {
                try { window.MathJax.typesetClear && window.MathJax.typesetClear(); } catch (e) {}
                window.MathJax.typesetPromise().catch(() => {});
            } else if (retries > 0) {
                setTimeout(() => typesetMath(retries - 1), 200);
            }
        };
        const useTypeset = (ref, deps) => {
            useEffect(() => {
                const t = setTimeout(() => {
                    if (ref.current && window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([ref.current]).catch(() => {});
                    }
                }, 40);
                return () => clearTimeout(t);
            }, deps);
        };

        /* ============================================================
           HOOK: useLocalStorage — persistencia del progreso (Módulo 3)
           Clave propia del M3, distinta de las del M1 y M2.
        ============================================================ */
        const STORAGE_KEY = 'm3_ruta_progreso';

        const defaultProgress = () => ({
            capsVistos:    { 1: false, 2: false, 3: false },
            videosVistos:  { profundizacion: false },
            guia3Pasos:    { 1: false, 2: false, 3: false },
            act3Pasos:     { 1: false, 2: false, 3: false, 4: false, 5: false, 6: false, 7: false },
            guia3Entregada:  false,
            act3Entregada:   false,
            resetAt: new Date().toISOString(),
        });

        const useLocalProgress = () => {
            const [progress, setProgress] = useState(() => {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return defaultProgress();
                    const parsed = JSON.parse(raw);
                    // Mezcla profunda para tolerar keys nuevas en versiones futuras
                    return { ...defaultProgress(), ...parsed,
                        capsVistos:   { ...defaultProgress().capsVistos,   ...(parsed.capsVistos   || {}) },
                        videosVistos: { ...defaultProgress().videosVistos, ...(parsed.videosVistos || {}) },
                        guia3Pasos:   { ...defaultProgress().guia3Pasos,   ...(parsed.guia3Pasos   || {}) },
                        act3Pasos:    { ...defaultProgress().act3Pasos,    ...(parsed.act3Pasos    || {}) },
                    };
                } catch (e) { return defaultProgress(); }
            });
            useEffect(() => {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
            }, [progress]);
            const update = useCallback((patch) => {
                setProgress(prev => ({ ...prev, ...(typeof patch === 'function' ? patch(prev) : patch) }));
            }, []);
            const reset = useCallback(() => setProgress(defaultProgress()), []);
            return [progress, update, reset];
        };

        /* ============================================================
           CÁLCULO DE PROGRESO GLOBAL (0–100)
        ============================================================ */
        const computeProgress = (p) => {
            // 3 caps (16,67% c/u ≈ 50%) + 1 video (10%) + pasos Guía 3 (10%)
            // + pasos Fase 3 (15%) + entregas (5% + 10%) = 100%
            let pct = 0;
            for (let i = 1; i <= 3; i++) if (p.capsVistos[i]) pct += 50 / 3;
            if (p.videosVistos.profundizacion) pct += 10;
            const g3 = Object.values(p.guia3Pasos).filter(Boolean).length;
            pct += (g3 / 3) * 10;
            const a3 = Object.values(p.act3Pasos).filter(Boolean).length;
            pct += (a3 / 7) * 15;
            if (p.guia3Entregada) pct += 5;
            if (p.act3Entregada)  pct += 10;
            return Math.min(100, Math.round(pct));
        };

        /* ============================================================
           SUBCOMPONENTES UI
        ============================================================ */

        /* Box — callout (info / tip / warn / danger / eth) */
        const Box = ({ type = 'info', label, children }) => {
            const styles = {
                info:   { border: '#3D008D', bg: '#F5F0FA', label: '#3D008D', icon: 'fa-circle-info' },
                tip:    { border: '#15803D', bg: '#F0FDF4', label: '#15803D', icon: 'fa-lightbulb' },
                warn:   { border: '#B45309', bg: '#FFFBEB', label: '#B45309', icon: 'fa-triangle-exclamation' },
                danger: { border: '#B91C1C', bg: '#FEF2F2', label: '#B91C1C', icon: 'fa-circle-exclamation' },
                eth:    { border: '#0E7490', bg: '#ECFEFF', label: '#0E7490', icon: 'fa-scale-balanced' },
            }[type] || { border: '#3D008D', bg: '#F5F0FA', label: '#3D008D', icon: 'fa-circle-info' };
            return (
                <div className="rounded-xl px-5 py-4 my-4 border-l-4" style={{ borderColor: styles.border, background: styles.bg }}>
                    {label && (
                        <span className="inline-flex items-center gap-2 text-[0.7rem] uppercase tracking-wider font-bold rounded mb-2 px-2 py-0.5 text-white" style={{ background: styles.label }}>
                            <i className={`fas ${styles.icon}`}></i>{label}
                        </span>
                    )}
                    <div className="text-gray-700 leading-relaxed text-[0.95rem]">{children}</div>
                </div>
            );
        };

        /* Accordion — apertura/cierre de un panel */
        const Accordion = ({ items, multi = false }) => {
            const [open, setOpen] = useState(multi ? new Set() : null);
            const ref = useRef(null);
            useTypeset(ref, [open]);
            const toggle = (i) => {
                if (multi) {
                    setOpen(prev => {
                        const s = new Set(prev);
                        s.has(i) ? s.delete(i) : s.add(i);
                        return s;
                    });
                } else {
                    setOpen(open === i ? null : i);
                }
            };
            return (
                <div ref={ref} className="space-y-2 my-5">
                    {items.map((it, i) => {
                        const isOpen = multi ? open.has(i) : open === i;
                        return (
                            <div key={i} className="border border-gray-200 rounded-xl overflow-hidden bg-white">
                                <button onClick={() => toggle(i)}
                                    className="w-full flex justify-between items-center px-4 py-3 hover:bg-gray-50 text-left font-semibold text-navy transition-colors">
                                    <span className="flex items-center gap-2">
                                        {it.icon && <i className={`fas ${it.icon} text-secondary text-sm`}></i>}
                                        {it.titulo}
                                    </span>
                                    <i className={`fas fa-chevron-down transition-transform duration-300 text-secondary ${isOpen ? 'rotate-180' : ''}`}></i>
                                </button>
                                {isOpen && (
                                    <div className="px-4 py-3 bg-gray-50 text-gray-700 text-[0.92rem] leading-relaxed animate-fade-in border-t border-gray-100">
                                        {it.contenido}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        };

        /* MCQ — opción múltiple con retroalimentación */
        const MCQ = ({ pregunta, opciones, multiple = false }) => {
            const [sel, setSel] = useState([]);
            const [checked, setChecked] = useState(false);
            const toggle = (i) => {
                if (checked) return;
                if (multiple) setSel(s => s.includes(i) ? s.filter(x => x !== i) : [...s, i]);
                else setSel([i]);
            };
            const correctSet = opciones.map((o, i) => o.correcta ? i : -1).filter(i => i >= 0);
            const acierto = sel.length === correctSet.length && sel.every(i => opciones[i].correcta);
            const ref = useRef(null);
            useTypeset(ref, [checked]);
            return (
                <div ref={ref} className="my-5 rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
                    <div className="flex items-start gap-2 font-semibold text-navy mb-1">
                        <i className="fas fa-circle-question text-secondary mt-1"></i>
                        <span>{pregunta}</span>
                    </div>
                    {multiple && <p className="text-xs text-gray-400 mb-2 ml-6">Selección múltiple</p>}
                    <div className="space-y-2 mt-3">
                        {opciones.map((o, i) => {
                            const isSel = sel.includes(i);
                            let cls = 'border-gray-200 hover:border-primary/50';
                            if (checked) {
                                if (o.correcta) cls = 'border-green-500 bg-green-50';
                                else if (isSel) cls = 'border-red-400 bg-red-50';
                                else cls = 'border-gray-200 opacity-70';
                            } else if (isSel) cls = 'border-secondary bg-pink-50';
                            return (
                                <button key={i} onClick={() => toggle(i)} disabled={checked}
                                    className={`w-full text-left px-4 py-2.5 rounded-lg border text-[0.92rem] flex items-center gap-3 transition-all ${cls}`}>
                                    <span className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${isSel ? 'usta-gradient text-white' : 'bg-gray-100 text-gray-500'}`}>
                                        {String.fromCharCode(97 + i)}
                                    </span>
                                    <span className="flex-1 text-gray-700">{o.texto}</span>
                                    {checked && o.correcta && <i className="fas fa-check text-green-600"></i>}
                                    {checked && isSel && !o.correcta && <i className="fas fa-xmark text-red-500"></i>}
                                </button>
                            );
                        })}
                    </div>
                    <div className="mt-3 flex items-center gap-3 flex-wrap">
                        {!checked
                            ? <button onClick={() => sel.length && setChecked(true)} disabled={!sel.length}
                                className="text-sm font-bold px-4 py-1.5 rounded-full text-white usta-gradient disabled:opacity-40">Comprobar</button>
                            : <button onClick={() => { setChecked(false); setSel([]); }}
                                className="text-sm font-bold px-4 py-1.5 rounded-full border border-primary text-primary hover:bg-primary/5">Reintentar</button>}
                        {checked && (
                            <span className={`text-sm font-bold ${acierto ? 'text-green-600' : 'text-red-500'}`}>
                                <i className={`fas ${acierto ? 'fa-circle-check' : 'fa-circle-xmark'} mr-1`}></i>
                                {acierto ? '¡Correcto!' : 'Revisa la explicación'}
                            </span>
                        )}
                    </div>
                    {checked && (() => {
                        const justifs = opciones.filter(o => o.correcta && o.justificacion).map(o => o.justificacion);
                        if (!justifs.length) return null;
                        return (
                            <div className="mt-3 text-[0.9rem] text-gray-700 bg-bg rounded-lg p-3 border-l-4 animate-fade-in" style={{ borderColor: '#FDB913' }}>
                                <strong>Explicación: </strong>{justifs.join(' ')}
                            </div>
                        );
                    })()}
                </div>
            );
        };

        /* Tabs — alternar entre paneles (con accent lookup, no template strings) */
        const Tabs = ({ tabs, accent = 'primary' }) => {
            const [active, setActive] = useState(0);
            const contentRef = useRef(null);
            useTypeset(contentRef, [active]);
            const accentClass = {
                primary:   'text-primary',
                secondary: 'text-secondary',
                navy:      'text-navy',
                gold:      'text-gold',
            }[accent] || 'text-primary';
            return (
                <div className="my-5">
                    <div className="flex flex-wrap gap-1 border-b border-gray-200">
                        {tabs.map((t, i) => (
                            <button key={i} onClick={() => setActive(i)}
                                className={`px-4 py-2 text-sm font-semibold rounded-t-lg transition-colors ${active === i
                                    ? `${accentClass} border-b-2 border-secondary bg-white`
                                    : 'text-gray-500 hover:text-primary'}`}>
                                {t.icon && <i className={`fas ${t.icon} mr-2`}></i>}
                                {t.label}
                            </button>
                        ))}
                    </div>
                    <div ref={contentRef} className="p-4 md:p-5 bg-white border border-t-0 border-gray-200 rounded-b-lg animate-fade-in text-[0.95rem] text-gray-700">
                        <div key={active}>{tabs[active].content}</div>
                    </div>
                </div>
            );
        };

        /* ProgressBar — barra de progreso segmentada */
        const ProgressBar = ({ value = 0, label = 'Progreso', showPct = true, segments = null }) => {
            return (
                <div className="w-full">
                    <div className="flex justify-between items-center mb-1.5">
                        <span className="text-sm font-semibold text-navy">{label}</span>
                        {showPct && <span className="text-sm font-bold text-primary">{value}%</span>}
                    </div>
                    <div className="w-full h-3 rounded-full bg-gray-200 overflow-hidden shadow-inner">
                        <div className="h-full usta-gradient transition-all duration-500 ease-out"
                            style={{ width: `${value}%` }}></div>
                    </div>
                    {segments && (
                        <div className="mt-2 flex flex-wrap gap-2 text-[0.72rem]">
                            {segments.map((s, i) => (
                                <span key={i} className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full ${s.done ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                    <i className={`fas ${s.done ? 'fa-circle-check' : 'fa-circle'}`}></i>{s.label}
                                </span>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        /* Checklist — lista de tareas marcables (persistente) */
        const Checklist = ({ items, value, onChange, titulo, icono = 'fa-list-check' }) => {
            const doneCount = items.filter((_, i) => value[i + 1] || value[String(i + 1)]).length;
            return (
                <div className="bg-white border border-gray-200 rounded-xl p-4">
                    {titulo && (
                        <div className="flex items-center gap-2 mb-3 text-navy font-semibold text-sm">
                            <i className={`fas ${icono} text-secondary`}></i>{titulo}
                            <span className="ml-auto text-xs text-gray-400">{doneCount}/{items.length}</span>
                        </div>
                    )}
                    <ul className="space-y-2">
                        {items.map((it, i) => {
                            const k = i + 1;
                            const checked = !!value[k];
                            return (
                                <li key={i}>
                                    <label className={`flex items-start gap-2.5 cursor-pointer p-2 rounded-lg transition-colors ${checked ? 'bg-green-50/60' : 'hover:bg-gray-50'}`}>
                                        <input type="checkbox" checked={checked}
                                            onChange={(e) => onChange(k, e.target.checked)}
                                            className="mt-0.5 w-4 h-4 accent-secondary cursor-pointer flex-shrink-0" />
                                        <span className={`text-[0.9rem] leading-snug ${checked ? 'text-gray-400 line-through' : 'text-gray-700'}`}>
                                            {it}
                                        </span>
                                    </label>
                                </li>
                            );
                        })}
                    </ul>
                </div>
            );
        };

        /* Timeline — línea de tiempo de eventos */
        const Timeline = ({ eventos }) => (
            <div className="timeline-line my-5 space-y-5">
                {eventos.map((e, i) => (
                    <div key={i} className="relative">
                        <span className="timeline-node usta-gradient"></span>
                        <div className="flex flex-wrap items-baseline gap-2">
                            {e.fecha && <span className="text-xs font-bold text-secondary uppercase tracking-wide">{e.fecha}</span>}
                            {e.hora && <span className="text-xs text-gray-500"><i className="far fa-clock mr-1"></i>{e.hora}</span>}
                            {e.tipo && (
                                <span className="text-[0.65rem] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded text-white"
                                    style={{ background: e.tipoColor || '#3D008D' }}>
                                    {e.tipo}
                                </span>
                            )}
                        </div>
                        <h4 className="text-navy font-semibold text-[1rem] mt-1">{e.titulo}</h4>
                        {e.desc && <p className="text-[0.88rem] text-gray-600 mt-1 leading-relaxed">{e.desc}</p>}
                        {e.link && (
                            <a href={e.link} target="_blank" rel="noopener"
                                className="inline-flex items-center gap-1 mt-2 text-xs font-semibold text-primary hover:text-secondary transition-colors">
                                <i className="fas fa-external-link-alt"></i>{e.linkLabel || 'Enlace'}
                            </a>
                        )}
                    </div>
                ))}
            </div>
        );

        /* Stat — caja numérica grande */
        const Stat = ({ value, label, sub, icon, color = 'primary' }) => (
            <div className="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
                <div className="flex items-start justify-between mb-2">
                    {icon && (

                            <Tag color={ch.badgeColor} icon="fa-tag">#{ch.tag}</Tag>
                            <Tag color="gray" icon="fa-clock">{ch.duracion}</Tag>
                            {isVisto && <Tag color="green" icon="fa-circle-check">Visto</Tag>}
                        </div>
                        <h3 className="text-lg md:text-xl font-extrabold text-navy leading-tight flex items-center gap-2">
                            <i className={`fas ${ch.icon} text-secondary`}></i>{ch.title}
                        </h3>
                    </div>
                    <label className="flex items-center gap-2 text-xs font-semibold text-navy cursor-pointer bg-white px-3 py-1.5 rounded-full shadow-sm hover:shadow transition-shadow">
                        <input type="checkbox" checked={isVisto}
                            onChange={(e) => onToggleVisto(e.target.checked)}
                            className="w-4 h-4 accent-secondary cursor-pointer" />
                        {isVisto ? 'Visto' : 'Marcar como visto'}
                    </label>
                </header>
                <div className="p-5 md:p-6">
                    <Accordion items={[
                        { titulo: `Qué voy a aprender (${ch.ra.length} resultados)`, icono: 'fa-bullseye',
                          contenido: (
                            <ul className="space-y-1.5">
                                {ch.ra.map((r, i) => (
                                    <li key={i} className="flex items-start gap-2 text-[0.92rem] text-gray-700">
                                        <i className="fas fa-check text-secondary mt-1 text-[0.7rem] flex-shrink-0"></i>
                                        <span>{r}</span>
                                    </li>
                                ))}
                            </ul>
                          ),
                        },
                        { titulo: ch.analogia.titulo, icono: 'fa-mug-hot',
                          contenido: ch.analogia.contenido,
                        },
                    ]} />
                    <div className="mt-4 pt-4 border-t border-gray-100">
                        <div className="flex items-center gap-2 mb-3 text-navy font-bold text-sm">
                            <i className="fas fa-circle-question text-secondary"></i>Autoevaluación ({ch.mcq.length} {ch.mcq.length === 1 ? 'pregunta' : 'preguntas'})
                        </div>
                        {ch.mcq.map((q, i) => (
                            <MCQ key={i} pregunta={q.pregunta} opciones={q.opciones} multiple={q.multiple || false} />
                        ))}
                    </div>
                </div>
            </article>
        );

        const CapitulosSection = ({ progress, update }) => (
            <section id="capitulos" className="mt-12">
                <div className="flex items-center gap-3 mb-2">
                    <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                        <i className="fas fa-book text-xl"></i>
                    </div>
                    <div>
                        <h2 className="text-2xl font-extrabold text-navy">Catálogo de los 3 capítulos</h2>
                        <p className="text-sm text-gray-600">Cada capítulo cierra con preguntas de autoevaluación. Marque como visto al completar la lectura del material principal.</p>
                    </div>
                </div>
                <div className="mt-4 mb-2">
                    <a href="03_Modulo_3_Implementacion_Deep_Learning.html"
                        className="inline-flex items-center gap-1.5 text-sm font-bold px-4 py-2 rounded-full text-white usta-gradient hover:opacity-90 transition-opacity shadow-md">
                        <i className="fas fa-book-open"></i>Abrir el material interactivo del Módulo 3
                    </a>
                </div>
                <div className="space-y-5 mt-4">
                    {chapters.map(ch => (
                        <ChapterCard
                            key={ch.id}
                            ch={ch}
                            isVisto={!!progress.capsVistos[ch.id]}
                            onToggleVisto={(v) => update(prev => ({ ...prev, capsVistos: { ...prev.capsVistos, [ch.id]: v } }))}
                        />
                    ))}
                </div>
            </section>
        );

        /* ============================================================
           SECCIÓN 5 — VIDEO (1 card)
        ============================================================ */
        const VideoCard = ({ v, visto, onToggleVisto }) => (
            <div className="usta-card p-5 md:p-6">
                <div className="flex flex-wrap items-center gap-2 mb-2">
                    <Tag color="navy" icon="fa-video">{v.tipo}</Tag>
                    <Tag color="gold" icon="fa-clock">{v.duracion}</Tag>
                    {v.numEscenas != null && (<Tag color="gray" icon="fa-film">{v.numEscenas} escenas</Tag>)}

                    <i className={`fas ${v.icono} text-secondary`}></i>{v.titulo}
                </h3>
                <div className="grid sm:grid-cols-2 gap-4 mt-4">
                    <div>
                        <h4 className="text-xs uppercase tracking-wider font-bold text-navy mb-2">
                            <i className="fas fa-lightbulb text-gold mr-1"></i>Conceptos cubiertos
                        </h4>
                        <ul className="space-y-1.5">
                            {v.conceptos.map((c, i) => (
                                <li key={i} className="flex items-start gap-2 text-[0.88rem] text-gray-700">
                                    <i className="fas fa-angle-right text-secondary mt-1 text-[0.7rem] flex-shrink-0"></i>
                                    <span>{c}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                    <div>
                        <h4 className="text-xs uppercase tracking-wider font-bold text-navy mb-2">
                            <i className="fas fa-quote-left text-secondary mr-1"></i>Texto en pantalla destacado
                        </h4>
                        <ul className="space-y-1.5">
                            {v.textoDestacado.map((t, i) => (
                                <li key={i} className="text-[0.88rem] text-gray-700 italic bg-bg px-3 py-2 rounded-lg border-l-2 border-secondary">
                                    "{t}"
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
                <div className="mt-4 pt-4 border-t border-gray-100 flex flex-wrap items-center gap-3">
                    <label className="flex items-center gap-2 text-sm font-semibold text-navy cursor-pointer">
                        <input type="checkbox" checked={visto}
                            onChange={(e) => onToggleVisto(e.target.checked)}
                            className="w-4 h-4 accent-secondary cursor-pointer" />
                        Marcar como visto
                    </label>
                    {v.url && (
                        <a href={v.url} target="_blank" rel="noopener"
                            className="text-xs font-semibold text-secondary hover:text-primary transition-colors">
                            <i className="fab fa-youtube mr-1"></i>Ver en YouTube
                        </a>
                    )}
                    <a href={`obsidian://open?vault=Deep%20learning%20course&file=${encodeURIComponent(v.linkMd)}`}
                        className="ml-auto text-xs font-semibold text-primary hover:text-secondary transition-colors">
                        <i className="fas fa-file-lines mr-1"></i>Ver guion completo
                    </a>
                </div>
            </div>
        );

        const VideosSection = ({ progress, update }) => (
            <section id="videos" className="mt-12">
                <div className="flex items-center gap-3 mb-2">
                    <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                        <i className="fas fa-video text-xl"></i>
                    </div>
                    <div>
                        <h2 className="text-2xl font-extrabold text-navy">Video del módulo</h2>
                        <p className="text-sm text-gray-600">Pieza audiovisual de profundización (12 escenas) que recorre un sistema multimodal (LSTM, BETO, Autoencoders y CNN-OCR), su despliegue Edge y la vigilancia ética para la deserción escolar rural en Colombia.</p>
                    </div>
                </div>
                <Box type="info" label="Nota puente: del aula rural al cafetal">
                    Este video y la <strong>Guía 3</strong> aplican las arquitecturas del Módulo 2 (LSTM, Transformers como BETO,
                    Autoencoders) a un caso multimodal de predicción de <strong>deserción escolar rural</strong>, distinto al contenido
                    de implementación con café de los capítulos. Sirven de <strong>puente conceptual</strong> hacia la industrialización
                    (pipelines, GPU y despliegue) que practicarás con el caso del café en la <strong>Fase 3</strong>.
                </Box>
                <div className="grid md:grid-cols-1 gap-5 mt-4">
                    {videos.map(v => (
                        <VideoCard
                            key={v.id}
                            v={v}
                            visto={!!progress.videosVistos[v.id]}
                            onToggleVisto={(val) => update(prev => ({ ...prev, videosVistos: { ...prev.videosVistos, [v.id]: val } }))}
                        />
                    ))}
                </div>
            </section>
        );

        /* ============================================================
           SECCIÓN 6 — GLOSARIO
        ============================================================ */
        const GlosarioSection = () => {
            // Agrupar por letra inicial
            const grouped = useMemo(() => {
                const map = {};
                glossary.forEach(g => {
                    const letter = g.t[0].toUpperCase();
                    (map[letter] = map[letter] || []).push(g);
                });
                return Object.keys(map).sort().reduce((acc, k) => (acc[k] = map[k], acc), {});
            }, []);
            const items = Object.entries(grouped).map(([letter, terms]) => ({
                titulo: `${letter}  ·  ${terms.length} ${terms.length === 1 ? 'término' : 'términos'}`,
                icono: 'fa-book-open',
                contenido: (
                    <div className="space-y-3">
                        {terms.map((g, i) => (
                            <div key={i} className="border-l-2 border-primary/30 pl-3">
                                <h4 className="font-bold text-navy text-[0.95rem]">
                                    <span className="inline-code mr-1.5">{g.t}</span>
                                </h4>
                                <p className="text-[0.85rem] text-gray-600 leading-relaxed">{g.d}</p>
                            </div>
                        ))}
                    </div>
                ),
            }));
            return (
                <section id="glosario" className="mt-12">
                    <div className="flex items-center gap-3 mb-2">
                        <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                            <i className="fas fa-language text-xl"></i>
                        </div>
                        <div>
                            <h2 className="text-2xl font-extrabold text-navy">Glosario del módulo</h2>
                            <p className="text-sm text-gray-600"><strong>{glossary.length} términos clave</strong> con su definición operativa y la analogía local colombiana cuando aplica.</p>
                        </div>
                    </div>
                    <div className="mt-4 usta-card p-5 md:p-6">
                        <Accordion items={items} multi={true} />
                    </div>
                </section>
            );
        };

        /* ============================================================
           SECCIÓN 7 — RECURSOS (bibliografía, webgrafía, datasets)
        ============================================================ */
        const ResourcesSection = () => {
            const renderList = (arr, icon, accent) => (
                <ul className="space-y-2.5">
                    {arr.map((r, i) => (
                        <li key={i} className="flex items-start gap-2 text-[0.92rem]">
                            <i className={`fas ${icon} text-${accent} mt-1 text-[0.8rem] flex-shrink-0`}></i>
                            <span className="text-gray-700">
                                {r.url
                                    ? <a href={r.url} target="_blank" rel="noopener" className="hover:text-secondary transition-colors">{r.ref} <i className="fas fa-external-link-alt text-[0.65rem] ml-1 text-gray-400"></i></a>
                                    : r.ref}
                            </span>
                        </li>
                    ))}
                </ul>
            );
            return (
                <section id="recursos" className="mt-12">
                    <div className="flex items-center gap-3 mb-2">
                        <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                            <i className="fas fa-folder-open text-xl"></i>
                        </div>
                        <div>
                            <h2 className="text-2xl font-extrabold text-navy">Recursos complementarios</h2>
                            <p className="text-sm text-gray-600">Bibliografía oficial, webgrafía interactiva y datasets para profundizar durante y después del módulo.</p>
                        </div>
                    </div>
                    <div className="grid md:grid-cols-3 gap-4 mt-4">
                        <div className="usta-card p-5">
                            <h3 className="font-bold text-navy mb-3 flex items-center gap-2">
                                <i className="fas fa-book text-primary"></i>Bibliografía
                            </h3>
                            {renderList(resources.bibliografia, 'fa-bookmark', 'primary')}
                        </div>
                        <div className="usta-card p-5">
                            <h3 className="font-bold text-navy mb-3 flex items-center gap-2">
                                <i className="fas fa-globe text-secondary"></i>Webgrafía
                            </h3>
                            {renderList(resources.webgrafia, 'fa-link', 'secondary')}
                        </div>
                        <div className="usta-card p-5">
                            <h3 className="font-bold text-navy mb-3 flex items-center gap-2">
                                <i className="fas fa-database text-gold"></i>Datasets y herramientas
                            </h3>
                            {renderList(resources.datasets, 'fa-cube', 'gold')}
                        </div>
                    </div>
                </section>
            );
        };

        /* ============================================================
           SECCIÓN 8 — FOOTER + CTA CIERRE DEL CURSO (Cuestionario Final)
        ============================================================ */
        const FooterSection = ({ progress }) => {
            const pct = computeProgress(progress);
            return (
                <footer className="mt-14">
                    <div className="usta-card p-6 md:p-8" style={{ background: 'linear-gradient(135deg, #FAF8FF 0%, #FCE7F1 100%)' }}>
                        <div className="flex flex-wrap items-start gap-3 mb-3">
                            <i className="fas fa-trophy text-gold text-2xl"></i>
                            <h2 className="text-2xl font-extrabold text-navy">¡Felicitaciones por cerrar el Módulo 3 y el curso!</h2>
                        </div>
                        {pct === 100 ? (
                            <Box type="tip" label="Módulo 3 completado al 100%">
                                <p>Ha marcado los 3 capítulos, el video de profundización, las 2 entregas y todos los pasos de los 2 hitos.
                                Con esto cierra el ciclo de vida del Proyecto Centinela: ya está listo para el <strong>Cuestionario Final del curso</strong>.</p>
                            </Box>
                        ) : (
                            <p className="text-gray-700 leading-relaxed">
                                Si el progreso actual es <strong>{pct}%</strong>, aún quedan actividades por marcar.
                                Los acordeones de cada capítulo permiten repasar; la sección de <a href="#recursos" className="text-primary font-semibold hover:text-secondary">recursos</a> y el <a href="#glosario" className="text-primary font-semibold hover:text-secondary">glosario</a> son el mejor repaso antes del Cuestionario Final.
                            </p>
                        )}

                    <div className="mt-6 usta-card p-6 md:p-8 border-2 border-primary/20">
                        <div className="flex flex-wrap items-center gap-3 mb-3">
                            <Tag color="primary" icon="fa-flag-checkered">Cierre del curso</Tag>
                        </div>
                        <h3 className="text-xl md:text-2xl font-extrabold text-navy leading-tight flex items-center gap-2">
                            <i className="fas fa-clipboard-question text-secondary"></i>Lo que sigue: el Cuestionario Final del curso
                        </h3>
                        <p className="text-gray-700 mt-2 leading-relaxed">
                            Con el Módulo 3 se completa la formación: <strong>Frameworks (TensorFlow / PyTorch / Keras 3)</strong>,
                            <strong> cómputo de alto rendimiento con GPUs</strong> y <strong>pipelines de datos y despliegue</strong>.
                            La <strong>Fase 3 del Proyecto Centinela</strong> industrializó el sistema (pipeline, precisión mixta, exportación
                            ONNX y despliegue offline en campo). El último paso evaluativo es el <strong>Cuestionario Final</strong>: repase el
                            glosario y los recursos de los tres módulos antes de presentarlo.
                        </p>
                        <div className="mt-4 flex flex-wrap items-center gap-2">
                            <a href="index.html"
                                className="inline-flex items-center gap-1.5 text-sm font-bold px-4 py-2 rounded-full text-white usta-gradient hover:opacity-90 transition-opacity shadow-md">
                                <i className="fas fa-house"></i>Volver al portal del curso
                            </a>
                            <a href="obsidian://open?vault=Deep%20learning%20course&file=Welcome"
                                className="inline-flex items-center gap-1.5 text-sm font-bold px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary/5 transition-colors">
                                <i className="fas fa-map-location-dot"></i>Ir al mapa del Segundo Cerebro

                        </div>
                    </div>

                    <div className="mt-8 rounded-2xl bg-navy text-white px-6 py-8 text-center space-y-3">
                        <p className="text-sm md:text-base font-semibold text-gold italic leading-relaxed max-w-2xl mx-auto">
                            <i className="fas fa-quote-left mr-2 text-xs"></i>
                            La IA más sofisticada no es la más precisa, sino la que llega a la mano del agricultor o del orientador rural sin estigmatizar.
                        </p>
                        <p className="text-[0.82rem] md:text-sm font-semibold text-white/85 italic leading-relaxed max-w-2xl mx-auto">

                        </p>
                        <div className="pt-3 border-t border-white/15 text-xs text-white/70 space-y-1">
                            <p>
                                <i className="fas fa-envelope mr-1"></i>javiersierra@usta.edu.co
                            </p>
                            <p className="text-white/90 font-semibold">
                                Universidad Santo Tomás · Maestría en Ciencia de Datos
                            </p>
                            <p>
                                Profundización I: Redes Neuronales — Deep Learning (EA-N-F-004) · Experto temático: Javier Mauricio Sierra
                            </p>
                            <p className="text-white/50">Documento HTML autocontenido · React 18 + Tailwind CDN + MathJax 3 ·
                                Progreso persistido en <code className="inline-code">localStorage</code> (clave <code className="inline-code">m3_ruta_progreso</code>)</p>
                        </div>
                    </div>
                </footer>
            );
        };

        /* ============================================================
           APP (compone todo)
        ============================================================ */
        const App = () => {
            const [progress, update, reset] = useLocalProgress();

            return (
                <div className="min-h-screen">
                    <header className="usta-header text-white">
                        <div className="max-w-6xl mx-auto px-4 md:px-6 py-6">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="usta-gradient p-2.5 rounded-xl shadow-md">
                                    <i className="fas fa-route text-xl"></i>
                                </div>
                                <span className="text-xs uppercase tracking-widest text-gold font-bold">Universidad Santo Tomás</span>
                            </div>
                            <h1 className="text-2xl md:text-3xl font-extrabold">Ruta de Aprendizaje · Módulo 3</h1>
                            <p className="text-sm md:text-base text-white/80 mt-1">Implementación y Herramientas Profesionales · Maestría en Ciencia de Datos</p>
                        </div>
                    </header>

                    <StickyNav />

                    <main className="max-w-6xl mx-auto px-4 md:px-6 py-8 space-y-2">
                        <HeroSection progress={progress} onReset={reset} />
                        <CronogramaSection />
                        <HitosSection progress={progress} update={update} />
                        <CapitulosSection progress={progress} update={update} />
                        <VideosSection progress={progress} update={update} />
                        <GlosarioSection />
                        <ResourcesSection />
                        <FooterSection progress={progress} />
                    </main>

                    <ScrollTopButton />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script defer src="portal-nav.js"></script>
</body>
