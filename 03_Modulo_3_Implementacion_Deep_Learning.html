        const { useState, useEffect, useRef } = React;

        /* ============================================================

        const typesetMath = (retries = 25) => {
            if (window.MathJax && window.MathJax.typesetPromise) {
                try { window.MathJax.typesetClear && window.MathJax.typesetClear(); } catch (e) { }
                window.MathJax.typesetPromise().catch(() => { });
            } else if (retries > 0) {
                setTimeout(() => typesetMath(retries - 1), 200);
            }
        };

        // Re-tipografía SOLO el subárbol de un componente cuando cambia su estado
        // de revelado (pestañas, acordeones, retroalimentación). Evita que el LaTeX
        // recién mostrado quede como texto literal "\frac{...}".
        const useTypeset = (ref, deps) => {
            useEffect(() => {
                const t = setTimeout(() => {
                    if (ref.current && window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([ref.current]).catch(() => { });
                    }

                return () => clearTimeout(t);
            }, deps);

        const renderIcon = (iconName, size = 20) => {
            const Icon = Icons[iconName];
            return Icon ? <Icon size={size} /> : null;
        };

        /* ============================================================
           BLOQUE DE CÓDIGO — resaltado, copiar y OCULTAR
        ============================================================ */
        const CodeBlock = ({ title, code, lang = 'python' }) => {
            const [copied, setCopied] = useState(false);
            const [hidden, setHidden] = useState(false);

            const handleCopy = () => {
                navigator.clipboard.writeText(code).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const meta = {
                python: { icon: 'fab fa-python text-yellow-400', label: title || 'Python' },
                pytorch: { icon: 'fas fa-fire text-orange-400', label: title || 'PyTorch' },
                shell: { icon: 'fas fa-terminal text-green-400', label: title || 'Terminal' },
                text: { icon: 'fas fa-file-alt text-gray-300', label: title || 'Salida' },
            }[lang] || { icon: 'fas fa-code text-gray-300', label: title || 'Código' };

            const escapeHtml = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            const protect = (src, patterns) => {
                const tokens = [];
                let out = src;
                patterns.forEach(({ re, cls }) => {
                    out = out.replace(re, (m) => {
                        const ch = String.fromCharCode(0xE000 + tokens.length);
                        tokens.push({ text: m, cls });
                        return ch;
                    });
                });
                return { out, tokens };
            };
            // Reconstruye los <span>: cada caracter del Area de Uso Privado (>= 0xE000)
            // que se inserto en "protect" se reemplaza por su token original.
            const restore = (src, tokens) => {
                let out = '';
                for (const ch of src) {
                    const code = ch.charCodeAt(0);
                    const t = (code >= 0xE000 && code <= 0xF8FF) ? tokens[code - 0xE000] : null;
                    out += t ? `<span class="${t.cls}">${t.text}</span>` : ch;
                }
                return out;
            };

            // Todo el resaltado se hace en UNA sola pasada de "protect": cada coincidencia
            // (strings y comentarios primero, luego palabras clave, tipos y numeros) se
            // sustituye por un caracter opaco que no es \w ni digito; asi ninguna regex
            // posterior puede tocar el marcado ya generado.
            const highlightPython = (raw) => {
                const escaped = escapeHtml(raw);
                const { out, tokens } = protect(escaped, [
                    { re: /"""[\s\S]*?"""|'''[\s\S]*?'''/g, cls: 'text-green-500 italic' },
                    { re: /#[^\n]*/g, cls: 'text-green-500 italic' },
                    { re: /"(?:\\.|[^"\\\n])*"|'(?:\\.|[^'\\\n])*'/g, cls: 'text-emerald-300' },
                    { re: /\b(?:class|def|from|import|return|if|else|elif|for|while|async|await|try|except|finally|raise|del|as|in|not|and|or|is|with|yield|lambda|pass|break|continue|None|True|False|global|nonlocal|assert|print)\b/g, cls: 'text-pink-400' },
                    { re: /\b(?:self|cls)\b/g, cls: 'text-orange-300 italic' },
                    { re: /\b(?:np|torch|nn|optim|F|plt|tensor|Tensor|array|ndarray|Linear|Sequential|ReLU|Sigmoid|Module|Adam|SGD|Dropout|BatchNorm1d|MSELoss|BCELoss|CrossEntropyLoss|matmul|dot|maximum|exp|sum|mean|zeros|ones|randn|float|int)\b/g, cls: 'text-yellow-300' },
                    { re: /\b\d+(?:\.\d+)?\b/g, cls: 'text-amber-300' },
                ]);
                return restore(out, tokens);
            };

            const html = highlightPython(code);

            return (
                <div className="my-4 rounded-xl overflow-hidden border border-gray-700 bg-gray-900 text-gray-100 shadow-lg">
                    <div className="bg-gray-800 px-4 py-2 text-xs font-mono text-gray-400 border-b border-gray-700 flex justify-between items-center">
                        <span><i className={`${meta.icon} mr-2`}></i>{meta.label}</span>
                        <span className="flex items-center gap-3">
                            <button onClick={() => setHidden(h => !h)} className="flex items-center gap-1 hover:text-white transition-colors" title={hidden ? 'Mostrar código' : 'Ocultar código'}>
                                <i className={`fas ${hidden ? 'fa-eye' : 'fa-eye-slash'}`}></i>
                                <span>{hidden ? 'Mostrar' : 'Ocultar'}</span>
                            </button>
                            <button onClick={handleCopy} className="flex items-center gap-1 hover:text-white transition-colors" title="Copiar código">
                                {copied
                                    ? <><i className="fas fa-check text-green-400"></i><span className="text-green-400">¡Copiado!</span></>
                                    : <><i className="far fa-clipboard"></i><span>Copiar</span></>}
                            </button>
                            <span className="flex items-center gap-1">
                                <span className="w-2 h-2 rounded-full bg-red-500"></span>
                                <span className="w-2 h-2 rounded-full bg-yellow-500"></span>
                                <span className="w-2 h-2 rounded-full bg-green-500"></span>
                            </span>
                        </span>
                    </div>
                    {!hidden && (
                        <div className="p-4 overflow-x-auto code-scroll animate-fade-in">
                            <pre className="text-sm leading-relaxed"><code dangerouslySetInnerHTML={{ __html: html }} /></pre>
                        </div>
                    )}
                </div>
            );
        };

        /* ============================================================
           CALLOUT (info / tip / warn / danger / eth)
        ============================================================ */
        const Box = ({ type = 'info', label, children }) => {
            const styles = {
                info: { border: '#3D008D', bg: '#F5F0FA', label: '#3D008D', icon: 'fa-circle-info' },
                tip: { border: '#15803D', bg: '#F0FDF4', label: '#15803D', icon: 'fa-lightbulb' },
                warn: { border: '#B45309', bg: '#FFFBEB', label: '#B45309', icon: 'fa-triangle-exclamation' },
                danger: { border: '#B91C1C', bg: '#FEF2F2', label: '#B91C1C', icon: 'fa-circle-exclamation' },
                eth: { border: '#0E7490', bg: '#ECFEFF', label: '#0E7490', icon: 'fa-scale-balanced' },
            }[type] || { border: '#3D008D', bg: '#F5F0FA', label: '#3D008D', icon: 'fa-circle-info' };
            return (
                <div className="rounded-xl px-5 py-4 my-4 border-l-4" style={{ borderColor: styles.border, background: styles.bg }}>
                    {label && (
                        <span className="inline-flex items-center gap-2 text-[0.7rem] uppercase tracking-wider font-bold rounded mb-2 px-2 py-0.5 text-white" style={{ background: styles.label }}>
                            <i className={`fas ${styles.icon}`}></i>{label}
                        </span>
                    )}
                    <div className="text-gray-700 leading-relaxed text-[0.95rem]">{children}</div>
                </div>
            );
        };

        /* ============================================================
           CALLOUT DESTACADO (tarjeta con cabecera en gradiente + ícono)
           Para los recuadros clave (p. ej. la dimensión ética).
        ============================================================ */
        const CalloutPro = ({ tema = 'eth', titulo, subtitulo, icon, children }) => {
            const temas = {
                eth: { grad: 'linear-gradient(135deg,#0E7490 0%,#06B6D4 100%)', bg: 'rgba(8,145,178,0.06)', border: 'rgba(14,116,137,0.22)', icon: 'fa-scale-balanced' },
                warn: { grad: 'linear-gradient(135deg,#B45309 0%,#F59E0B 100%)', bg: 'rgba(180,83,9,0.06)', border: 'rgba(180,83,9,0.22)', icon: 'fa-triangle-exclamation' },
                info: { grad: 'linear-gradient(135deg,#3D008D 0%,#ED1E79 100%)', bg: 'rgba(61,0,141,0.05)', border: 'rgba(61,0,141,0.18)', icon: 'fa-circle-info' },
            };
            const t = temas[tema] || temas.eth;
            return (
                <div className="my-6 rounded-2xl overflow-hidden shadow-md border bg-white not-prose" style={{ borderColor: t.border }}>
                    <div className="px-5 py-3 flex items-center gap-3" style={{ background: t.grad }}>
                        <span className="bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0" style={{ width: 36, height: 36 }}>
                            <i className={`fas ${icon || t.icon} text-white text-lg`}></i>
                        </span>
                        <div>
                            <div className="text-white font-bold text-base leading-tight">{titulo}</div>
                            {subtitulo && <div className="text-white/80 text-xs">{subtitulo}</div>}
                        </div>
                    </div>
                    <div className="px-5 py-4 text-[0.95rem] text-gray-700 leading-relaxed" style={{ background: t.bg }}>
                        {children}
                    </div>
                </div>
            );
        };

        /* ============================================================
           ECUACIÓN DESTACADA (display LaTeX)
        ============================================================ */
        const Eq = ({ children }) => (
            <div className="eq-block my-4 text-center">{children}</div>
        );

        /* ============================================================
           ENCABEZADO DE SECCIÓN
        ============================================================ */
        const SectionHeader = ({ title, icon: Icon }) => (
            <div className="flex items-center gap-3 mb-5 border-b border-gray-200 pb-3">
                <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                    {Icon && <Icon size={24} />}
                </div>
                <h2 className="text-2xl font-bold text-gray-900">{title}</h2>
            </div>
        );

        /* ============================================================
           PIPELINE (pasos horizontales)
        ============================================================ */
        const Pipeline = ({ steps }) => (
            <div className="flex items-stretch flex-wrap gap-2 my-6 justify-between">
                {steps.map((s, i) => (
                    <React.Fragment key={i}>
                        <div className="flex-1 min-w-[140px] bg-white border border-gray-200 rounded-xl px-3 py-3 text-center text-sm shadow-sm" style={{ borderTop: '4px solid #3D008D' }}>
                            <span className="inline-block w-6 h-6 leading-6 rounded-full text-white font-bold text-xs mb-1" style={{ background: '#3D008D' }}>{s.num}</span>
                            <span className="block font-semibold text-navy mb-1">{s.title}</span>
                            <span className="text-gray-600">{s.desc}</span>
                        </div>
                        {i < steps.length - 1 && <div className="self-center text-secondary font-bold text-xl hidden md:block">→</div>}
                    </React.Fragment>
                ))}
            </div>
        );

        /* ============================================================
           LÍNEA DE TIEMPO (historia)
        ============================================================ */
        const Timeline = ({ eventos }) => (
            <div className="relative border-l-2 border-primary/30 ml-3 my-6 space-y-5">
                {eventos.map((e, i) => (
                    <div key={i} className="ml-6 relative">
                        <span className="absolute left-[-1.95rem] top-1 w-4 h-4 rounded-full usta-gradient border-2 border-white shadow"></span>
                        <span className="text-sm font-extrabold text-secondary">{e.year}</span>
                        <p className="text-sm text-gray-700 mt-0.5">{e.text}</p>
                    </div>
                ))}
            </div>
        );

        /* ============================================================
           PESTAÑAS
        ============================================================ */
        const Tabs = ({ tabs }) => {
            const [active, setActive] = useState(0);
            const contentRef = useRef(null);
            useTypeset(contentRef, [active]);
            return (
                <div className="my-5">
                    <div className="flex flex-wrap gap-1 border-b border-gray-200">
                        {tabs.map((t, i) => (
                            <button key={i} onClick={() => setActive(i)}
                                className={`px-4 py-2 text-sm font-semibold rounded-t-lg transition-colors ${active === i ? 'text-primary border-b-2 border-secondary bg-white' : 'text-gray-500 hover:text-primary'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>
                    <div ref={contentRef} className="p-4 bg-white border border-t-0 border-gray-200 rounded-b-lg animate-fade-in text-[0.95rem] text-gray-700">
                        <div key={active}>{tabs[active].content}</div>
                    </div>
                </div>
            );
        };

        /* ============================================================
           ACORDEÓN
        ============================================================ */
        const Accordion = ({ items }) => {
            const [open, setOpen] = useState(null);
            const ref = useRef(null);
            useTypeset(ref, [open]);
            return (
                <div ref={ref} className="space-y-2 my-5">
                    {items.map((it, i) => (
                        <div key={i} className="border border-gray-200 rounded-xl overflow-hidden bg-white">
                            <button onClick={() => setOpen(open === i ? null : i)}
                                className="w-full flex justify-between items-center px-4 py-3 hover:bg-gray-50 text-left font-semibold text-navy transition-colors">
                                <span>{it.titulo}</span>
                                <i className={`fas fa-chevron-down transition-transform duration-300 text-secondary ${open === i ? 'rotate-180' : ''}`}></i>
                            </button>
                            {open === i && (
                                <div className="px-4 py-3 bg-gray-50 text-gray-700 text-[0.92rem] leading-relaxed animate-fade-in border-t border-gray-100">
                                    {it.contenido}
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        };

        /* ============================================================
           RETO con SOLUCIÓN OCULTA
        ============================================================ */
        const Reto = ({ titulo = 'Reto práctico', children, solucion }) => {
            const [show, setShow] = useState(false);
            const ref = useRef(null);
            useTypeset(ref, [show]);
            return (
                <div ref={ref} className="my-5 rounded-xl border-2 border-dashed p-5" style={{ borderColor: '#FDB913', background: '#FFFDF5' }}>
                    <div className="flex items-center gap-2 font-bold text-navy mb-2">
                        <i className="fas fa-dumbbell text-gold"></i>{titulo}
                    </div>
                    <div className="text-gray-700 text-[0.95rem] mb-3">{children}</div>
                    <button onClick={() => setShow(s => !s)}
                        className="text-xs font-bold px-3 py-1.5 rounded-full text-white usta-gradient hover:opacity-90 transition-opacity">
                        <i className={`fas ${show ? 'fa-eye-slash' : 'fa-key'} mr-1`}></i>
                        {show ? 'Ocultar solución' : 'Mostrar solución'}
                    </button>
                    {show && <div className="mt-3 animate-fade-in">{solucion}</div>}
                </div>
            );
        };

        /* ============================================================
           MCQ — pregunta de opción múltiple con retroalimentación inmediata
        ============================================================ */
        const MCQ = ({ pregunta, opciones, multiple = false }) => {
            const [sel, setSel] = useState([]);
            const [checked, setChecked] = useState(false);

            const toggle = (i) => {
                if (checked) return;
                if (multiple) setSel(s => s.includes(i) ? s.filter(x => x !== i) : [...s, i]);
                else setSel([i]);
            };

            const correctSet = opciones.map((o, i) => o.correcta ? i : -1).filter(i => i >= 0);
            const acierto = sel.length === correctSet.length && sel.every(i => opciones[i].correcta);
            const ref = useRef(null);
            useTypeset(ref, [checked]);

            return (
                <div ref={ref} className="my-5 rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
                    <div className="flex items-start gap-2 font-semibold text-navy mb-1">
                        <i className="fas fa-circle-question text-secondary mt-1"></i>
                        <span>{pregunta}</span>
                    </div>
                    {multiple && <p className="text-xs text-gray-400 mb-2 ml-6">Selección múltiple</p>}
                    <div className="space-y-2 mt-3">
                        {opciones.map((o, i) => {
                            const isSel = sel.includes(i);
                            let cls = 'border-gray-200 hover:border-primary/50';
                            if (checked) {
                                if (o.correcta) cls = 'border-green-500 bg-green-50';
                                else if (isSel) cls = 'border-red-400 bg-red-50';
                                else cls = 'border-gray-200 opacity-70';
                            } else if (isSel) cls = 'border-secondary bg-pink-50';
                            return (
                                <button key={i} onClick={() => toggle(i)} disabled={checked}
                                    className={`w-full text-left px-4 py-2.5 rounded-lg border text-[0.92rem] flex items-center gap-3 transition-all ${cls}`}>
                                    <span className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${isSel ? 'usta-gradient text-white' : 'bg-gray-100 text-gray-500'}`}>
                                        {String.fromCharCode(97 + i)}
                                    </span>
                                    <span className="flex-1 text-gray-700">{o.texto}</span>
                                    {checked && o.correcta && <i className="fas fa-check text-green-600"></i>}
                                    {checked && isSel && !o.correcta && <i className="fas fa-xmark text-red-500"></i>}
                                </button>
                            );
                        })}
                    </div>
                    <div className="mt-3 flex items-center gap-3">
                        {!checked
                            ? <button onClick={() => sel.length && setChecked(true)} disabled={!sel.length}
                                className="text-sm font-bold px-4 py-1.5 rounded-full text-white usta-gradient disabled:opacity-40">Comprobar</button>
                            : <button onClick={() => { setChecked(false); setSel([]); }}
                                className="text-sm font-bold px-4 py-1.5 rounded-full border border-primary text-primary hover:bg-primary/5">Reintentar</button>}
                        {checked && (
                            <span className={`text-sm font-bold ${acierto ? 'text-green-600' : 'text-red-500'}`}>
                                <i className={`fas ${acierto ? 'fa-circle-check' : 'fa-circle-xmark'} mr-1`}></i>
                                {acierto ? '¡Correcto!' : 'Revisa la explicación'}
                            </span>
                        )}
                    </div>
                    {checked && (
                        <div className="mt-3 text-[0.9rem] text-gray-700 bg-bg rounded-lg p-3 border-l-4 animate-fade-in" style={{ borderColor: '#FDB913' }}>
                            <strong>Explicación: </strong>
                            {opciones.find(o => o.correcta)?.justificacion ||
                                opciones.filter(o => o.correcta).map(o => o.justificacion).filter(Boolean).join(' ')}
                        </div>
                    )}
                </div>
            );
        };

        /* ============================================================
           QUIZ — mini-cuestionario con puntuación visual
        ============================================================ */
        const Quiz = ({ titulo = 'Mini-cuestionario', preguntas }) => {
            const [resp, setResp] = useState({});
            const [enviado, setEnviado] = useState(false);

            const toggle = (qi, oi, multiple) => {
                if (enviado) return;
                setResp(prev => {
                    const actual = prev[qi] || [];
                    if (multiple) {
                        return { ...prev, [qi]: actual.includes(oi) ? actual.filter(x => x !== oi) : [...actual, oi] };
                    }
                    return { ...prev, [qi]: [oi] };
                });
            };

            const esCorrecta = (qi) => {
                const correctSet = preguntas[qi].opciones.map((o, i) => o.correcta ? i : -1).filter(i => i >= 0);
                const sel = resp[qi] || [];
                return sel.length === correctSet.length && sel.every(i => preguntas[qi].opciones[i].correcta);
            };

            const score = preguntas.reduce((acc, _, qi) => acc + (esCorrecta(qi) ? 1 : 0), 0);
            const total = preguntas.length;
            const pct = Math.round((score / total) * 100);
            const todasResp = preguntas.every((_, qi) => (resp[qi] || []).length > 0);

            const color = pct >= 80 ? '#15803D' : pct >= 50 ? '#B45309' : '#B91C1C';
            const mensaje = pct >= 80 ? '¡Excelente dominio del tema!' : pct >= 50 ? 'Bien, repasa los puntos fallados.' : 'Conviene releer la lección antes de continuar.';
            const ref = useRef(null);
            useTypeset(ref, [enviado]);

            return (
                <div ref={ref} className="my-8 rounded-2xl border border-primary/20 bg-white p-6 shadow-md">
                    <div className="flex items-center gap-2 mb-4">
                        <span className="usta-gradient text-white p-2 rounded-lg"><i className="fas fa-clipboard-question"></i></span>
                        <h3 className="text-lg font-bold text-primary" style={{ margin: 0 }}>{titulo}</h3>
                    </div>

                    {preguntas.map((q, qi) => (
                        <div key={qi} className="mb-5">
                            <div className="font-semibold text-navy text-[0.95rem] mb-2">
                                {qi + 1}. {q.pregunta}
                                {q.multiple && <span className="ml-2 text-xs text-gray-400 font-normal">(selección múltiple)</span>}
                            </div>
                            <div className="space-y-1.5">
                                {q.opciones.map((o, oi) => {
                                    const sel = (resp[qi] || []).includes(oi);
                                    let cls = 'border-gray-200 hover:border-primary/40';
                                    if (enviado) {
                                        if (o.correcta) cls = 'border-green-500 bg-green-50';
                                        else if (sel) cls = 'border-red-400 bg-red-50';
                                        else cls = 'border-gray-200 opacity-70';
                                    } else if (sel) cls = 'border-secondary bg-pink-50';
                                    return (
                                        <button key={oi} onClick={() => toggle(qi, oi, q.multiple)} disabled={enviado}
                                            className={`w-full text-left px-3 py-2 rounded-lg border text-[0.9rem] flex items-center gap-2.5 transition-all ${cls}`}>
                                            <span className={`flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-[0.7rem] font-bold ${sel ? 'usta-gradient text-white' : 'bg-gray-100 text-gray-500'}`}>
                                                {String.fromCharCode(97 + oi)}
                                            </span>
                                            <span className="flex-1 text-gray-700">{o.texto}</span>
                                            {enviado && o.correcta && <i className="fas fa-check text-green-600 text-xs"></i>}
                                            {enviado && sel && !o.correcta && <i className="fas fa-xmark text-red-500 text-xs"></i>}
                                        </button>
                                    );
                                })}
                            </div>
                            {enviado && q.justificacion && (
                                <p className="text-xs text-gray-600 mt-1.5 ml-1 italic">{q.justificacion}</p>
                            )}
                        </div>
                    ))}

                    {!enviado
                        ? <button onClick={() => todasResp && setEnviado(true)} disabled={!todasResp}
                            className="text-sm font-bold px-5 py-2 rounded-full text-white usta-gradient disabled:opacity-40">
                            <i className="fas fa-flag-checkered mr-2"></i>Calificar ({Object.keys(resp).length}/{total})
                        </button>
                        : (
                            <div className="animate-fade-in">
                                <div className="flex items-center gap-4 p-4 rounded-xl" style={{ background: '#FAFAFA' }}>
                                    <div className="relative w-20 h-20 flex-shrink-0">
                                        <svg viewBox="0 0 36 36" className="w-20 h-20" aria-hidden="true">
                                            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#eee" strokeWidth="3" />
                                            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke={color} strokeWidth="3" strokeDasharray={`${pct}, 100`} strokeLinecap="round" />
                                        </svg>
                                        <span className="absolute inset-0 flex items-center justify-center font-extrabold text-sm" style={{ color }}>{pct}%</span>
                                    </div>
                                    <div>
                                        <div className="font-bold text-navy">Puntaje: {score} / {total}</div>
                                        <div className="text-sm" style={{ color }}>{mensaje}</div>
                                    </div>
                                </div>
                                <button onClick={() => { setEnviado(false); setResp({}); }}
                                    className="mt-3 text-sm font-bold px-4 py-1.5 rounded-full border border-primary text-primary hover:bg-primary/5">
                                    <i className="fas fa-rotate-right mr-1"></i>Reintentar
                                </button>
                            </div>
                        )}
                </div>
            );
        };

        /* ============================================================
           GRÁFICA PLOTLY (hook + contenedor)
        ============================================================ */
        const usePlotly = (id, dataFn, layoutFn, deps = []) => {
            useEffect(() => {
                const el = document.getElementById(id);
                if (el && window.Plotly) {
                    window.Plotly.newPlot(id, dataFn(), layoutFn(), { responsive: true, displayModeBar: false });
                }
                return () => { if (window.Plotly) { try { window.Plotly.purge(id); } catch (e) { } } };
            }, deps);
        };

        const ChartFrame = ({ id, height = 'chart-h-360', caption }) => (
            <>
                <div className="bg-white border border-gray-200 rounded-xl p-2 shadow-sm my-3">
                    <div id={id} className={height} style={{ width: '100%' }}></div>
                </div>
                {caption && <p className="text-xs text-gray-500 italic text-center mb-4">{caption}</p>}
            </>
        );

        /* ============================================================
           TÉRMINO con definición emergente (tooltip por portal)
        ============================================================ */
        const Termino = ({ children, def }) => {
            const [open, setOpen] = useState(false);
            const [pos, setPos] = useState(null);
            const btnRef = useRef(null);
            const popRef = useRef(null);
            const closeTimer = useRef(null);

            // Cierre con periodo de gracia: permite mover el cursor del termino al
            // cuadro (que estan separados unos pixeles) sin que se cierre de inmediato.
            const cancelClose = () => { if (closeTimer.current) { clearTimeout(closeTimer.current); closeTimer.current = null; } };
            const scheduleClose = () => { cancelClose(); closeTimer.current = setTimeout(() => setOpen(false), 150); };
            const openNow = () => { cancelClose(); setOpen(true); };
            useEffect(() => cancelClose, []); // limpia el temporizador al desmontar

            // Calcula la posición del cuadro en coordenadas del viewport (position: fixed)
            // y decide si abrir hacia abajo o hacia arriba según el espacio disponible.
            const place = () => {
                if (!btnRef.current) return;
                const r = btnRef.current.getBoundingClientRect();
                const margin = 12;
                const w = Math.min(300, window.innerWidth - margin * 2);
                let left = r.left;
                if (left + w > window.innerWidth - margin) left = window.innerWidth - margin - w;
                if (left < margin) left = margin;
                const abreArriba = (window.innerHeight - r.bottom) < 180; // poco espacio abajo
                setPos({
                    left, width: w,
                    top: abreArriba ? null : Math.round(r.bottom + 6),
                    bottom: abreArriba ? Math.round(window.innerHeight - r.top + 6) : null,
                });
            };

            useEffect(() => {
                if (!open) { setPos(null); return; }
                place();
                const reflow = () => place();
                const onDoc = (e) => {
                    if (popRef.current && popRef.current.contains(e.target)) return;
                    if (btnRef.current && btnRef.current.contains(e.target)) return;
                    setOpen(false);
                };
                // 'true' captura también el scroll del contenedor interno de la lección.
                window.addEventListener('scroll', reflow, true);
                window.addEventListener('resize', reflow);
                document.addEventListener('mousedown', onDoc);
                return () => {
                    window.removeEventListener('scroll', reflow, true);
                    window.removeEventListener('resize', reflow);
                    document.removeEventListener('mousedown', onDoc);
                };
            }, [open]);

            return (
                <span className="inline-block">
                    <button ref={btnRef} type="button" onClick={openNow} onMouseEnter={openNow} onMouseLeave={scheduleClose}
                        className="text-primary font-semibold cursor-help bg-primary/5 hover:bg-primary/10 rounded px-1 transition-colors"
                        style={{ borderBottom: '1px dotted #3D008D' }} title="Ver definición rápida">
                        {children}<i className="fas fa-circle-info text-[0.6em] align-super ml-0.5 text-secondary"></i>
                    </button>
                    {open && pos && ReactDOM.createPortal(
                        <span ref={popRef} role="tooltip"
                            onMouseEnter={cancelClose} onMouseLeave={scheduleClose}
                            className="block rounded-lg bg-white shadow-2xl border border-primary/30 p-3 text-[0.8rem] font-normal text-gray-700 leading-snug animate-fade-in text-left"
                            style={{ position: 'fixed', left: pos.left, top: pos.top == null ? 'auto' : pos.top, bottom: pos.bottom == null ? 'auto' : pos.bottom, width: pos.width, zIndex: 200 }}>
                            <span className="block font-bold text-primary mb-1 text-[0.72rem] uppercase tracking-wide">{children}</span>
                            {def}
                        </span>,
                        document.body
                    )}
                </span>
            );
        };

        /* ============================================================
           PORTADA + OBJETIVOS (Lección 0)
        ============================================================ */
        const PortadaSection = () => (
            <div className="prose-usta">
                <Box type="tip" label="Cómo estudiar este módulo">
                    Este material es <strong>autónomo</strong>: permite avanzar a ritmo propio con los botones <em>Anterior / Siguiente</em>.
                    Cada capítulo combina teoría breve, una analogía colombiana, un diagrama, código comentado y práctica.
                    El navegador <strong>recuerda la última lección</strong>, de modo que es posible pausar y retomar en cualquier momento.
                    Se recomienda intentar las preguntas <em>antes</em> de ver la retroalimentación.
                </Box>

                <h3>Identificación del espacio académico</h3>
                <div className="overflow-x-auto">
                    <table>

                        <span className="inline-code">tf.Session</span>) y solo al final, cuando el notario lo llamaba, ejecutar. Si había

                        se ejecuta cada paso de inmediato (<em>ejecución eager</em>), se verifica el resultado en el acto y, si algo sale mal,

                        dentro de una <span className="inline-code">tf.Session</span>. Era poco intuitivo y difícil de depurar. Con
                        <strong> TensorFlow 2.0 (2019)</strong> Google adoptó la <strong>ejecución eager</strong> (inmediata) por defecto,

                    <h4>El ecosistema de producción de TensorFlow</h4>
                    <p>Una de las mayores fortalezas de TensorFlow es su ecosistema completo de despliegue:</p>
                    <ul>
                        <li><strong>TensorFlow Serving:</strong> sistema de alto rendimiento en C++ para servir modelos en producción, con versionamiento, pruebas A/B y API REST/gRPC. Estándar de facto en despliegues empresariales de gran escala.</li>
                        <li><strong>LiteRT</strong> (antes TensorFlow Lite): optimiza modelos para móviles y borde (cuantización, reducción de tamaño). Permite correr DL en un Android de una zona rural del Cauca sin internet. Desde 2025 <span className="inline-code">tf.lite</span> se está deprecando y el desarrollo se trasladó a LiteRT como proyecto independiente con APIs nativas en Kotlin y C++.</li>
                        <li><strong>TensorFlow.js:</strong> ejecuta modelos en el navegador o en Node.js (IA del lado del cliente).</li>
                        <li><strong>TFX (TensorFlow Extended):</strong> pipelines de ML de extremo a extremo, de la validación de datos al monitoreo en producción.</li>
                        <li><strong>TensorBoard:</strong> visualización de curvas de pérdida, histogramas de pesos, grafos y métricas durante el entrenamiento.</li>
                    </ul>

                    {/* ============== 1.2 PyTorch ============== */}
                    <h3>2. PyTorch: tensores, grafos dinámicos y módulos</h3>
                    <p>
                        <strong>PyTorch</strong>, desarrollado por Meta AI (FAIR) y publicado en 2016, opera desde 2022 bajo la Linux
                        Foundation. A 2025 domina la investigación académica: ≈<strong>80 % de los artículos de Deep Learning en NeurIPS</strong>{' '}
                        usan este framework, y arquitecturas como GPT, LLaMA, Stable Diffusion y los modelos de Hugging Face están construidas
                        sobre él.
                    </p>

                    <h4>El tensor: la moneda corriente del Deep Learning</h4>
                    <Box type="info" label="Analogía local — la cosecha de café">
                        Si un dato individual es un <strong>grano de café</strong>, un <strong>vector</strong> es un saco de granos (una
                        dimensión), una <strong>matriz</strong> es una estiba de sacos (dos dimensiones) y un <strong>tensor</strong> es un
                        contenedor lleno de estibas (tres o más dimensiones). Toda la información —imágenes, textos, audio— se empaqueta en
                        estos «contenedores multidimensionales» antes de ser procesada.
                    </Box>
                    <p>
                        Un tensor de PyTorch es conceptualmente idéntico a un <span className="inline-code">ndarray</span> de NumPy, pero con
                        dos capacidades críticas: puede ejecutarse en <strong>GPU</strong> y puede <strong>rastrear automáticamente</strong> las
                        operaciones para calcular gradientes (diferenciación automática).
                    </p>
                    <CodeBlock lang="pytorch" title="Tensores y dispositivo" code={`import torch

# Detectar dispositivo disponible
device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')

# Crear tensores y moverlos al mismo dispositivo
datos_sensor = torch.tensor([23.5, 67.8, 45.2, 91.0]).to(device)

# Tensor con rastreo de gradientes (pesos de la red)
pesos = torch.randn(3, 4, requires_grad=True, device=device)

# Operaciones (ambos tensores en el mismo dispositivo)
resultado = datos_sensor @ pesos.T   # Multiplicación matricial`} />
                    <Box type="warn" label="Alerta — mismo dispositivo">
                        Todos los tensores de una operación deben estar en el <strong>mismo dispositivo</strong> (CPU o GPU); de lo contrario
                        PyTorch lanza un error de ejecución. <span className="inline-code">requires_grad=True</span> es la señal que activa el
                        rastreo de operaciones: la base del sistema <strong>Autograd</strong>.
                    </Box>

                    <h4>Grafos computacionales dinámicos: «define-by-run»</h4>
                    <Box type="info" label="Analogía local — el río Magdalena">
                        Un grafo estático (TensorFlow 1.x) es como construir un <strong>canal de riego de concreto</strong> antes de la
                        temporada de lluvias: el agua solo puede fluir por ese camino fijo. Un grafo dinámico (PyTorch) es el
                        <strong> río Magdalena</strong>: su cauce se adapta al terreno, se bifurca, crea meandros y cambia de curso según la
                        temporada. Si el flujo de datos debe cambiar según una condición (¿la imagen tiene nubes o no?), el grafo dinámico lo
                        permite con simples <span className="inline-code">if/else</span> de Python.
                    </Box>
                    <p>
                        En PyTorch el grafo se construye <strong>en tiempo real</strong>, operación por operación, a medida que el código se
                        ejecuta. Esto permite usar las herramientas estándar de depuración de Python (<span className="inline-code">print()</span>,{' '}
                        <span className="inline-code">pdb</span>, puntos de interrupción) para inspeccionar cualquier tensor intermedio. Esa inmediatez es la
                        razón principal de su adopción masiva en investigación.
                    </p>

                    <h4>El sistema Autograd: la bitácora automática</h4>
                    <p>
                        Al operar sobre tensores con <span className="inline-code">requires_grad=True</span>, PyTorch registra cada operación en un
                        grafo dirigido acíclico (DAG). Al invocar <span className="inline-code">.backward()</span> sobre la pérdida, el motor recorre
                        el grafo en orden inverso aplicando la regla de la cadena. Es la implementación práctica de la retropropagación: el
                        «secretario invisible que anota en la bitácora».
                    </p>
                    <CodeBlock lang="pytorch" title="Autograd en acción" code={`x = torch.tensor(2.0, requires_grad=True)
y = 2 * x**2 + 3 * x + 5    # y = 2(4) + 6 + 5 = 19
y.backward()                # Calcula dy/dx = 4x + 3
print(x.grad)               # tensor(11.)  ->  4(2) + 3 = 11`} />

                    <h4>El módulo torch.nn: construcción de redes</h4>
                    <p>
                        PyTorch organiza las redes alrededor de <span className="inline-code">torch.nn.Module</span>. Todo modelo se define como una
                        clase que hereda de <span className="inline-code">nn.Module</span> e implementa dos elementos: el constructor
                        <span className="inline-code">__init__()</span> (donde se declaran las capas) y <span className="inline-code">forward()</span>{' '}
                        (cómo fluyen los datos).
                    </p>
                    <CodeBlock lang="pytorch" title="Definir un modelo con nn.Module" code={`import torch.nn as nn

class DetectorRoya(nn.Module):
    def __init__(self):
        super().__init__()
        self.red = nn.Sequential(
            nn.Linear(4, 128),
            nn.ReLU(),
            nn.Dropout(0.3),
            nn.Linear(128, 64),
            nn.ReLU(),
            nn.Linear(64, 1),
            nn.Sigmoid()
        )

    def forward(self, x):
        return self.red(x)

modelo = DetectorRoya()`} />
                    <CalloutPro tema="info" titulo="Control explícito vs. abstracción" subtitulo="Keras model.fit() ↔ bucle de PyTorch" icon="fa-code-branch">
                        En Keras, <span className="inline-code">model.fit()</span> encapsula todo el ciclo de entrenamiento. En PyTorch el
                        programador escribe explícitamente el <em>bucle de entrenamiento</em>. Más laborioso al inicio, pero otorga control total sobre
                        cada paso, facilitando técnicas avanzadas como la precisión mixta o la acumulación de gradientes.
                    </CalloutPro>

                    <h4>El ecosistema de PyTorch</h4>
                    <ul>
                        <li><strong>TorchVision, TorchAudio, TorchText:</strong> visión, audio y NLP, con datasets, transformaciones y modelos preentrenados (TorchText fue archivado en 2024).</li>
                        <li><strong>Hugging Face Transformers:</strong> la biblioteca de modelos de lenguaje (BERT, GPT, LLaMA) más popular del mundo, construida primordialmente sobre PyTorch.</li>
                        <li><strong>torch.export y ONNX:</strong> <span className="inline-code">torch.export</span> (recomendado desde 2.5) es el sucesor de TorchScript (deprecado) y serializa modelos como grafos AOT sin dependencia de Python; ONNX es el formato abierto de interoperabilidad.</li>
                        <li><strong>TorchServe:</strong> desarrollado por AWS y Meta, el equivalente de TF Serving para PyTorch (REST, lotes, versiones).</li>
                        <li><strong>torch.compile()</strong> (PyTorch 2.x): con una línea, compila el modelo a código de máquina optimizado (≈20–25 % de aceleración).</li>
                        <li><strong>ExecuTorch:</strong> runtime oficial para móviles y borde (sucesor de PyTorch Mobile); consume modelos de <span className="inline-code">torch.export</span> y soporta aceleradores Arm, Apple y Qualcomm.</li>
                    </ul>

                    {/* ============== 1.3 Comparativa ============== */}
                    <h3>3. Comparativa y flujos de trabajo</h3>
                    <Box type="info" label="Analogía local — TransMilenio vs. bicicleta">
                        Elegir entre TensorFlow y PyTorch es como decidir entre <strong>TransMilenio</strong> y <strong>bicicleta</strong> en
                        Bogotá. TransMilenio (TF) tiene rutas establecidas y mueve miles de personas con una infraestructura robusta, pero es
                        rígido. La bicicleta (PyTorch) ofrece libertad total de ruta y se adapta al tráfico, pero exige más esfuerzo del
                        ciclista (el programador). Ninguno es «mejor»: depende de a dónde se vaya y de las condiciones del día.
                    </Box>

                    <h4>El mismo problema en ambos frameworks</h4>
                    <p>
                        Considérese entrenar un <strong>clasificador binario</strong> que determine si una muestra de agua del
                        <strong> río Bogotá</strong> supera los límites de contaminación, a partir de cuatro variables químicas (pH, oxígeno
                        disuelto, DBO, sólidos suspendidos). Así se ve en cada framework:
                    </p>
                    <div className="grid lg:grid-cols-2 gap-3">
                        <CodeBlock lang="python" title="Flujo en Keras (TensorFlow)" code={`# 1. Definir el modelo
modelo = keras.Sequential([
    keras.Input(shape=(4,)),
    keras.layers.Dense(64, activation='relu'),
    keras.layers.Dropout(0.3),
    keras.layers.Dense(32, activation='relu'),
    keras.layers.Dense(1, activation='sigmoid')
])

# 2. Compilar
modelo.compile(optimizer='adam',
               loss='binary_crossentropy',
               metrics=['accuracy'])

# 3. Entrenar (una sola línea)
historia = modelo.fit(X_train, y_train,
                      validation_split=0.2,

# 4. Evaluar

                        <CodeBlock lang="pytorch" title="Flujo en PyTorch" code={`# 1. Definir el modelo
class ClasificadorAgua(nn.Module):
    def __init__(self):
        super().__init__()
        self.red = nn.Sequential(
            nn.Linear(4, 64), nn.ReLU(), nn.Dropout(0.3),
            nn.Linear(64, 32), nn.ReLU(),
            nn.Linear(32, 1))  # Sin Sigmoid: la incluye la pérdida

    def forward(self, x):
        return self.red(x)

modelo = ClasificadorAgua().to(device)
criterio = nn.BCEWithLogitsLoss()   # Sigmoid + BCE (estable)
optimizador = torch.optim.Adam(modelo.parameters())

# 2. Bucle de entrenamiento explícito
for epoca in range(50):
    modelo.train()
    for batch_x, batch_y in dataloader:
        optimizador.zero_grad()           # Limpiar gradientes
        prediccion = modelo(batch_x)      # Forward (logits)
        perdida = criterio(prediccion, batch_y)
        perdida.backward()                # Backpropagation
        optimizador.step()                # Actualizar pesos`} />
                    </div>
                    <Box type="tip" label="Nota técnica — BCEWithLogitsLoss">
                        En PyTorch se usa <span className="inline-code">nn.BCEWithLogitsLoss()</span> en lugar de{' '}
                        <span className="inline-code">nn.BCELoss()</span> + <span className="inline-code">nn.Sigmoid()</span>: fusiona internamente
                        la sigmoide con la entropía cruzada binaria en una operación numéricamente más estable, evitando desbordamientos con
                        valores extremos. El modelo produce <em>logits</em> crudos; para obtener probabilidades en inferencia se aplica{' '}
                        <span className="inline-code">torch.sigmoid()</span>.
                    </Box>

                    <h4>Keras 3: el puente entre mundos</h4>
                    <p>
                        Con Keras 3 (finales de 2023), Keras se volvió <strong>agnóstico de backend</strong>: el mismo código corre sobre
                        TensorFlow, PyTorch o JAX configurando una variable de entorno. Esto elimina la falsa dicotomía: se prototipa con la
                        simplicidad de Keras, se depura con PyTorch y se despliega con TensorFlow o JAX, sin reescribir el modelo.
                    </p>
                    <CodeBlock lang="python" title="Seleccionar backend en Keras 3" code={`import os
os.environ['KERAS_BACKEND'] = 'torch'   # o 'tensorflow', 'jax'
import keras
# ... el resto del código Keras es idéntico para cualquier backend`} />

                        por hora. Entrenar una red es multiplicar matrices enormes —miles de operaciones idénticas sobre datos distintos—,
                        justo el trabajo de la línea industrial.
                    </Box>
                    <CPUvsGPUSVG />
                    <p>
                        Las cifras son contundentes: una CNN de 58 millones de parámetros tarda ≈4.787 s en CPU y ≈745 s en una RTX 2080
                        (aceleración de 6,4×). Para modelos como BERT, las aceleraciones típicas van de 10× a 100×, según el modelo y el hardware.
                    </p>

                    <h4>Núcleos CUDA vs. Tensor Cores</h4>
                    <p>
                        Los <strong>núcleos CUDA</strong> son procesadores de propósito general (una operación de punto flotante por ciclo).
                        Los <strong>Tensor Cores</strong> (desde la arquitectura Volta, 2017) son unidades especializadas en
                        multiplicación-acumulación de matrices (MMA): un solo Tensor Core ejecuta una multiplicación 4×4 en una instrucción.
                        En una A100, los núcleos CUDA dan 19,5 TFLOPS en FP32 y los Tensor Cores <strong>312 TFLOPS en FP16</strong> (16× más para la
                        matemática matricial que domina el DL).
                    </p>

                    <h4>La pila de software: CUDA y cuDNN</h4>
                    <p>
                        <strong>CUDA</strong> (2006) es la plataforma de computación paralela de NVIDIA. Sobre ella se construye
                        <strong> cuDNN</strong>, con implementaciones optimizadas de convoluciones, normalización, activaciones y atención.
                        Cuando se invoca <span className="inline-code">torch.nn.Conv2d</span> o <span className="inline-code">keras.layers.Conv2D</span>,
                        internamente se despacha a cuDNN. Otras bibliotecas: <strong>NCCL</strong> (comunicación multi-GPU) y
                        <strong> TensorRT</strong> (optimización de inferencia).
                    </p>
                    <Box type="tip" label="Contexto local — por qué NVIDIA domina">
                        Cuando un estudiante ejecuta <span className="inline-code">modelo.fit()</span> en Colab con una T4 gratuita, detrás de
                        esa línea se activan automáticamente CUDA, cuDNN y los Tensor Cores, sin escribir una sola línea de bajo nivel. Esa pila
                        de software es la verdadera ventaja competitiva de NVIDIA.
                    </Box>
                    <CudaStackSVG />

                    <h4>VRAM: el recurso más escaso</h4>
                    <p>
                        La <strong>VRAM</strong> almacena simultáneamente los pesos, los estados del optimizador, los gradientes, las
                        activaciones y el lote actual. Regla práctica:
                    </p>
                    <Eq>{String.raw`$$ \text{VRAM}_{\text{pesos}} \approx 2N\ \text{GB} \quad(\text{para } N\text{ mil millones de parámetros en FP16})$$`}</Eq>
                    <p>
                        y el entrenamiento demanda entre 4 y 8 veces esa cantidad para optimizador, gradientes y activaciones.
                    </p>
                    <Box type="danger" label="Analogía local — la bodega y el error CUDA OOM">
                        La VRAM es la <strong>bodega de una plaza de mercado</strong>. No importa cuántos camiones (datos) lleguen ni cuántos
                        vendedores (núcleos) haya: si la bodega se llena, no entra más mercancía. El temido error{' '}
                        <span className="inline-code">CUDA out of memory</span> (OOM) es el administrador diciendo «no hay más espacio,
                        devuelvan el camión». La primera solución siempre es <strong>reducir el tamaño del lote (batch size)</strong>.
                    </Box>
                    <VRAMSVG />

                    <h4>Precisión mixta: hacer más con menos</h4>
                    <p>
                        El entrenamiento con <strong>precisión mixta</strong> realiza la mayoría de los cálculos en 16 bits (FP16 o BF16)
                        mientras mantiene los pesos maestros en FP32 para la estabilidad. Formatos clave:
                    </p>
                    <ul>
                        <li><strong>FP32</strong> (32 bits): precisión completa, para pesos maestros y la pérdida final.</li>
                        <li><strong>BF16</strong> (16 bits, exponente de 8): preferido en Ampere+ (A100, H100); su rango iguala al de FP32, sin necesidad de escalado.</li>
                        <li><strong>FP16</strong> (16 bits, exponente de 5): requiere <em>escalado de pérdida</em> para evitar desbordamientos. En toda GPU con Tensor Cores.</li>
                        <li><strong>FP8</strong> (8 bits): en Hopper (H100) y Blackwell (B200); la H100 alcanza ≈1.979 TFLOPS en FP8 (3.958 con dispersión estructurada).</li>
                    </ul>
                    <FormatosNumericosSVG />
                    <p>Resultado: <strong>2–3× de aceleración y ≈50 % menos memoria</strong>, permitiendo duplicar el lote sin cambiar de hardware.</p>
                    <AMPSVG />

                    <Tabs tabs={[

                    <h4>Gestión de memoria: cuando la GPU dice «no más»</h4>
                    <p>La <strong>acumulación de gradientes</strong> simula lotes grandes sin memoria adicional:</p>
                    <CodeBlock lang="pytorch" title="Acumulación de gradientes" code={`pasos_acumulacion = 8
for i, (entradas, etiquetas) in enumerate(dataloader):
    perdida = criterio(modelo(entradas.to(device)),
                       etiquetas.to(device)) / pasos_acumulacion
    perdida.backward()
    if (i + 1) % pasos_acumulacion == 0:
        optimizador.step()
        optimizador.zero_grad()`} />
                    <ul>
                        <li><strong>Gradient Checkpointing:</strong> descarta activaciones intermedias y las recalcula en el backward; ahorra mucha memoria a costa de un 20–30 % más de cómputo.</li>
                        <li><strong>Flash Attention 2:</strong> reduce la memoria de atención de O(N²) a O(N), con 2–4× de aceleración en Transformers.</li>
                        <li><strong>torch.no_grad():</strong> envolver la validación evita almacenar gradientes innecesarios.</li>
                    </ul>

                    <h4>Entrenamiento multi-GPU: escalar la potencia</h4>
                    <Box type="info" label="Analogía local — la minga">
                        En las comunidades del Cauca, la <strong>minga</strong> es un trabajo comunitario donde decenas de personas colaboran
                        en una tarea común. El entrenamiento multi-GPU funciona igual: cada GPU procesa una porción de los datos y, al final de
                        cada paso, todas comparten sus gradientes para avanzar unificadamente.
                    </Box>
                    <p>
                        <strong>DataParallel (DP)</strong> es simple pero ineficiente (cuello de botella en GPU-0).
                        <strong> DistributedDataParallel (DDP)</strong> lanza un proceso por GPU y sincroniza con NCCL (≈3× más utilización
                        que DP); es la opción recomendada. <strong>FSDP</strong> fragmenta parámetros, gradientes y estados del optimizador,
                        permitiendo entrenar modelos que exceden la VRAM de una sola GPU. En TensorFlow,{' '}
                        <span className="inline-code">tf.distribute.MirroredStrategy()</span> ofrece multi-GPU de un nodo de forma transparente.
                    </p>

                    <h3>1. Pipelines de datos eficientes</h3>
                    <h4>El cuello de botella invisible: «GPU starvation»</h4>
                    <p>
                        El error más común al empezar es culpar a la GPU del entrenamiento lento. Casi siempre el verdadero cuello de botella

                    <Box type="info" label="Analogía local — el restaurante de La Candelaria">
                        El <strong>chef</strong> (la GPU) es rapidísimo, pero la cocina depende de un solo <strong>mesero</strong> (el pipeline)

                        (<span className="inline-code">num_workers</span>), preparar el siguiente plato mientras se cocina el actual
                        (<span className="inline-code">prefetch</span>) y tener a la mano lo más usado (<span className="inline-code">cache</span>).
                    </Box>

                    <h4>tf.data: el pipeline declarativo de TensorFlow</h4>
                    <p>
                        <span className="inline-code">tf.data</span> construye pipelines como cadenas de transformaciones; TensorFlow optimiza
                        internamente el paralelismo CPU-GPU. El orden óptimo es: <strong>map → cache → shuffle → batch → prefetch</strong>.
                    </p>
                    <CodeBlock lang="python" title="Pipeline óptimo con tf.data" code={`import tensorflow as tf

# 1. Cargar los datos
dataset = tf.data.Dataset.from_tensor_slices((imagenes, etiquetas))

# 2. Transformar (preprocesar en paralelo)
dataset = dataset.map(preprocesar, num_parallel_calls=tf.data.AUTOTUNE)

# 3. Caché (evita releer del disco en cada época)
dataset = dataset.cache()

# 4. Mezclar aleatoriamente
dataset = dataset.shuffle(buffer_size=1000)

# 5. Agrupar en lotes
dataset = dataset.batch(32)

# 6. Precargar el siguiente lote (SIEMPRE al final)
dataset = dataset.prefetch(tf.data.AUTOTUNE)`} />

                    <ul>
                        <li><strong>map() con num_parallel_calls:</strong> paraleliza el preprocesamiento; <span className="inline-code">AUTOTUNE</span> deja que TF elija el número de hilos.</li>
                        <li><strong>cache():</strong> guarda el dataset tras la primera época; va después del preprocesamiento pero antes del aumento, para no cachear la aleatoriedad.</li>
                        <li><strong>prefetch():</strong> la más importante. Mientras la GPU entrena con el lote N, la CPU prepara el N+1. <strong>Siempre la última operación</strong>; puede mejorar el rendimiento hasta un 60 % con alta sobrecarga de E/S.</li>

                    <CodeBlock lang="pytorch" title="DataLoader optimizado" code={`from torch.utils.data import Dataset, DataLoader
from torchvision import transforms

class DatasetCafe(Dataset):
    def __init__(self, rutas, etiquetas, transform=None):
        self.rutas = rutas
        self.etiquetas = etiquetas
        self.transform = transform
    def __len__(self):
        return len(self.rutas)
    def __getitem__(self, idx):
        imagen = cargar_imagen(self.rutas[idx])
        if self.transform:
            imagen = self.transform(imagen)
        return imagen, self.etiquetas[idx]

dataloader = DataLoader(
    dataset=DatasetCafe(rutas, etiquetas, transform=mis_transforms),
    batch_size=32,
    shuffle=True,
    num_workers=4,           # Procesos paralelos de carga
    pin_memory=True,         # Memoria fija: transferencia rápida a GPU
    prefetch_factor=2,       # Lotes precargados por worker
    persistent_workers=True  # Mantener workers entre épocas
)`} />

                        <li><strong>pin_memory=True:</strong> asigna tensores en memoria <em>page-locked</em> de la CPU para transferencias asíncronas más rápidas a la GPU. Combinar con <span className="inline-code">.to(device, non_blocking=True)</span>. Solo útil con GPU.</li>
                        <li><strong>prefetch_factor:</strong> lotes precargados por worker (2 por defecto funciona bien).</li>
                        <li><strong>persistent_workers=True:</strong> mantiene los procesos vivos entre épocas, evitando el costo de reiniciarlos. Útil con épocas cortas.</li>
                    </ul>

                    {/* ============== 3.2 Data Augmentation ============== */}
                    <h3>2. Estrategias de Data Augmentation</h3>
                    <Box type="info" label="Analogía local — el director técnico de la Selección Colombia">
                        Si el DT solo entrena al equipo contra el mismo rival, en la misma cancha y con el mismo clima, el equipo no se adapta
                        cuando juega en la altura de La Paz o bajo la lluvia de Barranquilla. El <strong>Data Augmentation</strong> es entrenar
                        en <strong>condiciones variadas</strong>: cambiar iluminación, ángulo, rotación y ruido para que el modelo aprenda
                        patrones esenciales y no memorización superficial.
                    </Box>
                    <p>
                        Es una técnica de <strong>regularización</strong> que aplica transformaciones aleatorias a los datos de entrenamiento:
                        aumenta el tamaño efectivo del dataset, reduce el sobreajuste y mejora la generalización. <strong>Solo se aplica al
                        conjunto de entrenamiento</strong>, nunca a validación o prueba, y en tiempo de ejecución (<em>on-the-fly</em>), generando
                        variaciones distintas en cada época.
                    </p>
                    <AugmentationSVG />
                    <p>Las transformaciones se clasifican en:</p>
                    <ul>
                        <li><strong>Geométricas:</strong> <span className="inline-code">RandomHorizontalFlip</span> (útil en escenas naturales; contraindicado en texto o dígitos), <span className="inline-code">RandomRotation</span>, <span className="inline-code">RandomResizedCrop</span>, <span className="inline-code">RandomAffine</span>.</li>
                        <li><strong>Fotométricas:</strong> <span className="inline-code">ColorJitter</span> (brillo, contraste, saturación, tono — simula sol vs. nublado), <span className="inline-code">GaussianBlur</span>, <span className="inline-code">Normalize</span> (con media/desviación de ImageNet; es preprocesamiento esencial, no un aumento en sí).</li>
                        <li><strong>Mezcla entre muestras:</strong> <strong>Mixup</strong> interpola linealmente dos imágenes y sus etiquetas; <strong>CutMix</strong> recorta una región de una imagen y la pega en otra, ajustando las etiquetas por área. Mejoran calibración y robustez.</li>
                    </ul>

                        <span className="inline-code">weights_only=True</span> es <strong>el comportamiento por defecto desde PyTorch 2.6</strong> y recomendado desde
                        2.4. Sin él, <span className="inline-code">torch.load()</span> usa Pickle, que permite ejecución de código arbitrario al
                        cargar archivos de fuentes no confiables. Con <span className="inline-code">weights_only=True</span> solo se deserializan
                        tensores y tipos primitivos. Guardar el <em>modelo completo</em> es más cómodo pero menos portable y hereda los riesgos de
                        Pickle; úsese solo para guardados temporales.

                    <p>Para entrenamientos largos, el <strong>checkpoint</strong> guarda también el optimizador, la época y la pérdida para reanudar:</p>

    'epoca': epoca,
    'modelo_state_dict': modelo.state_dict(),
    'optimizador_state_dict': optimizador.state_dict(),
    'perdida': perdida_actual,
}
torch.save(checkpoint, f'checkpoint_epoca_{epoca}.pth')`} />

                    <h4>Guardado en TensorFlow/Keras: .keras vs. SavedModel</h4>
                    <CodeBlock lang="python" title="Formatos de Keras" code={`# Formato .keras (Keras 3, multi-backend)
modelo.save('clasificador_cafe.keras')
modelo_cargado = keras.models.load_model('clasificador_cafe.keras')

# Formato SavedModel (para despliegue TF: Serving, LiteRT, TF.js)
# En Keras 3 se genera con export() — save() exige extensión .keras/.h5
modelo.export('clasificador_cafe_savedmodel')

# Para inferencia, el SavedModel se recarga como capa:
capa_inferencia = keras.layers.TFSMLayer(
    'clasificador_cafe_savedmodel', call_endpoint='serving_default')`} />
                    <p>
                        El formato <strong>.keras</strong> (recomendado desde Keras 3) guarda arquitectura, pesos y configuración en un archivo
                        agnóstico de backend; <strong>SavedModel</strong> almacena el grafo completo y la lógica de servicio, estándar para TF
                        Serving, LiteRT y TF.js.
                    </p>

                    <h4>ONNX: el «pasaporte universal»</h4>
                    <p>
                        <strong>ONNX</strong> (Open Neural Network Exchange) es un formato abierto que funciona como un <strong>pasaporte</strong>:
                        permite entrenar en PyTorch y ejecutar en TensorFlow, un servidor C++, un móvil o un acelerador especializado, sin reescribir
                        código. Lo mantiene la Linux Foundation AI &amp; Data y lo soportan Microsoft, Meta, AWS y NVIDIA.
                    </p>
                    <CodeBlock lang="pytorch" title="Exportar a ONNX (exportador recomendado desde PyTorch 2.5)" code={`import torch

modelo.eval()
entrada_ejemplo = (torch.randn(1, 3, 224, 224),)

torch.onnx.export(
    modelo,
    entrada_ejemplo,
    'detector_roya.onnx',
    input_names=['imagen'],
    output_names=['prediccion'],
    dynamic_axes={'imagen': {0: 'batch_size'}},  # dynamo lo traduce a dynamic_shapes
    dynamo=True   # Usa torch.export internamente (NO TorchScript)
)`} />
                    <p>Una vez exportado, el modelo corre con <strong>ONNX Runtime</strong>, que optimiza la ejecución para el hardware disponible (CPU, GPU, aceleradores).</p>

                    <h4>torch.export: el sucesor de TorchScript</h4>
                    <p>
                        <strong>TorchScript</strong> fue oficialmente <strong>deprecado a partir de PyTorch 2.9 (2025)</strong>. Su sucesor,{' '}
                        <span className="inline-code">torch.export</span>, captura el modelo como un grafo <strong>AOT</strong> (Ahead-of-Time)
                        de operadores ATen, consumible por ExecuTorch y ONNX Runtime; se integra con el compilador Dynamo y evita los problemas de
                        compatibilidad de TorchScript.
                    </p>
                    <CodeBlock lang="pytorch" title="Exportar con torch.export (.pt2)" code={`import torch

modelo.eval()
entrada = (torch.randn(1, 3, 224, 224),)
programa = torch.export.export(modelo, entrada)
torch.export.save(programa, 'detector_roya.pt2')

# Cargar en otro entorno (sin el código fuente del modelo)
programa_cargado = torch.export.load('detector_roya.pt2')
resultado = programa_cargado.module()(entrada[0])`} />

                        <li><strong>Borde / móvil:</strong> el modelo se optimiza (cuantización, poda) y se convierte a LiteRT o ExecuTorch para correr en teléfonos o IoT <strong>sin internet</strong>.</li>
                        <li><strong>Navegador:</strong> TensorFlow.js ejecuta el modelo en el navegador, sin servidor de inferencia.</li>

            ['Prefetch', 'Técnica que superpone la preparación del siguiente lote (CPU) con el entrenamiento del lote actual (GPU). Analogía: preparar el siguiente plato mientras el actual se cocina.'],
            ['pin_memory', 'Parámetro del DataLoader que asigna tensores en memoria page-locked de la CPU, permitiendo transferencias DMA asíncronas más rápidas a la GPU.'],
            ['num_workers', 'Número de subprocesos del DataLoader que cargan datos en paralelo en segundo plano. Analogía: meseros trabajando en paralelo.'],
            ['Data Augmentation', 'Técnica de regularización que aplica transformaciones aleatorias (volteo, rotación, color) a los datos de entrenamiento. Analogía: entrenar a la Selección en condiciones variadas.'],
            ['Mixup / CutMix', 'Técnicas de aumento que mezclan dos muestras: Mixup interpola imágenes y etiquetas; CutMix recorta una región y la pega en otra, ajustando las etiquetas por área.'],
            ['AlbumentationsX', 'Biblioteca de augmentation de imágenes optimizada con OpenCV. Sucesora de Albumentations (MIT). Licencia dual AGPL-3.0 / Comercial desde 2025.'],
            ['GPU starvation', '«Hambruna de GPU»: la GPU permanece ociosa esperando datos porque el pipeline no la alimenta a tiempo. Se mitiga con prefetch, num_workers y cache.'],
            ['ONNX', 'Open Neural Network Exchange: formato abierto universal para modelos, mantenido por la Linux Foundation AI. Analogía: el pasaporte universal del modelo.'],
            ['torch.export', 'Sucesor de TorchScript (deprecado en PyTorch 2.9). Captura modelos como grafos AOT (ATen) para despliegue sin Python. Recomendado desde PyTorch 2.5.'],
            ['Transfer Learning', 'Reutilizar un modelo preentrenado (ResNet-18, MobileNetV3) para una tarea nueva con menos datos y cómputo; clave en entornos con recursos limitados.'],
            ['Cuantización', 'Reducir la precisión de los pesos (ej. de FP32 a INT8) para obtener un modelo ≈4× más pequeño y rápido, con cierta pérdida de exactitud; clave para borde.'],
            ['LiteRT', 'Sucesor de TensorFlow Lite. Proyecto independiente para inferencia optimizada en móviles y borde, con APIs nativas en Kotlin y C++.'],
            ['ExecuTorch', 'Runtime oficial de PyTorch para móviles y borde (sucesor de PyTorch Mobile). Consume modelos de torch.export. Soporta Arm, Apple y Qualcomm.'],
            ['SavedModel', 'Formato nativo de TensorFlow para despliegue. Almacena el grafo, los pesos y la lógica de servicio. Estándar para TF Serving, LiteRT y TF.js.'],
            ['Checkpoint', 'Guardado periódico del estado del modelo, el optimizador, la época y la pérdida; permite reanudar un entrenamiento interrumpido (esencial en Colab).'],
            ['FSDP', 'Fully Sharded Data Parallel: estrategia multi-GPU que fragmenta pesos, gradientes y estados del optimizador, para entrenar modelos que exceden la VRAM de una GPU.'],
            ['Google Colab', 'Entorno de cuadernos Jupyter en la nube de Google con acceso gratuito a GPUs T4. Planes Pro (≈10 USD/mes) y Pro+ (≈50 USD/mes) con GPUs más potentes.'],
