                            className={`px-5 py-2 rounded-full text-sm font-semibold transition-all ${seleccionado
                                ? 'bg-white text-primary shadow-md'
                                : 'bg-white/10 text-white border border-white/20 hover:bg-white/20'}`}>
                            {m.etiqueta}
                        </button>
                    );
                })}
            </div>
        );

        /* ============================================================
           HERO — cabecera institucional navy (se adapta al módulo)
        ============================================================ */
        const Hero = ({ modulo, activo, onSelect }) => (
            <header className="usta-header">
                <div className="max-w-5xl mx-auto px-6 py-14 lg:py-20 text-center">
                    <p className="text-xs uppercase tracking-[0.25em] text-gold font-bold mb-3">
                        Universidad Santo Tomás
                    </p>
                    <p className="text-sm text-secondary font-semibold mb-2">
                        Profundización I: Redes Neuronales — Deep Learning
                    </p>
                    <h1 className="text-3xl lg:text-5xl font-extrabold text-white tracking-tight">
                        {modulo.etiqueta} — {modulo.titulo}
                    </h1>
                    <p className="text-white/70 font-light mt-4 max-w-2xl mx-auto">
                        {modulo.subtitulo}
                    </p>

                    <SelectorModulo activo={activo} onSelect={onSelect} />

                    <div className="flex justify-center flex-wrap gap-2 mt-6">
                        {modulo.temas.map(t => (
                            <span key={t}
                                className="px-3 py-1 rounded-full text-xs text-white bg-white/10 border border-white/15">
                                {t}
                            </span>
                        ))}
                    </div>

                    <p className="text-[11px] text-white/70 mt-8">
                        Maestría en Ciencia de Datos · Facultad de Estadística · EA-N-F-004 · Teórico-práctico · 3 créditos
                    </p>
                </div>
            </header>
        );

        /* ============================================================
           TARJETA DESTACADA — núcleo del módulo
        ============================================================ */
        const TarjetaNucleo = ({ data }) => (
            <a href={data.archivo}
                className="usta-card block overflow-hidden group">
                <div className="usta-gradient h-2 w-full"></div>
                <div className="p-7 lg:p-9 flex flex-col md:flex-row gap-6 items-start">
                    <div className="usta-gradient text-white rounded-2xl flex-shrink-0 flex items-center justify-center shadow-md"
                        style={{ width: 64, height: 64 }}>
                        <i className={`fas ${data.icon} text-2xl`} aria-hidden="true"></i>
                    </div>
                    <div className="flex-1">
                        <p className="text-xs uppercase tracking-widest text-secondary font-bold mb-1">
                            {data.eyebrow}
                        </p>
                        <h2 className="text-2xl font-bold text-primary">{data.titulo}</h2>
                        <p className="text-gray-600 mt-3 leading-relaxed">{data.desc}</p>
                        <span className="inline-flex items-center gap-2 mt-5 px-5 py-2.5 rounded-full text-white usta-gradient text-sm font-semibold group-hover:opacity-90 transition-opacity">
                            {data.cta} <i className="fas fa-arrow-right" aria-hidden="true"></i>
                        </span>
                    </div>
                </div>
            </a>
        );

        /* ============================================================
           TARJETA DE RECURSO — hijos del módulo (ruta, consulta, etc.)
        ============================================================ */
        const TarjetaRecurso = ({ data }) => (
            <a href={data.href || data.archivo}
                {...(data.externo ? { target: '_blank', rel: 'noopener noreferrer' } : {})}
                className="usta-card block p-6 group h-full flex flex-col">
                <div className="flex items-center gap-3 mb-3">
                    <span className="bg-primary/10 text-primary rounded-xl flex items-center justify-center flex-shrink-0"
                        style={{ width: 44, height: 44 }}>
                        <i className={`fas ${data.icon} text-lg`} aria-hidden="true"></i>
                    </span>
                    <h3 className="text-lg font-bold text-navy">{data.titulo}</h3>
                </div>
                <p className="text-sm text-gray-600 leading-relaxed flex-1">{data.desc}</p>
                <span className="inline-flex items-center gap-2 mt-4 text-sm font-semibold text-secondary group-hover:gap-3 transition-all">
                    {data.cta} <i className={`fas ${data.externo ? 'fa-arrow-up-right-from-square' : 'fa-arrow-right'} text-xs`} aria-hidden="true"></i>
                </span>
            </a>
        );

        /* ============================================================
           APP — portal multi-módulo de una sola página
        ============================================================ */
        const App = () => {
            const [activo, setActivo] = useState(1);
            const modulo = MODULOS[activo];

            return (
                <div className="min-h-screen flex flex-col">
                    <Hero modulo={modulo} activo={activo} onSelect={setActivo} />

                    <main key={activo} className="flex-1 max-w-5xl w-full mx-auto px-6 py-12 animate-fade-in">
                        <TarjetaNucleo data={modulo.nucleo} />

                        <div className="mt-12">
                            <div className="flex items-center gap-3 mb-5">
                                <span className="usta-gradient text-white p-2 rounded-lg">
                                    <i className="fas fa-layer-group" aria-hidden="true"></i>
                                </span>
                                <h2 className="text-xl font-bold text-navy">Recursos del {modulo.etiqueta.toLowerCase()}</h2>
                            </div>
                            <div className="grid md:grid-cols-2 gap-5">
                                {modulo.recursos.map(r => <TarjetaRecurso key={r.archivo} data={r} />)}
                            </div>
                        </div>

                        <div className="mt-12">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="usta-gradient text-white p-2 rounded-lg">
                                    <i className="fas fa-diagram-project" aria-hidden="true"></i>
                                </span>
                                <h2 className="text-xl font-bold text-navy">Proyecto integrador · crece con el curso</h2>
                            </div>
                            <p className="text-sm text-gray-600 mb-5 ml-1">
                                Proyecto longitudinal Centinela. La Fase 1 pertenece al Módulo 1, la Fase 2 al Módulo 2 y la Fase 3 al Módulo 3.
                            </p>
                            <div className="grid md:grid-cols-2 gap-5">
                                {PROYECTO.map(p => <TarjetaRecurso key={p.archivo} data={p} />)}
                            </div>
                        </div>
                    </main>

                    <footer className="max-w-5xl w-full mx-auto px-6 pb-12">
                        <div className="usta-header rounded-xl p-6 text-center">
                            <p className="text-white font-medium text-sm">
                                <strong>Profundización I: Redes Neuronales — Deep Learning</strong>
                                <span className="text-white/70"> · Módulos 1, 2 y 3 · Proyecto Centinela (Fases 1–3)</span>
                            </p>
                            <p className="text-xs mt-1 text-white/70">
                                Maestría en Ciencia de Datos · Universidad Santo Tomás
                            </p>
                            <p className="text-[11px] mt-3 text-white/70 italic max-w-2xl mx-auto">
                                Metodología «Ingeniería de Trinchera»: si una arquitectura no corre en Google Colab, no existe.
                            </p>
                            <p className="text-[10px] mt-3 text-white/70">
                                Material de aprendizaje autónomo. Analogías contextualizadas al entorno colombiano.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
